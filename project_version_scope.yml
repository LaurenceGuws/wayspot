# PROJECT VERSION SCOPE: active Wayspot development scope and named bounds.
project:
  name: wayspot
  version: 0.1.3-dev
scope:
  included:
    - one Wayspot binary
    - Hyprland/Wayland desktop integration
    - one shared Cmd tree for GUI and CLI
    - one bounded ordered mode array
    - apps as the default picker mode
    - notifications mode
    - wallpaper mode
    - sunglasses mode
    - Bash completion
    - installable Bash completion entrypoint
    - resolved Concrete leaf launch boundary
    - canonical resident packaging and bounded rerun wiring
  excluded:
    - other compositors
    - generic UI toolkit abstractions
    - resident launcher protocol
    - Nushell completion
    - flock or fallback lifecycle daemon
    - GUI-owned resident process lifecycle
freeze:
  compositor: Hyprland/Wayland only
  interfaces:
    cli: Bash first
  gui: SDL picker surface
  cmd_shape:
    shape: subcommand
    template: "wayspot <mode> [operation] [input...]"
    default_mode: apps
mode_catalog_capacity:
  max_modes: 4
  max_resident_modes: 3
  max_candidates_per_mode: 16
  max_sub_cmd_arms_per_mode: 8
  max_input_arms: 4
  max_scalar_fields: 4
  max_concrete_arms: 4
  max_lifecycle_arms: 9
  max_lifecycle_candidates_per_mode: 8
bounds:
  cmd_bytes: 4096
  query_bytes: 256
  candidates: 1024
  completion_candidates: 256
  completion_output_bytes: 65536
  completion_positions: 4
  bash_completion_words: 16
  bash_completion_line_chars: 4096
  bash_completion_word_chars: 256
  process_intent_bytes: 4096
  launch_wait_interrupts: 16
  rerun_pid_records: 8
  rerun_proc_argv_words: 4
  rerun_pid_value: 4194304
  rerun_pid_file_lines: 2
  rerun_wait_checks: 40
  notification_history_open_bytes: 64
  wallpaper_images: 4096
  wallpaper_path_bytes: 4096
  wallpaper_directory_entries: 16384
  notification_count: 256
  notification_app_name_bytes: 256
  notification_summary_bytes: 512
  notification_body_bytes: 4096
  sunglasses_monitors: 8
  sunglasses_monitor_name_bytes: 96
  sunglasses_state_bytes: 16384
  sunglasses_image_path_bytes: 1024
  sunglasses_scalar_bounds:
    dim:
      min: 0
      max: 100
      step: 1
    filter:
      min: -100
      max: 100
      step: 1
    image_opacity:
      min: 0
      max: 100
      step: 1
test_coverage:
  aggregate_root: src/aggregate_test.zig
  accepted_minimum: 320
  current_verified: 377
  aggregate_root_tests: 187
  direct_root_tests: 190
  proof_command: "zig build test --summary all"
proof:
  required_before_acceptance:
    - Cmd and SubCmd construction is bounded and failure-atomic
    - Candidate reachability is exhaustive at every selected arm
    - completion output bound includes every emitted byte
    - Cmd completion returns only the next shell argument at each named position
    - top-level COMPREPLY contains apps, notifications, wallpaper, and sunglasses
    - nested COMPREPLY contains no full wayspot command prefix or notification-history leaf
    - Bash rejects invalid COMP_POINT and excessive COMP_CWORD or COMP_WORDS state
    - Bash rejects a middle-of-word COMP_POINT without invoking Wayspot
    - process launch rejects empty and overlong intents before fork
    - process launch rejects embedded NUL before sentinel construction
    - process launch accepts the exact process intent bound and rejects one byte beyond it
    - process launch maps child success, child failure, fork failure, and wait interruption bounds exactly
    - process launch imports no Cmd, GUI, or CLI code
    - GUI LaunchQueue clears after process success and failure
    - wayspot notifications, wayspot wallpaper, and wayspot sunglasses select their owning resident entrypoints
    - wallpaper rotate and sunglasses typed operations select the owning SubCmd or Concrete leaf meaning
    - root help lists apps first and all canonical modes without resident flags
    - every legacy resident flag is rejected to help while --ui remains the exact GUI entry
    - Input exposes exactly none, scalar, toggle, and path arms
    - every typed Concrete leaf declares its accepted Input arms
    - scalar, toggle, path, and monitor bounds are equal in GUI and CLI
    - GUI control commits and equivalent CLI argv produce equal Concrete values
    - producer string lifetime is explicit and tested
    - apps is the default picker mode in GUI and CLI
    - CLI, GUI, and resident mode receipts are captured
    - build.zig exposes the current direct CLI, GUI, process, Cmd, mode, and resident roots
    - systemd uses the exact canonical notifications argv
    - rerun starts only exact canonical resident argv
    - rerun recognizes exact legacy argv only for bounded stop and cleanup
    - rerun rejects malformed, stale, duplicate, and over-bound PID data
    - tools/re-run_test.sh exercises legacy and canonical stop paths in isolation
