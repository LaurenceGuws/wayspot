# PROJECT DESIGN: Wayspot Cmd-tree architecture and ownership shape.
# Product vocabulary and ownership remain authoritative in DOMAIN.yml.
project:
  name: wayspot
  version: 0.1.3-dev
  type: single_binary
purpose: A small Wayland desktop-environment busybox for bare Hyprland.
source:
  domain: DOMAIN.yml
  implementation: src/
  build: build.zig
  workflow: AGENTS.md
  scope: project_version_scope.yml
  debt: debt_offenders.yml
document_precedence:
  - project_version_scope.yml
  - project_rules.yml
  - DOMAIN.yml
  - project_design.yml
  - AGENTS.md
  - README.md
ownership:
  cmd:
    role: top-level tagged union and recursive Cmd-tree owner
    symbol: Cmd
    current_source: src/picker/cmd.zig
  sub_cmd:
    role: one shared closed tagged union carrying resident child unions; apps has no child union
    symbol: SubCmd
    source: src/picker/sub_cmd.zig
  candidate:
    role: next reachable Cmd-tree node or concrete terminal candidate
    symbol: Candidate
    current_source: src/picker/candidate.zig
  input:
    role: typed value carried by a Concrete leaf; never GUI widget state or resident runtime state
    symbols:
      - Input
      - ScalarInput
      - ToggleInput
      - PathInput
    source: src/picker/candidate.zig
    owner: picker.candidate
  gui:
    role: SDL lifecycle, input, candidate-tree rendering, selection, and intent
    current_source: src/gui/surface.zig
  cli:
    role: candidate-tree consumption, Bash serialization, and help output
    current_source: src/cli/entry.zig
  process:
    role: resolved leaf launch ownership plus executable entry, identity, mode selection, and resident runtime invocation
    current_source: src/process/launch.zig
    entry_source: src/main.zig
    intent:
      input: bounded []const u8 resolved leaf intent
      bound: project_version_scope.yml:process_intent_bytes
      rejection: empty, overlong, and embedded NUL input before fork
      sentinel: constructed and owned by src/process/launch.zig
  modes:
    role: concrete Cmd arms with one candidate source and optional resident runtime
    current_sources:
      - src/picker/mode/
      - src/notification/
      - src/wallpaper/
      - src/sunglasses/
dependency_graph:
  compile:
    sub_cmd: []
    input: []
    candidate:
      - sub_cmd
      - input
    cmd:
      - sub_cmd
      - candidate
      - input
      - concrete mode route behavior
    gui:
      - cmd
      - process launch
      - SDL
    cli:
      - cmd
      - process launch
      - Bash serialization
    process:
      - resolved leaf intent
      - resident mode runtime owners
  mode_catalog:
    imports:
      - src/picker/mode/apps.zig
      - src/picker/mode/notifications.zig
      - src/picker/mode/wallpaper.zig
      - src/picker/mode/sunglasses.zig
    order:
      - apps
      - notifications
      - wallpaper
      - sunglasses
  forbidden:
    - cmd importing SDL
    - cmd importing Bash serialization
    - cmd importing GUI or CLI code
    - candidate importing SDL, Bash, or GUI code
    - GUI rebuilding the Cmd tree independently
    - CLI rebuilding the Cmd tree independently
    - GUI storing Input as resident runtime state
    - CLI constructing a second Concrete leaf representation
    - process importing Cmd, GUI, or CLI code
    - resident mode runtime importing the picker surface
    - a generic mode registry or erased mode interface
mode_shape:
  cmd_shape: subcommand
  cmd_template: "wayspot <mode> [operation] [input...]"
  top_level: Wayspot Cmd arms
  default_mode: apps
  modes:
    - apps
    - notifications
    - wallpaper
    - sunglasses
  resident_modes:
    - notifications
    - wallpaper
    - sunglasses
  consumers:
    - gui
    - cli
cmd_tree:
  cmd:
    type: tagged_union
    symbol: Cmd
    arms:
      - apps
      - notifications
      - wallpaper
      - sunglasses
    array:
      type: bounded_ordered_array
      order:
        - apps
        - notifications
        - wallpaper
        - sunglasses
      default: apps
  sub_cmd:
    type: tagged_union
    symbol: SubCmd
    source: src/picker/sub_cmd.zig
    arms:
      - notifications: NotificationsSubCmd
      - wallpaper: WallpaperSubCmd
      - sunglasses: SunglassesSubCmd
    apps: none
    rule: this is one closed concrete union; src/picker/sub_cmd.zig declares all child unions and each resident mode owns route behavior for its explicit arm
    child_unions:
      NotificationsSubCmd:
        arms:
          - history
          - restart
      WallpaperSubCmd:
        arms:
          - restart
          - rotate
      SunglassesSubCmd:
        arms:
          - restart
          - apply
          - reconcile
          - dim: DimSubCmd
          - filter: FilterSubCmd
          - image: ImageSubCmd
      DimSubCmd:
        arms:
          - set
          - on
          - off
        input_contract:
          set: scalar
          on: toggle
          off: toggle
      FilterSubCmd:
        arms:
          - set
          - on
          - off
        input_contract:
          set: scalar
          on: toggle
          off: toggle
      ImageSubCmd:
        arms:
          - set
          - opacity
          - on
          - off
          - clear
        input_contract:
          set: path
          opacity: scalar
          on: toggle
          off: toggle
          clear: none
  candidate:
    type: tagged_union
    symbol: Candidate
    source: src/picker/candidate.zig
    arms:
      - sub_cmd: SubCmd
      - concrete: Concrete
    meaning: the next reachable node of the selected Cmd tree
    rule: Candidate.sub_cmd stores the one shared SubCmd union; Candidate.concrete stores one terminal Concrete leaf; no generic or erased child storage exists
  input:
    type: tagged_union
    symbol: Input
    source: src/picker/candidate.zig
    arms:
      - none
      - scalar: ScalarInput
      - toggle: ToggleInput
      - path: PathInput
    fields:
      ScalarInput:
        - value: i32
        - min: i32
        - max: i32
        - step: i32
      ToggleInput:
        - enabled: bool
      PathInput:
        - bytes: fixed_storage
        - length: usize
    scalar_invariant: min <= value <= max, step is positive and no greater than max - min, and (value - min) % step == 0
    ownership: Input values are copied into Concrete leaves; PathInput owns its bounded path bytes
    gui_policy:
      none: action leaf
      scalar: reusable slider draft, committed as Input.scalar
      toggle: reusable on/off control, committed as Input.toggle
      path: bounded textbox draft, committed as Input.path
    cli_policy: raw argv is parsed into the same Input arm and bounds before leaf construction
    bounds:
      arm_count: project_version_scope.yml:max_input_arms
      scalar: project_version_scope.yml:sunglasses_scalar_bounds
      path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
    invariant: GUI and CLI construct equal Input values for equal accepted input and reject equal invalid input
    relation: Input is the typed value field of a Concrete leaf; it is not another Candidate arm or a parallel candidate tag
  concrete:
    type: tagged_union
    symbol: Concrete
    source: src/picker/candidate.zig
    arms:
      - app
      - open
      - lifecycle
      - notification
    lifecycle:
      type: tagged_union
      symbol: Lifecycle
      arms:
        - notifications_restart
        - wallpaper_restart
        - wallpaper_rotate
        - sunglasses_restart
        - sunglasses_apply
        - sunglasses_reconcile
        - sunglasses_dim
        - sunglasses_filter
        - sunglasses_image
    typed_leaf_fields:
      app:
        input: Input.none
        owner: src/picker/mode/apps.zig
      open:
        input: Input.none
        owner: src/picker/mode/apps.zig
      lifecycle:
        notifications_restart:
          input: Input.none
        wallpaper_restart:
          input: Input.none
        wallpaper_rotate:
          input: Input.none
        sunglasses_restart:
          input: Input.none
        sunglasses_apply:
          input: Input.none
        sunglasses_reconcile:
          input: Input.none
        sunglasses_dim:
          fields:
            monitor: owned bounded monitor name
            input:
              type: Input
              accepted_arms:
                - scalar
                - toggle
          scalar_bounds: project_version_scope.yml:sunglasses_scalar_bounds.dim
        sunglasses_filter:
          fields:
            monitor: owned bounded monitor name
            input:
              type: Input
              accepted_arms:
                - scalar
                - toggle
          scalar_bounds: project_version_scope.yml:sunglasses_scalar_bounds.filter
        sunglasses_image:
          fields:
            monitor: owned bounded monitor name
            input:
              type: Input
              accepted_arms:
                - none
                - scalar
                - toggle
                - path
          scalar_bounds: project_version_scope.yml:sunglasses_scalar_bounds.image_opacity
      notification:
        input: Input.none
        owner: src/notification/history_list.zig
    ownership:
      declaration: src/picker/candidate.zig
      app: src/picker/mode/apps.zig
      open: src/picker/mode/apps.zig
      lifecycle: selected resident mode route owner
      notification: src/notification/history_list.zig
    resolution:
      app: executable leaf intent
      open: executable leaf intent
      lifecycle: typed resident leaf intent
      notification: explicit display-only rejection at selection and launch
    bounds:
      arm_count: project_version_scope.yml:max_concrete_arms
      lifecycle_arm_count: project_version_scope.yml:max_lifecycle_arms
      monitor_name_bytes: project_version_scope.yml:sunglasses_monitor_name_bytes
      image_path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
    rule: Concrete is terminal and every leaf carries an explicit Input contract; hint and mode are not Concrete arms
  input_equivalence:
    examples:
      - 'wayspot sunglasses dim DP-1 set 35 equals a GUI slider commit at 35'
      - 'wayspot sunglasses dim DP-1 on equals a GUI toggle commit enabled'
      - 'wayspot sunglasses dim DP-1 off equals a GUI toggle commit disabled'
      - 'wayspot sunglasses filter DP-1 set -35 equals a GUI slider commit at -35'
      - 'wayspot sunglasses image DP-1 opacity 55 equals a GUI slider commit at 55'
      - 'wayspot sunglasses image DP-1 set /absolute/image.png equals a GUI textbox commit'
    rejection: GUI and CLI reject the same out-of-bound scalar, toggle, path, and monitor values
  interface_rule: GUI and CLI consume the same Cmd array, SubCmd unions, Candidate values, and Input values
mode_catalog:
  apps:
    mode: apps
    role: installed application and fixed-local desktop action launch mode
    cmd: "wayspot apps"
    process_entry: none
    candidate_owner: src/picker/mode/apps.zig
    runtime_owner: none
    default_mode: true
    compositor_dependency: none
    picker_queries:
      - /apps
    sub_cmd: none
    candidate_shape: concrete
    candidates:
      - kind: concrete
        source: installed applications and available fixed-local actions
        behavior: launch selected application or fixed-local action
    lifecycle_candidates: []
    direct_cmds: []

  notifications:
    mode: notifications
    role: freedesktop notification resident mode
    cmd: "wayspot notifications"
    process_entry: "wayspot notifications"
    candidate_owner: src/picker/mode/notifications.zig
    runtime_owner: src/notification/
    default_mode: false
    picker_queries:
      - /notifications
      - /notifications history
    sub_cmd:
      type: NotificationsSubCmd
      source: src/picker/sub_cmd.zig
      owner: src/picker/mode/notifications.zig route behavior
      wrapper_arm: notifications
      arms:
        - history
        - restart
    candidates:
      - kind: sub_cmd
        name: history
        input: /notifications history
      - kind: concrete
        name: restart
        input: "lifecycle:notifications:restart"
    lifecycle_candidates:
      - restart
    direct_cmds: []

  wallpaper:
    mode: wallpaper
    role: still-image wallpaper resident mode
    cmd: "wayspot wallpaper"
    process_entry: "wayspot wallpaper"
    candidate_owner: src/picker/mode/wallpaper.zig
    runtime_owner: src/wallpaper/
    default_mode: false
    picker_queries:
      - /wallpapers
    sub_cmd:
      type: WallpaperSubCmd
      source: src/picker/sub_cmd.zig
      owner: src/picker/mode/wallpaper.zig route behavior
      wrapper_arm: wallpaper
      arms:
        - restart
        - rotate
    candidates:
      - kind: concrete
        name: restart
        input: "lifecycle:wallpapers:restart"
      - kind: concrete
        name: rotate
        input: "wayspot wallpaper rotate"
    lifecycle_candidates:
      - restart
      - rotate
    direct_cmds:
      - "wayspot wallpaper rotate"

  sunglasses:
    mode: sunglasses
    role: focused per-monitor overlay resident mode
    cmd: "wayspot sunglasses"
    process_entry: "wayspot sunglasses"
    candidate_owner: src/picker/mode/sunglasses.zig
    runtime_owner: src/sunglasses/
    default_mode: false
    picker_queries:
      - /sunglasses
    sub_cmd:
      type: SunglassesSubCmd
      source: src/picker/sub_cmd.zig
      owner: src/picker/mode/sunglasses.zig route behavior
      wrapper_arm: sunglasses
      arms:
        - restart
        - apply
        - reconcile
        - dim: DimSubCmd
        - filter: FilterSubCmd
        - image: ImageSubCmd
    candidates:
      - kind: concrete
        name: restart
        input: "lifecycle:sunglasses:restart"
      - kind: concrete
        name: apply
        input: "wayspot sunglasses apply"
      - kind: concrete
        name: reconcile
        input: "wayspot sunglasses reconcile"
      - kind: sub_cmd
        name: dim
        input: "wayspot sunglasses dim"
        route: SubCmd.sunglasses.dim
      - kind: sub_cmd
        name: filter
        input: "wayspot sunglasses filter"
        route: SubCmd.sunglasses.filter
      - kind: sub_cmd
        name: image
        input: "wayspot sunglasses image"
        route: SubCmd.sunglasses.image
    lifecycle_candidates:
      - restart
      - apply
      - reconcile
    nested_candidates:
      dim:
        kind: sub_cmd
        route: DimSubCmd
        candidates:
          - operation: set
            input: scalar
            leaf: lifecycle.sunglasses_dim
          - operation: on
            input: toggle
            leaf: lifecycle.sunglasses_dim
          - operation: off
            input: toggle
            leaf: lifecycle.sunglasses_dim
      filter:
        kind: sub_cmd
        route: FilterSubCmd
        candidates:
          - operation: set
            input: scalar
            leaf: lifecycle.sunglasses_filter
          - operation: on
            input: toggle
            leaf: lifecycle.sunglasses_filter
          - operation: off
            input: toggle
            leaf: lifecycle.sunglasses_filter
      image:
        kind: sub_cmd
        route: ImageSubCmd
        candidates:
          - operation: set
            input: path
            leaf: lifecycle.sunglasses_image
          - operation: opacity
            input: scalar
            leaf: lifecycle.sunglasses_image
          - operation: on
            input: toggle
            leaf: lifecycle.sunglasses_image
          - operation: off
            input: toggle
            leaf: lifecycle.sunglasses_image
          - operation: clear
            input: none
            leaf: lifecycle.sunglasses_image
    direct_cmds:
      - "wayspot sunglasses apply"
      - "wayspot sunglasses reconcile"
      - "wayspot sunglasses dim <monitor> set <scalar>"
      - "wayspot sunglasses dim <monitor> on"
      - "wayspot sunglasses dim <monitor> off"
      - "wayspot sunglasses filter <monitor> set <scalar>"
      - "wayspot sunglasses filter <monitor> on"
      - "wayspot sunglasses filter <monitor> off"
      - "wayspot sunglasses image <monitor> set <path>"
      - "wayspot sunglasses image <monitor> opacity <scalar>"
      - "wayspot sunglasses image <monitor> on"
      - "wayspot sunglasses image <monitor> off"
      - "wayspot sunglasses image <monitor> clear"

mode_catalog_totals:
  modes: 4
  resident_modes: 3
  default_mode: apps
  top_level_candidate_rows: 11
  lifecycle_candidates: 6
  declared_input_arms: 4
  declared_lifecycle_arms: 9

mode_catalog_capacity:
  max_modes: 4
  max_resident_modes: 3
  max_candidates_per_mode: 16
  max_sub_cmd_arms_per_mode: 8
  max_input_arms: 4
  max_scalar_fields: 4
  max_lifecycle_candidates_per_mode: 8

transition:
  previous_cmd_shape:
    source: src/picker/command.zig
    shape: flat Candidate.List with separate Mode collection
    required_exit:
      - introduce the Cmd tagged union and ordered mode array
      - add the shared closed SubCmd wrapper with explicit resident child arms
      - make Candidate store SubCmd or Concrete explicitly
      - make every Concrete leaf carry an explicit Input contract
      - make scalar, toggle, and path input bounds identical in GUI and CLI
      - make apps the default picker mode
  current_cmd_shape:
    source: src/picker/cmd.zig
    shape: bounded Cmd array consumed by CLI and GUI
  current_process_shape: src/main.zig flag branches
  noncanonical_entries:
    - --notifications-daemon
    - --wallpaper
    - --next-wallpaper
    - --wallpaper-rotate-now
    - --sunglasses-daemon
    - --sunglasses-apply
    - --sunglasses-reconcile
    - --sunglasses-set-image
    - --sunglasses-clear-image
  canonical_process_shape: mode_catalog cmd and process_entry
  required_exit:
    - remove flag-based resident mode entry paths
    - make every mode record executable through its cmd
    - keep apps available through wayspot apps and the default picker mode

interfaces:
  cmd:
    role: shared semantic Cmd tree and completion policy owner
    paths:
      - mode subcommands from mode_catalog
      - query
      - open
      - complete bash
    completion:
      symbol: Completion
      positions:
        - mode
        - sub_cmd
        - operation
        - app
      result: one borrowed next shell argument without a wayspot command prefix
      ownership: Cmd selects the argument; CLI serializes and quotes it
  gui:
    role: shared Cmd, Candidate, and Input consumer and SDL picker owner
    path: src/gui/surface.zig
    input_controls:
      - Input.none: direct action
      - Input.scalar: reusable slider draft committed to a typed leaf
      - Input.toggle: reusable on/off control committed to a typed leaf
      - Input.path: bounded textbox draft committed to a typed leaf
  cli:
    role: shared Cmd, Candidate, and Input consumer and Bash/help wire owner
    path: src/cli/entry.zig
    serialization_source: src/cli/bash_completion.zig
    completion_entrypoint: packaging/bash/wayspot.bash
    input_contract: raw argv and GUI commit construct equal typed leaf values
  process:
    role: resolved leaf launch owner and resident runtime caller
    path: src/main.zig
    launch_source: src/process/launch.zig
    mode_entry: mode_catalog.process_entry
    launch_input: bounded []const u8; process owns sentinel construction
