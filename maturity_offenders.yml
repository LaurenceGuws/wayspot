      unit_gates:
        - "Test pure SDL property/result mapping, plain-id publication, bounds, and every listed SDL/Wayland error without C handles."
        - "Test configure success/closed/roundtrip mapping and exact reverse cleanup state transitions."
      fuzz_gates:
        - "Fuzz bounded names, sizes, ids, layer values, configure facts, typed result codes, and fixed transcript lengths; assert termination, no invalid id publication, and no double cleanup."
      simulation_gates:
        - "Run one exact sunglasses transcript for property creation/setters, window creation, property destruction, Wayland setup/configure, resize, deinit, and window destruction."
        - "Run setter, window-create, property-lookup, globals, output, layer, input-region, closed-configure, roundtrip, and resize failures; assert exact operation order and reverse cleanup."
        - "Assert the transcript contains only plain ids and values, native handles never enter transcript state, borrowed SDL display/surface handles are not disconnected or destroyed, and no deferred image/SHM/render/event operation is called."
