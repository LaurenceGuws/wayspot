        comptime_justification:
          - "The Source parameter exists only on requestWith, queryMonitorsWith, fillStateWith, EventStream.initWith, EventStream.waitWith, EventStream.deinit, MonitorSourceWith, and MonitorFactStreamWith; the owner compositions call the same Source methods and are not product-owned generic collections or runtime interfaces."
