    exact_bounds:
      - "WAYSPOT_LAYER_MAX_OUTPUTS is 8; output_count never exceeds 8."
      - "WAYSPOT_LAYER_MAX_OUTPUT_NAME is 96; one terminating byte is retained by the C slot."
      - "The env monitor bound is src/env/monitor.zig:max_monitors = 8."
      - "The SDL display adapter copies at most 8 display ids and 96 name bytes; one display transcript has at most 26 operations."
      - "The SDL window/property transcript has at most 32 operations; one title has 1..160 bytes and one window/property id is the nonzero token 1."
      - "Window property width and height are positive i32 values and are rejected before transcript publication; the Wayland anchor mask is 1..15."
      - "A configured reply has serial 1..u32 and width/height 1..2147483647; a closed reply has zero serial and dimensions."
      - "Display names are non-empty, contain no embedded NUL, and have at most 96 bytes; display scales are finite and strictly positive or absent only for the explicit SDL scale-missing error."
      - "The C buffer accepts width and height greater than zero, rejects multiplication overflow, and stores stride * height bytes."
      - "One SDL_Event is the input/output unit for wait, poll, and push; shutdown uses the exact SDL quit, terminating, and window-close event types."
      - "Layer names and monitor names enter C as bounded sentinel strings owned by the caller."
    exact_errors:
      - >-
        The SDL owner mapping is exhaustive: SdlHintFailed, SdlInitFailed,
        SdlTextInputFailed, SdlShowFailed, SdlRendererFailed, SdlWindowFailed,
        SdlWindowSizeFailed, SdlWindowPropertyMissing, SdlMonitorQueryFailed,
        SdlMonitorNameMissing, SdlMonitorSizeMissing, SdlMonitorScaleMissing,
        SdlMonitorPropertyMissing, SdlWaitFailed, SdlRenderFailed,
        SdlResizeFailed, SdlScaleFailed, SdlClipboardFailed,
        SdlTextTextureFailed, and SdlTextRenderFailed.
      - >-
        The implemented display adapter also maps InvalidMonitorName,
        InvalidMonitorSize, InvalidMonitorScale, MonitorIdOutOfRange, and
        TooManyMonitors without exposing SDL result types.
      - >-
        The Wayland owner mapping is exhaustive: WaylandDisplayUnavailable,
        WaylandSurfaceUnavailable, LayerShellOutputMissing,
        LayerShellSurfaceCreateFailed, LayerShellRegistryFailed,
        LayerShellRegistryListenerFailed, LayerShellRoundtripFailed,
        LayerShellMissing, LayerShellCompositorMissing, LayerShellShmMissing,
        LayerShellInputRegionFailed, LayerShellConfigureFailed,
        LayerShellClosed, LayerShellUnexpectedResult,
        WallpaperImageUnexpectedResult, and SunglassesBufferUnexpectedResult.
      - >-
        The pure Wayland transcript additionally rejects invalid lifecycle and
        fact use with WaylandGlobalsNotInitialized,
        WaylandGlobalsAlreadyInitialized, WaylandLayerNotCreated,
        WaylandLayerAlreadyCreated, WaylandLayerDestroyed,
        WaylandCleanupOutOfOrder, WaylandIoDeinitialized,
        InvalidWaylandAnchor, InvalidConfigureFacts,
        InvalidWaylandLayerValue, WaylandProtocolOutOfOrder, WaylandOutputNotSelected, and
        WaylandConfigureSerialMismatch.
      - >-
        The wallpaper and sunglasses image mapping is exhaustive:
        WallpaperUnsupportedImageExtension, WallpaperImageLoadFailed,
        WallpaperImageConvertFailed, WallpaperImageTargetFailed,
        WallpaperImageScaleFailed, SunglassesUnsupportedImageExtension,
        SunglassesImageLoadFailed, SunglassesImageConvertFailed,
        SunglassesImageTargetFailed, SunglassesImageScaleFailed, and
        SunglassesImageOpacityInvalid.
      - >-
        The wallpaper and sunglasses buffer mapping is exhaustive:
        WallpaperInvalidBufferSize, WallpaperMemfdFailed,
        WallpaperTruncateFailed, WallpaperMmapFailed, WallpaperShmPoolFailed,
        WallpaperWlBufferFailed, SunglassesInvalidBufferSize,
        SunglassesMemfdFailed, SunglassesTruncateFailed,
        SunglassesMmapFailed, SunglassesShmPoolFailed, and
        SunglassesWlBufferFailed.
    exact_cleanup:
      - "Native SDL property cleanup follows failed setters and window cleanup follows failed layer setup; each native object is destroyed once."
      - "Native Wayland cleanup destroys the layer, flushes, and deinitializes globals; borrowed SDL display and surface handles are never disconnected or destroyed."
      - "The pure transcript completes property, window, layer, and globals cleanup exactly once; a failed cleanup remains in CleanupSession and a retry consumes only the repeated failed operation."
    pure_internal_paths:
      - "src/gui/surface.zig:handleEvent/routeQueryForSelection/queryMouseByteOffset"
      - "src/wallpaper/surface.zig:imageKind/coverSourceRect/positiveRect/mapWallpaperImageResult"
      - "src/sunglasses/surface.zig:imageKind/coverSourceRect/positiveRect/mapSunglassesBufferResult"
    unit_gates:
      - "Test bounded display count, name, size, scale, monitor-id mapping, window/property result mapping, and layer result mapping with exact plain values."
    fuzz_gates:
      - "Fuzz bounded display counts, names, scales, ids, sizes, configure facts, and fixed transcript lengths; assert termination and no invalid token publication."
    simulation_gates:
      - "Drive queryMonitorsWith through a DisplayTranscript for valid ids, null and invalid SDL lists, name/size/scale failures, out-of-range ids, exact SDL_free order, and no partial published list."
      - "Run src/c/io_simulation_test.zig for exact SDL property/window success and failure, the ordered Wayland sunglasses protocol through both configure rounds, returned CleanupSession retry, setup failure, reverse cleanup, and plain-id-only transcripts."
      - "Compile/link src/c/native_io_check.zig separately; its explicit table proves every implemented native display callback and SDL/Wayland setup entry point is analyzed and linked without invoking native code. Surface image, SHM, render, event, and wallpaper paths remain deferred."
