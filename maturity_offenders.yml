        - std.testing.TmpDir
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace image path fixture roots with a typed image/file transcript; C surface calls remain order-1 simulation."
    - path: src/wallpaper/config.zig
      symbols:
        - "config loader rejects oversized file"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.TmpDir
        - tmp.dir.writeFile
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace wallpaper config fixture files with a typed ConfigFileIo transcript; parse remains unit/fuzz."
    - path: src/wallpaper/library.zig
      symbols:
        - "library scan indexes PNG and BMP records from one directory"
        - "library scan requires an absolute directory path"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.TmpDir
        - tmp.dir.writeFile
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace wallpaper directory fixture trees with WallpaperLibraryIo open/next/stat/close transcripts."
    - path: src/wallpaper/loop.zig
      symbols:
        - "wallpaper owner rejects a second live pid file"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.TmpDir
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace wallpaper pid fixture paths with PidStatusFileIo and ProcessControlIo transcripts."
  required_scan: >-
    Run rg for std.testing.tmpDir, std.testing.io, std.testing.TmpDir, tmp.dir,
    and test-only realPathFileAlloc calls. The result must equal these fourteen
    source paths; every match remains an open migration offender and is
    forbidden as maturity simulation evidence.

absent_dependencies:
  - name: sqlite
    present: false
    evidence: "No SQLite import, link, schema, query, or database path exists in src, build.zig, or assets."
  - name: ini
    present: false
    evidence: "No INI parser, INI reader, or INI file path exists in src, build.zig, or assets."
  - name: jsonl
    present: false
    evidence: "No JSONL reader or writer exists; in-scope JSON parsing belongs to the Hyprland wire adapter."

test_classes:
  unit:
    meaning: >-
      Run a pure Wayspot function with bounded values and assert exact returned
      values, errors, and owned-memory state.
  fuzz:
    meaning: >-
      Generate bounded bytes or typed wire values for a pure parser and assert
      termination, exact rejection, and cleanup without an external process.
  simulation:
    meaning: >-
      Run production code against an exact mock IO interface. The mock is
      generated from bounded operations and reproduces every input byte, output
      byte, error, partial transfer, callback, and cleanup event exactly; it is
      not a fixture, screenshot, live GUI or compositor call, shell call, or
      canned external object.

rules:
  pure_internal_modules: >-
    Pure parsers, event classifiers, result mappers, geometry, and state
    transitions use unit and fuzz only. They do not receive a mock IO object.
  external_adapters: >-
    Every direct C, socket, D-Bus, main-loop, file, terminal, or diagnostic-log
    owner uses a named mock seam and simulation. Passing unit or fuzz evidence
    alone does not close that owner.
  mock_cleanup: >-
    Every simulated handle, buffer, variant, source, callback context, and
    connection has one explicit deinit or close assertion on success and every
    error path.
  source_path_rule: >-
    current_owner_paths name current files and symbols. current_direct_calls list
    exact calls; grouped keys name adapter call groups owned by the paths above.
    planned_mock_interface paths are targets until their boundary marks an
    implemented slice; an implemented target is also a current source claim.
  test_class_rule: "Only unit, fuzz, and simulation occur in this register."

boundaries:
  - order: 1
    name: sdl_wayland_window_display_events
    status: partial_sdl_display_facts
    next_design:
      status: pending
      scope: >-
        This is one paired window/property and Wayland layer slice for the
        sunglasses consumer. The implemented display-facts slice remains
        unchanged. Wallpaper and the image, SHM, render, texture, clipboard,
        event, and standalone Wayland connection slices remain deferred.
      no_c_mock_build:
        status: required
        rule: >-
          Transcript, unit, fuzz, and simulation code is plain typed Zig. It
          does not import sdl_c or wayland_c, link libc or SDL3, link a
          Wayland library, start a DE, or invoke native adapter code.
        plain_modules:
          - path: src/c/sdl_io.zig
            role: >-
              Own SdlDisplayIo, SdlWindowIo, SdlWindowPropertyIo, their plain
              result types, and fixed typed transcripts. This module is the
              mock source used by unit, fuzz, and simulation targets.
            imports: []
            links: []
          - path: src/c/wayland_io.zig
            role: >-
              Own WaylandIo, its plain layer/display/surface result types, and
              fixed typed transcripts. This module is the mock source used by
              unit, fuzz, and simulation targets.
            imports: []
            links: []
          - path: src/c/io_simulation_test.zig
            role: >-
              Test the paired sunglasses transcript against exact typed mock
              operation records; it imports only sdl_io and wayland_io.
            imports:
              - sdl_io
              - wayland_io
            links: []
            display: absent
        native_modules:
          - path: src/c/sdl_native.zig
            status: planned
            role: >-
              Implement the native SdlDisplayIo, SdlWindowIo, and
              SdlWindowPropertyIo sources. It is the only Zig module in this
              slice that imports sdl_c or calls SDL_*.
            imports:
              - sdl_c
              - sdl_io
            links:
              - libc
              - SDL3
          - path: src/c/wayland_native.zig
            status: planned
            role: >-
              Implement the native WaylandIo source by invoking the listed
              wayspot_* wrappers. Raw wl_* calls remain in
              src/c/wayspot_layer_shell.c. It consumes the native-only SDL
              handle handoff and never changes the plain transcript types.
            imports:
              - wayland_c
              - wayland_io
              - sdl_native
            links:
              - libc
              - wayland-client
          - path: src/c/native_io_check.zig
            status: planned
            role: >-
              Compile and link the native adapter modules without starting a
              window, compositor, or DE. This is a compile/link check, not a
              simulation source.
            imports:
              - sdl_native
              - wayland_native
            links:
              - libc
              - SDL3
              - wayland-client
        targets:
          - name: sdl_io_unit_fuzz
            root: src/c/sdl_io.zig
            imports: []
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
          - name: wayland_io_unit_fuzz
            root: src/c/wayland_io.zig
            imports: []
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
          - name: sdl_wayland_simulation
            root: src/c/io_simulation_test.zig
            imports: [sdl_io, wayland_io]
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
            forbidden_imports: [sdl_c, wayland_c, sdl_native, wayland_native]
          - name: wayspot_native_io_check
            root: src/c/native_io_check.zig
            imports: [sdl_native, wayland_native]
            links: [libc, SDL3, wayland-client]
            invokes_simulation: false
            starts_de: false
          - name: wayspot
            role: production/native
            imports: [sdl_native, wayland_native]
            links: [libc, SDL3, wayland-client]
            invokes_simulation: false
        separation_gate:
          - >-
            The simulation target must compile and run when SDL3, Wayland,
            libc, sdl_c, wayland_c, and DE environment inputs are absent.
          - >-
            The native check and production targets compile/link native
            adapters separately; neither target is used as simulation proof.
          - >-
            No simulation transcript may contain a native pointer or invoke a
            function from sdl_native, wayland_native, sdl_c, or wayland_c.
      ownership:
        - path: src/c/sdl_io.zig
          symbols:
            - SdlWindowIo
            - SdlWindowPropertyIo
          owns_calls:
            - SDL_CreateProperties
            - SDL_DestroyProperties
            - SDL_SetStringProperty
            - SDL_SetNumberProperty
            - SDL_SetBooleanProperty
            - SDL_CreateWindowWithProperties
            - SDL_GetWindowProperties
            - SDL_GetPointerProperty
            - SDL_SetWindowSize
            - SDL_DestroyWindow
          does_not_own:
            - SDL image calls
            - SDL SHM, render, texture, clipboard, or event calls
        - path: src/c/wayland_io.zig
          symbols:
            - WaylandIo
          owns_calls:
            - wayspot_layer_globals_init
            - wayspot_layer_globals_deinit
            - wayspot_layer_find_output
            - wayspot_layer_get_surface_on_layer
            - wayspot_layer_surface_add_listener
            - wayspot_layer_surface_set_size
            - wayspot_layer_surface_set_anchor
            - wayspot_layer_surface_set_exclusive_zone
            - wayspot_layer_surface_set_keyboard_interactivity
            - wayspot_layer_surface_ack_configure
            - wayspot_layer_surface_destroy
            - wayspot_wl_surface_set_empty_input_region
            - wayspot_wl_surface_commit
            - wayspot_wl_display_roundtrip
            - wayspot_wl_display_roundtrip_cleanup
          raw_calls_owned_by:
            path: src/c/wayspot_layer_shell.c
            calls:
              - wl_display_get_registry
              - wl_display_roundtrip
              - wl_registry_add_listener
              - wl_registry_bind
              - wl_registry_destroy
              - wl_output_add_listener
              - wl_output_destroy
              - wl_proxy_add_listener
              - wl_proxy_get_version
              - wl_proxy_marshal_flags
              - wl_surface_commit
          transcript_boundary: >-
            The transcript records the typed wayspot_* wrapper operations and
            bypasses the native C helper. Raw wl_* calls are owned by
            wayspot_layer_shell.c, not by Zig WaylandIo and not by transcript
            records.
          does_not_call:
            - SDL_* calls
          deferred_calls:
            - wayspot_wayland_connect
            - wayspot_wayland_disconnect
            - wayspot_layer_create_surface
            - wayspot_wl_surface_destroy
            - wayspot_shm_buffer_create
            - wayspot_shm_buffer_destroy
            - wayspot_wl_surface_attach_buffer
            - wayspot_wl_surface_detach_buffer
            - memfd_create
            - ftruncate
            - mmap
            - munmap
            - wl_display_connect
            - wl_display_disconnect
            - wl_shm_create_pool
            - wl_shm_pool_create_buffer
            - wl_shm_pool_destroy
            - wl_shm_destroy
            - wl_buffer_destroy
        - path: src/sunglasses/surface.zig
          symbols:
            - SunglassesSurface.init
            - SunglassesSurface.redraw
            - SunglassesSurface.deinit
            - LayerShellRole.init
            - LayerShellRole.deinit
          role: >-
            Orchestrate SdlPropertyId, SdlWindowId, WaylandDisplayId,
            WaylandOutputId, WaylandSurfaceId, and LayerSurfaceId values;
            after this slice it owns no raw SDL_Window, wl_display, wl_surface,
            wl_output, or layer-surface pointer for window/layer setup.
            Deferred image, SHM, buffer, and render code may retain its current
            C state until those named seams land.
        - path: src/env/monitor.zig
          symbols:
            - queryMonitorsWith
          role: >-
            Keep the implemented display-facts owner unchanged. No SDL
            property wrapper is reintroduced in the monitor module.
      plain_transcript_types:
        - "SdlPropertyId: u32"
        - "SdlWindowId: u32"
        - "SdlWaylandIds: { display_id: u32, surface_id: u32 }"
        - "WindowSize: { width: u32, height: u32 }"
        - "WaylandDisplayId: u32"
        - "WaylandOutputId: u32"
        - "WaylandSurfaceId: u32"
        - "LayerSurfaceId: u32"
        - "ConfigureFacts: { configured: bool, closed: bool, serial: u32, width: u32, height: u32 }"
        - "WindowTitle: owned bytes, 1..160, no embedded NUL (src/sunglasses/surface.zig:max_title_bytes)"
        - "MonitorName: owned bytes, 1..96, no embedded NUL"
        - "OutputName: owned bytes, 1..96, no embedded NUL"
        - "LayerNamespace: the fixed non-empty wayspot-sunglasses bytes"
      local_id_rule:
        - "Every transcript ID is a nonzero local u32 token; zero is invalid and is never a native pointer."
        - "One transcript permits at most one live SdlPropertyId, SdlWindowId, WaylandDisplayId, WaylandSurfaceId, and LayerSurfaceId; WaylandOutputId values are 1..8."
        - "A token is published only after its create operation succeeds, is not reused while live, and is consumed by its matching destroy operation exactly once."
        - "Native SDL and Wayland pointers are separate adapter-internal values and never appear in transcript or product state."
      native_only_handoff: >-
        WaylandIo receives an SdlWindowId. Native SdlWindowIo resolves it to
        NativeWaylandHandles containing the borrowed SDL-provided wl_display
        and wl_surface pointers. The handoff is adapter-internal only; it is
        never stored in a transcript, SunglassesSurface, or product state;
        transcript IDs remain local nonzero tokens, not pointer values.
        SDL owns those borrowed handles, so WaylandIo never disconnects the
        display or destroys the surface.
      transcript_operations:
        sdl_window:
          - "property_create -> SdlPropertyId | SdlWindowFailed"
          - "set_title(SdlPropertyId, WindowTitle) -> void | SdlWindowFailed"
          - "set_width(SdlPropertyId, u32) -> void | SdlWindowFailed"
          - "set_height(SdlPropertyId, u32) -> void | SdlWindowFailed"
          - "set_hidden(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "set_custom_surface_role(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "set_create_egl_window(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "window_create(SdlPropertyId) -> SdlWindowId | SdlWindowFailed"
          - "window_wayland_ids(SdlWindowId) -> SdlWaylandIds | WaylandSurfaceUnavailable"
          - "window_resize(SdlWindowId, WindowSize) -> void | SdlWindowSizeFailed"
          - "property_destroy(SdlPropertyId) -> void"
          - "window_destroy(SdlWindowId) -> void"
        wayland_layer:
          - "globals_init(SdlWaylandIds.display_id) -> void | LayerShellRegistryFailed/LayerShellRegistryListenerFailed/LayerShellRoundtripFailed/LayerShellMissing/LayerShellCompositorMissing/LayerShellShmMissing"
          - "find_output(MonitorName) -> WaylandOutputId | LayerShellOutputMissing"
          - "create_layer_surface(SdlWaylandIds.surface_id, WaylandOutputId, u32, LayerNamespace) -> LayerSurfaceId | LayerShellSurfaceCreateFailed"
          - "add_listener(LayerSurfaceId) -> void"
          - "set_size/set_anchor/set_exclusive_zone/set_keyboard_interactivity(LayerSurfaceId, plain value) -> void"
          - "set_empty_input_region(SdlWaylandIds.surface_id) -> void | LayerShellInputRegionFailed/LayerShellCompositorMissing/LayerShellUnexpectedResult"
          - "commit(SdlWaylandIds.surface_id) -> void"
          - "roundtrip(SdlWaylandIds.display_id) -> ConfigureFacts | LayerShellConfigureFailed"
          - "ack_configure(LayerSurfaceId, u32) -> void"
          - "destroy_layer_surface(LayerSurfaceId) -> void"
          - "roundtrip_cleanup(SdlWaylandIds.display_id) -> void"
          - "globals_deinit(SdlWaylandIds.display_id) -> void"
      success_order:
        - "Create properties and apply the six typed setters in their fixed transcript order."
        - "Create the SDL window, then destroy the property object exactly once."
        - "Resolve borrowed Wayland ids, initialize globals, find the output, and create the layer surface."
        - "Install the listener, set layer values, set the empty input region, commit, and roundtrip until configured or closed."
        - "Acknowledge configure, resize the SDL window, commit, and roundtrip again."
        - "Publish only plain ids after every required step succeeds."
      rollback_order:
        - "A failed property setter destroys the new property object and publishes no window."
        - "A failed window creation destroys the property object and publishes no window."
        - "A resize failure leaves the SDL window owned and available for caller cleanup."
        - "A missing Wayland property, globals failure, output failure, layer creation failure, input-region failure, closed configure, or roundtrip failure destroys only newly created layer state, then deinitializes partial globals."
        - "The sunglasses consumer destroys the SDL window after Wayland rollback; borrowed SDL display and surface handles are never disconnected or destroyed by WaylandIo."
      cleanup_order:
        - "Success deinit destroys the layer surface, performs roundtrip cleanup, deinitializes globals, then destroys the SDL window."
        - "Each SDL property and window id is destroyed exactly once."
        - "Each Wayland layer id and initialized global resource is destroyed exactly once in reverse creation order."
        - "Image, SHM, buffer, render, texture, clipboard, event, and standalone display cleanup is outside this slice."
      errors:
        sdl:
          - SdlWindowFailed
          - SdlWindowPropertyMissing
          - SdlWindowSizeFailed
          - WaylandSurfaceUnavailable
        wayland:
          - WaylandSurfaceUnavailable
          - LayerShellRegistryFailed
          - LayerShellRegistryListenerFailed
          - LayerShellRoundtripFailed
          - LayerShellMissing
          - LayerShellCompositorMissing
          - LayerShellShmMissing
          - LayerShellOutputMissing
