          - "The build check rejects every Source instantiation other than SocketTranscript and SocketSource."
        signatures:
          - "SocketTranscript.init(allocator: std.mem.Allocator) SocketTranscript; initializes empty fixed records and stores the borrowed allocator handle without allocating"
          - "SocketTranscript.deinit(self: *SocketTranscript) void; frees every copied configuration payload, permits retired socket records, and asserts that no socket record is open"
          - "hyprland_native.SocketSource.init() SocketSource; initializes the fixed native mapping table empty, owns no allocator, and has no open socket"
          - "hyprland_native.SocketSource.deinit(self: *SocketSource) SocketCleanupError!void; attempts each live native close once, retires every mapping after its attempt, and returns the first close error"
          - "SocketId.init(value: u32) SocketIdError!SocketId; zero is rejected and the value is local to one Source owner"
          - "StopId.fromFd(value: i32) StopIdError!StopId; accepts 0..maxInt(i32), rejects every negative value with StopIdNegative, maps the nonnegative i32 exactly to u32, borrows the token, and never closes it"
          - "SocketPath.init(bytes: []const u8) SocketPathError!SocketPath; copies 1..107 non-NUL bytes and stores the terminator in slot len"
          - "PollTimeout.fromMilliseconds(value: i32) PollTimeoutError!PollTimeout; accepts -1 or 0..60000, where -1 means an infinite native poll"
          - "RequestWrite.fromName(name: RequestName) RequestWrite; emits only the three canonical request byte strings"
          - "Source.socket(self: *Source, kind: SocketKind) SocketOpenError!SocketId"
          - "Source.connect(self: *Source, id: SocketId, path: SocketPath) SocketConnectError!void"
          - "Source.write(self: *Source, id: SocketId, request: RequestWrite) SocketWriteError!WriteCount; returns one bounded count or a named SocketWriteError"
          - "Source.readRequest(self: *Source, id: SocketId) SocketReadError!RequestRead"
          - "Source.readEvent(self: *Source, id: SocketId) SocketReadError!EventRead"
          - "Source.poll(self: *Source, set: PollSet) PollError!PollResult; set.timeout is the single bounded poll deadline"
          - "Source.close(self: *Source, id: SocketId) SocketCloseError!void"
          - "EventStream.initWith(comptime Source: type, allocator: std.mem.Allocator, source: *Source, connection: Connection) EventStreamInitError!EventStream"
          - "EventStream.waitWith(self: *EventStream, source: *Source, stop: StopId) EventWaitError!FactEvent"
          - "EventStream.deinit(self: *EventStream, source: *Source) SocketCleanupError!void"
          - "MonitorSourceWith(comptime Source: type).init(source: *Source, connection: Connection) MonitorSourceWith(Source); stores only a borrowed, pointer-stable Source address and control state; it never owns or deinitializes Source"
          - "MonitorSourceWith(Source).deinit(self: *MonitorSourceWith(Source)) void; clears only control state, so the caller deinitializes its Source exactly once after this call"
          - "src/env/native.zig:MonitorSource.init(connection: Connection) MonitorSource; the production wrapper owns an in-place SocketSource field, then binds MonitorSourceWith(SocketSource) to that field; it has no open socket and cannot fail"
          - "src/env/native.zig:MonitorSource.deinit(self: *MonitorSource) SocketCleanupError!void; clears the borrowed control state, then delegates one-shot native SocketSource cleanup and returns its first close error"
          - "MonitorSource.queryMonitors(self: *MonitorSource, allocator: std.mem.Allocator) MonitorQueryError!monitor.MonitorList"
          - "MonitorSource.monitorStream(self: *MonitorSource, allocator: std.mem.Allocator) MonitorFactStreamInitError!MonitorFactStream"
          - "MonitorFactStreamWith(comptime Source: type).init(allocator: std.mem.Allocator, source: *Source, connection: Connection) MonitorFactStreamInitError!MonitorFactStreamWith(Source); borrows the pointer-stable Source and publishes no stream until event setup succeeds"
