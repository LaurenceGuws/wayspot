    mock_contract:
      native_calls: current_direct_calls
      targets:
        - path: src/c/sdl_io.zig
          mock_call_transcript:
            - operation: SdlDisplayIo.queryDisplays
              input_type: void
              result_type: DisplayList<=8
              error_set: [SdlMonitorQueryFailed, TooManyMonitors]
            - operation: SdlDisplayIo.queryName
              input_type: DisplayId
              result_type: DisplayName<=96
              error_set: [SdlMonitorNameMissing, InvalidMonitorName]
            - operation: SdlDisplayIo.queryBounds
              input_type: DisplayId
              result_type: DisplayBounds
              error_set: [SdlMonitorSizeMissing, InvalidMonitorSize]
            - operation: SdlDisplayIo.queryScale
              input_type: DisplayId
              result_type: f64
              error_set: [SdlMonitorScaleMissing]
            - operation: SdlRuntimeIo.init/quit/setHint/startTextInput/stopTextInput
              status: deferred
              input_type: SdlRuntimeRequest
              result_type: SdlRuntimeResult
              error_set: [SdlInitFailed, SdlHintFailed, SdlTextInputFailed]
            - operation: SdlWindowIo.create/waylandIds/resize/deinit
              input_type: "SdlPropertyId, SdlWindowId, or WindowSize"
              result_type: "SdlWindowId, SdlWaylandIds, or void"
              error_set: [SdlWindowFailed, InvalidPropertyId, InvalidWindowId, InvalidWaylandIds, InvalidWindowSize, SdlWindowSizeFailed]
              expansion: >-
                waylandIds records window_properties, then
                wayland_display_pointer and wayland_surface_pointer with the
                same borrowed SdlPropertyId; nativeWaylandHandles is the
                native pointer adapter for the same three external calls.
            - operation: SdlWindowPropertyIo.create/setTitle/setWidth/setHeight/setHidden/setCustomSurfaceRole/setCreateEglWindow/deinit
              input_type: "WindowTitle, SdlPropertyId, i32, or bool"
