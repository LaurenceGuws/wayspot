    - "Run rg -l '\\bSDL_[A-Za-z0-9_]+' src --glob '*.zig' and require exactly the twelve listed Zig owner paths; compare every c.SDL_* call to the file-keyed SDL current_direct_calls; parse every current_owner_paths entry and verify each slash- or semicolon-delimited symbol exists in its exact file, then validate every file path."
