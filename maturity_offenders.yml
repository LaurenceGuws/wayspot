          - "src/sunglasses/state.zig:State.loadForMonitors imports src/env/native.zig as wayspot_env_native, keeps a local MonitorSource owner, passes &monitor_source to queryMonitors, and deinitializes it on success and failure."
          - "src/notification/banner.zig:placeOnFocusedMonitor imports src/env/native.zig as wayspot_env_native, keeps the local MonitorSource owner through runPlacementAction, passes &monitor_source, and deinitializes it before return."
          - "src/aggregate_test.zig exports fact types only; tests move each local source/stream once and call deinit through a pointer."
        failure_atomic_init:
          - "src/env/native.zig:MonitorSource initializes its in-place SocketSource field before binding src/env/mod.zig:MonitorSourceWith(SocketSource); the simulation root initializes its SocketTranscript local before binding MonitorSourceWith(SocketTranscript). Neither wrapper publishes partial control state."
          - "src/env/mod.zig:MonitorFactStreamWith(Source).init uses the borrowed Source pointer, then opens the event stream; on any later failure it performs one cleanup pass through Source.close, returns the cleanup error if cleanup also fails, and publishes no stream. src/env/native.zig later calls SocketSource.deinit; the simulation root later calls SocketTranscript.deinit, exactly once."
          - "All resident callers import src/env/native.zig and use pointer ownership for MonitorSource and MonitorFactStream; no function stores or copies either production wrapper by value after initialization."
          - "MonitorSource.fromProcessEnv continues to borrow HOME/XDG/Hyprland environment facts; environment acquisition remains order 8 and does not create or own StopId."
      ownership:
        - "SocketTranscript.init receives an allocator and copies every configured path, response chunk, event chunk, and injected typed error into its owned fixed-capacity records; deinit frees those copies and requires no live socket records."
        - "hyprland_native.SocketSource owns its open SocketId table and the native fd mapping. SocketId is a nonzero local id; a native fd is never published to the parser or transcript."
        - "SocketTranscript has no fallible init allocation; configuration appends copy caller bytes into the fixed request, event, path, and error records. If a copy or capacity check fails, it frees only the bytes copied for that append, restores the prior counts, and leaves the prior transcript unchanged."
        - "SocketSource.init has no allocator and starts with all eight native mapping slots empty. SocketSource.deinit attempts each live close once, retires each slot after that attempt, continues cleanup for the remaining live slots, and returns the first close error; after a failure all slots are retired and a later deinit is a no-op."
        - "The Source owner owns every socket from successful socket() until one attempted close(). A close success retires the mapping; a close failure also retires the mapping because the raw fd may already be released or reused. No native close is retried."
        - "StopId is passed by the lifecycle caller as a borrowed plain token. Hyprland IO never creates, duplicates, reads, closes, or stores ownership of the stop fd."
      failure_atomicity:
        - "A failed socket publishes no id; a successful socket followed by connect failure retains the opened id until one close attempt retires it. A close failure returns HyprlandSocketCloseFailed with no live native fd retained."
        - "A failed write/read/poll returns the exact source error; request response bytes and parser-owned facts are not published. fillStateWith refreshes EnvState only after all three fact lists succeed."
        - "A transcript capacity, mismatch, or exhaustion failure is test-harness failure only; it is never part of SocketError and cannot leak into production parser control flow."
      error_precedence:
        - "When an operation fails after opening a socket, attempt close exactly once. If close succeeds, return the original operation error; if close fails, retire the mapping and return HyprlandSocketCloseFailed as the cleanup error."
        - "When an operation succeeds but cleanup fails, publish no new owner state and return HyprlandSocketCloseFailed. Never retry the raw close integer."
        - "The transcript records both the operation failure and the one close result in order; deinit accepts the retired record and reports no second cleanup attempt."
      pure_module: >-
        src/env/hyprland_io.zig contains only plain values and
        SocketTranscript code. It imports no sdl_c, wayland_c,
        hyprland_native, libc, compositor, or DE module. It does not parse
        JSON, perform socket calls, or own a native fd.
      native_module: >-
        src/env/hyprland_native.zig is the only planned owner of the listed
        std.os.linux socket, connect, read, write, poll, close, and errno
        calls. Raw fd n maps to local SocketId.value n+1 with a checked
        overflow path; the inverse mapping stays native-only and no raw fd or
        C type reaches the parser or transcript.
      parser_module: >-
        src/env/hyprland.zig owns request/event control flow and JSON-to-fact
        conversion. It receives one of the two concrete Source types through
        the compile-time signature above; parser work is not a target of the
        hyprland_io mock contract.
      targets:
        - path: src/env/hyprland_io.zig
          public_types:
            - "SocketId: struct{ value: u32 }; value is nonzero, local to one Source owner, and is not a native fd"
            - "StopId: struct{ value: u32 }; value is a borrowed lifecycle token; native fd 0 is valid and no ownership is retained"
            - "SocketKind: request or event"
            - "RequestName: monitors, workspaces, or clients; exact bytes are j/monitors, j/workspaces, or j/clients"
            - "SocketPath: struct{ bytes: [108]u8, len: u16 }; native pathname bytes, 1..107, with one NUL terminator at bytes[len]"
            - "RequestWrite: struct{ bytes: [12]u8, len: u8 }; exact RequestName bytes, no arbitrary request"
            - "RequestChunk: struct{ bytes: [4096]u8, len: u16 }; one bounded request read chunk"
            - "RequestRead: union(enum){ chunk: RequestChunk, eof }; bytes and eof cannot coexist"
            - "EventChunk: struct{ bytes: [1024]u8, len: u16 }; one bounded socket2 read chunk"
            - "EventRead: union(enum){ chunk: EventChunk, eof }; bytes and eof cannot coexist"
            - "WriteCount: u8; a successful Source.write returns 1..RequestWrite.len, while SignalInterrupted and write failure are typed SocketWriteError values"
            - "PollTimeout: struct{ milliseconds: i32 }; -1 is infinite, 0 is immediate, 1..60000 are bounded deadlines"
            - "PollState: idle, readable, readable_hangup, closed, or failed"
            - "PollSet: struct{ event: ?SocketId, stop: StopId, timeout: PollTimeout }; event null is the valid stop-only reconnect poll, every poll has one borrowed lifecycle stop token and one bounded timeout, and no stop-less poll exists"
            - "PollResult: struct{ event: ?PollState, stop: PollState }; event is null exactly when PollSet.event is null, stop is always present, and no raw revents bits are discarded"
          socket_error_set:
            - HyprlandSocketPathTooLong
            - HyprlandSocketOpenFailed
            - HyprlandSocketConnectFailed
            - HyprlandSocketWriteFailed
            - HyprlandSocketReadFailed
            - HyprlandSocketCloseFailed
            - HyprlandSocketNotLive
            - SignalInterrupted
            - SystemCallFailed
          constructor_error_set:
            - SocketIdZero
            - HyprlandSocketPathInvalid
            - HyprlandSocketPathTooLong
            - StopIdNegative
            - PollTimeoutOutOfRange
          mock_call_transcript:
            - operation: Source.socket
              source_types: "SocketTranscript and SocketSource"
              input_type: SocketKind
              result_type: SocketId
              error_set: [HyprlandSocketOpenFailed, SystemCallFailed]
            - operation: Source.connect
              source_types: "SocketTranscript and SocketSource"
              input_type: "SocketId and SocketPath"
              result_type: void
              error_set: [HyprlandSocketConnectFailed, HyprlandSocketNotLive, SystemCallFailed]
            - operation: Source.write
              source_types: "SocketTranscript and SocketSource"
              input_type: "SocketId and RequestWrite bytes"
              result_type: "WriteCount in 1..request length"
              error_set: [SignalInterrupted, HyprlandSocketWriteFailed, HyprlandSocketNotLive, SystemCallFailed]
            - operation: Source.readRequest
              source_types: "SocketTranscript and SocketSource"
              input_type: "SocketId and 4096-byte destination"
              result_type: RequestRead
              error_set: [SignalInterrupted, HyprlandSocketReadFailed, HyprlandSocketNotLive, SystemCallFailed]
            - operation: Source.readEvent
              source_types: "SocketTranscript and SocketSource"
              input_type: "SocketId and 1024-byte destination"
              result_type: EventRead
              error_set: [SignalInterrupted, HyprlandSocketReadFailed, HyprlandSocketNotLive, SystemCallFailed]
            - operation: Source.poll
              source_types: "SocketTranscript and SocketSource"
              input_type: PollSet
              result_type: PollResult
              error_set: [SignalInterrupted, SystemCallFailed, HyprlandSocketNotLive]
            - operation: Source.close
              source_types: "SocketTranscript and SocketSource"
              input_type: SocketId
              result_type: void
              error_set: [HyprlandSocketCloseFailed, HyprlandSocketNotLive, SystemCallFailed]
          test_only_error_set:
            - TranscriptMismatch
            - TranscriptExhausted
            - TranscriptCapacityExceeded
          transcript_shape:
            source_count: one
            source_role: "One SocketTranscript serves request and event sockets; request steps, event steps, and poll steps are separate fixed arrays consumed by one operation cursor."
            capacities:
              max_socket_records: 8
              max_transcript_operations: 2048
              max_request_steps: 4
              max_request_reads_per_step: 256
              max_write_steps: 64
              max_event_read_steps: 256
              max_poll_steps: 256
              max_injected_errors: 64
            max_owned_bytes: "4*1048576 + 256*1024 + 8*108"
            fields:
              - "socket_records: [8]SocketRecord{kind: SocketKind, id: SocketId, state: open|retired}; successful or failed close changes open directly to retired, and deinit requires no open records"
              - "operations: [2048]ExpectedOperation{kind: OperationKind, record_index: u16, step_index: u16, socket_id: ?SocketId, request: ?RequestWrite, path: ?SocketPath, poll_set: ?PollSet, result: OperationResult}; step_index references the matching request, write, event-read, or poll record; operation_count and operation_cursor are u16"
              - "request_steps: [4]RequestStep{name: RequestName, reads: [256]RequestReadStep, read_count: u16, total_bytes: u32}"
              - "write_steps: [64]WriteStep{socket: SocketId, request: RequestWrite, result: WriteCount or typed write error}"
              - "event_steps: [256]EventReadStep{socket: SocketId, result: EventRead or typed read error}"
              - "poll_steps: [256]PollStep{set: PollSet, result: PollResult or typed poll error}; a stop-only set records event null"
              - "injected_errors: at most 64 typed error fields attached to expected operations; no arbitrary error text"
              - "OperationResult: tagged socket-id, void, WriteCount, RequestRead, EventRead, PollResult, or typed error matching OperationKind"
              - "WriteCount is 1..RequestWrite.len and records a partial native write; an injected SignalInterrupted or HyprlandSocketWriteFailed is recorded as that exact typed error, never as a sentinel union arm or a full write."
              - "owned_payloads: allocator-owned request/event/path bytes copied at configuration time and freed by deinit"
            request_reply: >-
              Each RequestStep names one RequestName and owns an ordered read
              plan ending in eof. Each chunk is at most 4096 bytes, total
              response bytes are at most 1048576, and partial reads are
              represented by multiple RequestReadStep records.
            event_reply: >-
              EventReadStep records one event read chunk, eof, or typed read
              error. Each chunk is at most 1024 bytes; the production parser
              receives the chunks in order and must retain at most 1044 bytes
              before a newline for the recognized event frame bound.
              RequestRead and EventRead both use the tagged .chunk/.eof shape;
              eof carries no bytes and a chunk never carries eof.
            operation_order: >-
              Every call consumes the next ExpectedOperation and checks its
              kind, record_index, step_index, socket_id, request/path/token
              inputs, poll_set, and tagged result type before changing state. A request is
              socket(request), connect, one or more write records, one or
              more readRequest records through eof or error, then close. An
              event stream is socket(event), connect, poll/read cycles, then
              close. The shared cursor proves cross-channel order; a method
              cannot consume a step from the other channel.
            ownership: >-
              Configuration methods copy all caller bytes before returning;
              no response, event chunk, path, or operation record borrows the
              caller after append. Returned RequestRead and EventRead values
              are fixed plain values. A close success or failure retires the
              socket record; a close failure never creates or permits a retry
              record.
            protocol_failure: >-
              TranscriptMismatch, TranscriptExhausted, and
              TranscriptCapacityExceeded are test-only harness failures. A
              mismatch or exhausted cursor asserts/panics in the simulation
              harness and is never converted into a production SocketError;
              a failed match consumes no operation and changes no socket or
              payload state.
          terminal_rule: >-
            A successful scenario must consume its declared terminal close
            operations and finish with no open socket records. An expected
            operation error ends that scenario at the error record; later
            records are not required and are absent from that scenario's
            operation_count. A close error is terminal because the local
            mapping is retired after one attempt. SocketTranscript.deinit
            frees owned payloads and asserts only that no socket record is
            open; it does not reject intentionally unconsumed future records
            after an expected terminal error.
      cleanup_record: >-
            A request records socket, connect, every partial write, every read
            through EOF or failure, and one close attempt. A connect, write,
            read, response-bound, parse, or close failure publishes no facts.
            If close fails, the Source retires the SocketId after that one
            attempt because the raw fd may be released or reused; the owner
            returns HyprlandSocketCloseFailed and never retries. An event
            stream records socket, connect, poll/read cycles, and one close
            attempt in deinit. Reconnect retires the old stream before opening
            the new one. Response bytes and the std.json parse tree are
            released after fact publication or error. A close error is
            returned, not logged and discarded.
      poll_contract:
        timeout:
          - "PollTimeout.fromMilliseconds(-1) is PollTimeout.infinite and is used by EventStream.waitWith for the current blocking wait."
          - "PollTimeout.fromMilliseconds(1000) is the reconnect deadline used by env/mod.zig:waitForEventStreamReconnect through the same Source.poll operation."
          - "0 means an immediate poll; 1..60000 are bounded millisecond deadlines; values below -1 or above 60000 return PollTimeoutOutOfRange before native poll."
          - "Both current poll owners consume Source.poll with their PollSet.timeout; env/mod.zig contains no direct std.os.linux.poll or std.os.linux.errno after this slice."
        native_revents:
          - "When PollSet.event is null, no event fd is registered and PollResult.event is null; the stop revents still map normally."
          - "0 -> PollState.idle"
          - "POLLIN only -> PollState.readable"
          - "POLLIN|POLLHUP -> PollState.readable_hangup; read remaining bytes, then map read EOF to HyprlandEventSocketClosed"
          - "POLLHUP without POLLIN -> PollState.closed"
          - "POLLERR or POLLNVAL, with or without POLLIN/HUP -> PollState.failed and SystemCallFailed"
          - "Any other revents bit -> PollState.failed and SystemCallFailed; no bit is ignored"
        stop_mapping:
          - "Stop PollState.readable -> EventStream.waitWith returns FactEvent.stopped; the event socket remains owned for deinit."
          - "Stop PollState.readable_hangup or closed -> HyprlandStopClosed from the Hyprland source; stop closure is not normal readiness."
          - "Stop PollState.failed -> SystemCallFailed from the source; env/mod.zig maps it to EnvironmentReconnectWaitFailed for MonitorFactStream reconnect handling."
          - "env/mod.zig maps HyprlandStopClosed to EnvironmentReconnectWaitFailed; hyprland.zig and the source never return the env-layer error."
          - "A stop token is never closed by SocketSource or SocketTranscript; the lifecycle caller retains and closes it."
        signal_mapping:
          - "EventStream.waitWith retries SignalInterrupted as the current wait loop does."
          - "MonitorFactStream.waitForEventStreamReconnect preserves its current error return for a failed poll and does not add a retry counter."
      close_failure:
        state: "Source.close performs one native close attempt and retires the local SocketId mapping on both success and failure; a failed attempt returns HyprlandSocketCloseFailed and retains no fd that can be retried."
        retry: "No retry is permitted after a native close attempt because the kernel may already have released the fd and a repeated integer could close a reused descriptor. A second close on the retired id returns HyprlandSocketNotLive without a native call."
        terminal: "The owning MonitorSource or MonitorFactStream records the returned cleanup error and finishes with no live local mapping; deinit does not attempt the retired close again."
        proof: "Simulation injects one close failure and asserts exactly one close operation, immediate retired state, no second close record, no reused-id close, and exact cleanup-error precedence; hyprland_native_io_check references every close/deinit entry point."
    four_bar_audit:
      simple_direct:
        - "The current request path has one owner in src/env/hyprland.zig, but it accepts arbitrary request_text and mixes socket syscalls, response buffering, JSON parsing, and fact publication. The slice replaces only the syscall boundary with typed request names and typed chunks."
        - "The current event path is direct and bounded, but src/env/mod.zig owns a second poll/reconnect path; the slice gives both paths the same compile-time concrete Source contract without adding a registry or erased adapter."
      readable_vocabulary:
        - "Connection, EventStream, MonitorSource, MonitorFactStream, MonitorList, WorkspaceList, WindowList, and FactEvent remain the product names. SocketId, RequestName, RequestChunk, EventChunk, PollSet, and PollResult are wire-boundary values only."
      useful_capability:
        - "The contract preserves j/monitors, j/workspaces, j/clients, socket2 fact events, stop-fd shutdown, and reconnect behavior used by wallpaper and sunglasses. It does not add compositor policy or a new fact model."
      defensive_boundary:
        - "The current socket/parser split has unchecked JSON integer casts, ignored extra window-size fields, discarded close errors, and ignored poll HUP/ERR/NVAL. These are named implementation gates, not hidden behind the mock."
      exact_bounds:
      - "The native sockaddr.un.path storage is exactly 108 bytes. SocketPath accepts 1..107 non-NUL pathname bytes, writes one NUL at bytes[len], and rejects 0, embedded NUL, and 108 bytes before the native adapter."
      - "max_hypr_response_bytes is 1048576; a response of exactly 1048576 bytes is accepted and one additional byte is rejected before publication."
      - "request_read_bytes is the current 4096-byte request destination; event_read_bytes is 1024 bytes per socket read."
      - "max_event_line_bytes is 1044 before the newline for the current recognized event set; 1044 data/name bytes plus the newline is the 1045-byte source frame bound, and the next non-newline byte is rejected."
      - "RequestName is exactly j/monitors, j/workspaces, or j/clients; arbitrary request text is not part of the planned public source boundary."
      - "Parsed output bounds are 8 monitors, 64 workspaces, and 256 windows; monitor/workspace names are 96 bytes, window classes are 128 bytes, and window titles are 512 bytes."
      - "Monitor and workspace ids must fit the domain i32; window addresses are u64; numeric JSON conversion never uses an unchecked external @intCast or @intFromFloat."
      - "A window size is exactly two numeric values; extra values are rejected rather than ignored."
      - "PollSet contains one optional event SocketId, one required borrowed StopId, and one PollTimeout; a null event produces PollResult.event null for the stop-only reconnect poll. The pure transcript has at most 2048 operation records per simulation. The production reconnect loop remains unbounded until stop and sleeps for its current 1000 ms poll deadline; no retry counter is introduced."
      exact_errors:
      current_socket_errors:
        - HyprlandSocketPathTooLong
        - HyprlandSocketOpenFailed
        - HyprlandSocketConnectFailed
        - HyprlandSocketWriteFailed
        - HyprlandSocketReadFailed
        - SignalInterrupted
        - SystemCallFailed
      current_wire_errors:
        - HyprlandResponseTooLarge
        - HyprlandEventLineTooLong
        - HyprlandEventSocketClosed
        - InvalidMonitorJson
        - InvalidWorkspaceJson
        - InvalidWindowJson
        - InvalidJsonNumber
      current_env_errors:
        - EnvironmentReconnectWaitFailed
      planned_mappings:
        - "Request/socket failures preserve the current named errors; the native close operation adds HyprlandSocketCloseFailed instead of logging a failed close."
        - "Parser failures preserve JSON shape, field, number, address, response-size, and list-capacity meaning; allocator errors propagate without partial fact publication."
        - "Poll HUP maps to closed, POLLERR/POLLNVAL and unknown bits map to SystemCallFailed, and stop-fd closure maps to HyprlandStopClosed at the source. env/mod.zig alone maps HyprlandStopClosed to EnvironmentReconnectWaitFailed."
      exact_cleanup:
      - "A failed socket connect closes the new socket exactly once; a request closes its socket after EOF or every later write/read/parse failure."
      - "EventStream.deinit closes its retained event socket exactly once. Reconnect deinitializes the old stream before opening the replacement; a close failure retires the old mapping, returns the cleanup error, and never retries or publishes a replacement through that failed owner."
      - "Response bytes and the std.json parse tree are released after fact publication or error. EnvState changes only after monitors, workspaces, and windows all parse and publish successfully."
      - "The transcript records close results rather than discarding them; it contains no native fd, C pointer, JSON tree, or borrowed read buffer."
    pure_internal_paths:
      - "src/env/hyprland.zig:classifyEventLine/eventNameIn/jsonString/jsonBool/jsonI32/jsonF64/parseAddress"
      - "src/env/hyprland.zig:parseMonitors/parseWorkspaces/parseWindows"
      - "src/env/monitor.zig:MonitorList"
      - "src/env/workspace.zig:WorkspaceList"
      - "src/env/window.zig:WindowList"
    current_shape_offenders:
      - "src/env/hyprland.zig:request accepts arbitrary request_text instead of RequestName."
      - "src/env/hyprland.zig:jsonI32 uses unchecked @intCast and @intFromFloat on external JSON."
      - "src/env/hyprland.zig:parseWindows ignores size-array entries after the first two."
      - "src/env/hyprland.zig:closeFd logs and discards close failure."
      - "src/env/hyprland.zig:connectRequestSocket accepts the old 160-byte check but copies into sockaddr.un.path[108], so native-bound path validation is incomplete."
      - "src/env/mod.zig:eventStreamErrorRecoverable uses anyerror and waitForEventStreamReconnect ignores poll HUP/ERR/NVAL."
      - "src/env/hyprland.zig and src/env/mod.zig call std.os.linux directly, preventing a C-free wire simulation target."
    build_separation:
      pure_target:
        path: src/env/hyprland_io.zig
        imports: "std and plain env fact/value modules only; no sdl_c, wayland_c, hyprland_native, libc, compositor, or DE module"
        links: []
        artifact: hyprland_io_unit_fuzz
        role: "Unit and structured operational-history fuzz root for SocketTranscript and pure wire values"
      simulation_target:
        path: src/env/hyprland_wire_simulation.zig
        artifact: hyprland_wire_simulation
        module_imports:
          - "hyprland_io -> src/env/hyprland_io.zig"
          - "wayspot_env -> src/env/mod.zig"
        imports:
          - hyprland_io
          - src/env/hyprland.zig
          - src/env/mod.zig
          - src/env/monitor.zig
          - src/env/workspace.zig
          - src/env/window.zig
          - src/env/state.zig
        links: []
        separation_rule: "This root runs the same hyprland.zig and pure src/env/mod.zig control flow against SocketTranscript and imports no src/env/native.zig, hyprland_native, C module, libc, compositor, DE, fixture, or live socket."
      native_target:
        path: src/env/hyprland_native.zig
        imports: std.os.linux only for the planned socket/poll adapter
        links: "production native system libraries only"
        artifact: "module consumed by wayspot_env_native and hyprland_native_io_check; no standalone step"
      production_owner_target:
        path: src/env/native.zig
        module: wayspot_env_native
        module_imports:
          - "wayspot_env -> src/env/mod.zig"
          - "hyprland_native -> src/env/hyprland_native.zig"
        imports:
          - src/env/mod.zig
          - src/env/hyprland_native.zig
        links: "production owner module; no additional external library"
        role: "Only production owner of MonitorSource and MonitorFactStream; not imported by pure roots."
      native_check_target:
        path: src/env/hyprland_native_io_check.zig
        module: hyprland_native_io_check
        artifact: hyprland_native_io_check
        imports:
          - "wayspot_env_native -> src/env/native.zig"
          - "hyprland_native -> src/env/hyprland_native.zig"
        role: "Explicit no-runtime reference table for every production wrapper and hyprland_native SocketSource operation; this is distinct from src/c/native_io_check.zig and its native_io_check SDL/Wayland step."
        separation_rule: "The simulation compiles pure src/env/mod.zig control flow against SocketTranscript and never opens a compositor socket or imports src/env/native.zig; the production owner and native check are separate roots."
    unit_gates:
      - "Test exact RequestName bytes, SocketPath bytes at 107/108, nonzero local ids, negative StopId rejection, PollTimeout -1/0/60000 and out-of-range values, PollSet.event null stop-only mapping, PollResult event/stop fields, PollState mapping, event classification, partial-line merging, event-line bytes at 1044/1045, checked JSON values, exact window size shape, list bounds, and every public error mapping without a socket."
      - "Test ordered WriteStep results for full and partial WriteCount values, SignalInterrupted, HyprlandSocketWriteFailed, and stale SocketId rejection; test RequestRead and EventRead tagged chunk/eof values with no bytes-plus-eof state."
      - "Test one attempted close on injected failure, immediate retired mapping, no second native close, and cleanup-error precedence over the original operation error."
      - "In src/env/mod.zig, compile-time assertions bind MonitorSourceWith(Source) and MonitorFactStreamWith(Source) to pointer-stable Source fields and exact init/query/stream/wait/deinit signatures; src/env/native.zig binds those fields to SocketSource, and unit cases use an invalid pre-open connection to prove no partial owner or stream publication."
      - "The native check references src/env/native.zig:MonitorSource/MonitorFactStream plus SocketSource.init/deinit; the SocketTranscript simulation supplies the injected close result, and both wrapper/composition paths return that exact cleanup error without a second close."
    fuzz_gates:
      - "Use Zig 0.16 std.testing.fuzz for bounded parser-byte inputs: fuzz monitor/workspace/window JSON bytes, scalar conversions, event lines, and read chunks; assert termination, exact rejection, no partial fact publication, and parse-buffer cleanup without external IO."
      - "Use a separate Zig 0.16 std.testing.fuzz gate for operational history: decode each bounded fuzz input into a bounded sequence of existing typed ExpectedOperation records, drive SocketTranscript's ordered cursor, and assert no out-of-bounds access, exact TranscriptMismatch/TranscriptExhausted termination, one-shot close retirement, and cleanup. This gate does not replace parser-byte fuzzing and does not use fixtures or live sockets."
    simulation_gates:
      - "Drive queryMonitorsWith, fillStateWith, EventStream.waitWith, MonitorSourceWith(SocketTranscript), and MonitorFactStreamWith(SocketTranscript) through one concrete SocketTranscript. The real parser and env/mod.zig owner control flow consume response/event bytes, reconnect, stop, and cleanup records in the same order as the native wrappers."
      - "Return partial writes, partial reads, SignalInterrupted, EOF, malformed JSON, one-byte response overflow, one-byte event-line overflow at 1045, poll closed/error, stop readiness/closure, and one injected close failure with no retry."
      - "Assert exact socket path/request bytes, write-step references, response chunks, tagged read results, parse errors, FactEvent output, stop handling, reconnect poll timeout, returned errors, and one attempted close per socket."
      - "The env-owner simulation proves both concrete Source instantiations, pointer-stable Source storage, transcript ownership transfer for the test lifetime, invalid-init rollback, reconnect/stop control flow, and one-shot deinit error forwarding; the native check separately proves pointer-stable native storage and native adapter reachability."
    proof_commands:
      - "zig fmt --check src/env/hyprland_io.zig src/env/hyprland_native.zig src/env/native.zig src/env/hyprland_native_io_check.zig src/env/hyprland.zig src/env/mod.zig"
      - "zig build test --summary all"
      - "zig build"
      - "zig build hyprland_io_unit_fuzz hyprland_wire_simulation hyprland_native_io_check"
      - "! rg -n 'std\\.os\\.linux\\.(socket|connect|write|read|close|poll|errno)' src/env/hyprland.zig src/env/mod.zig"
      - "rg -n 'std\\.os\\.linux\\.poll|waitForEventStreamReconnect|EventStream.waitWith' src/env/hyprland.zig src/env/mod.zig src/env/hyprland_native.zig"
      - "! rg -n 'hyprland_native|std\\.os\\.linux|std\\.testing\\.(tmpDir|io)|TmpDir' src/env/hyprland_io.zig src/env/hyprland_wire_simulation.zig src/env/mod.zig"
      - "rg -n 'hyprland_native|MonitorSource|MonitorFactStream' src/env/native.zig src/env/hyprland_native_io_check.zig"
      - "ruby -e 'require \"yaml\"; YAML.load_stream(File.read(\"maturity_offenders.yml\"))'"
      - "git diff --check"
    implementation_order:
      - "Approve one bounded compile-time Source contract. MonitorSourceWith/MonitorFactStreamWith are direct owner compositions around that one contract, with exactly two concrete Source instantiations, SocketTranscript for pure tests and SocketSource for production; no second source contract or runtime interface exists."
      - "Keep src/env/mod.zig pure and move production MonitorSource/MonitorFactStream wrappers into src/env/native.zig; the pure roots import mod.zig, while product callers and the native check import native.zig."
      - "Move only socket and poll syscalls into src/env/hyprland_native.zig; inject Source into hyprland.zig and pure control in src/env/mod.zig, while src/env/native.zig binds the production SocketSource without changing product fact types."
      - "Replace arbitrary request_text with RequestName, check every external numeric range and exact window-size shape, map poll revents, and return close failures."
      - "Add src/env/hyprland_wire_simulation.zig with the listed C-free imports and hyprland_wire_simulation build step; it runs hyprland.zig and env/mod.zig against SocketTranscript."
      - "Add src/env/hyprland_native_io_check.zig as the distinct no-runtime native reference table, wire the hyprland_native_io_check build step, add the hyprland_io_unit_fuzz root, update aggregate/direct registrations, then prove MonitorSource and MonitorFactStream callers."
