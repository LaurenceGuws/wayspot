      migration_task: "Replace pid/status temporary paths with PidStatusFileIo and ProcessControlIo transcripts; overlay lifecycle simulation must not use fixture files."
    - path: src/sunglasses/state.zig
      symbols:
        - "effective image overlay requires enabled opacity and absolute path"
        - "parse valid state with image fields"
        - "malformed state load falls back to default"
        - "missing state load falls back to default"
        - "oversized state load falls back to default"
      direct_calls:
