        ownership_model:
          - "src/env/native.zig:MonitorSource and MonitorFactStream are native wrappers around src/env/mod.zig:MonitorSourceWith(Source) and MonitorFactStreamWith(Source). Each production wrapper owns one pointer-stable hyprland_native.SocketSource field; the borrowed control composition never copies its Source."
          - "The same bounded compile-time owner composition is instantiated exactly twice: SocketTranscript for C-free simulation and SocketSource for production. The production wrapper owns its SocketSource field; the simulation test owns its SocketTranscript local, passes its pointer to the borrowed control composition, clears control state, then deinitializes the transcript exactly once."
          - "This is one compile-time composition, not a runtime plugin interface, type table, erased field, or third Source realization. Every socket, read, write, poll, and close still belongs to one of the two Source implementations."
          - "MonitorSource and MonitorFactStream init publish their concrete owner only after all fallible socket setup succeeds; failure closes once, retires any mapping, and returns cleanup failure over the original failure when both fail."
      hyprland_call_site_changes:
        hyprland:
          - "Replace request(allocator, Connection, request_text) with requestWith(comptime Source: type, allocator: std.mem.Allocator, source: *Source, connection: Connection, name: RequestName) RequestError![]u8; the helper builds the native-bound SocketPath and RequestWrite and drives source operations."
          - "If requestWith returns HyprlandSocketCloseFailed, the Source has retired the local mapping after one close attempt; the caller reports the cleanup error and does not retry or reuse that SocketId."
          - "Replace queryMonitors and fillState internals with queryMonitorsWith(comptime Source: type, allocator: std.mem.Allocator, source: *Source, connection: Connection) MonitorQueryError!monitor_facts.MonitorList and fillStateWith(comptime Source: type, allocator: std.mem.Allocator, source: *Source, connection: Connection, env_state: *state_facts.EnvState) FillStateError!void."
          - "Change EventStream.init to initWith(comptime Source: type, allocator: std.mem.Allocator, source: *Source, connection: Connection) EventStreamInitError!EventStream; change wait to waitWith(self: *EventStream, source: *Source, stop: StopId) EventWaitError!FactEvent; change deinit to deinit(self: *EventStream, source: *Source) SocketCleanupError!void."
          - "Keep parseMonitors, parseWorkspaces, parseWindows, and classifyEventLine in hyprland.zig; they consume owned response bytes or bounded event lines after the source boundary."
        env_mod:
          - "Keep src/env/mod.zig pure: add MonitorSourceWith(comptime Source: type) and MonitorFactStreamWith(comptime Source: type) with exact two instantiations. MonitorSourceWith.init(source: *Source, connection: Connection) stores borrowed control state only; MonitorSourceWith.deinit clears that state and never deinitializes Source."
          - "Keep src/env/native.zig as the only production wrapper owner: it initializes an in-place SocketSource, binds MonitorSourceWith(SocketSource) and MonitorFactStreamWith(SocketSource), and deinitializes the Source exactly once after control deinit. The simulation root owns SocketTranscript and performs the same sequence with the SocketTranscript instantiations."
          - "Apply the pure composition to MonitorFactStreamWith.init(allocator: std.mem.Allocator, source: *Source, connection: Connection) and deinit; it borrows Source, owns only event-stream control state, passes the borrowed StopId and PollTimeout.infinite, and retries recoverable loss only through the named 1000 ms Source.poll reconnect path."
          - "Route waitForEventStreamReconnect through the same Source.poll with PollTimeout.milliseconds(1000); remove its direct std.os.linux.poll/errno calls."
          - "Drive both MonitorSourceWith(SocketTranscript) and MonitorFactStreamWith(SocketTranscript) through query, fill, stop, recoverable reconnect, parser failure, partial publication, and cleanup-failure cases; the native wrappers use the identical control flow with SocketSource."
        ownership_callers:
          - "src/main.zig:runWallpaper/runSunglasses import src/env/native.zig as wayspot_env_native, create one var MonitorSource, pass &monitor_source, and defer monitor_source.deinit; inline value arguments are removed."
          - "src/wallpaper/mod.zig:run, src/wallpaper/loop.zig:Loop.run/startWallpaper/runRandomLoop/rebuildSurfaceSlots/MonitorWatcher.init import src/env/native.zig as wayspot_env_native and take *wayspot_env_native.MonitorSource; MonitorWatcher moves its MonitorFactStream once and never copies it."
