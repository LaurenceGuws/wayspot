    - path: src/wallpaper/loop.zig
      symbols:
        - "wallpaper owner rejects a second live pid file"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.TmpDir
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace wallpaper pid fixture paths with PidStatusFileIo and ProcessControlIo transcripts."
  required_scan: >-
    Run rg for std.testing.tmpDir, std.testing.io, std.testing.TmpDir, tmp.dir,
    and test-only realPathFileAlloc calls. The result must equal these fourteen
    source paths; every match remains an open migration offender and is
    forbidden as maturity simulation evidence.

absent_dependencies:
  - name: sqlite
    present: false
    evidence: "No SQLite import, link, schema, query, or database path exists in src, build.zig, or assets."
  - name: ini
    present: false
    evidence: "No INI parser, INI reader, or INI file path exists in src, build.zig, or assets."
  - name: jsonl
    present: false
    evidence: "No JSONL reader or writer exists; in-scope JSON parsing belongs to the Hyprland wire adapter."

test_classes:
  unit:
    meaning: >-
      Run a pure Wayspot function with bounded values and assert exact returned
      values, errors, and owned-memory state.
  fuzz:
    meaning: >-
      Generate bounded bytes or typed wire values for a pure parser and assert
      termination, exact rejection, and cleanup without an external process.
  simulation:
    meaning: >-
      Run production code against an exact mock IO interface. The mock is
      generated from bounded operations and reproduces every input byte, output
      byte, error, partial transfer, callback, and cleanup event exactly; it is
      not a fixture, screenshot, live GUI or compositor call, shell call, or
      canned external object.

rules:
  pure_internal_modules: >-
    Pure parsers, event classifiers, result mappers, geometry, and state
    transitions use unit and fuzz only. They do not receive a mock IO object.
  external_adapters: >-
    Every direct C, socket, D-Bus, main-loop, file, terminal, or diagnostic-log
    owner uses a named mock seam and simulation. Passing unit or fuzz evidence
    alone does not close that owner.
  mock_cleanup: >-
    Every simulated handle, buffer, variant, source, callback context, and
    connection has one explicit deinit or close assertion on success and every
    error path.
  source_path_rule: >-
    current_owner_paths name current files and symbols. current_direct_calls list
    exact calls; grouped keys name adapter call groups owned by the paths above.
    planned_mock_interface paths are targets until their boundary marks an
    implemented slice; an implemented target is also a current source claim.
  test_class_rule: "Only unit, fuzz, and simulation occur in this register."

boundaries:
  - order: 1
    name: sdl_wayland_window_display_events
    status: partial_sdl_display_with_paired_window_layer_adapters
    next_design:
      status: implemented
      scope: >-
        This is one paired window/property and Wayland layer slice for the
        sunglasses consumer. The implemented display-facts slice remains
        unchanged. Wallpaper and the image, SHM, render, texture, clipboard,
        event, and standalone Wayland connection slices remain deferred.
      no_c_mock_build:
        status: implemented
        rule: >-
          Transcript, unit, fuzz, and simulation code is plain typed Zig. It
          does not import sdl_c or wayland_c, link libc or SDL3, link a
          Wayland library, start a DE, or invoke native adapter code.
        plain_modules:
          - path: src/c/sdl_io.zig
            role: >-
              Own SdlDisplayIo, SdlWindowIo, SdlWindowPropertyIo, their plain
              result types, and fixed typed transcripts. This module is the
              mock source used by unit, fuzz, and simulation targets.
            imports: []
            links: []
          - path: src/c/wayland_io.zig
            role: >-
              Own WaylandIo, its plain layer/display/surface result types, and
              fixed typed transcripts. This module is the mock source used by
              unit, fuzz, and simulation targets.
            imports:
              - sdl_io
            links: []
          - path: src/c/io_simulation_test.zig
            role: >-
              Run the production sunglasses_setup plan against exact typed
              SDL and Wayland mock operation records; it imports no native
              adapter or C module.
            imports:
              - sdl_io
              - sunglasses_setup
              - wayland_io
            links: []
            display: absent
          - path: src/sunglasses/setup.zig
            status: implemented
            role: >-
              Own SetupPlan and the fixed window/layer command sequences. The
              transcript executor in this module is production setup code; it
              consumes only plain typed adapters and no native or C module.
            imports:
              - sdl_io
              - wayland_io
            links: []
        native_modules:
          - path: src/c/sdl_native.zig
            status: implemented
            role: >-
              Implement the native SdlDisplayIo, SdlWindowIo, and
              SdlWindowPropertyIo sources. It is the only Zig module in this
              slice that calls SDL_*; Wayland native imports sdl_c only for
              adapter-internal C handle types.
            imports:
              - sdl_c
              - sdl_io
            links:
              - libc
              - SDL3
          - path: src/c/wayland_native.zig
            status: implemented
            role: >-
              Implement the native WaylandIo source by invoking the listed
              wayspot_* wrappers. Raw wl_* calls remain in
              src/c/wayspot_layer_shell.c. It consumes the native-only SDL
              handle handoff and never changes the plain transcript types.
            imports:
              - sdl_c
              - sdl_io
              - sdl_native
              - sunglasses_setup
              - wayland_io
            links:
              - libc
              - SDL3
              - wayspot_layer_shell
              - wayland-client
          - path: src/c/native_io_check.zig
            status: implemented
            role: >-
              Compile and link the explicit native entry-point table: all four
              sdl_native display callbacks, every SdlWindowPropertyIo and
              SdlWindowIo method, and WaylandIo.init/globalsPtr/surfacePtr/
              displayPtr/deinit. It invokes no native function and starts no
              window, compositor, or DE; it is not simulation evidence.
            imports:
              - sdl_native
              - wayland_native
            links:
              - libc
              - SDL3
              - wayspot_layer_shell
              - wayland-client
        targets:
          - name: sdl_io_unit_fuzz
            root: src/c/sdl_io.zig
            imports: []
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
          - name: wayland_io_unit_fuzz
            root: src/c/wayland_io.zig
            imports: [sdl_io]
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
          - name: sdl_wayland_simulation
            root: src/c/io_simulation_test.zig
            imports: [sdl_io, sunglasses_setup, wayland_io]
            links: []
            runs_without: [SDL3, wayland-client, libc, DE]
            forbidden_imports: [sdl_c, wayland_c, sdl_native, wayland_native]
          - name: wayspot_native_io_check
            root: src/c/native_io_check.zig
            imports: [sdl_native, wayland_native]
            links: [libc, SDL3, wayspot_layer_shell, wayland-client]
            entry_points:
              - sdl_native.displaySource.query_displays/query_name/query_bounds/query_scale
              - sdl_native.SdlWindowPropertyIo.create/setTitle/setWidth/setHeight/setHidden/setCustomSurfaceRole/setCreateEglWindow/deinit
              - sdl_native.SdlWindowIo.create/nativeWaylandHandles/resize/deinit
              - wayland_native.WaylandIo.init/globalsPtr/surfacePtr/displayPtr/deinit
            invokes_simulation: false
            starts_de: false
          - name: wayspot
            role: production/native
            imports: [sdl_native, wayland_native]
            links: [libc, SDL3, wayland-client]
            invokes_simulation: false
        separation_gate:
          - >-
            The simulation target must compile and run when SDL3, Wayland,
            libc, sdl_c, wayland_c, and DE environment inputs are absent.
          - >-
            The native check references every listed adapter entry point and
            links the native modules separately; it invokes no adapter method
            and is never used as simulation proof. Production links the same
            adapters for the real callers.
          - >-
            No simulation transcript may contain a native pointer or invoke a
            function from sdl_native, wayland_native, sdl_c, or wayland_c.
          - >-
            The simulation executes sunglasses_setup.runTranscript, while the
            native surface and Wayland adapter consume the same SetupPlan and
            fixed command sequences with real SDL and Wayland calls.
      ownership:
        - path: src/c/sdl_io.zig
          symbols:
            - DisplayName
            - DisplayBounds
            - DisplayFacts
            - DisplayList
            - DisplayTranscript
            - SdlDisplayIo
            - SdlWindowIo
            - SdlWindowPropertyIo
          owns_calls: []
          role: >-
            Owns plain bounded values and fixed typed transcripts only. It
            does not import sdl_c and does not call native SDL.
          does_not_own:
            - SDL_CreateProperties
            - SDL_DestroyProperties
            - SDL_SetStringProperty
            - SDL_SetNumberProperty
            - SDL_SetBooleanProperty
            - SDL_CreateWindowWithProperties
            - SDL_GetWindowProperties
            - SDL_GetPointerProperty
            - SDL_SetWindowSize
            - SDL_DestroyWindow
            - SDL image calls
            - SDL SHM, render, texture, clipboard, or event calls
        - path: src/c/sdl_native.zig
          symbols:
            - displaySource
            - SdlWindowPropertyIo
            - SdlWindowIo
          owns_calls:
            - SDL_GetDisplays
            - SDL_free
            - SDL_GetDisplayName
            - SDL_GetDisplayBounds
            - SDL_GetDisplayContentScale
            - SDL_CreateProperties
            - SDL_DestroyProperties
            - SDL_SetStringProperty
            - SDL_SetNumberProperty
            - SDL_SetBooleanProperty
            - SDL_CreateWindowWithProperties
            - SDL_GetWindowProperties
            - SDL_GetPointerProperty
            - SDL_SetWindowSize
            - SDL_DestroyWindow
          role: >-
            Owns native SDL display, property, window, and borrowed Wayland
            handle calls. Native pointers stay inside this adapter handoff.
        - path: src/c/wayland_io.zig
          symbols:
            - WaylandIo
          owns_calls: []
          role: >-
            Owns plain layer/display/surface values and fixed typed
            transcripts only. It does not import wayland_c or call C.
          does_not_own:
            - wayspot_layer_globals_init
            - wayspot_layer_globals_deinit
            - wayspot_layer_find_output
            - wayspot_layer_get_surface_on_layer
            - wayspot_layer_surface_add_listener
            - wayspot_layer_surface_set_size
            - wayspot_layer_surface_set_anchor
            - wayspot_layer_surface_set_exclusive_zone
            - wayspot_layer_surface_set_keyboard_interactivity
            - wayspot_layer_surface_ack_configure
            - wayspot_layer_surface_destroy
            - wayspot_wl_surface_set_empty_input_region
            - wayspot_wl_surface_commit
            - wayspot_wl_display_roundtrip
            - wayspot_wl_display_roundtrip_cleanup
        - path: src/c/wayland_native.zig
          symbols:
            - WaylandIo.init
            - WaylandIo.globalsPtr
            - WaylandIo.surfacePtr
            - WaylandIo.displayPtr
            - WaylandIo.deinit
          owns_calls:
            - wayspot_layer_globals_init
            - wayspot_layer_globals_deinit
            - wayspot_layer_find_output
            - wayspot_layer_get_surface_on_layer
            - wayspot_layer_surface_add_listener
            - wayspot_layer_surface_set_size
            - wayspot_layer_surface_set_anchor
            - wayspot_layer_surface_set_exclusive_zone
            - wayspot_layer_surface_set_keyboard_interactivity
            - wayspot_wl_surface_set_empty_input_region
            - wayspot_wl_surface_commit
            - wayspot_wl_display_roundtrip
            - wayspot_layer_surface_ack_configure
            - wayspot_wl_display_roundtrip_cleanup
            - wayspot_layer_surface_destroy
          role: >-
            Owns the native wayspot_* wrapper calls for the SetupPlan's
            paired layer setup.
            Deferred buffer calls remain in sunglasses/surface until their
            named seam. It never calls SDL_*; raw wl_* calls remain in
            src/c/wayspot_layer_shell.c.
          raw_calls_owned_by:
            path: src/c/wayspot_layer_shell.c
            calls:
              - wl_display_get_registry
              - wl_display_roundtrip
              - wl_registry_add_listener
              - wl_registry_bind
              - wl_registry_destroy
              - wl_output_add_listener
              - wl_output_destroy
              - wl_proxy_add_listener
              - wl_proxy_get_version
              - wl_proxy_marshal_flags
              - wl_surface_commit
          transcript_boundary: >-
            The transcript records the typed wayspot_* wrapper operations and
            bypasses the native C helper. Raw wl_* calls are owned by
            wayspot_layer_shell.c, not by Zig WaylandIo and not by transcript
            records.
          does_not_call:
            - SDL_* calls
          deferred_calls:
            - wayspot_wayland_connect
            - wayspot_wayland_disconnect
            - wayspot_layer_create_surface
            - wayspot_wl_surface_destroy
            - wayspot_shm_buffer_create
            - wayspot_shm_buffer_destroy
            - wayspot_wl_surface_attach_buffer
            - wayspot_wl_surface_detach_buffer
            - memfd_create
            - ftruncate
            - mmap
            - munmap
            - wl_display_connect
            - wl_display_disconnect
            - wl_shm_create_pool
            - wl_shm_pool_create_buffer
            - wl_shm_pool_destroy
            - wl_shm_destroy
            - wl_buffer_destroy
        - path: src/sunglasses/surface.zig
          symbols:
            - SunglassesSurface.init
            - SunglassesSurface.redraw
            - SunglassesSurface.deinit
            - LayerShellRole.init
            - LayerShellRole.deinit
          role: >-
            Orchestrate SdlPropertyId, SdlWindowId, WaylandDisplayId,
            WaylandOutputId, WaylandSurfaceId, and LayerSurfaceId values;
            after this slice it owns no raw SDL_Window, wl_display, wl_surface,
            wl_output, or layer-surface pointer for window/layer setup.
            Deferred image, SHM, buffer, and render code may retain its current
            C state until those named seams land.
        - path: src/sunglasses/setup.zig
          symbols:
            - SetupPlan
            - WindowCommand
            - window_commands
            - LayerCommand
            - layer_commands
            - SetupResult
            - CleanupSession
            - runTranscript
          owns_calls: []
          role: >-
            Owns the fixed typed setup sequence shared by the native executor
            and the pure transcript executor; it owns no native handle.
        - path: src/env/monitor.zig
          symbols:
            - queryMonitorsWith
          role: >-
            Keep the implemented display-facts owner unchanged. No SDL
            property wrapper is reintroduced in the monitor module.
      plain_transcript_types:
        - "SdlPropertyId: u32"
        - "SdlWindowId: u32"
        - "SdlWaylandHandleId: u32"
        - "SdlWaylandIds: { display_id: SdlWaylandHandleId, surface_id: SdlWaylandHandleId }"
        - "WindowSize: { width: i32, height: i32 }"
        - "WaylandDisplayId: u32"
        - "WaylandOutputId: u32"
        - "WaylandSurfaceId: u32"
        - "LayerSurfaceId: u32"
        - "LayerValue: raw value 3 only for the active sunglasses overlay"
        - "ConfigureFacts: configured replies require closed=false, serial 1..u32, and width/height 1..2147483647; a closed reply requires serial/width/height zero"
        - "WindowTitle: owned bytes, 1..160, no embedded NUL (src/sunglasses/surface.zig:max_title_bytes)"
        - "MonitorName: owned bytes, 1..96, no embedded NUL"
        - "OutputName: owned bytes, 1..96, no embedded NUL"
        - "LayerNamespace: the fixed non-empty wayspot-sunglasses bytes"
      local_id_rule:
        - "Every transcript ID is a nonzero local u32 token; zero is invalid and is never a native pointer."
        - "One transcript permits at most one live SdlPropertyId, SdlWindowId, WaylandDisplayId, WaylandSurfaceId, and LayerSurfaceId; WaylandOutputId values are 1..8."
        - "A token is published only after its create operation succeeds, is not reused while live, and is consumed by its matching destroy operation exactly once."
        - "SDL property/window operations reject use after deinit; positive width and height are rejected before the transcript records them."
        - "WaylandIo requires findOutput to publish the selected output before layer creation, installs one listener, and rejects repeated or skipped phases without consuming a transcript call."
        - "The one sunglasses sequence is the SetupPlan's window commands, handle lookup, globals, output, layer value, setup, first commit/roundtrip, matching configure ack, second commit/roundtrip, layer destroy, cleanup roundtrip, and globals deinit; cleanup and reuse are rejected after deinit."
        - "Layer operations after destroy are rejected; anchor is 1..15, closed configure facts are rejected, and ack serials must match the published first configure serial."
        - "Native SDL and Wayland pointers are separate adapter-internal values and never appear in transcript or product state."
      native_only_handoff: >-
        Native WaylandIo receives a mutable native SdlWindowIo and resolves it
        to NativeWaylandHandles containing the borrowed SDL-provided
        wl_display and wl_surface pointers. The handoff is adapter-internal
        only; it is never stored in a transcript, SunglassesSurface, or
        product state. Transcript IDs remain local nonzero tokens, not pointer
        values. SDL owns those borrowed handles, so WaylandIo never
        disconnects the display or destroys the surface.
      transcript_operations:
        sdl_window:
          - "property_create -> SdlPropertyId | SdlWindowFailed"
          - "set_title(SdlPropertyId, WindowTitle) -> void | SdlWindowFailed"
          - "set_width(SdlPropertyId, i32) -> void | InvalidWindowSize/SdlWindowFailed/InvalidPropertyId"
          - "set_height(SdlPropertyId, i32) -> void | InvalidWindowSize/SdlWindowFailed/InvalidPropertyId"
          - "set_hidden(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "set_custom_surface_role(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "set_create_egl_window(SdlPropertyId, bool) -> void | SdlWindowFailed"
          - "window_create(SdlPropertyId) -> SdlWindowId | SdlWindowFailed"
          - "window_properties(SdlWindowId) -> SdlPropertyId | SdlWindowPropertyMissing/InvalidPropertyId"
          - "wayland_display_pointer(SdlPropertyId) -> SdlWaylandHandleId | WaylandSurfaceUnavailable/InvalidWaylandIds"
          - "wayland_surface_pointer(SdlPropertyId) -> SdlWaylandHandleId | WaylandSurfaceUnavailable/InvalidWaylandIds"
          - "window_resize(SdlWindowId, WindowSize) -> void | InvalidWindowSize/SdlWindowSizeFailed/InvalidWindowId"
          - "property_destroy(SdlPropertyId) -> void"
          - "window_destroy(SdlWindowId) -> void"
        wayland_layer:
          - "globals_init(WaylandDisplayId) -> void | WaylandGlobalsAlreadyInitialized/WaylandIoDeinitialized/LayerShellRegistryFailed/LayerShellRegistryListenerFailed/LayerShellRoundtripFailed/LayerShellMissing/LayerShellCompositorMissing/LayerShellShmMissing"
          - "find_output(MonitorName) -> WaylandOutputId | WaylandGlobalsNotInitialized/WaylandProtocolOutOfOrder/WaylandLayerDestroyed/LayerShellOutputMissing"
          - "create_layer_surface(WaylandSurfaceId, WaylandOutputId, LayerValue, LayerNamespace) -> LayerSurfaceId | InvalidWaylandLayerValue/WaylandOutputNotSelected/WaylandProtocolOutOfOrder/WaylandLayerAlreadyCreated/WaylandLayerDestroyed/LayerShellSurfaceCreateFailed"
          - "add_listener(LayerSurfaceId) -> void | WaylandLayerNotCreated/WaylandLayerDestroyed/WaylandProtocolOutOfOrder"
          - "set_size/set_anchor/set_exclusive_zone/set_keyboard_interactivity(LayerSurfaceId, plain value) -> void | WaylandLayerDestroyed/WaylandProtocolOutOfOrder/InvalidWaylandAnchor/SdlWindowSizeFailed"
          - "set_empty_input_region(WaylandSurfaceId) -> void | WaylandLayerNotCreated/WaylandLayerDestroyed/WaylandProtocolOutOfOrder/LayerShellInputRegionFailed"
          - "commit(WaylandSurfaceId) -> void | WaylandLayerNotCreated/WaylandLayerDestroyed/WaylandProtocolOutOfOrder"
          - "roundtrip(WaylandDisplayId) -> ConfigureFacts | LayerShellConfigureFailed/LayerShellClosed/InvalidConfigureFacts/WaylandProtocolOutOfOrder"
          - "ack_configure(LayerSurfaceId, u32) -> void | InvalidConfigureFacts/WaylandConfigureSerialMismatch/WaylandLayerDestroyed/WaylandProtocolOutOfOrder"
          - "destroy_layer_surface(LayerSurfaceId) -> void | WaylandLayerNotCreated/WaylandLayerDestroyed"
          - "roundtrip_cleanup(WaylandDisplayId) -> void | WaylandCleanupOutOfOrder"
          - "globals_deinit(WaylandDisplayId) -> void | WaylandCleanupOutOfOrder/WaylandIoDeinitialized"
      success_order:
        - "Create properties and apply the six typed setters in their fixed transcript order."
        - "Create the SDL window, then destroy the property object exactly once."
        - "Resolve and retain the returned SdlWaylandIds, then pass its display_id and surface_id through globals, output, layer, commit, roundtrip, and cleanup calls."
        - "Install the listener, set layer values, set the empty input region, commit, and roundtrip until configured; closed facts are rejected and trigger rollback."
        - "Acknowledge configure, resize the SDL window, commit, and roundtrip again."
        - "The native first and second roundtrips validate the same ConfigureFacts bounds as the pure transcript; the second commit clears the prior facts before waiting for a fresh reply."
        - "Publish only plain ids after every required step succeeds."
      rollback_order:
        - "A failed property setter destroys the new property object and publishes no window."
        - "A failed window creation destroys the property object and publishes no window."
        - "A resize failure leaves the SDL window owned and available for caller cleanup."
        - "A missing Wayland property, globals failure, output failure, layer creation failure, input-region failure, closed configure, or roundtrip failure returns the newly created owners in CleanupSession until retryCleanup completes."
        - "CleanupSession is the one owner for the SDL window and partial Wayland state; borrowed SDL display and surface handles are never disconnected or destroyed by WaylandIo."
      cleanup_order:
        - "Success deinit destroys the layer surface, performs roundtrip cleanup, deinitializes globals, then destroys the SDL window."
        - "Each SDL property and window id is destroyed exactly once."
        - "Each Wayland layer id and initialized global resource is destroyed exactly once in reverse creation order."
        - "runTranscript returns SetupResult.failure with CleanupSession when cleanup fails; retryCleanup retains pending state, retries the failed operation, and does not issue a duplicate successful destroy."
        - "Native Wayland deinit performs layer destroy and roundtrip cleanup only when layer_surface was published; a globals-only failure deinitializes globals without a cleanup roundtrip."
        - "Image, SHM, buffer, render, texture, clipboard, event, and standalone display cleanup is outside this slice."
      errors:
        sdl:
          - SdlWindowFailed
          - SdlWindowPropertyMissing
          - SdlWindowSizeFailed
          - WaylandSurfaceUnavailable
        wayland:
          - WaylandSurfaceUnavailable
          - LayerShellRegistryFailed
          - LayerShellRegistryListenerFailed
          - LayerShellRoundtripFailed
          - LayerShellMissing
          - LayerShellCompositorMissing
          - LayerShellShmMissing
          - LayerShellOutputMissing
          - LayerShellSurfaceCreateFailed
          - LayerShellInputRegionFailed
          - LayerShellConfigureFailed
          - LayerShellClosed
          - LayerShellUnexpectedResult
          - WaylandProtocolOutOfOrder
          - WaylandOutputNotSelected
          - WaylandConfigureSerialMismatch
          - WaylandCleanupOutOfOrder
          - InvalidConfigureFacts
      unit_gates:
        - "Test pure SDL property/result mapping, plain-id publication, bounds, and every listed SDL/Wayland error without C handles."
        - "Test SDL live guards, foreign property transcripts, pre-record dimension rejection, and exact property/window cleanup."
        - "Test native SDL resize rejects non-positive dimensions before SDL_SetWindowSize without creating a native window."
        - "Test Wayland globals/layer ownership, repeated and out-of-order cleanup, post-destroy rejection, anchor bounds, configure bounds, and exact reverse cleanup state transitions."
      fuzz_gates:
        - "Fuzz bounded names, sizes, ids, layer values, configure facts, typed result codes, and fixed transcript lengths; assert termination, no invalid id publication, and no double cleanup."
      simulation_gates:
        - "Run one ordered sunglasses setup protocol: property creation/setters, window creation, immediate property destruction, plain Wayland id handoff, Wayland setup/configure, resize, layer cleanup, globals cleanup, and window destruction."
        - "Run setter, window-create, property-lookup, globals, output, layer, input-region, closed-configure, roundtrip, and resize failures; assert exact operation order and reverse cleanup."
        - "Assert the transcript contains only plain ids and values, native handles never enter transcript state, borrowed SDL display/surface handles are not disconnected or destroyed, and no deferred image/SHM/render/event operation is called."
        - "Run sunglasses_setup.runTranscript with the same fixed SetupPlan and command sequences consumed by native setup; assert split SDL property/pointer calls, layer value 3, ordered Wayland calls, and reverse cleanup."
        - "Run runTranscript-driven property-set, output, resize, configure-roundtrip, cleanup-flush, globals-deinit, and layer-destroy failures; assert SetupResult.failure retains CleanupSession, retryCleanup consumes the bounded repeated operation, and cleanup finishes exactly once."
