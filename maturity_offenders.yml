# Wayspot external IO maturity register.
# This index is exhaustive for current external calls. It does not replace
# DOMAIN.yml or the cache/config/history register.

register:
  name: external_io_maturity
  status: open
  implementation_status: partial_sdl_display_facts
  source_changes: true
  implementation_order:
    - sdl_wayland_window_display_events
    - hyprland_ipc_wire
    - dbus_notifications
    - std_io_fs_file_and_terminal
    - process_launch
    - linux_lifecycle
    - clock_and_random
    - process_input_environment
    - lua_defaults_runtime
    - text_rasterization

scope:
  included_surfaces:
    - SDL and Wayland C window, display, buffer, and event calls
    - Hyprland request and socket2 event sockets with their JSON wire parsing
    - D-Bus notification connection, messages, variants, main loop, and timers
    - std.Io/std.fs file calls, terminal output, and standard diagnostic logs
      used by Wayspot owners
    - fork, exec, wait, child-process, and converter launch calls
    - Linux signal, eventfd, poll, kill, sleep, and /proc lifecycle reads
    - clock and random sources used by resident and notification owners
    - process environment inputs used to choose XDG, HOME, PATH, and Hyprland paths
    - Lua 5.4/Howl calls used by the defaults loader
    - FreeType and HarfBuzz font loading, scaling, shaping, glyph, and bitmap calls
  not_boundaries:
    - SQLite
    - INI
    - JSONL
  exclusion_rule: >-
    SQLite, INI, and JSONL remain absent dependencies. This register separates
    runtime product IO from build/re-run tooling and from test-only filesystem
    fixtures. std.Io and std.fs are runtime substrate calls only when a listed
    product owner invokes them; build.zig and re-run.sh are tooling inventory,
    and std.testing.tmpDir/std.testing.io/TmpDir calls are forbidden evidence.

  inventory_claim: >-
    The current_direct_calls entries cover every current runtime native C,
    socket, std.Io/std.fs, process, Linux lifecycle, clock/random, environment,
    and terminal/logging, Lua, FreeType, and HarfBuzz call in the listed product owners. Tooling-only build.zig and
    re-run.sh calls are listed only under tooling_only. Test-only
    std.testing.tmpDir/std.testing.io/TmpDir file calls are listed only under
    forbidden_current_test_io and never satisfy a maturity gate. Pure
    formatting through an abstract std.Io.Writer is unit/fuzz work. Orders 1-3
    are the largest first wave; the remaining orders preserve the complete
    current runtime-call inventory.

tooling_only:
  meaning: >-
    build.zig and re-run.sh are build/re-run tools, not runtime product IO
    owners. Their filesystem, process, environment, /proc, and shell calls are
    inventoried for completeness only. They have no product mock seam and are
    never driven by a simulation gate; shell receipts and build-graph receipts
    are not maturity evidence.
  paths:
    - path: build.zig
      symbols:
        - build
      direct_calls:
        - std.Io.Dir.cwd().readFileAlloc
        - b.dependency
        - linkSystemLibrary
        - "linkSystemLibrary(freetype2)"
        - "linkSystemLibrary(harfbuzz)"
        - "include_path(/usr/include/freetype2)"
        - "include_path(/usr/include/harfbuzz)"
        - addModule
        - addTest
        - addRunArtifact
      bounds:
        - "The embedded defaults.lua read is limited to 32768 bytes by build.zig."
        - "Build graph module, test, link, and run-artifact counts are bounded by the declared build graph; no product input is created by this path."
      errors: "Build configuration, dependency, read, link, and graph-construction errors stop the build; no runtime fallback is claimed."
      cleanup: "Build-owned module and artifact objects are released by the build runner; this path has no resident handle or product state."
    - path: re-run.sh
      symbols:
        - sync_binary
        - read_proc_argv
        - read_pid_file
        - pid_has_canonical_mode
        - pid_has_legacy_mode
        - collect_mode_pids
        - collect_wallpaper_pids
        - stop_pid_list
        - wait_for_pid_list
        - wait_for_canonical_mode
        - wait_for_canonical_wallpaper
        - restart_notifications
        - restart_wallpaper
      direct_calls:
        - mkdir -p
        - cp
        - chmod +x
        - mv -f
        - rm -f
        - head -n 2
        - pgrep -x
        - kill -TERM
        - sleep 0.05
        - setsid
        - systemctl --user start/stop
        - zigup run 0.16.0 build
        - canonical binary launch
        - /proc/<pid>/cmdline read
        - /proc/<pid>/comm read
        - stdout/stderr redirection
      bounds:
        - "At most 8 external pid candidates, 4 argv elements, pid values <=4194304, and 40 wait cycles are accepted."
        - "The shell script accepts only exact canonical or exact legacy argv identities; fuzzy substring matches are not accepted."
      errors: "Every shell command status is checked at its current boundary; malformed, stale, duplicate, and overbound pid data is rejected."
      cleanup: "Temporary binary paths, pid candidates, and receipt processes are removed or reaped by the bounded script path; no product owner receives shell ownership."
  evidence: "inventory_only"
  simulation: false

forbidden_current_test_io:
  status: open_migration_offenders
  meaning: >-
    These are current test-only filesystem fixtures, not runtime product IO.
    Their std.testing.tmpDir, std.testing.io, and std.testing.TmpDir operations
    are open migration work and cannot count as unit, fuzz, or simulation
    maturity evidence. A future mock seam must replace the fixture operation
    before its boundary can claim simulation coverage.
  entries:
    - path: src/config/defaults.zig
      symbols:
        - "test missing user config keeps embedded defaults"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.io
        - std.testing.TmpDir
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace the temporary HOME/config directory with the planned typed file mock; keep Lua mapping unit/fuzz tests separate."
    - path: src/notification/dbus.zig
      symbols:
        - dbusTestPath
        - readTestHistory
        - "timer expiry rejects stale source and accepts current source"
        - "notify History failure rolls back Store timer file hooks and rows"
        - "post-replace History failure commits Store timer and effects"
        - "notify history preserves replacement created time and dates new rows"
        - "close persists every durable field before live removal"
        - "close missing durable row leaves live state and timer unchanged"
        - "close pre-replace failure preserves live state timer file and effects"
        - "close parent sync failure commits live close and effects"
        - "expiry retries pre-replace failure and closes on success"
        - "DBus deinit creates no durable history row"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.TmpDir
        - std.Io.Dir.cwd().readFileAlloc
      migration_task: "Move durable-history test paths and readback behind the D-Bus/file mock transcripts; native GLib simulation must not use a temporary fixture directory."
    - path: src/notification/history.zig
      symbols:
        - writeTestFile
        - testPath
        - "missing history file loads empty"
        - "directory read error propagates"
        - "permission read error propagates"
        - "read allocation error propagates"
        - "read byte bound propagates StreamTooLong"
        - "invalid JSON propagates"
        - "unsupported version propagates"
        - "wrong or missing rows propagate invalid JSON"
        - "malformed row rejects the complete history"
        - "parse returns HistoryFieldTooLong and frees prior rows"
        - "save writes and replaces one JSON object atomically"
        - "save reports parent sync failure after publishing new bytes"
        - "save creates nested absolute parent directories"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.io
        - std.testing.TmpDir
        - tmp.dir.writeFile
        - tmp.dir.openFile
        - tmp.dir.setPermissions
        - tmp.dir.close
        - std.Io.Dir.cwd().realPathFileAlloc
      migration_task: "Replace temporary history files and injected parent paths with the typed HistoryFileIo transcript, retaining pure JSON and row unit/fuzz tests."
    - path: src/notification/history_list.zig
      symbols:
        - "notification History list projects newest rows and loads once"
        - "notification history candidate cleanup is repeatable"
        - "notification History list retries after a failed read"
        - "notification History list enforces the selection bound"
        - "notification History list allocation failure cleans every owner"
        - "notification History list stages output before publishing"
      direct_calls:
        - std.testing.tmpDir
        - std.testing.io
        - std.testing.TmpDir
        - tmp.dir.writeFile
      migration_task: "Drive history-list load failure and retry through a typed history mock; do not treat a temporary JSON file as simulation."
    - path: src/picker/cmd.zig
      symbols:
        - pickerHistoryTestPath
        - expectHistoryWriteFailure
        - "Cmd picker collects candidates once per picker lifecycle"
        - "candidate loading rolls back overflow and retries without stale candidates"
        - "desktop scan overflow reaches transaction and retries cleanly"
        - "Cmd Apps route reaches installed and fixed-local leaves"
        - "picker history save creates nested parent directories"
        - "picker history rejects persisted unreachable selection without mutation"
        - "picker history load remembers missing file and retries every other failure"
        - "picker history load failure publishes no partial list and retries"
        - "picker history load rejects oversized files and permission failures"
        - "picker history serialization accepts exact file bound and rejects one byte over"
        - "picker history save preflights file overflow before replacement"
        - "picker history atomic write preserves phases and cleans temporary files"
      direct_calls:
