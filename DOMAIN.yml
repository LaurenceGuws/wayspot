---
ownership:
  process:
    owner: wayspot
    must_exist:
      - mode_selection
      - entrypoint
      - cleanup
      - direct_lifecycle_ownership
      - owner_identity_assertion
    owns:
      - picker_lifecycle
      - notification_lifecycle
      - wallpaper_lifecycle
      - sunglasses_lifecycle

  picker:
    owner: picker
    must_exist:
      - query
      - candidate
      - mode
      - selection
      - cmd
      - sub_cmd
    modes:
      apps:
        owns:
          - app_discovery
          - app_open
          - default_picker_mode
      notifications:
        owns:
          - history
          - notification_open
      wallpaper:
        owns:
          - wallpaper_start
          - wallpaper_stop
          - wallpaper_rotate
      sunglasses:
        owns:
          - filter
          - dimming
          - image
          - overlay_apply

    cmd:
      owner: picker.cmd
      must_exist:
        - tagged_union
        - mode_array
        - default_mode
        - sub_cmd_union
        - candidate_union
        - input_union
        - typed_concrete_leaf
        - gui_cli_input_equivalence
        - bash_completion
      owns:
        - cmd_tree
        - sub_cmd_tree
        - candidate_reachability
        - cmd_resolution
        - input_contract
        - typed_concrete_leaf
        - gui_cli_input_equivalence
        - cli_consumption
        - gui_consumption
      completion:
        owner: picker.cmd
        positions:
          - mode
          - sub_cmd
          - operation
          - app
        result: one next shell argument without a command prefix
        serialization_owner: cli.bash
      consumers:
        - cli
        - gui

  notification:
    owner: notification
    must_exist:
      - freedesktop_name
      - notification_row
      - history
      - banner
    owns:
      - notify
      - close
      - close_all
      - expire
      - one_live_owner

  wallpaper:
    owner: wallpaper
    must_exist:
      - image
      - monitor_overlay
      - rotation_deadline
    owns:
      - image_load
      - image_rotate
      - monitor_reconcile
      - one_live_owner
      - event_source_recovery

  sunglasses:
    owner: sunglasses
    must_exist:
      - monitor_filter
      - monitor_dimming
      - monitor_image
      - overlay
    owns:
      - filter_apply
      - dim_apply
      - image_apply
      - monitor_reconcile

  environment:
    owner: environment
    must_exist:
      - monitor
      - workspace
      - window
      - bounded_snapshot
    owns:
      - monitor_facts
      - workspace_facts
      - window_facts
    source_rules:
      sdl:
        provides:
          - monitor
          - wayland
          - window
      hyprland:
        provides:
          - workspace
          - window
          - monitor
        policy: facts_only

---
build:
  must_exist:
    - one_bounded_picker_lifecycle
    - one_notification_name_owner
    - one_notification_history
    - one_wallpaper_loop
    - one_sunglasses_overlay
    - one_environment_snapshot
    - one_owner_per_lifecycle
    - one_cleanup_per_owner

  picker:
    path: process -> cmd -> sub_cmd -> candidate -> interface -> selection -> cmd -> clean
    cmd:
      type: tagged_union
      arms:
        - apps
        - notifications
        - wallpaper
        - sunglasses
      default_mode: apps
      mode_array: bounded_and_ordered
      sub_cmd:
        type: tagged_union
        source: src/picker/sub_cmd.zig
        arms:
          - notifications: NotificationsSubCmd
          - wallpaper: WallpaperSubCmd
          - sunglasses: SunglassesSubCmd
        apps: none
      candidate:
        type: tagged_union
        source: src/picker/candidate.zig
        arms:
          - sub_cmd: SubCmd
          - concrete: Concrete
        rule: Candidate stores one shared SubCmd value or one Concrete leaf; no generic or erased child storage
      input:
        type: tagged_union
        source: src/picker/candidate.zig
        symbol: Input
        arms:
          - none
          - scalar: ScalarInput
          - toggle: ToggleInput
          - path: PathInput
        meaning: Input is the typed value contract carried by a Concrete leaf; it is not GUI widget state or resident runtime state
        gui: GUI switches explicitly on Input and renders scalar as a slider, toggle as an on/off control, and path as a bounded textbox
        cli: CLI parses raw argv into the same Input arm and bounds before constructing the same Concrete leaf
        definitions:
          none:
            symbol: Input.none
            fields: []
            meaning: The leaf takes no user value.
          scalar:
            symbol: ScalarInput
            fields:
              - value: i32
              - min: i32
              - max: i32
              - step: i32
            invariant: min <= value <= max, step is positive and no greater than max - min, and (value - min) % step == 0
            ownership: The value is copied into the Concrete leaf; GUI slider draft state is separate.
          toggle:
            symbol: ToggleInput
            fields:
              - enabled: bool
            ownership: The value is copied into the Concrete leaf; GUI toggle draft state is separate.
          path:
            symbol: PathInput
            fields:
              - bytes: fixed_storage
              - length: usize
            ownership: PathInput owns one bounded copy and does not borrow GUI text or argv storage.
            invariant: path is non-empty, absolute, and contains no invalid path byte
        bounds:
          arm_count: project_version_scope.yml:max_input_arms
          scalar: project_version_scope.yml:sunglasses_scalar_bounds
          path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
      concrete:
        type: tagged_union
        source: src/picker/candidate.zig
        arms:
          - app
          - open
          - lifecycle
          - notification
        lifecycle_arms:
          - notifications_restart
          - wallpaper_restart
          - wallpaper_rotate
          - sunglasses_restart
          - sunglasses_apply
          - sunglasses_reconcile
          - sunglasses_dim
          - sunglasses_filter
          - sunglasses_image
        bounds:
          arm_count: project_version_scope.yml:max_concrete_arms
          lifecycle_arm_count: project_version_scope.yml:max_lifecycle_arms
          monitor_name_bytes: project_version_scope.yml:sunglasses_monitor_name_bytes
          image_path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
        input_policy:
          app: none
          open: none
          lifecycle:
            notifications_restart: none
            wallpaper_restart: none
            wallpaper_rotate: none
            sunglasses_restart: none
            sunglasses_apply: none
            sunglasses_reconcile: none
            sunglasses_dim: scalar_or_toggle
            sunglasses_filter: scalar_or_toggle
            sunglasses_image: none_or_scalar_or_toggle_or_path
          notification: none
        leaf_shapes:
          app:
            input: Input.none
            owner: apps mode
          open:
            input: Input.none
            owner: apps mode
          lifecycle:
            typed_arms:
              notifications_restart:
                fields: []
                input: Input.none
              wallpaper_restart:
                fields: []
                input: Input.none
              wallpaper_rotate:
                fields: []
                input: Input.none
              sunglasses_restart:
                fields: []
                input: Input.none
              sunglasses_apply:
                fields: []
                input: Input.none
              sunglasses_reconcile:
                fields: []
                input: Input.none
              sunglasses_dim:
                fields:
                  monitor: owned_bounded_monitor_name
                  input:
                    type: Input
                    accepted_arms:
                      - scalar
                      - toggle
                input_policy: scalar_or_toggle
              sunglasses_filter:
                fields:
                  monitor: owned_bounded_monitor_name
                  input:
                    type: Input
                    accepted_arms:
                      - scalar
                      - toggle
                input_policy: scalar_or_toggle
              sunglasses_image:
                fields:
                  monitor: owned_bounded_monitor_name
                  input:
                    type: Input
                    accepted_arms:
                      - none
                      - scalar
                      - toggle
                      - path
                input_policy: none_or_scalar_or_toggle_or_path
          notification:
            input: Input.none
            owner: notification history
        rule: Concrete is terminal and every arm has an explicit typed Input contract; notification is display-only and explicitly rejected at selection and launch boundaries
      input_equivalence:
        rule: CLI raw input and GUI editing construct equal Concrete values for the same mode, monitor, operation, and bounded value
        examples:
          - "wayspot sunglasses dim DP-1 set 35"
          - "wayspot sunglasses dim DP-1 on"
          - "wayspot sunglasses dim DP-1 off"
          - "wayspot sunglasses filter DP-1 set -35"
          - "wayspot sunglasses image DP-1 opacity 55"
          - "wayspot sunglasses image DP-1 set /absolute/image.png"
        tests:
          - same scalar argv and slider commit produce equal sunglasses_dim leaves
          - same on/off argv and toggle commit produce equal sunglasses_dim leaves
          - same path argv and textbox commit produce equal sunglasses_image leaves
          - GUI and CLI reject the same scalar, toggle, path, and monitor bounds
        rejection: CLI and GUI reject the same out-of-bound scalar, toggle, path, and monitor values
      completion: bash_only
    modes:
      - apps
      - notifications
      - wallpaper
      - sunglasses

  notification:
    path: freedesktop -> notification -> history_or_banner -> clean

  wallpaper:
    path: process -> wallpaper -> monitor -> image -> rotate -> clean
    invariants:
      - one_live_owner
      - pid_identity_matches_mode
      - event_socket_close_is_recoverable

  sunglasses:
    path: picker -> sunglasses -> monitor -> filter_or_dim_or_image -> overlay -> clean

  environment:
    path: source -> monitor_workspace_window_facts -> bounded_snapshot
    product_policy: none

  lifecycle:
    path: process -> owner_identity -> direct_start_or_signal -> clean
    invariants:
      - no_shell_lock_owns_a_lifecycle
      - duplicate_owner_is_an_explicit_error
      - stale_identity_is_rejected

---
bounds:
  every:
    - loop
    - queue
    - list
    - cmd
    - sub_cmd
    - result
    - event
    - signal
    - buffer
    - file
    - image
    - notification
    - snapshot
  rules:
    - fixed_capacity_or_explicit_limit
    - invalid_external_data_is_rejected
    - owner_frees_owned_memory
    - owner_stops_owned_threads
    - owner_closes_owned_files_and_sockets
    - owner_destroys_owned_surfaces
    - cpu_sleeps_without_input_work_or_deadline

---
proof:
  design_first:
    - write_ownership_before_code
    - write_bounds_before_storage
    - write_failure_meaning_before_recovery
  assertions:
    - assert_constants
    - assert_input
    - assert_return_values
    - assert_state_transitions
    - assert_positive_space
    - assert_negative_space
  receipts:
    - unit_tests
    - zig_build_test
    - zig_build
    - git_diff_check
    - direct_runtime_path
  shape:
    tigerbeetle: defensive_invariants_and_assertions
    foot: tiny_direct_runtime_owners
    qagent: exhaustive_domain_and_ownership_shape

---
forbidden_shape:
  - product_domain_noun_not_in_vocabulary
  - product_verb_not_in_vocabulary
  - generic_shared_bucket
  - compatibility_wrapper
  - dead_owner
  - unbounded_storage
  - silent_external_failure
  - product_policy_inside_source_adapter
  - compositor_ipc_inside_picker_wallpaper_or_sunglasses
  - resident_launcher_ipc
  - gtk
  - scripting_vm
  - generic_ui_framework
