product:
  name: wayspot
  mission: >
    A small Hyprland and Wayland desktop environment busybox. Wayspot gives a
    bare Hyprland session the focused tools normally supplied by a traditional
    desktop environment.

scope:
  binary: wayspot
  platform:
    compositor: Hyprland
    display: Wayland
    other_compositors: excluded

  interfaces:
    gui:
      purpose: interactive desktop picker
    cli:
      purpose: direct access to the same product actions
    bash:
      entry: source <(wayspot completion bash)
      behavior:
        - complete modes at wayspot
        - complete one matching mode prefix
        - complete the selected mode's next choices

  modes:
    apps:
      default: true
      purpose: find and open installed applications
      resident_process: false
    notifications:
      purpose: receive, show, close, and retain desktop notifications
      retention: 30 days
      resident_process: true
    wallpaper:
      purpose: show and rotate monitor wallpapers
      resident_process: true
      invariants:
        - monitor focus never changes the current wallpaper round
        - each process start receives a fresh random sequence
        - the process remains alive while the desktop session is alive
    sunglasses:
      purpose: interactively dim, filter, and overlay an image per monitor
      resident_process: true
      gui:
        - select a monitor
        - adjust bounded values directly
        - toggle effects on and off
        - select an image path
      cli: exposes the same accepted values and actions

  process_lifecycle:
    - each resident process owns and asserts its lifecycle
    - no flock process
    - no fallback process manager

excluded:
  - architecture inferred from deleted source
  - generic framework or plugin systems
  - support for compositors other than Hyprland
