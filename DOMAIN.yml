---
ownership:
  process:
    owner: wayspot
    must_exist:
      - mode_selection
      - entrypoint
      - cleanup
      - direct_lifecycle_ownership
      - owner_identity_assertion
    owns:
      - picker_lifecycle
      - notification_lifecycle
      - wallpaper_lifecycle
      - sunglasses_lifecycle

  picker:
    owner: picker
    must_exist:
      - query
      - candidate
      - mode
      - selection
      - command_launch
    modes:
      app:
        owns:
          - app_discovery
          - app_open
      notification:
        owns:
          - history
          - notification_open
      wallpaper:
        owns:
          - wallpaper_start
          - wallpaper_stop
          - wallpaper_rotate
      sunglasses:
        owns:
          - filter
          - dimming
          - image
          - overlay_apply

    command:
      owner: picker.command
      must_exist:
        - candidate_union
        - user_input_type
        - candidate_builder
        - bash_completion
      owns:
        - command_candidates
        - command_resolution
        - cli_consumption
        - gui_consumption
      consumers:
        - cli
        - gui

  notification:
    owner: notification
    must_exist:
      - freedesktop_name
      - notification_row
      - history
      - banner
    owns:
      - notify
      - close
      - close_all
      - expire
      - one_live_owner

  wallpaper:
    owner: wallpaper
    must_exist:
      - image
      - monitor_overlay
      - rotation_deadline
    owns:
      - image_load
      - image_rotate
      - monitor_reconcile
      - one_live_owner
      - event_source_recovery

  sunglasses:
    owner: sunglasses
    must_exist:
      - monitor_filter
      - monitor_dimming
      - monitor_image
      - overlay
    owns:
      - filter_apply
      - dim_apply
      - image_apply
      - monitor_reconcile

  environment:
    owner: environment
    must_exist:
      - monitor
      - workspace
      - window
      - bounded_snapshot
    owns:
      - monitor_facts
      - workspace_facts
      - window_facts
    source_rules:
      sdl:
        provides:
          - monitor
          - wayland
          - window
      hyprland:
        provides:
          - workspace
          - window
          - monitor
        policy: facts_only

---
build:
  must_exist:
    - one_bounded_picker_lifecycle
    - one_notification_name_owner
    - one_notification_history
    - one_wallpaper_loop
    - one_sunglasses_overlay
    - one_environment_snapshot
    - one_owner_per_lifecycle
    - one_cleanup_per_owner

  picker:
    path: process -> command -> candidate -> cli_or_gui -> selection -> command -> clean
    command:
      candidate: tagged_union
      user_input: explicit_bounded_type
      completion: bash_only
    modes:
      - app
      - notification
      - wallpaper
      - sunglasses

  notification:
    path: freedesktop -> notification -> history_or_banner -> clean

  wallpaper:
    path: process -> wallpaper -> monitor -> image -> rotate -> clean
    invariants:
      - one_live_owner
      - pid_identity_matches_mode
      - event_socket_close_is_recoverable

  sunglasses:
    path: picker -> sunglasses -> monitor -> filter_or_dim_or_image -> overlay -> clean

  environment:
    path: source -> monitor_workspace_window_facts -> bounded_snapshot
    product_policy: none

  lifecycle:
    path: process -> owner_identity -> direct_start_or_signal -> clean
    invariants:
      - no_shell_lock_owns_a_lifecycle
      - duplicate_owner_is_an_explicit_error
      - stale_identity_is_rejected

---
bounds:
  every:
    - loop
    - queue
    - list
    - command
    - result
    - event
    - signal
    - buffer
    - file
    - image
    - notification
    - snapshot
  rules:
    - fixed_capacity_or_explicit_limit
    - invalid_external_data_is_rejected
    - owner_frees_owned_memory
    - owner_stops_owned_threads
    - owner_closes_owned_files_and_sockets
    - owner_destroys_owned_surfaces
    - cpu_sleeps_without_input_work_or_deadline

---
proof:
  design_first:
    - write_ownership_before_code
    - write_bounds_before_storage
    - write_failure_meaning_before_recovery
  assertions:
    - assert_constants
    - assert_arguments
    - assert_return_values
    - assert_state_transitions
    - assert_positive_space
    - assert_negative_space
  receipts:
    - unit_tests
    - zig_build_test
    - zig_build
    - git_diff_check
    - direct_runtime_path
  shape:
    tigerbeetle: defensive_invariants_and_assertions
    foot: tiny_direct_runtime_owners
    qagent: exhaustive_domain_and_ownership_shape

---
forbidden_shape:
  - product_domain_noun_not_in_vocabulary
  - product_verb_not_in_vocabulary
  - generic_shared_bucket
  - compatibility_wrapper
  - dead_owner
  - unbounded_storage
  - silent_external_failure
  - product_policy_inside_source_adapter
  - compositor_ipc_inside_picker_wallpaper_or_sunglasses
  - resident_launcher_ipc
  - gtk
  - scripting_vm
  - generic_ui_framework
