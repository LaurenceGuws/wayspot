# Wayspot domain contract.
# The allowed vocabulary and ownership below are exhaustive.
# A new noun, verb, relationship, or product surface requires an operator decision.

---
product:
  wayspot:
    role: pragmatic Wayland desktop busybox
    mission: >
      Keep useful desktop actions direct and bounded: summon a picker, select one
      candidate, retain notifications, rotate wallpapers, and apply focused
      monitor overlays.
    release:
      design: first concrete best design
      proof: runtime and assertions before release

