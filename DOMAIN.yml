      - process
      - picker
      - mode
      - app
      - command
      - notification
      - history
      - banner
      - wallpaper
      - image
      - sunglasses
      - filter
      - dimming
      - overlay
    environment:
      - monitor
      - workspace
      - window
    picker:
      - query
      - candidate
      - input
      - selection
      - textbox
      - cursor
      - scale
      - icon
      - font
    operation:
      - lifecycle
      - event
      - signal
      - source
      - owner
      - bound
      - error
      - proof
      - state
      - default
  verbs:
    - start
    - stop
    - run
    - open
    - select
    - query
    - rank
    - launch
    - retain
    - close
    - show
    - hide
