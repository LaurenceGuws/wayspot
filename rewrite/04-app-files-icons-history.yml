# Temporary acceptance record. Product law remains outside this file.

marathon: apps_files_icons_history
state: accepted

useful_product_path: >
  Present application names immediately, then load available PNG icons into
  only the visible rows without delaying queued input.

owners:
  src/icon.zig: bounded candidate icon paths
  src/image.zig: bounded PNG header validation
  src/sdl.zig: visible textures, production text, drawing, and cleanup
  src/sdl_pixels.zig: one fixed logical picker geometry

bounds:
  visible_rows: 14
  visible_icon_records: 14
  icon_pixels: 22x22
  icon_encoded_bytes: 4194304
  icon_source_side_pixels: 1024
  icon_decoded_bytes: 4194304
  icon_path_bytes: 1024
  icon_attempts_per_idle_turn: 1
  text_objects: 15
  logical_window_pixels: 720x480

accepted_behavior:
  - names render before icon work
  - queued input is drained before one icon attempt
  - leaving the viewport destroys its loaded textures
  - missing, invalid, malformed, and oversized icons retain the application row
  - source surfaces and encoded bytes are released in the loading turn
  - SDL_ttf, FreeType, HarfBuzz, and Noto Sans are pinned
  - the font is embedded and opened from one read-only memory stream
  - every text object, engine, font, stream, texture, renderer, window, and library has reverse-order cleanup
  - high-DPI drawing and pointer input share one logical geometry

accepted_absence:
  - SVG icons remain text-only
  - no icon or application metadata is persisted
  - no worker thread or generic cache exists
  - selection history is deferred
  - IME and editor behavior are deferred

proof:
  tests: 156
  source_non_whitespace_characters: 95507
  stripped_release_safe_binary_bytes: 8166936
  shared_runtime_dependencies:
    - libc
    - libm
    - ELF loader
  live_receipts:
    - application names appear immediately
    - PNG icons stream into visible rows
    - filtering, pointer selection, wheel scrolling, and scrollbar remain useful
    - Noto Sans UTF-8 text renders through SDL_ttf
