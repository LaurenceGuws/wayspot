useful_product_path: >
  Show application names immediately, then add available icons to the current
  picker rows without delaying input.

minimum_file_tree:
  src/icon.zig: resolve one desktop icon name to one bounded PNG path
  src/sdl.zig: own visible SDL textures and destroy each exactly once

dependency_direction:
  - desktop App supplies an optional icon name
  - picker Frame supplies visible App indexes
  - SDL owns decoding, scaling, texture creation, drawing, and cleanup

data_shapes:
  icon_path: one terminated path
  visible_texture: one App index and one SDL texture

named_bounds:
  visible_textures: 32
  rendered_icon_pixels: 16x16
  icon_path_bytes: 1024
  work_per_idle_turn: 1 icon

invariants:
  - names are presented before icon work starts
  - input is handled before the next icon is loaded
  - only current visible rows own textures
  - source surfaces are destroyed before another icon is attempted
  - missing, unsupported, and malformed icons never remove an application
  - no icon data is persisted

errors_and_failure_meaning:
  missing_or_unsupported_icon: keep the text row
  texture_creation_failure: fail the picker after exact cleanup

cleanup:
  - destroy decoded and scaled surfaces in the loading turn
  - destroy evicted textures once
  - destroy all remaining textures before the renderer

negative_space:
  - no icon cache
  - no worker thread
  - no process invocation
  - no SVG decoder in the first experiment
  - no complete Freedesktop theme implementation

unit_tests:
  - absolute PNG path
  - bounded generated path
  - invalid icon name rejection

deterministic_simulations:
  - input interrupts idle turns
  - idle work remains bounded

real_product_receipts:
  - initial names remain immediate
  - PNG icons appear progressively
  - scrolling and filtering retain bounded memory

character_budget: measure before acceptance
explicit_exclusions:
  - selection history
  - retained app metadata
  - persistent icon data

icon_slice:
  state: accepted
  behavior:
    - names render before icon work
    - one visible PNG is attempted per idle turn
    - at most 32 visible icon attempts remain in memory
    - leaving the viewport destroys its textures
  accepted_miss:
    - SVG icons remain text-only
    - no generated PNG directory exists yet
  proof:
    - 146 test executions pass
    - live icons stream in without delaying input
    - Alacritty proves SVG absence does not remove or break an application row

picker_chrome_slice:
  state: active
  scope:
    - separate query and result panes
    - 24 pixel result rows
    - full-row selection
    - pointer hover and click
    - wheel scrolling
    - proportional scrollbar
  excludes:
    - complete text editing
    - fonts and themes
    - generic layout or control types
