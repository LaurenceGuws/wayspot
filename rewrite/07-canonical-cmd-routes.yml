proof_goal:
  product_path: >
    One closed Cmd family gives the existing CLI and GUI equal apps and
    notifications routes while each interface keeps its own presentation.
  first_theorem: >
    Resolve existing CLI arguments into one exhaustive Cmd without changing
    their product meaning or touching the zero-argument apps picker path.
  primary_path: >
    wayspot-beta with no arguments opens apps directly. It does not parse a
    route, read notification history, allocate route rows, or add work before
    the current picker startup.

references_read:
  - DOMAIN.yml
  - rewrite-marathons.yml
  - src/main.zig
  - src/cli.zig
  - src/apps.zig
  - src/picker.zig
  - src/sdl.zig
  - src/launch.zig
  - src/notification_history.zig
  - /home/home/personal/projects/dev_references/terminals/ghostty/src/terminal/parse_table.zig
  - /home/home/personal/projects/dev_references/terminals/ghostty/src/terminal/Parser.zig
  - /home/home/personal/projects/dev_references/zig_maturity/tigerbeetle/docs/TIGER_STYLE.md
  - /home/home/personal/projects/dev_references/terminals/foot
  - /home/home/personal/projects/qagent/qagent/src

reference_lessons:
  ghostty:
    keep:
      - closed tagged states and actions
      - compile-time-complete tables
      - one direct lookup followed by one exhaustive switch
      - construction checks that reject missing or conflicting entries
    reject:
      - a byte-by-state parser table where Wayspot has only three shallow tables
      - terminal parser vocabulary outside its problem
  tigerbeetle:
    - bound every table, row, query, loop, and route depth
    - assert positive and forbidden states
    - keep central control flow explicit and nonrecursive
  foot:
    - prefer shallow switches and concrete data over a routing framework
  qagent:
    - use tagged unions only when their arms represent exact owned states
    - do not import QAgent product nouns or architecture

vocabulary:
  keep:
    Cmd: one closed family of interface-neutral meanings that main can perform
    Table: one GUI-only navigation destination containing bounded rows
    Row: one GUI navigation destination, application identity, or retained record
    Rows: the exact storage or borrowed view for one open table
  existing:
    query: interface-owned text used to narrow apps or root rows
    record: the existing notification_history.Record
    app: the existing apps.App
  reject:
    - Command
    - commands
    - Route
    - Entry
    - Leaf
    - Next
    - Candidate
    - CandidateType
    - Input
    - widget
    - provider
    - service
    - controller
    - registry
    - node
    - payload
    - context
  reason: >
    Cmd names interface-neutral product meaning. Table and Row are GUI facts,
    and Rows names their bounded storage. Route, Entry, and Leaf would only
    rename relationships already represented by tagged-union arms.

minimum_file_tree:
  src:
    cmd.zig: >
      Own only Cmd, exhaustive argument resolution, and Cmd shape assertions.
    cli.zig: >
      Own CLI argument intake and text or JSONL presentation; consume Cmd
      without SDL types.
    picker.zig: >
      Own GUI-only Table, Row, Rows, static root rows, table labels, query,
      transition, selection, and the lifetime of the open Rows value.
    sdl.zig: >
      Draw picker rows and app icons; contain no argument or product routing.
    main.zig: >
      Compose the interfaces and exhaustively perform Cmd actions; retain
      resident notification and application-launch ownership.
    apps.zig: >
      Retain application discovery, matching, and App ownership unchanged.
    launch.zig: >
      Retain structured application launch unchanged.
    notification_history.zig: >
      Retain Record, bounded History, inspection, and JSONL formatting
      unchanged.
  build.zig: register cmd.zig unit tests

dependency_direction:
  allowed:
    - "main -> cmd"
    - "main -> cli"
    - "main -> picker"
    - "main -> launch"
    - "cli -> cmd"
    - "picker -> cmd"
    - "picker -> notification_history"
    - "sdl -> picker row presentation"
    - "cmd -> apps identity and query meaning"
    - "launch -> apps"
  forbidden:
    - "cmd -> main, cli, picker, sdl, or launch"
    - "cmd -> notification_history"
    - "cli -> picker or sdl"
    - "picker -> cli or CLI JSONL"
    - "notification_history -> cmd, picker, cli, or sdl"
    - SDL rows in CLI output

declarations_pseudocode: |
  pub const Cmd = union(enum) {
      apps: union(enum) {
          list: []const u8,
          open: u16,
      },
      notifications: union(enum) {
          run,
          history,
      },
  };

  pub const Table = enum {
      root,
      apps,
      notifications,
  };

  pub fn tableName(table: Table) []const u8 {
      return switch (table) {
          .root => "/",
          .apps => "apps",
          .notifications => "notifications",
      };
  }

  pub const Row = union(enum) {
      table: Table,
      app: u16,
      notification: *const notification_history.Record,
  };

  pub const Rows = union(enum) {
      root,
      apps: struct {
          values: []const apps.App,
          matches: apps.Matches,
      },
      notifications: notification_history.History,

      pub fn count(rows: *const Rows) u16;
      pub fn row(rows: *const Rows, index: u16) Row;
      pub fn deinit(rows: *Rows, allocator: Allocator) void;
  };

  const root_rows = [2]Row{
      .{ .table = .apps },
      .{ .table = .notifications },
  };

  pub fn resolve(
      argv: []const []const u8,
      applications: []const apps.App,
      query_bytes: *[query_bytes_max]u8,
  ) Error!Cmd;

shape_assertions:
  - Cmd has exactly apps and notifications arms
  - every Cmd value has exactly one exhaustive performer in main
  - Table has exactly root, apps, and notifications
  - Row has exactly table, app, and notification
  - root_rows has exactly two entries in apps then notifications order
  - every root row contains a distinct Table arm
  - every Table has exactly one exhaustive tableName
  - no root row points to root
  - every Row arm is handled exhaustively by picker and SDL presentation
  - every Row.table selection transitions to its contained Table
  - every Row.app selection produces Cmd.apps.open for its checked index
  - no Row.notification can produce any Cmd
  - a Row.notification never launches, mutates, closes, signals, or persists
  - no recursive table walk exists

ownership_and_borrowing:
  Cmd_apps_list: >
    Borrows bytes from the caller's fixed query buffer and is consumed before
    that invocation returns.
  Cmd_apps_open: >
    Stores a checked u16 index into main's application array. Main owns the
    array until launch completes or fails.
  Rows_root: >
    Borrows the immutable compile-time root_rows array and allocates nothing.
  Rows_apps: >
    Borrows main's application array and owns the existing fixed-capacity
    apps.Matches value.
  Rows_notifications: >
    Owns exactly one notification_history.History returned by inspect and
    releases all Record allocations through History.deinit.
  transition: >
    Build and validate the complete next Rows value locally. Only after success
    may picker release the prior Rows and publish the next table, query, and
    selection.

identity:
  table: Table enum value
  app: checked index into the immutable application array
  notification: >
    borrowed Record address while Rows.notifications is alive; it is display
    identity only and can never become Cmd
  selection: >
    checked row index into the current Rows only; a table change resets it to
    zero after the new row count is known
  picker_selection_control: |
    switch (row) {
        .table => |table| transitionTo(table),
        .app => |index| perform(.{ .apps = .{ .open = index } }),
        .notification => {}, // Browsing only. Do not create or perform Cmd.
    }

table_construction:
  root:
    source: root_rows
    allocation: none
    filtering: ASCII case-insensitive prefix against the two exact names
  apps:
    source: existing application array and apps.Matches
    filtering: retain current application matching and ordering
  notifications:
    source: notification_history.inspect
    ordering: newest retained Record first by reverse iteration
    filtering: none in this marathon
    materialization: >
      Do not copy Records into a generic row array. Rows.row maps a checked
      visible index directly to the retained Record.

bounds:
  cmd_families: 2
  tables: 3
  root_rows: 2
  current_route_depth: 2
  route_or_query_bytes: 256
  cli_arguments: 64
  app_rows: 512
  notification_rows: 4096
  visible_rows: 14
  pending_sdl_events_per_draw: 1024
  selection_index: u16
  constraints:
    - every usize-to-u16 conversion is checked before conversion
    - every row loop is bounded by its concrete Rows arm
    - no recursion, unbounded list, or route stack
    - existing App and Record field bounds remain owned by their current files

failure_meaning:
  QueryTooLong: no Cmd or Rows mutation
  TooManyArguments: no Cmd or Rows mutation
  UnknownCmd: no action and CLI prints the existing bounded help
  AppNotFound: no launch
  RowOutOfBounds: no selection or table mutation
  HistoryReadFailure: >
    publish no notification rows; keep the prior Rows valid until normal SDL
    cleanup, then report the exact error
  HistoryCorrupt: same failure meaning as HistoryReadFailure
  AllocationFailure: >
    publish no partial Rows; release only locally completed allocations

cleanup:
  - picker owns and deinitializes exactly one current Rows value
  - a failed table transition deinitializes only the local incomplete owner
  - notification History deinitializes every retained Record exactly once
  - SDL cleanup completes before main launches an app or reports a picker error
  - Cmd owns no allocation and has no cleanup path

product_routes:
  gui_zero_arguments:
    input: wayspot-beta
    result: >
      Open Table.apps directly with the empty query. This bypasses root parsing
      and notification history exactly as the current primary path does.
  gui_root:
    input: /
    rows:
      - apps -> Table.apps
      - notifications -> Table.notifications
  gui_root_prefix:
    input: /ap
    rows:
      - apps -> Table.apps
  gui_apps:
    input: /apps term
    result: >
      Open Table.apps and use term with the existing application matcher.
  gui_notifications:
    input: /notifications
    result: >
      Lazily inspect retained history and show Record values newest first.
      There is no one-row history intermediate table because notifications has
      only one currently reachable GUI value.
    row_selection: >
      Cursor, highlight, and scroll may inspect Records. Enter or click performs
      no transition and produces no Cmd; the picker remains open.
  cli_apps:
    input: wayspot-beta apps term
    cmd: Cmd.apps.list("term")
    result: print the same matching app names as the current CLI
  cli_app_open:
    input: wayspot-beta exact-app-name
    cmd: Cmd.apps.open(checked_app_index)
    result: retain current structured launch
  cli_notification_process:
    input: wayspot-beta notifications
    cmd: Cmd.notifications.run
    result: retain current resident process
  cli_notification_history:
    input: wayspot-beta notifications history
    cmd: Cmd.notifications.history
    result: retain current newest-first public JSONL bytes exactly

gui_query_rules:
  - ordinary text always queries the default apps table
  - slash is the only root-table marker
  - an exact root name enters its Table; optional text after one ASCII space is
    accepted only by apps
  - editing an exact slash path back into a prefix returns to filtered root rows
  - no navigation stack, hidden aliases, fuzzy table ranking, or recursive parser
  - an unknown slash prefix produces zero rows and Enter performs no action
  - editing /notifications back to a prefix returns to root filtering without
    reading or publishing another history table

presentation_boundary:
  cli:
    - app lists remain newline-delimited names
    - notification history remains the existing public JSONL formatter
    - CLI never sees SDL Frame or Row rendering data
  gui:
    - consumes Row values directly
    - app rows retain current icon and launch behavior
    - notification rows consume Record fields directly and never parse JSONL
    - table rows render their exact names without app icons

implementation_checkpoints:
  - order: 1
    name: cli_cmd_theorem
    status: implemented_uncommitted
    scope:
      - add cmd.zig with Cmd and bounded resolve
      - route existing apps and notifications argv through one exhaustive switch
      - retain exact CLI output, app launch, and resident process behavior
      - leave zero-argument GUI and picker source untouched
    useful_receipt: >
      Existing apps, exact app launch, notifications process dispatch, and
      notifications history all resolve through Cmd with byte-identical output.
    expected_character_cost:
      production_added: 3500..6000
      tests_added: 4000..7000
      deletion_target: direct duplicate argv decisions in main and cli
    implementation_receipts:
      - Cmd contains exactly apps.list, apps.open, notifications.run, and
        notifications.history
      - notification arguments resolve before desktop discovery
      - zero arguments bypass Cmd resolution and retain direct apps picker startup
      - query UTF-8 and total bytes are checked before the caller buffer is written
      - exact desktop id or unique exact app name is the only launch fallback
      - fuzzy and typo app matches remain list-only
      - main contains one exhaustive performer for every Cmd
      - cmd.zig imports no notification, history, picker, SDL, CLI, launch, or main
      - cli.zig owns only bounded help and app-list presentation
      - isolated missing notification history succeeds without app discovery
      - isolated malformed notification arguments return status 2 without output
      - isolated app list, typo rejection, and exact structured launch pass
      - 302 tests pass with the complete build
      - production source is 2020 characters larger than checkpoint start
      - cmd adds 2838 production characters, cli removes 1893, and main adds 1075
  - order: 2
    name: apps_rows_theorem
    status: implemented_uncommitted
    scope:
      - add Table, Row, and Rows apps arm
      - replace picker-owned app-specific Row and selection helpers
      - preserve current apps visuals, icons, matching, input, and launch
      - do not expose root or notification tables yet
    useful_receipt: >
      The primary picker behaves identically while its visible values are the
      closed Row union rather than an app-only duplicate model.
    expected_character_cost:
      production_net: -1000..2500
      tests_added: 3000..5000
      stop_if: picker or SDL gains a second retained app representation
    implementation_receipts:
      - Table, Row, and Rows contain only the production-reachable apps arm
      - Rows.apps borrows the immutable application slice and owns one Matches value
      - Frame carries only Row.app with one checked u16 application index
      - SDL resolves every name and icon from its authoritative application slice
      - query changes construct complete Query and Rows values before publication
      - app matching occurs once at startup and once per accepted query change
      - old app_index plus name projection, selectedApp, and matchCount are deleted
      - strict transcripts preserve query, order, indexes, selection, scroll,
        hover, click, Enter, cleanup, and launch result
      - picker and SDL import no notification history and perform no history access
      - checkpoint production source is 2225 characters larger than its start
      - 1830 picker characters from the superseded shape are deleted
      - one apps.Matches.init remains in the complete production picker path
      - 333 tests pass, including the linked SDL native index test
      - no live GUI receipt was run because strict transcripts prove this
        nonvisual ownership change without disrupting the operator
  - order: 3
    name: root_and_notification_rows
    scope:
      - add the static root table and slash transition
      - lazily open existing retained notification History
      - render Record rows directly as non-actionable browsing values
      - preserve ordinary text as the direct apps query
    useful_receipt: >
      Slash reaches apps and retained notifications in the GUI while direct CLI
      routes retain equal product meaning and separate presentation.
    expected_character_cost:
      production_added: 4000..8000
      tests_added: 5000..9000
      stop_if: history is copied, parsed from JSONL, or read during default startup
  - order: 4
    name: shape_reduction_and_hardening
    scope:
      - delete superseded picker/app routing branches
      - collapse duplicate row bounds and switches
      - fuzz bounded argv, root queries, and table transitions
      - prove all compile-time shape assertions and native receipts
    expected_character_cost:
      deletion_target: at least 15 percent of characters added in checkpoints 1..3
      final_production_net_cap: 10000
      stop_if: >
        the net cap cannot be met without hiding control flow or compressing
        readable Zig

migration_and_deletion:
  delete_after_checkpoint_1:
    - direct notifications argv branch in main after Cmd owns equivalent meaning
    - duplicate app argv classification split between main and cli
  delete_after_checkpoint_2:
    - picker-local app-only Row declaration
    - picker app_index/name row projection
    - app-only selection helpers replaced exactly by Rows.row
  delete_after_checkpoint_3:
    - any temporary slash branch that does not consume root_rows
  retain:
    - apps discovery and matching
    - current SDL rendering and icon loading until each Row arm is proven
    - structured launch
    - notification resident process
    - notification History and public JSONL formatter
  forbidden:
    - compatibility shim between old and new row models
    - dual argv resolver
    - pre-delete Cmd, Candidate, SubCmd, Concrete, Lifecycle, or Input source

tests:
  unit:
    - exact Cmd union and exhaustive argv mapping
    - exact static root rows and apps-first order
    - every valid and invalid route depth
    - exact 255, 256, and 257-byte query behavior
    - exact app and history row capacities
    - checked selection and row identity
    - notification reverse iteration and non-actionable selection
    - edit exact /notifications back to every valid root prefix
    - transition failure leaves prior Rows unchanged
    - zero arguments construct apps Rows without history access
  fuzz:
    - bounded argv slices and arbitrary bytes never produce an invalid Cmd
    - slash query edits never exceed depth or query bounds
    - table and selection histories preserve one live Rows owner
    - arbitrary Record text remains data and never becomes a route
  simulation:
    - history success publishes complete newest-first rows
    - history missing file publishes an empty complete table
    - history corruption, short read, permission failure, and allocation failure
      publish no partial table
    - SDL transcript proves table, app, and notification rows draw without CLI bytes
    - selecting notification rows emits no Cmd, launch, close, persistence, or
      notification side effect
  native:
    - zero-argument picker startup remains the direct apps path
    - / shows apps then notifications
    - /notifications reads isolated retained history only when entered
    - CLI apps and notification history bytes remain unchanged
    - exact app selection still reaches structured launch
  gates:
    - zig fmt --check .
    - zig build test --summary all
    - zig build
    - YAML parse
    - git diff --check
    - bounded stale-vocabulary and dependency-direction scans

negative_space:
  - no wallpaper or sunglasses Cmd arm or behavior
  - no Bash or other shell completion implementation
  - no generic route parser, graph, registry, callback, or plugin model
  - no Candidate, CandidateType, Input, SubCmd, Concrete, or form resurrection
  - no GUI parsing CLI JSONL
  - no CLI consuming SDL rows
  - no history read, route allocation, or root parse on zero-argument startup
  - no notification history filtering, mutation, deletion, or launch action
  - no notification Record inside Cmd
  - no second app matcher, history store, or launch owner
  - no timestamps or internal history IDs in GUI presentation
  - no compatibility aliases or migration state during beta
  - no future family represented before it has reachable product behavior

future_shell_adapter:
  invariant: >
    A future shell-specific adapter may consume Cmd family names and bounded
    next product meanings. It cannot consume GUI-only Table, Row, or Rows, and
    Cmd exposes no shell protocol, escaping, COMP variables, or completion
    command in this marathon.
  reason: >
    Closed Cmd arms preserve semantic product meaning without making either
    shell internals or GUI navigation part of the product CLI.

open_product_decisions:
  - decision: gui_exact_route_activation
    disposition: approved_for_theorem
    rule: >
      Typing or selecting exact /notifications enters its table immediately;
      /apps enters apps. Editing either exact path back into a prefix returns to
      root filtering.
    effect: no separate submit-only route mode or navigation stack
  - decision: notification_row_text
    disposition: approved
    rule: >
      Render app_name as the small label, summary as the primary line, and body
      as bounded secondary text. Do not show timestamps or history IDs.
    effect: requires a small Row-aware Frame extension but no new product type
  - decision: notification_row_selection
    disposition: approved_as_non_actionable
    rule: >
      Cursor, highlight, and scroll may inspect a Record. Enter or click
      produces no Cmd, performs no action, and keeps the picker open.
    effect: non-actionability is exhaustive picker control flow, not an error
  - decision: history_route_failure
    disposition: approved_with_cleanup_proof
    rule: >
      Construct history Rows locally. On failure, publish nothing and preserve
      the prior Rows until the picker performs exact native cleanup; then return
      and report the inspection error. Do not silently show empty history.
    effect: >
      external failure remains visible, transition remains failure-atomic, and
      neither prior nor partial Rows leaks

review_gate:
  approved: false
  source_implementation_blocked: checkpoint_2_and_later
  questions:
    - approve or reject checkpoint 1 implementation
    - keep checkpoint 2 blocked until this diff is committed
