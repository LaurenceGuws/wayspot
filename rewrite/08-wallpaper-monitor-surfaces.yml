        lines: 1728-1758, 2358-2430
        proves: direct prepare/read/dispatch sequencing, HUP handling, and writable flush retry
      - path: /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/posix.zig
        lines: 995-1050
        proves: ppoll exposes SignalInterrupt while poll retries it with the original timeout
      - path: /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/posix.zig
        lines: 400-475
