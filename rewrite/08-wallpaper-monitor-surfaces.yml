      - path: /home/home/personal/projects/dev_references/zig_maturity/tigerbeetle/docs/TIGER_STYLE.md
        lines: 91-140
        proves: fixed loop bounds and paired positive/negative assertions
    negative_space:
      - no product argv route, wallpaper schedule, rotation, randomness, image change, cache, config, or history
      - no other compositor, SDL window, GPU renderer, frame loop, or periodic refresh
      - no focus/workspace/window/mouse-triggered reconciliation
      - no in-place mutation of Current output_snapshot for a changed monitor set
      - no stop/socket2/path/deadline field in Native and no fd transfer between Native values
      - no daemon supervisor, fallback process, generic reconnect owner, or hidden thread
      - no live compositor receipt in checkpoint 5
    closes_when:
      - stop wins every simultaneous readiness history and performs no later product work
      - socket2 reconnect and monitor convergence share the exact 8-attempt/2-second bound
      - independent Hyprland and Wayland add/remove orders converge through exact candidate discovery
      - idle reaches one infinite blocking poll after bounded drains
      - old Current remains owned until a complete candidate Round publishes
      - changed monitor sets use a new Wayland connection and never reuse output_snapshot by count
      - Native handoff preserves resident stop/socket2 identities and closes only old Wayland ownership
