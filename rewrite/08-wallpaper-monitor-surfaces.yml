        image: runWallpaper owns and deinitializes exactly once after every later owner
        paths: runWallpaper stack owns; every socket operation borrows
        stop: runWallpaper owns from openStop through closeStop and exact mask restoration
        event_fd: runWallpaper owns; reconnect mutates the one slot and exit closes it only when present
        current_native: >
