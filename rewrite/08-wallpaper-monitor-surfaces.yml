unit_tests:
  - exact required-global versions and every under-version rejection
  - output initial facts publish only on done
  - missing and duplicate output names and global_remove state
  - exact and maximum valid Monitor
  - every rejected Monitor field and exact two-decimal scale conversion
  - sorted snapshot equality and duplicate rejection
  - exact event classification with all refresh and ignored event names
  - fragmented, coalesced, empty, malformed, and overlong event records
  - cover-center crop arithmetic for landscape, portrait, equal ratio, and odd excess
  - exact image, monitor, round pixel and byte endpoints
  - exhaustive transform mapping
  - stop, reconnect, and refresh state transitions
  - exact transient mismatch classification and attempt endpoints
  - all capacities fit their checked index types
  - SurfaceHandle rejects absent, stale, wrong-generation, and double-release records

fuzz_tests:
  data:
    - >
      Smith generates bounded JSON monitor arrays, unknown fields, number
      endpoints, escapes, truncation, and malformed bytes.
    - Smith generates socket2 fragments, separators, newlines, overlong records, and irrelevant event bursts
    - Smith generates PNG header dimensions and crop arithmetic inputs before native decoding
  operational:
    - >
      Smith generates partial writes, EINTR, response fragments, EOF, close
      failure, event loss, poll readiness, reconnect outcome, configure bursts,
      closed surfaces, and buffer releases.
    - every history is capped by the exact operation and event capacities
    - Smith interleaves snapshot changes with output global, name, done, and removal histories
  assertions:
    - no malformed data publishes a snapshot, image, surface, or Event
    - stop causes no later task
    - all acquired handles are released exactly once
    - focus/workspace/window histories perform zero snapshot and surface tasks
    - transient cross-protocol mismatch never mutates Round or allocates a SurfaceHandle

deterministic_simulations:
  - first roundtrip advertises globals and issues binds; matching remains forbidden
  - >
    Second roundtrip supplies output geometry, modes, scale, name, and done;
    only then may exact Hyprland names match.
  - output v3, missing name, missing done, duplicate name, and excessive output events reject discovery
  - global_remove retires one output and cannot reuse its match before reconciliation
  - socket2 add arrives first; a later output global/name/done converges
  - output global/name/done arrives first; a later socket2 add and snapshot converge
  - global_remove arrives first; the old snapshot remains transient until monitor removal
  - socket2 remove arrives first; the old output remains usable until snapshot/output convergence
  - all four hotplug orders retain the current Round before exact matching
  - a refresh or output change arriving during j/monitors restarts without preparation
  - mismatch exhaustion after eight attempts performs visible fatal cleanup
  - a blocked request reaches the shared monotonic deadline and closes its socket once
  - stop during the attempt wait performs no later drain, request, prepare, or publication
  - removal of compositor, shm, viewporter, or layer-shell is fatal with exact cleanup
  - request connect -> partial write -> EINTR -> write -> fragmented response -> EOF -> close
  - request response reaches exact capacity and capacity plus one
  - socket2 connect before snapshot prevents an add/remove gap
  - fragments form one line; one read forms many lines; suffix survives to next read
  - overlong line is discarded through newline and the following valid line is retained
  - focus, pointer-derived focus, workspace, and window bursts perform no refresh
  - monitor add/remove bursts collapse to one snapshot and one Round
  - config reload with geometry/scale change replaces the complete Round
  - unchanged snapshot performs no surface or image work
  - missing output, duplicate output, allocation failure, configure close, and scale failure publish nothing
  - every initial surface configures before any buffer commit
  - every surface creates an empty region, sets it once, and destroys it before initial commit
  - every buffer commit precedes one batch flush
  - old surfaces remain owned until the replacement batch succeeds
  - orderly unmap waits for every release within the shared callback/deadline bounds
  - release timeout disconnects before unmapping and exits without a live replacement Round
  - socket loss retains current surfaces during bounded reconnect
  - malformed wire data does not reconnect
  - reconnect exhaustion exits and cleans every owner
  - stop plus socket readiness performs only stop cleanup
  - plain tests import no Linux, SDL, Wayland, or compositor runtime
  - native parity reaches every production task without requiring a live compositor

negative_assertions:
  - no focusedmon, workspace, activewindow, openwindow, closewindow, pointer, or mouse record can call readMonitors
  - no unrelated event can set refresh pending or enter reconciliation attempts
  - no event can replace Image in Marathon 8
  - no Monitor numeric ID is retained
  - no null-output layer surface is created
  - no output below v4 is bound and no output is matched before done
  - no surface initial commit occurs before its empty input region is set
  - no ordinary SDL_Window is created
  - no surface exists without one checked Monitor and one exact named Wayland output
  - no partial monitor snapshot or prepared surface set enters current Round
  - no transient monitor/output mismatch mutates current Round or prepares a surface
  - no image bytes, SDL surface, shm mapping, socket, or Wayland object lacks one cleanup path
  - no timer wakes an idle healthy process
  - no buffer mapping is unmapped before release while Wayland remains connected
  - no wallpaper code imports picker, notifications, app discovery, config, cache, or history
  - no rotation, randomness, schedule, direct rotate action, or process supervisor exists

real_product_receipts:
  isolated_before_live:
    - build wayspot-beta without installing or replacing wayspot
    - run all native parser/image checks under an isolated temporary directory
    - verify protocol generation is byte-stable from the pinned XML
    - verify no live Hyprland or wallpaper process is needed by deterministic tests
  coordinated_live_only:
    - operator supplies one approved PNG path
    - record the current wallpaper process and do not stop it without explicit approval
    - stop or mask the current wallpaper only for the bounded receipt
    - start wayspot-beta wallpaper IMAGE.png attached
    - prove one background namespace and one surface per current monitor
    - add/remove or disable/enable one monitor if the operator approves
    - change focus repeatedly and prove zero image/surface publication
    - send SIGTERM and prove clean shutdown with no remaining namespace or process
    - restore the operator's prior wallpaper process and mappings exactly
  pending_until_coordinated: true

reincarnated_code_audit:
  deleted_source_inspected: false
  permitted_after_design_approval:
    - bounded Unix socket write/read mechanics if every branch is re-reviewed
    - event line assembly mechanics if vocabulary and ownership match this design
    - image crop arithmetic if proven independently
  forbidden:
    - wholesale file restoration
    - old owner names or process topology
    - focus-driven refresh
    - fallback process management
    - rotation state in this marathon

explicit_exclusions:
  - rotation schedule
  - direct rotate lifecycle action
  - random image choice or sequence
  - wallpaper directory discovery
  - JPEG, WebP, AVIF, SVG, or SDL_image dependency
  - different images per monitor
  - configuration or retained wallpaper state
  - cache or history
  - other compositors
  - generic compositor, display, image, or environment framework
  - daemon supervisor, flock, watchdog, or fallback process
  - XDG toplevel wallpaper windows
  - GPU renderer, animation, transition, or render loop
  - picker and GUI wallpaper routes
  - live receipt without operator coordination

closure_candidate:
  - one PNG is visibly correct on every current Hyprland monitor
  - monitor add/remove/geometry/scale histories converge to exactly one surface per monitor
  - focus, workspace, window, and mouse histories leave the image Round unchanged
  - request, event, image, Wayland, stop, reconnect, and cleanup histories pass strict simulation
  - the healthy resident process blocks while idle
  - source fits the approved character budget after reduction
  - no known Marathon 8 debt remains for Marathon 9

