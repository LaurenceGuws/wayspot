          pointed-to Wayland owner only through the approved candidate handoff.
        current_round: owned with current_native; no handle outlives that Native
      cleanup:
        - first stop observation performs no new request, candidate, surface, or publication work
        - >
          Stop or fatal resident failure disconnects the current Wayland
          display first, releases local maps/fds, resets Current.round, and
          destroys Current.native exactly once.
        - close socket2 once when present
        - close Stop and restore its exact prior mask once
        - deinitialize Image once
        - return stop as success; invalid argv and every operating failure remain visible and nonzero
      no_owner:
