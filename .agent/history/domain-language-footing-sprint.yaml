allowed_vendor_language:
  rule: >
    `SDL`, `sdl_c`, and C names such as `SDL_Window` may remain only where they
    name the actual vendor API, translated C module, dependency wiring, or
    vendor error boundary. They must not name Wayspot files, product owners, or
    exported domain symbols.
  allowed_locations:
    - build.zig dependency and translate-c wiring
    - src/c/sdl.h
    - src/c/wayspot_layer_shell.c
    - Zig imports of "@import(\"sdl_c\")"
    - Zig calls or types that are literal C API names
    - error names whose only meaning is vendor call failure
  forbidden_examples:
    - src/ui/sdl_shell.zig
    - SdlShell
    - sdl_started
    - sdl_custom_wayland_surface as product memory language

