id: domain_language_footing
state: accepted

purpose: >
  Make Wayspot's source tree speak the accepted product model directly. The
  final tree must not expose provider, search, common, types, ui, control,
  command, action, or SDL-prefixed vocabulary as domain buckets. Vendors remain
  implementation details at the C/build boundary only.

user_goal: >
  Stop when the repository contains nothing more and nothing less than the
  indexed model: process owns notification, wallpaper, sunglasses, and picker;
  picker owns mode as the list index; mode owns apps/open, notifications/history
  list and lifecycle restart, wallpaper lifecycle restart, and sunglasses
  runtime config.

stop_condition: >
  Stop only after every live source file, build module, README phrase, AGENTS
  map entry, and live memory entry using rejected technical buckets has either
  moved to an accepted owner or been deleted; all old paths are gone with no
  shim modules; concrete behavior receipts pass; hard stale-language scans pass;
  and the strict reviewer accepts that the resulting tree contains nothing more
  and nothing less than this index.

team_protocol:
  coordinator: >
    Owns this index, activates it only after reviewer acceptance, delegates
    implementation sequentially, waits, and does not implement sprint code.
  planner_coder: >
    One long-lived teammate implements only the accepted index. It may tighten
    code while migrating names, but may not add behavior or retain compatibility
    shells.
  reviewer: >
    One strict teammate gates this index and the final tree. Passing tests alone
    are not acceptance.
  report_to_user_only_for:
    - user_needed_blocker
    - sprint_complete

accepted_product_model:
  process:
    role: top-level CLI/runtime wiring and process identity.
    owns:
      - notification
      - wallpaper
      - sunglasses
      - picker
  notification:
    owns:
      - daemon
      - runtime state
      - history cache
      - history list rows for picker mode
      - banner user interface
  wallpaper:
    owns:
      - daemon/runtime
      - image library
      - Hyprland monitor facts
      - wallpaper surface
      - lifecycle restart row for picker mode
  sunglasses:
    owns:
      - runtime overlay daemon
      - persisted runtime config
      - overlay surface
      - picker form for runtime config
  picker:
    owns:
      - one CLI-summoned user interface lifecycle
      - query parsing
      - ranking
      - candidate rows
      - icon rendering and diagnostics
      - appearance use
      - text rendering
      - reusable inert picker element mechanics only when named by concrete
        element nouns
      - mode list index
  mode:
    role: picker-owned list index, not a provider registry.
    owns:
      - apps/open
      - notifications/history_list
      - notifications/lifecycle/restart
      - wallpaper/lifecycle/restart
      - sunglasses/runtime_config

