build_graph_mapping:
  module_roots:
    src/notifications/preview.zig: src/notification/preview.zig
    src/notifications/history_cache.zig: src/notification/history_cache.zig
    src/notification_history_provider_test.zig: src/notification/history_list.zig
    src/ui/appearance.zig: src/picker/appearance.zig
    src/ui/controls/appearance.zig: src/picker/appearance.zig
  required_build_assertion: >
    build.zig must not reference deleted paths, provider/search/ui module names,
    or old test variable names such as notification_history_provider_mod,
    ui_appearance_mod, or controls_appearance_mod.

symbol_rules:
  rename:
    SearchService: Picker
    AppsProvider: Apps
    ActionsProvider: Open
    ModesProvider: Mode
    NotificationHistoryProvider: NotificationHistoryList
    CandidateKind: Candidate.Kind
    CandidateList: Candidate.List
    ScoredCandidate: RankedCandidate
    UiKind: delete
    SdlShell: Surface
    sdl_started: vendor_started
  delete_as_domain_buckets:
    - ActionsProvider
    - action provider
    - command plan
    - control module
    - common kind
    - UI module export surface
  keep_when_literal_vendor_boundary:
    - SDL_Init
    - SDL_Quit
    - SDL_Window
    - SDL_Renderer
    - SDL_Event
    - SdlRenderFailed
    - SdlTextRenderFailed
  comments: >
    Production comments must describe the accepted owner. Do not keep provider,
    search service, common, generic controls, ui module, types, or SDL-prefixed
    product wording. Every moved Zig file keeps a top-level `//!` comment and
    important symbols keep `///` contracts.

behavior_receipts_required:
  cli_help:
    command: "./zig-out/bin/wayspot --help"
    proves: CLI flags still exist with accepted product language.
  picker_open_smoke:
    command: "bash -lc 'timeout 3 ./zig-out/bin/wayspot --ui; status=$?; test \"$status\" -eq 124'"
    proves: picker surface starts and remains alive until the smoke timeout owns shutdown.
  app_cache_diag:
    command: "./zig-out/bin/wayspot --icon-diag"
    proves: app rows still resolve icon diagnostics.
  notification_daemon_smoke:
    command: "bash -lc 'timeout 4 ./zig-out/bin/wayspot --notifications-daemon; status=$?; test \"$status\" -eq 124'"
    proves: notification daemon path starts and remains alive until the smoke timeout owns shutdown.
  notification_history_rows:
    command: "zigup run 0.16.0 build test --summary all"
    proves: owner-local history list tests replaced provider test coverage.
  wallpaper_rotate:
    command: "./zig-out/bin/wayspot --wallpaper-rotate-now"
    proves: wallpaper CLI route resolves and exits zero.
  sunglasses_config:
    command: "bash -lc 'out=$(./zig-out/bin/wayspot --sunglasses-apply 2>&1); status=$?; test \"$status\" -eq 1 && printf \"%s\\n\" \"$out\" | rg -q \"FileNotFound\"'"
    proves: sunglasses apply CLI route resolves and reports the expected missing-daemon socket failure.
  rerun_parse:
    command: "bash -n re-run.sh"
    proves: local lifecycle helper still parses after process naming changes.

behavior_contract:
  preserve:
    - CLI flags and user-visible commands
    - picker app launch behavior
    - slash mode behavior
    - notification daemon and banner behavior
    - notification history rows newer than seven days
    - wallpaper daemon/restart/rotate behavior
    - sunglasses form and overlay behavior
    - Lua defaults behavior
    - app icon diagnostics behavior
  no_behavior_expansion:
    - no new modes
    - no new IPC
    - no new config schema
    - no new runtime caches
    - no generic UI framework
    - no compatibility modules for old paths

slices:
  "00_index_review":
    goal: Reviewer accepts or rejects this contract before implementation.
  "01_notification_owner":
    goal: Rename plural notification folder and provider-history test into singular owner files.
    receipts:
      - src/notifications deleted
      - src/notification exists
      - history list coverage lives with notification owner
  "02_picker_query_rank_candidate":
    goal: Move search service, query, rank, and candidate facts into picker.
    receipts:
      - src/app deleted
      - src/search deleted
      - SearchService renamed to Picker
      - no picker service file
      - no types.zig
  "03_mode_index":
    goal: Move provider rows into picker mode owners with no actions bucket.
    receipts:
      - src/providers deleted
      - app open rows owned by picker/mode/apps.zig plus picker/open.zig
      - daemon restart rows live in notification/wallpaper mode lifecycle owners
  "04_picker_surface_elements":
    goal: Delete src/ui by moving surface/text/viewport/icons/appearance/element nouns under picker.
    receipts:
      - src/ui deleted
      - no control folder
      - no command folder or command file
      - no SDL-prefixed product file
  "05_wallpaper_sunglasses_surfaces":
    goal: Move wallpaper and sunglasses surfaces/forms to their domain owners.
    receipts:
      - src/wallpaper/surface.zig exists
      - src/sunglasses/surface.zig exists
      - src/sunglasses/form.zig exists
  "06_build_memory_docs":
    goal: Update build modules, root exports, main wiring, README, AGENTS, and live memory.
    receipts:
      - build.zig references only accepted owner paths
      - README has user-facing accepted language
      - AGENTS tree map matches final tree
      - live memory no longer names old buckets
  "07_behavior_receipts":
    goal: Run concrete commands and record expected pass/unhappy-path output.
  "08_final_reviewer_gate":
    goal: Strict reviewer accepts final code and receipts.

verification_floor:
  - "zigup run 0.16.0 fmt --check build.zig build.zig.zon src"
  - "zigup run 0.16.0 build test --summary all"
  - "zigup run 0.16.0 build -Doptimize=ReleaseFast"
  - "git diff --check"
  - "python -c 'import yaml; [yaml.safe_load(open(p, encoding=\"utf-8\")) for p in (\".agent/history/domain-language-footing-sprint.yaml\", \".agent/history/sprint.yaml\", \".agent/history/current.yaml\", \".agent/history/references.yaml\")]'"
  - "test ! -d src/app && test ! -d src/providers && test ! -d src/search && test ! -d src/notifications && test ! -d src/ui"
  - "bash -lc '! rg -n \"providers|provider|SearchService|AppsProvider|ActionsProvider|ModesProvider|NotificationHistoryProvider|CandidateKind|CandidateList|ScoredCandidate|search_service|picker/service.zig|search/mod.zig|search/types.zig|ui/common|common/dispatch|common/kinds|UiKind|types.zig|ui/controls|controls|action provider|actions provider|action candidates|fixed local actions|src/providers/actions.zig|providers/actions|mode/actions.zig|src/picker/mode/actions|pub const actions|wayspot\\.providers\\.ActionsProvider|ui_appearance_mod|ui_appearance_tests|controls_appearance_mod|controls_appearance_tests|wayspot\\.ui|pub const ui|sdl_shell|sdl_banner|sdl_text|sdl_wallpaper_surface|sdl_sunglasses_surface\" src build.zig README.md AGENTS.md .agent/history/README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml'"
  - "bash -lc '! rg -n \"sdl_[a-zA-Z0-9_]*|Sdl[A-Za-z0-9_]*\" src build.zig README.md AGENTS.md .agent/history/README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml --glob \"!src/c/**\" | rg -v \"@import\\\\(\\\"sdl_c\\\"\\\\)|\\\\bsdl_c\\\\b|\\\\bsdl_dep\\\\b|\\\\bsdl_include\\\\b|\\\\benable_sdl\\\\b|SDL build|SDL dependency|SDL executable|SDL stays link-compatible|SdlRenderFailed|SdlTextRenderFailed|SdlTextTextureFailed|SdlHintFailed|SdlInitFailed|SdlWaitFailed|SdlWindowFailed|SdlWindowSizeFailed|SdlRendererFailed|SdlResizeFailed|SdlShowFailed|SdlScaleFailed|SdlWakeUnavailable|SdlTextInputFailed\"'"
  - "bash -lc '! rg -n \"\\\\bSDL\\\\b|SDL_[A-Za-z0-9_]*\" src build.zig README.md AGENTS.md .agent/history/README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml --glob \"!src/c/**\" | rg -v \"c\\\\.SDL_[A-Za-z0-9_]*|SDL3|SDL build|SDL dependency|SDL executable|SDL stays link-compatible|SDL docs|dependency wiring for SDL|literal C API\"'"
  - "bash -lc '! rg -n \"(^|[^A-Za-z0-9_])_\\\\s*=|\\\\busize\\\\b|\\\\banytype\\\\b|TODO\" src --glob \"*.zig\" && test \"$(rg -n \"\\\\banyopaque\\\\b\" src --glob \"*.zig\" | cut -d: -f1 | sort -u)\" = \"src/notification/daemon.zig\"'"
  - "bash -lc 'test ! -e vendor/howl-lua/.git && rg -q \"89617b9f30a595b27c2ec1cc6140026e24b25641\" vendor/howl-lua/WAYSPOT_VENDOR.txt'"

reviewer_gate:
  index_acceptance_questions:
    - Does the index name every current affected file and build module?
    - Are target names accepted domain nouns rather than sideways generic buckets?
    - Are SDL/vendor names restricted to true vendor boundaries?
    - Are behavior receipts concrete enough to preserve product behavior?
    - Does the stop condition leave no escape hatch?
  final_acceptance_questions:
    - Are all rejected folders/files gone?
    - Are all imports and public symbols migrated?
    - Do comments, README, AGENTS, and live memory use the accepted language?
    - Did tests, scans, and behavior receipts pass?
    - Does the final tree contain nothing more and nothing less?
