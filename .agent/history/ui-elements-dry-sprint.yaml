id: ui_controls_dry_extraction
state: reviewer_gate_pending

purpose: >
  DRY the active product Zig under `src/` by extracting exactly three reusable,
  inert UI control mechanics into `src/ui/controls/`: cursor blink timing,
  single-line text editing mechanics, and scalar slider math. The sprint
  preserves current UX behavior and leaves product vocabulary with product
  owners.

active_sprint_conflict: >
  `.agent/history/sprint.yaml` still names `monitor_glasses_media_expansion` as
  approved for worker execution. This sprint is blocked from implementation
  until the user explicitly supersedes that live sprint or the coordinator
  updates live memory after user approval.

stop_condition: >
  Stop only when every active product Zig file under `src/` has a matching
  `repo_survey` decision, `build.zig` has an explicit out-of-product-scope
  decision, the reviewer verifies that no old duplicate mechanic remains for
  accepted controls, and the final tree contains no unapproved UI control files,
  compatibility wrappers, stale comments, or behavior changes.

team_protocol:
  coordinator: >
    Owns this index, delegates sequentially, waits, and does not implement
    sprint code directly.
  planner_coder: >
    One long-lived teammate implements only this reviewer-accepted index.
  reviewer: >
    One strict teammate gates this index and the final code against
    nothing-more/nothing-less completion.
  report_to_user_only_for:
    - user_needed_blocker
    - sprint_complete

behavior_contract:
  status: behavior_preserving
  current_behavior_kept:
    - picker query text appends at the end
    - sunglasses image path draft text appends at the end
    - backspace removes one UTF-8 scalar at the end
    - no text cursor movement beyond current end cursor
    - no text selection
    - no copy, cut, or paste
    - no draggable scrollbar
    - no file picker
    - sunglasses toggles remain local boolean flips
    - sliders remain click and keyboard adjusted as today
  query_storage_decision: >
    Preserve current picker query storage in this sprint. `SdlShell.query`
    remains an ArrayList because imposing a new input/search byte cap would be a
    behavior change. The textbox extraction may share append and backspace
    mechanics only where it preserves query behavior exactly.

shared_folder:
  path: src/ui/controls/
  role: >
    Inert reusable UI control mechanics only. Controls return state changes and
    facts; callers own SDL, rendering, search, persistence, daemons, and product
    effects.
  allowed_files:
    - src/ui/controls/mod.zig
    - src/ui/controls/cursor_blink.zig
    - src/ui/controls/textbox.zig
    - src/ui/controls/slider.zig
  forbidden_files:
    - any other file under src/ui/controls/
    - any product-domain filename under src/ui/controls/
    - any peer shared UI-control folder outside src/ui/controls/
  forbidden_imports:
    - sdl_c
    - sdl_text
    - app
    - search
    - providers
    - notifications
    - sunglasses
    - wallpaper
    - hyprland
    - runtime
    - std.c.getenv
    - filesystem IO
    - process spawning

accepted_controls:
  cursor_blink:
    file: src/ui/controls/cursor_blink.zig
    source_owner: src/ui/sdl_shell.zig
    source_symbols:
      - CursorBlink
      - cursor_blink_interval_ms
    owns:
      - visible flag
      - next toggle deadline
      - caller-provided interval
      - reset on input
      - advance by monotonic milliseconds
      - wait timeout in milliseconds
    does_not_own:
      - SDL events
      - rendering
      - query text
      - product state
    tests:
      - cursor advances only at its deadline
      - cursor reset shows cursor and restarts deadline

  textbox:
    file: src/ui/controls/textbox.zig
    source_owners:
      - src/ui/sdl_shell.zig
      - src/ui/sunglasses_form.zig
    source_symbols:
      - SdlShell.query ArrayList text editing
      - trimLastUtf8
      - Form.path_edit_buf
      - Form.path_edit_len
      - previousUtf8Start
    owns:
      - bounded single-line byte buffer where caller already has bounded storage
      - append-at-end text insertion
      - seed or replace text from caller
      - clear
      - expose immutable slice
      - UTF-8 scalar-safe backspace at end
      - overflow and no-change results
      - shared UTF-8 scalar backspace facts for unbounded caller-owned query storage
    does_not_own:
      - cursor movement
      - selection
      - clipboard
      - SDL text input
      - rendering or measuring
      - search refresh
      - image path validation
      - persistence
    tests:
      - empty state
      - seed and replace
      - append
      - overflow is reported without overrun
      - clear
      - UTF-8 scalar backspace

  slider:
    file: src/ui/controls/slider.zig
    source_owner: src/ui/sunglasses_form.zig
    source_symbols:
      - redBlueFromX
      - dimFromX
      - imageOpacityFromX
      - sliderTrack
      - bounded value adjustment duplicated across sliders
    owns:
      - bounded scalar range
      - clamp
      - delta adjustment
      - normalized 0..1 position
      - pointer x to bounded value for a horizontal track
    does_not_own:
      - labels
      - rendering
      - product value names
      - product persistence
      - monitor state
    tests:
      - min and max clamp
      - delta adjust clamps
      - normalized value
      - pointer x maps to bounded value

explicit_non_extractions:
  picker_viewport:
    file: src/ui/picker_viewport.zig
    reason: >
      It is already a single inert owner for picker/result viewport mechanics.
      Moving it would rename a stable owner and move picker/result vocabulary
      sideways.
  toggles:
    file: src/ui/sunglasses_form.zig
    reason: >
      Current toggles are local boolean flips with product labels and no shared
      mechanics beyond `value = !value`.
  form_focus_rows:
    file: src/ui/sunglasses_form.zig
    reason: >
      The form row enum and focus order are product form structure. Moving them
      into controls would recreate the rejected product-domain shared-file shape.
  icons:
    files:
      - src/ui/app_icons.zig
      - src/ui/app_icon_cache.zig
      - src/ui/app_icon_diag.zig
    reason: >
      These own icon resolution, diagnostics, SDL textures, and filesystem
      receipts. They are not UI controls.
  text_rendering:
    file: src/ui/sdl_text.zig
    reason: >
      This owns shaping, rasterization, textures, and cursor rectangle drawing.
      Rendering is outside controls.
  surface_config:
    file: src/ui/surface_config.zig
    reason: >
      This owns persisted zoom state and SDL key mapping, not inert control
      mechanics.
  surfaces:
    files:
      - src/ui/sdl_banner.zig
      - src/ui/sdl_shell.zig
      - src/ui/sdl_sunglasses_surface.zig
      - src/ui/sdl_wallpaper_surface.zig
    reason: >
      SDL windows, event loops, renderers, Wayland roles, and daemon-facing
      lifecycle stay with surface owners.

repo_survey:
  build.zig: OUT_OF_PRODUCT_SRC_SCOPE
  src/app/mod.zig: NO_ELEMENT_MECHANICS
  src/app/search_service.zig: NO_ELEMENT_MECHANICS
  src/app/search_service/history_access.zig: NO_ELEMENT_MECHANICS
  src/app/search_service/history_store.zig: NO_ELEMENT_MECHANICS
  src/main.zig: KEEP_LOCAL_CLI_AND_RUNTIME_ROUTING
  src/notification_history_provider_test.zig: NO_ELEMENT_MECHANICS
  src/notifications/dbus_daemon.zig: NO_ELEMENT_MECHANICS
  src/notifications/history_cache.zig: KEEP_LOCAL_NOTIFICATION_PERSISTENCE_ROWS
  src/notifications/mod.zig: NO_ELEMENT_MECHANICS
  src/notifications/preview.zig: KEEP_LOCAL_NOTIFICATION_PREVIEW_TEXT
  src/notifications/runtime.zig: KEEP_LOCAL_NOTIFICATION_RUNTIME_ROWS
  src/notifications/state.zig: NO_ELEMENT_MECHANICS
  src/process_identity.zig: NO_ELEMENT_MECHANICS
  src/providers/actions.zig: KEEP_LOCAL_PROVIDER_DATA
  src/providers/apps.zig: KEEP_LOCAL_APP_PROVIDER_ROWS
  src/providers/mod.zig: NO_ELEMENT_MECHANICS
  src/providers/modes.zig: KEEP_LOCAL_PRODUCT_PICKER_ROWS
  src/providers/notification_history.zig: KEEP_LOCAL_NOTIFICATION_HISTORY_ROWS
  src/providers/tool_check.zig: NO_ELEMENT_MECHANICS
  src/root.zig: NO_ELEMENT_MECHANICS
  src/search/mod.zig: NO_ELEMENT_MECHANICS
  src/search/query.zig: NO_ELEMENT_MECHANICS
  src/search/rank.zig: KEEP_LOCAL_SEARCH_ORDERING
  src/search/types.zig: KEEP_LOCAL_PRODUCT_ROW_FACTS
  src/sunglasses/mod.zig: NO_ELEMENT_MECHANICS
  src/sunglasses/runtime.zig: KEEP_LOCAL_SUNGLASSES_RUNTIME_SURFACES
  src/sunglasses/state.zig: KEEP_LOCAL_PRODUCT_STATE_AND_VALIDATION
  src/ui/app_icon_cache.zig: KEEP_LOCAL_ICON_PIPELINE
  src/ui/app_icon_diag.zig: KEEP_LOCAL_ICON_DIAGNOSTICS
  src/ui/app_icons.zig: KEEP_LOCAL_ICON_TEXTURE_OWNER
  src/ui/common/dispatch.zig: NO_ELEMENT_MECHANICS
  src/ui/common/kinds.zig: NO_ELEMENT_MECHANICS
  src/ui/mod.zig: NO_ELEMENT_MECHANICS
  src/ui/picker_viewport.zig: KEEP_LOCAL_PICKER_VIEWPORT_OWNER
  src/ui/sdl_banner.zig: KEEP_LOCAL_NOTIFICATION_SURFACE
  src/ui/sdl_shell.zig: EXTRACT_CURSOR_BLINK_AND_QUERY_TEXTBOX
  src/ui/sdl_sunglasses_surface.zig: KEEP_LOCAL_WAYLAND_PRODUCT_SURFACE
  src/ui/sdl_text.zig: KEEP_LOCAL_TEXT_RENDERER
  src/ui/sdl_wallpaper_surface.zig: KEEP_LOCAL_WAYLAND_PRODUCT_SURFACE
  src/ui/sunglasses_form.zig: EXTRACT_PATH_TEXTBOX_AND_SLIDER_MATH
  src/ui/surface_config.zig: KEEP_LOCAL_PERSISTED_SURFACE_CONFIG
  src/wallpaper/config.zig: NO_ELEMENT_MECHANICS
  src/wallpaper/hyprland.zig: NO_ELEMENT_MECHANICS
  src/wallpaper/image_info.zig: NO_ELEMENT_MECHANICS
  src/wallpaper/library.zig: NO_ELEMENT_MECHANICS
  src/wallpaper/mod.zig: NO_ELEMENT_MECHANICS
  src/wallpaper/runtime.zig: KEEP_LOCAL_WALLPAPER_RUNTIME

implementation_slices:
  - id: 00_live_memory_supersession
    goal: >
      User or coordinator updates live sprint memory so this sprint is the only
      approved implementation sprint.
    source_changes_allowed: false

  - id: 01_controls_folder_and_exports
    goal: >
      Add only `src/ui/controls/mod.zig`, `cursor_blink.zig`, `textbox.zig`,
      and `slider.zig`; export controls through `src/ui/mod.zig`.
    source_changes_allowed:
      - src/ui/controls/mod.zig
      - src/ui/controls/cursor_blink.zig
      - src/ui/controls/textbox.zig
      - src/ui/controls/slider.zig
      - src/ui/mod.zig

  - id: 02_cursor_blink_extraction
    goal: >
      Move cursor blink timing from `src/ui/sdl_shell.zig` into
      `src/ui/controls/cursor_blink.zig` without changing blink behavior.
    source_changes_allowed:
      - src/ui/sdl_shell.zig
      - src/ui/controls/cursor_blink.zig

  - id: 03_textbox_extraction
    goal: >
      Replace query and image-path duplicate text editing with
      `src/ui/controls/textbox.zig`, preserving append-at-end and backspace
      behavior exactly. The picker query keeps current ArrayList storage; the
      sunglasses path keeps bounded storage through the textbox owner.
    source_changes_allowed:
      - src/ui/sdl_shell.zig
      - src/ui/sunglasses_form.zig
      - src/ui/controls/textbox.zig

  - id: 04_slider_extraction
    goal: >
      Replace duplicated sunglasses slider clamp and pointer-x mapping with
      `src/ui/controls/slider.zig`, keeping product ranges in
      `src/sunglasses/state.zig` and labels/rendering in the form.
    source_changes_allowed:
      - src/ui/sunglasses_form.zig
      - src/ui/controls/slider.zig

  - id: 05_comment_and_test_bibliography
    goal: >
      Ensure every added file has `//!`, every important added public/private
      symbol has `///`, moved tests live with new owners, and touched comments
      describe current ownership only.
    source_changes_allowed:
      - files explicitly listed in slices 01 through 04

  - id: 06_final_reviewer_gate
    goal: >
      Reviewer verifies this exact index against the final diff and receipts.
    source_changes_allowed: false

tests_to_move_or_add:
  cursor_blink:
    from: src/ui/sdl_shell.zig
    to: src/ui/controls/cursor_blink.zig
    cases:
      - cursor advances only at its deadline
      - cursor reset shows cursor and restarts deadline
  textbox:
    to: src/ui/controls/textbox.zig
    cases:
      - empty state
      - seed and replace
      - append
      - overflow is reported without overrun
      - clear
      - UTF-8 scalar backspace
  slider:
    to: src/ui/controls/slider.zig
    cases:
      - min and max clamp
      - delta adjust clamps
      - normalized value
      - pointer x maps to bounded value
  integration_kept:
    - src/ui/sunglasses_form.zig path commit
    - src/ui/sunglasses_form.zig invalid path
    - src/ui/sunglasses_form.zig focus
    - src/ui/sunglasses_form.zig image opacity hit testing
    - src/ui/picker_viewport.zig all existing viewport tests

comment_requirements:
  new_files:
    - Every new controls file starts with `//!` role and ownership.
  symbols:
    - Each public control type/function has `///` contract comments.
    - Important private helpers have `///` when their bound or invariant is not obvious.
  forbidden_source_comments:
    - comments explaining rejected extractions
    - roadmap text
    - compatibility text

pre_implementation_cleanup_gate:
  required:
    - this artifact is present in the worktree planning checkpoint
    - untracked `wayspot-sunglasses-*` receipt duplicates are removed or folded into memory
    - AGENTS.md rewrite is committed or explicitly included in the planning checkpoint

verification_floor:
  static:
    - tree -L 2 src/ui
    - find src -name '*.zig' -type f | sort > /tmp/wayspot-src-zig-files && sed -n 's/^  \(src\/.*\.zig\): .*/\1/p' .agent/history/ui-elements-dry-sprint.yaml | sort > /tmp/wayspot-survey-zig-files && cmp -s /tmp/wayspot-src-zig-files /tmp/wayspot-survey-zig-files
    - "! find src/ui -maxdepth 2 -type d | rg '/(elements|widgets)$'"
    - "test ! -d src/ui/controls || ! find src/ui/controls -maxdepth 1 -type f | rg -v '/(mod|cursor_blink|textbox|slider)\\.zig$'"
    - "test ! -d src/ui/controls || ! rg -n '@import\\(\"(sdl_c|.*sdl_text.*|.*app.*|.*search.*|.*providers.*|.*notifications.*|.*sunglasses.*|.*wallpaper.*|.*hyprland.*|.*runtime.*)\"\\)|std\\.c\\.getenv|execve|fork|/bin/sh|wl-copy|wl-paste|xclip|xsel|SDL_' src/ui/controls"
    - "! rg -n '(^|[^A-Za-z0-9_])(_ =|usize|anytype|anyopaque)([^A-Za-z0-9_]|$)' src/ui/controls src/ui/sdl_shell.zig src/ui/sunglasses_form.zig src/ui/mod.zig"
    - "! rg -n 'TODO|legacy|fallback|maybe|eventually|later|future' src/ui/controls src/ui/sdl_shell.zig src/ui/sunglasses_form.zig src/ui/mod.zig"
  build:
    - zigup run 0.16.0 fmt --check src/ui/controls/mod.zig src/ui/controls/cursor_blink.zig src/ui/controls/textbox.zig src/ui/controls/slider.zig src/ui/mod.zig src/ui/sdl_shell.zig src/ui/sunglasses_form.zig
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build -Doptimize=ReleaseFast
    - git diff --check
  visual:
    commands:
      - RERUN_NOTIFICATIONS=false RERUN_WALLPAPER=false ./re-run.sh
      - ./zig-out/bin/wayspot --ui
    receipts:
      - hyprland screenshot showing default picker list after re-run
      - hyprland screenshot showing /sunglasses form if sunglasses_form.zig changed

reviewer_rejection_conditions:
  - any repo_survey decision is not reflected in final code
  - any unapproved file appears under src/ui/controls
  - product vocabulary appears in src/ui/controls
  - shared controls import SDL or product-domain modules
  - old duplicate cursor, textbox, or slider mechanics remain after extraction
  - old and new models coexist
  - a compatibility wrapper remains
  - behavior changes without a user-approved scope update
  - comments do not document new ownership clearly
