id: command_surface_vocabulary
state: accepted_research

purpose: >
  Source-backed vocabulary for Wayspot's terminal command surface and Nushell
  completions. This artifact exists so product names are not invented by agent
  taste during the obvious-shape command sprint.

busybox:
  official_sources:
    - url: https://busybox.net/downloads/BusyBox.html
      use: official generated documentation
    - url: https://busybox.net/FAQ.html
      use: official FAQ
  accepted_terms:
    multi_call_binary: >
      Official BusyBox term for one executable doing the job of many utilities.
    applet: >
      Official BusyBox term for built-in utility programs inside the binary.
    links:
      - applet symlink
      - symlink
      - hardlink
      - link
    argv0_dispatch: >
      BusyBox dispatches by looking at argv[0] when invoked through a link.
    multiplexer_applet: >
      BusyBox FAQ term for `busybox <applet> ...` invocation.
  terms_to_avoid:
    - toollet
    - mini command
    - sub-app
    - module command
    - servicelet
    - plugin
    - registry
  wayspot_implications:
    - Use `command` for Wayspot product rows because it already matches the picker model.
    - Use `multi-call binary` only when describing the architecture pattern.
    - Use `applet` only for BusyBox comparison or if Wayspot implements actual argv0 link dispatch.
    - Internal support for link dispatch should be named `argv0 dispatch`.

nushell:
  official_sources:
    - url: https://www.nushell.sh/book/custom_completions.html
      use: custom completions
    - url: https://www.nushell.sh/book/externs.html
      use: extern and known external command vocabulary
    - url: https://www.nushell.sh/cookbook/external_completers.html
      use: external completer examples
    - url: https://www.nushell.sh/commands/docs/attr_complete.html
      use: "@complete attribute"
    - url: https://www.nushell.sh/commands/docs/attr_complete_external.html
      use: "@complete external attribute"
  accepted_terms:
    - custom completions
    - completion command
    - completer
    - custom completer
    - extern
    - known external command
    - external completer
    - "@complete"
    - "@complete external"
  output_shape:
    json_records:
      required_fields:
        - value
        - description
      optional_fields:
        - style
    fallback: null may be used by a Nushell custom completer to fall back to file completions.
  terms_to_avoid:
    - completion record as primary product noun
    - external completion command when the integration is a custom completer
    - install Nushell completions unless Wayspot actually writes a Nu module
  wayspot_implications:
    - "`wayspot complete nushell ...spans` is acceptable as a terminal command."
    - Wayspot should print JSON records with `value` and `description`.
    - A Nu wrapper or extern wires the command into Nushell; Wayspot provides completer output.
