reviewer_gate:
  index_acceptance_questions:
    - Does this index cover all current duplicated UI appearance opinions?
    - Are all values either moved or explicitly retained with owner reasons?
    - Does `src/ui/controls/appearance.zig` stay inert and product-free?
    - Does Lua stay a bounded defaults loader rather than a scripting VM?
    - Is the exact vendor source pinned?
    - Are all config limits concrete?
  final_acceptance_questions:
    - Did every moved literal disappear from renderer ownership?
    - Did tests prove bounds, malformed config, and instruction-budget failure?
    - Is the rendered UI visually equivalent before user override?
    - Are all new comments production assertions?
    - Does final memory match actual source behavior?
