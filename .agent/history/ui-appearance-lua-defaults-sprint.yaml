slices:
  "00_index_review":
    goal: Reviewer accepts or rejects this sprint before source changes.

  "01_vendor_and_build_receipt":
    goal: >
      Vendor `howl-lua` from `v0.1.0-beta.2`, wire Zig 0.16 build support, and
      prove Lua 5.4 linkage before runtime use.
    must_include:
      - vendor source receipt
      - build.zig.zon dependency/path update or documented local vendor path
      - no unrelated vendored cache files
      - no upstream source modifications inside vendor/howl-lua beyond Wayspot provenance; bounded execution belongs in src/config/defaults.zig

  "02_defaults_lua_surface":
    goal: >
      Add `assets/lua/defaults.lua` with only the appearance defaults named in
      this inventory and LuaLS comments for user editing.

  "03_bounded_config_loader":
    goal: >
      Add `src/config/defaults.zig` and `src/config/mod.zig` to load embedded
      defaults and optional user defaults into bounded appearance state.
    required_tests:
      - embedded defaults parse
      - missing user config keeps embedded defaults
      - malformed user config returns a clear error without mutating defaults
      - overlong strings are rejected
      - too many font candidates are rejected
      - out-of-range font, chrome, color, opacity, string, count, and depth values are rejected
      - infinite loop Lua is stopped by the instruction budget

  "04_inert_and_product_appearance":
    goal: >
      Add `src/ui/controls/appearance.zig` for inert value types and
      `src/ui/appearance.zig` for product semantic mappings.
    required_tests:
      - named product defaults map to exact current RGBA and sizes
      - inert validators reject config values outside the bounds above
      - controls appearance has no forbidden imports

  "05_surface_wiring_and_deletion":
    goal: >
      Wire picker, banner, text, and sunglasses form to appearance state, then
      delete moved literals from renderer files.
    required_receipts:
      - "bash -lc '! rg -n \"IosevkaTerm|AdwaitaSans|NotoSans|DejaVuSans|18, 18, 22|96, 108, 124|168, 185, 204|214, 226, 244|64, 74, 84|246, 248, 252|216, 222, 230|186, 202, 224|140, 152, 166|190, 198, 208|38, 44, 52|104, 118, 136|70, 22, 26|20, 24, 27|24, 28, 34|105, 184, 150|150, 166, 184|238, 242, 247|188, 198, 210|218, 226, 236|238, 142, 142|112, 126, 144|222, 231, 242|92, 104, 120|228, 235, 244|text_font_px|value_font_px|value_column_width|slider_height|toggle_size|knob_width|knob_height|accent_width|text_x|app_y|summary_y|body_y|box\\\\.x \\\\+ 4|box\\\\.y \\\\+ 4|box\\\\.w - 8|box\\\\.h - 8|@max\\\\(122|0\\\\.28\" src/ui/sdl_text.zig src/ui/sdl_shell.zig src/ui/sdl_banner.zig src/ui/sunglasses_form.zig'"
      - "visual screenshot: default picker"
      - "visual screenshot: notification banner"
      - "visual screenshot: sunglasses form"
      - "./re-run.sh smoke if the environment is available"

  "06_memory_and_docs":
    goal: >
      Update local memory and README with the actual defaults path and limits,
      without presenting Wayspot as a generic theming framework.

documentation_requirements:
  zig_files: >
    Every new Zig file starts with `//!`. Every public or important private
    symbol added for config, appearance, or Lua ownership has a `///` contract
    covering bounds, cleanup, and caller obligations.
  lua_file: >
    `assets/lua/defaults.lua` comments are user-facing production docs, not
    roadmap prose. Comments must describe real knobs loaded by Zig.

