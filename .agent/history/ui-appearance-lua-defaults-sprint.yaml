id: ui_appearance_lua_defaults
state: complete

purpose: >
  Make active Wayspot UI appearance opinions reusable and auditable without
  creating a generic framework. Inert appearance value types live in
  `src/ui/controls/appearance.zig`; product-specific picker, banner, and form
  appearance names live in `src/ui/appearance.zig`; Lua returns only as a
  bounded defaults data surface.

user_goal: >
  Move adoption-sensitive Linux/Hyprland defaults such as font family, color
  palette, and small surface chrome out of scattered renderer code while
  keeping Wayspot a small pragmatic internal world view. Vendor the project
  owned Zig Lua wrapper at the newest accepted Zig 0.16/Lua 5.4 release and
  treat `assets/lua/defaults.lua` as production code with LSP-friendly comments.

stop_condition: >
  Stop only when every active UI appearance literal in the inventory below has
  either moved to the accepted appearance owners or has the exact retained-owner
  reason recorded here, the Lua wrapper is vendored from the pinned source with
  receipts, embedded and optional user Lua defaults load through bounded
  execution into bounded Zig state, and the reviewer verifies no compatibility
  shim, stale hardcoded style path, generic theme registry, runtime scripting VM,
  or product-domain file under `src/ui/controls/` remains.

team_protocol:
  coordinator: >
    Owns this index, delegates sequentially, waits, and does not implement
    sprint source code directly.
  planner_coder: >
    One long-lived teammate may implement only reviewer-accepted slices from
    this index and must not revert unrelated user or teammate edits.
  reviewer: >
    One strict teammate gates this index and final source against the
    nothing-more/nothing-less stop condition.
  report_to_user_only_for:
    - user_needed_blocker
    - sprint_complete

product_constraints:
  keep:
    - CLI-summoned picker lifecycle
    - notification daemon and banner
    - wallpaper daemon
    - sunglasses form and overlay runtime
    - direct SDL/Wayland surface owners
  avoid:
    - generic theme framework
    - registry architecture
    - runtime scripting VM exposed beyond bounded defaults loading
    - broad config schema not consumed by current surfaces
    - product-domain files under src/ui/controls/
    - old hardcoded style fallback after config is live

vendor_pin:
  package: howl-lua
  upstream_remote: git@github.com:LaurenceGuws/howl-lua.git
  local_reference: /home/home/personal/projects/howl/howl-linux-host/vendor/howl-lua
  required_source: refs/tags/v0.1.0-beta.2
  required_commit: 89617b9f30a595b27c2ec1cc6140026e24b25641
  rejected_source:
    ref: refs/heads/main
    commit: 6725deb227ccd1c8b3880c7d36f368250f8cbf10
    reason: >
      Main is older than the newest visible release tag and the sprint requires
      the latest audited release source.
  required_receipts:
    - "git ls-remote --heads --tags git@github.com:LaurenceGuws/howl-lua.git"
    - "test ! -e vendor/howl-lua/.git && rg -q \"git@github.com:LaurenceGuws/howl-lua.git\" vendor/howl-lua/WAYSPOT_VENDOR.txt && rg -q \"v0.1.0-beta.2\" vendor/howl-lua/WAYSPOT_VENDOR.txt && rg -q \"89617b9f30a595b27c2ec1cc6140026e24b25641\" vendor/howl-lua/WAYSPOT_VENDOR.txt"
    - "zigup run 0.16.0 build test --summary all"
    - "pkg-config --modversion lua5.4"

accepted_new_files:
  - assets/lua/defaults.lua
  - src/config/mod.zig
  - src/config/defaults.zig
  - src/ui/appearance.zig
  - src/ui/controls/appearance.zig
  - vendor/howl-lua/

accepted_changed_files:
  - build.zig
  - build.zig.zon
  - src/root.zig
  - src/main.zig
  - src/ui/controls/mod.zig
  - src/ui/mod.zig
  - src/ui/sdl_text.zig
  - src/ui/sdl_shell.zig
  - src/ui/sdl_banner.zig
  - src/ui/sunglasses_form.zig
  - README.md
  - .agent/history/current.yaml
  - .agent/history/references.yaml
  - .agent/history/sprint.yaml

explicit_non_changes:
  src/ui/picker_viewport.zig: >
    All current constants in this file stay. They are foot-derived row,
    scrollbar, icon, and query-line geometry used by render and hit testing, not
    shared appearance defaults.
  src/ui/surface_config.zig: >
    Zoom state stays local; it is persisted runtime state, not appearance
    defaults.
  src/ui/app_icons.zig: >
    Icon resolution, decode, and texture lifetime stay local.
  src/ui/sdl_wallpaper_surface.zig: >
    No style extraction.
  src/ui/sdl_sunglasses_surface.zig: >
    No style extraction.

appearance_ownership:
  controls_file: src/ui/controls/appearance.zig
  controls_role: >
    Inert reusable value types and clamps only: `Rgba8`, bounded font candidate
    list, bounded text size, bounded scalar chrome values, and conversion facts.
    It has no product semantic names.
  controls_forbidden_imports:
    - sdl_c
    - sdl_text
    - app
    - search
    - providers
    - notifications
    - sunglasses
    - wallpaper
    - hyprland
    - filesystem
    - process
  product_file: src/ui/appearance.zig
  product_role: >
    Maps bounded defaults to current product semantics: picker, notification
    banner, and sunglasses form appearance. This file may name product surfaces
    but must not call SDL, read files, spawn processes, or mutate domain state.
  renderer_role: >
    SDL files keep renderer calls, lifecycle, event loops, and product effects.
    They consume appearance values and do not own duplicated palette/font/chrome
    literals.

lua_config_bounds:
  max_embedded_defaults_bytes: 32768
  max_user_defaults_bytes: 32768
  max_lua_instructions: 100000
  max_table_depth: 4
  max_total_keys: 128
  max_color_entries: 32
  max_font_candidates: 8
  max_string_bytes: 240
  min_font_px: 8
  max_font_px: 48
  min_chrome_px: 0
  max_chrome_px: 96
  min_alpha: 0
  max_alpha: 255
  min_opacity: 0.0
  max_opacity: 1.0
  invalid_policy: >
    Embedded defaults are fatal if invalid. Missing user defaults keep embedded
    defaults. Present but invalid user defaults are rejected with a clear error
    and must not mutate the already loaded embedded defaults.
  lua_runtime_policy: >
    Config Lua runs in a Lua state created without opening standard libraries.
    The Wayspot config adapter must load buffers with `luaL_loadbufferx`, install
    `lua_sethook` with `LUA_MASKCOUNT` and `max_lua_instructions` before
    `lua_pcallk`, raise a deterministic config error from the hook when the
    budget expires, and clear the hook before closing the state.
  field_policy:
    counts: "reject values above the max_* count bounds"
    strings: "reject strings longer than max_string_bytes"
    table_depth: "reject nested tables deeper than max_table_depth"
    font_px: "reject values outside min_font_px..max_font_px"
    chrome_px: "reject values outside min_chrome_px..max_chrome_px"
    color_components: "reject r/g/b/a outside min_alpha..max_alpha"
    opacity: "reject values outside min_opacity..max_opacity"
    missing_fields: "keep the already loaded embedded default for that field"

defaults_lua_contract:
  file: assets/lua/defaults.lua
  required_shape:
    - file-level production comment
    - LuaLS annotations for the returned table and nested tables
    - returns one table
    - documents each user-facing knob beside the default value
    - includes only knobs consumed by this sprint
    - defaults are visually equivalent to current hardcoded UI before overrides
  forbidden_shape:
    - functions as public config values
    - callbacks into Wayspot
    - command strings
    - provider registration
    - mode registration

