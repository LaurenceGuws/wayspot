  - "bash -lc 'test ! -e vendor/howl-lua/.git && rg -q \"git@github.com:LaurenceGuws/howl-lua.git\" vendor/howl-lua/WAYSPOT_VENDOR.txt && rg -q \"v0.1.0-beta.2\" vendor/howl-lua/WAYSPOT_VENDOR.txt && rg -q \"89617b9f30a595b27c2ec1cc6140026e24b25641\" vendor/howl-lua/WAYSPOT_VENDOR.txt'"
