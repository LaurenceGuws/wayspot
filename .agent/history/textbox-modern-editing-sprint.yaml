id: textbox_modern_editing
state: complete

purpose: >
  Replace the weak append-at-end picker query textbox and sunglasses image-path
  textbox with one small bounded single-line text editing model. SDL remains
  only the window/event/clipboard adapter; picker-owned textbox code owns bytes,
  cursor, selection, bounds, and edit commands.

status:
  user_approved_focus: true
  implementation_authorized: true
  reviewer_gate_required_before_code: true
  dirty_tree_observed:
    - src/picker/appearance.zig
    - src/picker/surface.zig
    - src/picker/textbox.zig
    - src/sunglasses/form.zig
    - src/sunglasses/state.zig
    - src/sunglasses/surface.zig
    - src/sunglasses_form_test.zig
    - scratch.txt
  dirty_tree_rule: >
    Implementation must preserve existing edits and inspect the dirty diff
    before touching any listed file. No product source changes are authorized by
    this planning artifact until plan review passes and live memory activates
    this sprint.
  live_memory_rule: >
    Implementation remains unauthorized after plan review until the coordinator
    marks this sprint active in live memory. At time of proposal,
    .agent/history/sprint.yaml still points at completed abi_reference_maturity.

scope:
  in:
    - one concrete picker-owned bounded single-line editing model in src/picker/textbox.zig
    - UTF-8 text insertion from SDL_EVENT_TEXT_INPUT for picker query and sunglasses image path
    - cursor movement by UTF-8 scalar boundaries
    - selection ranges with anchor and cursor byte offsets
    - selection replacement on text input and paste
    - copy, cut, paste, select-all for both picker query and sunglasses image path
    - backspace and delete before or after the cursor
    - home and end movement
    - shift-left, shift-right, shift-home, shift-end range selection
    - deterministic mouse click placement and drag selection for the query textbox and image path candidate text
    - route-preserving picker query refresh after query text edits
    - sunglasses image path commit/invalid-path behavior preserved
    - bounded tests for model behavior and both product call sites
    - source comments updated to assert the new real behavior
  out:
    - rope, gap buffer, piece table, multiline editing, undo, redo, rich text, IME composition rendering
    - generic UI framework, shared product bucket, or cross-domain text service
    - moving picker rendering, Hyprland, DBus, wallpaper, or persistence into textbox ownership
    - changing picker ranking, command launching, sunglasses overlay rendering, or saved-state format
    - broad clipboard abstraction outside the picker surface event adapter
    - README feature marketing or user-facing docs

reference_support:
  sdl_boundary:
    docs_root: /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3
    files:
      - path: SDL_StartTextInput.md
        supports:
          - text input events are disabled by default and must be enabled per SDL_Window
          - SDL_EVENT_TEXT_INPUT and SDL_EVENT_TEXT_EDITING are produced after start
          - start/stop must be paired and called on the main thread
      - path: SDL_StopTextInput.md
        supports:
          - picker surface should stop window text input during cleanup
      - path: SDL_TextInputEvent.md
        supports:
          - event.text.text is UTF-8 encoded input text
          - text events require SDL_StartTextInput
      - path: SDL_KeyboardEvent.md
        supports:
          - event.key.key and event.key.mod are the adapter values for edit commands
      - path: SDL_MouseButtonEvent.md
        supports:
          - event.button.x and event.button.y are float window-relative hit coordinates
      - path: SDL_MouseMotionEvent.md
        supports:
          - event.motion.state, x, and y can drive drag selection
      - path: SDL_GetClipboardText.md
        supports:
          - clipboard returns UTF-8 text and must be released with SDL_free
      - path: SDL_SetClipboardText.md
        supports:
          - clipboard accepts UTF-8 text and returns failure through SDL
  local_source:
    files:
      - path: src/picker/textbox.zig
        current_problem: >
          Owns only append-at-end/backspace-at-end plus all_selected; no cursor,
          no range selection, no delete, no home/end, no mouse placement.
      - path: src/picker/surface.zig
        current_problem: >
          Uses std.ArrayList(u8) query directly and maps SDL text/backspace
          inline. Clipboard shortcuts currently only exist for sunglasses path.
      - path: src/sunglasses/form.zig
        current_problem: >
          Uses textbox.Textbox for image path but exposes path-specific append,
          backspace, select-all, paste, selected-text wrappers instead of the
          same edit model as query.

design:
  owner: src/picker/textbox.zig
  model_name: Textbox
  shape: >
    Keep one small fixed-capacity single-line model parameterized by max bytes.
    Store bytes in [max_bytes]u8, len as u32, cursor byte offset as u32, and an
    optional selection anchor byte offset as ?u32. All offsets are byte offsets
    that must sit on UTF-8 scalar boundaries.
  no_rope_reason: >
    Both call sites are bounded, single-line, small strings: picker query is
    currently rendered with max 84 bytes, and sunglasses image path is capped by
    sunglasses_state.max_image_path_bytes. A rope would add allocation,
    balancing, and slice traversal complexity without improving the accepted
    workload.
  utf8_policy:
    - accept SDL text input as UTF-8 bytes
    - reject or ignore malformed UTF-8 edit input before mutating model state
    - never split a UTF-8 continuation byte during cursor movement, delete, backspace, or truncation
    - overflow must not create partial UTF-8 scalars
  overflow_policy:
    - insertion that does not fully fit returns overflow and leaves prior text unchanged
    - paste overflow in sunglasses path keeps path_error true and prevents commit
    - query paste overflow leaves query unchanged and does not refresh ranking
  command_model:
    - insertText
    - backspace
    - deleteForward
    - moveLeft
    - moveRight
    - moveHome
    - moveEnd
    - selectAll
    - clearSelection
    - selectedText
    - copyRange
    - cutSelection
    - replace
    - setCursorFromByteOffset
    - selectToByteOffset
  adapter_model:
    name: PickerTextEditAction
    owner: src/picker/surface.zig
    purpose: >
      Convert SDL key/modifier/clipboard/mouse events into concrete textbox
      commands. SDL keycodes, modifiers, mouse coordinates, and clipboard memory
      stay in surface code.
  mouse_model:
    owner: src/picker/surface.zig
    accepted_behavior:
      - >
        Picker query mouse editing is active only inside the query content rect:
        left edge is the rendered query text x coordinate, right edge is the
        query divider right edge, top is the query text baseline y, and bottom is
        top plus the active query font pixel height.
      - >
        Sunglasses image path mouse editing is active only inside the image path
        candidate value rect: left edge is the same valueTextX used to draw the
        path, right edge is row.x + row.w - control_right_inset, top is row.y,
        and bottom is row.y + row.h.
      - >
        A click or drag x coordinate below the rect left edge maps to scalar
        index 0. A coordinate at or beyond the rect right edge maps to the
        scalar count. A coordinate inside the rect maps with
        floor(((x - left) / (right - left)) * (scalar_count + 1)), then clamps to
        0..scalar_count.
      - >
        Scalar index maps to a byte offset by walking UTF-8 scalar starts from
        the text beginning. Index 0 maps to byte 0; index scalar_count maps to
        len. The model never accepts offsets inside UTF-8 continuation bytes.
      - >
        Left-button down inside an active rect sets cursor to the mapped byte
        offset and clears selection. Motion with the left button held after such
        a down event keeps the down offset as anchor and selects to the mapped,
        clamped byte offset. Button up ends dragging without changing text.
      - >
        Mouse events outside the active rect do not create invalid offsets.
        During an active drag, outside x coordinates clamp to the nearest edge
        and outside y coordinates keep the same active textbox target.

files:
  change:
    - path: src/picker/textbox.zig
      symbols:
        remove_or_replace:
          - appendArrayList
          - backspaceArrayList
          - Textbox.all_selected
          - append-only tests that assert truncating partial overflow behavior
        add_or_rework:
          - EditResult
          - Textbox(max_bytes)
          - Textbox.replace
          - Textbox.insertText
          - Textbox.backspace
          - Textbox.deleteForward
          - Textbox.moveLeft
          - Textbox.moveRight
          - Textbox.moveHome
          - Textbox.moveEnd
          - Textbox.selectAll
          - Textbox.clearSelection
          - Textbox.hasSelection
          - Textbox.selectedText
          - Textbox.cutSelection
          - Textbox.slice
          - Textbox.cursorOffset
          - Textbox.selectionRange
          - helpers for previousUtf8Start, nextUtf8End, valid boundary, checked insertion capacity
      comments:
        - top-level file comment must describe bounded single-line editing, not append-at-end mechanics
        - public symbol comments must state ownership, byte bounds, UTF-8 boundary obligations, and mutation results
    - path: src/picker/surface.zig
      symbols:
        replace:
          - query: std.ArrayList(u8)
          - direct SDL_EVENT_TEXT_INPUT appendArrayList handling
          - direct query backspaceArrayList handling
          - PathEditAction
          - pathEditAction
          - applyPathEditAction
          - copySelectedPathText
        add_or_rework:
          - query: textbox.Textbox(query_max_bytes)
          - query_max_bytes bounded constant
          - TextEditTarget enum for query versus sunglasses image path
          - PickerTextEditAction enum for movement, deletion, selection, copy, cut, paste
          - textEditAction(key, modifiers)
          - applyTextInput(target, bytes)
          - applyTextEditAction(target, action)
          - copySelectedText(target)
          - pasteClipboardText(target)
          - query click and drag selection adapter using the exact mouse_model bounds and mapping
          - sunglasses image path click and drag selection adapter through Form methods
          - refreshResults only when query text changed
      comments:
        - surface comments should state SDL is only the event and clipboard adapter
        - no comment may claim append-only query behavior after this sprint
    - path: src/sunglasses/form.zig
      symbols:
        replace:
          - path_edit all_selected behavior assumptions
          - handleTextInput append-only behavior
          - handleBackspace delete-from-end behavior
          - selectPathText and pastePathText append-only/all-selection semantics
          - selectedPathText all-or-nothing assumption
        add_or_rework:
          - imagePathTextbox(state) or equivalent focused-path edit accessor
          - path edit insertion/deletion/movement wrappers only where state seeding and path_error belong to form
          - selected path range rendering bounded to the image path candidate value rect
          - path click/drag selection using the exact mouse_model bounds and mapping
      comments:
        - preserve form ownership of sunglasses state seeding, path_error, commit, and monitor focus
    - path: src/picker/mod.zig
      symbols:
        preserve:
          - pub const textbox
      comments:
        - preserve the existing concrete picker export name; do not add a broad export alias
    - path: src/sunglasses_form_test.zig
      symbols:
        update:
          - tests importing or constructing Form path editing expectations affected by cursor/selection
  do_not_change:
    - src/notification/**
    - src/wallpaper/**
    - src/env/**
    - src/c/**
    - src/sunglasses/overlay.zig
    - src/sunglasses/surface.zig
    - src/picker/text.zig
    - build.zig
    - assets/**
    - packaging/**
    - dev_references/**

slices:
  - id: 00_plan_review
    owner: reviewer
    goal: >
      Review this artifact for scope, ownership, SDL boundary evidence,
      stop conditions, and stale-surface coverage before any product code edit.
    allowed_files:
      - .agent/history/textbox-modern-editing-sprint.yaml
    done_when:
      - plan_review status is approved or exact edits are returned
  - id: 00a_live_memory_activation
    owner: coordinator
    goal: >
      Activate this accepted sprint in live project memory before any product
      source edit. The active sprint must no longer be the completed
      abi_reference_maturity sprint.
    allowed_files:
      - .agent/history/sprint.yaml
      - .agent/history/current.yaml
      - .agent/history/references.yaml
      - .agent/history/textbox-modern-editing-sprint.yaml
    tests:
      - 'python -c ''import yaml; [yaml.safe_load(open(p, encoding="utf-8")) for p in (".agent/history/sprint.yaml", ".agent/history/current.yaml", ".agent/history/references.yaml", ".agent/history/textbox-modern-editing-sprint.yaml")]'''
      - 'rg -n "active_index: .agent/history/textbox-modern-editing-sprint.yaml|id: textbox_modern_editing" .agent/history/sprint.yaml .agent/history/current.yaml'
    done_when:
      - .agent/history/sprint.yaml points at .agent/history/textbox-modern-editing-sprint.yaml
      - live memory states this sprint is active and implementation-authorized by coordinator
      - YAML validation passes
  - id: 00b_dirty_tree_preflight
    owner: planner_coder_after_review_and_activation
    goal: >
      Inspect and summarize every dirty path observed before the first product
      edit so sprint changes can be separated from existing user work.
    allowed_files: []
    commands:
      - git status --short
      - git diff -- src/picker/appearance.zig
      - git diff -- src/picker/surface.zig
      - git diff -- src/picker/textbox.zig
      - git diff -- src/sunglasses/form.zig
      - git diff -- src/sunglasses/state.zig
      - git diff -- src/sunglasses/surface.zig
      - git diff -- src/sunglasses_form_test.zig
      - test -e scratch.txt && sed -n '1,120p' scratch.txt || true
    done_when:
      - existing diffs for all dirty listed paths are summarized in the implementation handoff
      - sprint-owned target hunks are separable from existing edits
      - no product source file has been modified during this slice
    stop_if:
      - a dirty target file has user edits that make the sprint edit inseparable without a user or coordinator decision
      - live memory has not activated textbox_modern_editing
  - id: 01_textbox_model
    owner: planner_coder_after_review
    goal: >
      Rework src/picker/textbox.zig into the bounded model with UTF-8 cursor and
      selection semantics.
    allowed_files:
      - src/picker/textbox.zig
    tests:
      - zigup run 0.16.0 build test --summary all
    done_when:
      - model tests cover insertion, overflow no-mutate, UTF-8 scalar movement, backspace, delete, home/end, selection replacement, copy/cut selected ranges
      - model tests cover mouse scalar index to byte offset mapping at left edge, right edge, midpoint, and outside clamps
      - no ArrayList textbox helpers remain
  - id: 02_picker_query_adapter
    owner: planner_coder_after_review
    goal: >
      Move picker query from raw ArrayList edits to textbox model and map SDL
      text/key/clipboard/mouse events to query editing commands.
    allowed_files:
      - src/picker/surface.zig
      - src/picker/textbox.zig
    tests:
      - zigup run 0.16.0 build test --summary all
      - ./zig-out/bin/wayspot query settings
    done_when:
      - query typing, cursor movement, selection, copy/cut/paste, delete/backspace, home/end are model-driven
      - ranking refresh occurs only after query text changes
      - existing mode switching still replaces query with mode route text
      - tests cover malformed UTF-8 input leaving query unchanged
      - tests cover query overflow leaving text unchanged and not refreshing results
      - tests cover clipboard null and empty clipboard text leaving query unchanged
      - tests cover copy and cut with no selection as no-ops that do not call SDL_SetClipboardText
      - tests cover SDL_SetClipboardText failure propagating only when a selected copy/cut attempted clipboard write
      - tests cover query mouse click and drag using exact bounds, clamping, scalar mapping, and byte offset mapping
  - id: 03_sunglasses_path_adapter
    owner: planner_coder_after_review
    goal: >
      Route sunglasses image path edits through the same textbox model while
      keeping form ownership of path seeding, validation, and commit.
    allowed_files:
      - src/sunglasses/form.zig
      - src/picker/surface.zig
      - src/sunglasses_form_test.zig
      - src/picker/textbox.zig
    tests:
      - zigup run 0.16.0 build test --summary all
    done_when:
      - image path accepts UTF-8 insertion, cursor moves, selection replacement, copy/cut/paste, delete/backspace, home/end
      - overflow keeps path_error and does not commit truncated path
      - invalid relative paths still leave saved state unchanged
      - tests cover path candidate selection and replacement through the shared textbox model
      - tests cover invalid relative path commit leaving saved path and overlay toggles unchanged
      - tests cover overflow commit returning invalid and preserving previous saved image path
      - tests cover image path mouse click and drag using exact bounds, clamping, scalar mapping, and byte offset mapping
  - id: 04_mouse_and_render_receipts
    owner: planner_coder_after_review
    goal: >
      Add practical mouse click/drag selection and make rendering show cursor
      and selection without introducing a text layout framework.
    allowed_files:
      - src/picker/surface.zig
      - src/sunglasses/form.zig
      - src/picker/textbox.zig
    tests:
      - zigup run 0.16.0 build test --summary all
      - ./re-run.sh or direct wayspot --ui smoke where local compositor permits
    done_when:
      - query click places cursor using the exact mouse_model bounds, clamp, scalar mapping, and byte offset mapping
      - dragging in query or image path extends selection using the exact mouse_model anchor and clamp rules
      - selection rendering does not overlap row bounds
      - tests cover both query and image path mouse mapping without requiring text engine glyph measurement
  - id: 05_cleanup_and_final_gate
    owner: planner_coder_after_review
    goal: >
      Remove stale names, comments, and tests from old append-only behavior and
      collect final verification receipts.
    allowed_files:
      - src/picker/textbox.zig
      - src/picker/surface.zig
      - src/sunglasses/form.zig
      - src/sunglasses_form_test.zig
    tests:
      - '! rg -n "appendArrayList|backspaceArrayList|all_selected|append-only|pathEditAction|PathEditAction" src'
      - '! rg -n "\b(anytype|anyopaque|usize)\b|_ =" src/picker src/sunglasses'
      - zigup run 0.16.0 build test --summary all
      - zigup run 0.16.0 build
      - git diff --check
    done_when:
      - no stale append-only API or comments remain
      - cleanup rg commands exit 0 because rg finds no matches
      - final reviewer gate passes with receipts attached

happy_paths:
  - query receives "abc", left, left, "X" and becomes "aXbc" with cursor after X
  - query select-all then typing replaces whole query and refreshes results once for the final mutation
  - query ctrl-c copies selected bytes without changing query
  - query ctrl-x copies and removes selected bytes, then refreshes results
  - query ctrl-v inserts clipboard UTF-8 at cursor or replaces selection
  - query delete removes scalar after cursor and backspace removes scalar before cursor
  - query home/end move cursor to start/end; shift variants create a selection
  - sunglasses image path focus seeds saved path into edit model exactly once per edit session
  - sunglasses image path paste of valid absolute path commits through existing commitFocused flow
  - sunglasses image path empty commit still clears path and disables image
  - mouse click inside query/value area maps to the deterministic scalar index and byte offset; drag creates a bounded selection

unhappy_paths:
  - malformed UTF-8 input does not mutate model
  - insertion or paste beyond max bytes leaves previous text intact and returns overflow
  - overflow in sunglasses image path sets path_error and commitFocused returns invalid
  - cut/copy with no selection is a no-op and does not overwrite clipboard
  - clipboard get returning null or empty string does not crash and does not mutate text
  - SDL_SetClipboardText failure returns SdlClipboardFailed only on copy/cut paths that attempted a real selected copy
  - mouse drag outside row clamps to start or end by the mouse_model rule instead of producing invalid offsets
  - route switch to sunglasses still replaces query text with the mode route and resizes the picker window

tests:
  unit:
    - src/picker/textbox.zig: empty state, replace, insert at cursor, insert replaces selection
    - src/picker/textbox.zig: UTF-8 left/right/backspace/delete over ASCII, two-byte, and four-byte scalars
    - src/picker/textbox.zig: home/end and shift selection ranges
    - src/picker/textbox.zig: overflow leaves text/cursor/selection unchanged
    - src/picker/textbox.zig: selectedText and cutSelection return exact byte slices
    - src/picker/textbox.zig: mouse scalar index to byte offset mapping clamps and never splits UTF-8 scalars
    - src/picker/surface.zig: textEditAction maps ctrl-a/c/x/v, backspace, delete, arrows, home, end, and shift variants
    - src/picker/surface.zig: query mouse click and drag tests cover exact bounds and clamping
    - src/sunglasses/form.zig: image path cursor insertion and selected replacement preserve commit semantics
    - src/sunglasses/form.zig: image path candidate mouse click and drag tests cover exact bounds and clamping
    - src/sunglasses/form.zig: overflow/invalid path tests updated for no-truncation overflow policy
  smoke:
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build
    - ./zig-out/bin/wayspot --help
    - ./zig-out/bin/wayspot commands
    - ./zig-out/bin/wayspot query settings
  visual_or_manual_when_compositor_available:
    - open wayspot --ui, type UTF-8 query, move cursor, select, paste, and launch a row
    - open sunglasses route, edit image path with keyboard and mouse, commit valid and invalid values

stop_conditions:
  - reviewer rejects this plan
  - implementation begins before reviewer acceptance
  - implementation begins before live memory activates textbox_modern_editing
  - dirty worktree changes cannot be separated from sprint edits
  - a required edit would create a broad shared UI/text framework outside src/picker/textbox.zig ownership
  - a rope/gap-buffer/piece-table implementation is proposed without measured proof that the bounded single-line model is insufficient
  - SDL clipboard or text input requires unavailable APIs not present in dev_references/sdl
  - mouse hit-testing requires text engine changes
  - any active Zig code introduces new usize, anytype, anyopaque, or discard assignment violations
  - tests reveal changed picker ranking, command launch, or sunglasses persistence behavior outside accepted text editing semantics

must_not_exist_after_completion:
  - appendArrayList in src/picker/textbox.zig
  - backspaceArrayList in src/picker/textbox.zig
  - Textbox.all_selected
  - comments describing append-only textbox behavior
  - query editing stored as raw std.ArrayList(u8) in picker Surface
  - sunglasses-only copy/cut/paste model that bypasses picker textbox semantics
  - generic ui, widgets, controls, shared, or framework owner added for this work

receipts_required:
  - reviewer acceptance of this artifact before implementation
  - coordinator live-memory activation of this sprint before implementation
  - dirty-tree preflight summary before first product edit
  - final rg cleanup scans from slice 05 using no-match commands that must exit 0
  - final zigup test and build output summaries
  - final git diff --check result
  - visual UI receipt attempt with an explicit unavailable note when no compositor can run it
