id: obvious_shape_command
state: active

purpose: >
  Execute the reviewer-accepted style and command-surface sprint. The source of
  truth is `.agent/history/obvious-shape-command-sprint.yaml`.

active_index: .agent/history/obvious-shape-command-sprint.yaml

supporting_research:
  command_surface_vocabulary: .agent/history/command-surface-vocabulary-research.yaml

supersedes:
  id: flat_lifecycle_nouns
  reason: >
    User accepted the long style and footify sprint after lifecycle nouns were
    flattened to concrete owners.

law:
  - unfinished_work_must_be_completed_not_built_around
  - no_escape_hatches
  - one_command_model_two_surfaces
  - no_workflow_vocabulary_in_product_source
  - no_receipt_api_in_product_source
  - cli_and_gui_share_the_same_command_owner
  - nushell_completions_generated_from_shared_model
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - source-backed BusyBox and Nushell vocabulary application
    - one picker command model shared by GUI and terminal surfaces
    - terminal commands for list, query, open, and Nushell completion output
    - stable legacy flags preserved exactly
    - workflow/receipt vocabulary removed from production source
    - README/build/main/root and owner files made boring and obvious
    - happy and unhappy paths asserted without workflow language
  out:
    - generic command framework
    - new mode domains
    - new IPC
    - shell completions beyond Nushell
    - argv0 link dispatch unless the accepted implementation can finish it without deferral
    - compatibility wrappers

progress:
  completed:
    - 00_plan_review_accepted
    - 01_reference_vocabulary
    - 00_live_memory_activation
  current:
    - 02_command_model_index
  pending:
    - 03_terminal_surface
    - 04_workflow_language_cleanup
    - 05_control_spine_footing
    - 06_comments_and_invariants
    - 07_verification
    - 08_final_review

verification_floor:
  - commands listed in .agent/history/obvious-shape-command-sprint.yaml

stop_conditions:
  - any implementation need conflicts with the accepted index
  - CLI and GUI cannot share one command owner without changing accepted behavior
  - Nushell completion shape cannot be generated from the shared model
  - workflow vocabulary cannot be removed from product source without losing necessary diagnostics
  - a reviewer rejects the final tree
  - user decision is required
