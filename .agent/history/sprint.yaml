id: wallpaper_v1
state: active

source:
  detailed_index: .agent/history/wallpaper-v1-sprint-contract.yaml

purpose: >
  Add the minimal Wayspot-owned wallpaper daemon path after proving direct
  Hyprland layer surfaces, without restoring broad compositor abstractions.

law:
  - foot_it_up: keep surface owners direct, shallow, and practical
  - tigerbeetle_pressure: every owner has bounded state and exact cleanup
  - no_architecture_astronautics: abstractions earn their file, name, and call site
  - character_reduction_is_good_only_when_behavior_and_ownership_stay_clear

current_scope:
  in:
    - one SDL custom Wayland background layer surface per active monitor
    - one configured wallpaper library path
    - bounded still-image index with resolution metadata only
    - one random alternating timer mode
    - exact cleanup for surface, image, and retained path owners
  out:
    - hyprpaper backend
    - resident launcher IPC
    - broad surface framework
    - runtime scripting VM
    - monitor_glasses overlay implementation
    - animation, video, playlists, tags, ratings, or UI controls

baseline:
  src_lines: 6742
  src_zig_chars: 250448

progress:
  completed:
    - wallpaper_lifecycle_proof:
        receipt: /tmp/wayspot-wallpaper-shm-proof-20260704-195903
        facts:
          - two_wayspot_wallpaper_layer_surfaces_during
          - zero_wayspot_wallpaper_layers_after_cleanup
          - zero_wayspot_wallpaper_xdg_clients
          - no_wayland_protocol_errors
    - wallpaper_config_and_library_index:
        facts:
          - wallpaper_conf_loads_one_absolute_library_path
          - interval_seconds_clamps_to_30_86400_with_900_default
          - library_scan_indexes_png_and_bmp_headers_without_full_decode
          - records_store_path_byte_size_mtime_format_width_and_height
          - scan_bounds_max_images_paths_directory_entries_and_header_bytes
    - wallpaper_decode_and_draw:
        receipt: /tmp/wayspot-wallpaper-decode-slice-proof-20260704-204359
        facts:
          - image_decode_uses_wallpaper_surface_shm_path
          - no_sdl_renderer_texture_path_added
          - layer_surface_count_remained_bounded
    - wallpaper_random_timer:
        receipt: /tmp/wayspot-wallpaper-daemon-smoke-20260704-205249
        facts:
          - wallpaper_mode_loads_config_and_library_before_starting_sdl
          - empty_library_exits_before_surface_retention
          - one_random_timer_redraws_all_monitor_surfaces
          - event_loop_sleeps_on_sdl_wait_timeout_until_event_or_deadline
          - sigterm_wakes_daemon_and_runtime_cleanup_removes_layers
          - cleanup_remains_runtime_owned
  current:
    - wallpaper_monitor_change_events

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - stale runtime vocabulary scan
  - ./re-run.sh with RERUN_UI=false for daemon refresh when runtime files change

next_candidates: []

accepted_discoveries:
  - hyprland_direct_surface_discovery:
      memory: .agent/history/hyprland-direct-surface-discovery.yaml
      wallpaper_backend: Wayspot_owned_SDL_custom_Wayland_surfaces_with_wlr_layer_shell_background
      future_noun: monitor_glasses
