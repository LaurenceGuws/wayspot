id: ui_controls_dry_extraction
state: approved_for_worker_execution

purpose: >
  Execute the reviewer-accepted UI controls DRY extraction sprint. The source of
  truth is `.agent/history/ui-elements-dry-sprint.yaml`.

active_index: .agent/history/ui-elements-dry-sprint.yaml

supersedes:
  id: monitor_glasses_media_expansion
  reason: >
    User accepted the UI controls DRY sprint as the next active implementation
    sprint. Monitor-glasses media expansion remains historical planning until
    explicitly resumed.

accepted_controls:
  - src/ui/controls/cursor_blink.zig
  - src/ui/controls/textbox.zig
  - src/ui/controls/slider.zig

law:
  - implement_nothing_not_named_in_the_active_index
  - preserve_current_ux_behavior
  - no_product_domain_files_under_src_ui_controls
  - no_peer_shared_ui_control_folder
  - no_compatibility_wrappers
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - extract cursor blink timing from src/ui/sdl_shell.zig
    - extract shared append/backspace text mechanics without changing query storage behavior
    - extract generic scalar slider math used by sunglasses form
    - update tests and production comments for touched ownership
  out:
    - text cursor movement expansion
    - selection
    - copy/cut/paste
    - file picker
    - list/viewport move
    - toggle extraction
    - product-specific shared controls

progress:
  completed:
    - 00_index_review_accepted
    - 00_live_memory_supersession
  current:
    - 01_controls_folder_and_exports
  pending:
    - 02_cursor_blink_extraction
    - 03_textbox_extraction
    - 04_slider_extraction
    - 05_comment_and_test_bibliography
    - 06_final_reviewer_gate

verification_floor:
  - commands listed in .agent/history/ui-elements-dry-sprint.yaml

stop_conditions:
  - any implementation need conflicts with the accepted index
  - behavior preservation cannot be maintained
  - a reviewer rejects the final code
  - user decision is required
