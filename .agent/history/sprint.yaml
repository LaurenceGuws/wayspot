id: flat_lifecycle_nouns
state: active

purpose: >
  Execute the reviewer-accepted lifecycle noun flattening sprint. The source of
  truth is `.agent/history/flat-lifecycle-nouns-sprint.yaml`.

active_index: .agent/history/flat-lifecycle-nouns-sprint.yaml

supersedes:
  id: domain_language_footing
  reason: >
    User accepted the follow-up flattening sprint after the domain footing
    sprint completed.

law:
  - implement_nothing_not_named_in_the_active_index
  - flatten_daemon_runtime_process_to_concrete_owner_names
  - keep_external_daemon_flags_stable
  - no_compatibility_wrappers
  - no_sideways_lifecycle_buckets
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - move notification daemon/runtime to dbus/rows
    - move wallpaper runtime to loop
    - move sunglasses runtime to overlay
    - move process identity to identity
    - rename picker daemon rows to lifecycle rows
    - update source, build graph, README, AGENTS, live memory, re-run helper, and packaging
    - preserve behavior through explicit receipts
  out:
    - new modes
    - new IPC
    - new config schema
    - new caches
    - compatibility modules for old paths

progress:
  completed:
    - 00_index_review_accepted
    - 00_live_memory_activation
  current:
    - 01_notification_flatten
  pending:
    - 02_wallpaper_sunglasses_flatten
    - 03_picker_lifecycle_rows
    - 04_identity_and_child_nouns
    - 05_docs_memory_build
    - 06_behavior_receipts
    - 07_final_reviewer_gate

verification_floor:
  - commands listed in .agent/history/flat-lifecycle-nouns-sprint.yaml

stop_conditions:
  - any implementation need conflicts with the accepted index
  - an old path needs a compatibility wrapper to keep building
  - a behavior receipt cannot be made concrete
  - a reviewer rejects the final tree
  - user decision is required
