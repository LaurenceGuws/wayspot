id: textbox_modern_editing
state: complete

purpose: >
  Execute the reviewer-accepted textbox modernization sprint. The source of
  truth is `.agent/history/textbox-modern-editing-sprint.yaml`.

active_index: .agent/history/textbox-modern-editing-sprint.yaml

supersedes:
  id: abi_reference_maturity
  reason: >
    ABI/reference maturity completed and reviewer accepted the textbox sprint
    plan. The active work is now one bounded picker-owned text editing model
    shared by picker query and sunglasses image path candidate text.

law:
  - one_bounded_single_line_textbox_model
  - SDL_is_event_clipboard_and_window_adapter_only
  - no_rope_gap_buffer_piece_table_or_generic_ui_framework
  - picker_query_and_sunglasses_image_path_share_textbox_semantics
  - mouse_mapping_is_deterministic_rect_to_scalar_to_byte_clamp
  - dirty_tree_preflight_required_before_product_edits
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - live memory activation for textbox_modern_editing
    - dirty tree preflight before product edits
    - bounded UTF-8 cursor and selection model in src/picker/textbox.zig
    - SDL key text clipboard and mouse adapters in src/picker/surface.zig
    - sunglasses image path candidate text routed through the same model
  out:
    - rope gap buffer piece table multiline undo redo rich text or IME rendering
    - generic ui widgets controls shared or framework owner
    - text engine glyph hit-testing
    - changes to notification wallpaper env C build or packaging code

progress:
  completed:
    - 00_plan_review
    - 00a_live_memory_activation
    - 00b_dirty_tree_preflight
    - 01_textbox_model
    - 02_picker_query_adapter
    - 03_sunglasses_path_adapter
    - 04_mouse_and_render_receipts
    - 05_cleanup_and_final_gate
    - final_reviewer_gate
  current: []
  pending: []

verification_floor:
  - "python -c 'import yaml; [yaml.safe_load(open(p, encoding=\"utf-8\")) for p in (\".agent/history/textbox-modern-editing-sprint.yaml\", \".agent/history/sprint.yaml\", \".agent/history/current.yaml\", \".agent/history/references.yaml\")]'"
  - "git diff --check"

completion_receipts:
  - reviewer_gate_accepted
  - "zigup run 0.16.0 fmt --check src/picker/appearance.zig src/picker/surface.zig src/picker/textbox.zig src/sunglasses/form.zig"
  - "python -c 'import yaml; [yaml.safe_load(open(p, encoding=\"utf-8\")) for p in (\".agent/history/textbox-modern-editing-sprint.yaml\", \".agent/history/sprint.yaml\", \".agent/history/current.yaml\", \".agent/history/references.yaml\")]'"
  - "! rg -n \"path_selection_fill|path_selection_text|appendArrayList|backspaceArrayList|all_selected|append-only|pathEditAction|PathEditAction\" src"
  - "! rg -n \"\\b(anytype|anyopaque|usize)\\b|_ =\" src/picker src/sunglasses"
  - "zigup run 0.16.0 build test --summary all"
  - "zigup run 0.16.0 build"
  - "git diff --check"

stop_conditions:
  - product edits start before dirty tree preflight completes
  - dirty worktree changes cannot be separated from sprint edits
  - required implementation would touch files outside accepted scope
  - mouse hit-testing requires text engine changes
  - reviewer rejects final implementation
  - user decision is required
