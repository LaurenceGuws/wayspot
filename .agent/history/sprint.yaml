id: domain_language_footing
state: active

purpose: >
  Execute the reviewer-accepted domain language footing sprint. The source of
  truth is `.agent/history/domain-language-footing-sprint.yaml`.

active_index: .agent/history/domain-language-footing-sprint.yaml

supersedes:
  id: ui_appearance_lua_defaults
  reason: >
    User accepted the next repo-wide footing sprint after the Lua appearance
    defaults sprint completed.

law:
  - implement_nothing_not_named_in_the_active_index
  - final_tree_contains_nothing_more_and_nothing_less_than_the_index
  - no_provider_search_common_types_ui_control_command_or_action_buckets
  - no_sdl_prefixed_product_files_or_symbols
  - no_compatibility_wrappers
  - no_non_final_mapping_choices
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - rename or delete every rejected source path named by the index
    - move notification, picker, mode, wallpaper, and sunglasses code to accepted owners
    - update build graph roots and test module names
    - update root exports, main wiring, README, AGENTS, and live memory
    - preserve current product behavior through explicit receipts
  out:
    - new modes
    - new IPC
    - new config schema
    - new runtime caches
    - generic UI framework
    - compatibility modules for old paths

progress:
  completed:
    - 00_index_review_accepted
    - 00_live_memory_activation
  current:
    - 01_notification_owner
  pending:
    - 02_picker_query_rank_candidate
    - 03_mode_index
    - 04_picker_surface_elements
    - 05_wallpaper_sunglasses_surfaces
    - 06_build_memory_docs
    - 07_behavior_receipts
    - 08_final_reviewer_gate

verification_floor:
  - commands listed in .agent/history/domain-language-footing-sprint.yaml

stop_conditions:
  - any implementation need conflicts with the accepted index
  - any old path needs a compatibility shim to keep building
  - a behavior receipt cannot be made concrete
  - a reviewer rejects the final tree
  - user decision is required
