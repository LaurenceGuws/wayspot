id: notification_history_json_cache
state: completed

purpose: >
  Persist accepted freedesktop notifications into a bounded JSON cache and expose
  a /notifications history picker view without adding launcher IPC or a preview
  surface.

law:
  - notification_daemon_persistence_is_best_effort
  - notification_history_rows_are_informational
  - json_cache_is_the_file_owner_for_history_retention_and_bounds
  - launcher_remains_cli_summoned_with_no_resident_ipc

current_scope:
  in:
    - notification daemon writes accepted Notify calls to JSON history
    - cache path follows ${XDG_STATE_HOME:-$HOME/.local/state}/wayspot/notifications-history.json
    - history cache keeps rows newer than 7 days and caps retained rows
    - /notifications lists restart plus Notification history
    - /notifications history lists cached rows newest-first
    - banner and history previews share bounded whitespace-collapsing text helpers
  out:
    - notification detail preview pane
    - notification replay or action invocation from history
    - launcher IPC
    - generic provider registry

owners:
  cache: src/notifications/history_cache.zig
  daemon_persistence: src/notifications/dbus_daemon.zig
  provider: src/providers/notification_history.zig
  routing: src/search/rank.zig
  picker_non_launch: src/ui/sdl_shell.zig
  banner_preview: src/ui/sdl_banner.zig

progress:
  completed:
    - 01_json_cache_owner
    - 02_daemon_best_effort_persistence
    - 03_notification_history_provider
    - 04_route_and_non_launch_rows
    - 05_real_provider_test_artifact
  current:
    - notification_history_json_cache_complete

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 test src/search/rank.zig
  - zigup run 0.16.0 test src/notification_history_provider_test.zig
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - isolated dbus-run-session notify-send JSON write receipt
