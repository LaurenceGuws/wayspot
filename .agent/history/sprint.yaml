id: post_wallpaper_footification
state: active

source:
  detailed_index: .agent/history/post-wallpaper-footification-sprint.yaml

purpose: >
  Shrink and clarify the post-expansion wallpaper path before the next domain
  expansion. Delete stale proof surfaces, stale vocabulary, and unearned helper
  shape while preserving the proven daemon behavior.

law:
  - foot_it_up: keep surface owners direct, shallow, and practical
  - tigerbeetle_pressure: every owner has bounded state and exact cleanup
  - no_architecture_astronautics: abstractions earn their file, name, and call site
  - character_reduction_is_good_only_when_behavior_and_ownership_stay_clear

current_scope:
  in:
    - remove public lifecycle proof API now replaced by the real wallpaper daemon
    - keep only direct owner comments that assert live cleanup and bounds
    - shrink wallpaper runtime, Hyprland IPC, and layer-shell surface code where clarity survives
    - keep startup/config memory aligned with the installed two-daemon Hyprland path
    - preserve wallpaper daemon behavior that is already visually proven
  out:
    - new wallpaper features
    - monitor_glasses implementation
    - generic compositor or surface framework
    - cache or performance work without a proved owner and invalidation rule
    - metadata expansion beyond the existing resolution index

baseline:
  wallpaper_slice_lines: 2158
  wallpaper_slice_chars: 73249

progress:
  completed:
    - stale_lifecycle_proof_api_removed:
        facts:
          - public_wallpaper_lifecycle_proof_cli_removed
          - proof_named_runtime_wait_loop_removed
          - surface_initial_buffer_renamed_to_live_layer_shell_role
    - proof_shm_and_noop_wakes_removed:
        receipt: /tmp/wayspot-post-wallpaper-footification-20260704-212427
        facts:
          - solid_color_wallpaper_buffer_c_path_removed
          - wallpaper_first_draw_attaches_the_first_shm_buffer
          - focused_monitor_socket2_events_no_longer_wake_wallpaper_runtime
          - surface_slot_state_removed_because_slot_count_owns_initialized_range
          - unused_shutdown_requested_state_removed
          - wallpaper_module_reexports_narrowed_to_runtime_config_and_hyprland
