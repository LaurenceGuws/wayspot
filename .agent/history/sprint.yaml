id: abi_reference_maturity
state: complete

purpose: >
  Execute the reviewer-accepted ABI/reference-maturity sprint. The source of
  truth is `.agent/history/abi-reference-maturity.yaml`.

active_index: .agent/history/abi-reference-maturity.yaml

supersedes:
  id: de_entity_model_not_picker_abuse
  reason: >
    The env entity sprint completed and Sagan accepted it. User approved
    starting delegated execution for the ABI/reference-maturity sprint.

law:
  - vendored_ABI_is_direct_or_translated_at_ingestion_site
  - Zig_maturity_claims_use_Zig_0_16_release_notes_and_local_std_build_source
  - dev_references_is_the_bias_library
  - reference_repo_material_is_promoted_to_dev_references_or_deleted_or_explicitly_ignored
  - product_decisions_errors_and_lifecycle_live_in_Zig
  - C_is_ABI_glue_only_unless_user_accepts_specific_C_product_owner
  - reviewer_gate_required_for_completion

current_scope:
  in:
    - live memory activation for abi_reference_maturity
    - local dev_references promotion for exact Zig std build files
    - local official ABI surface image and memory references
    - reference_repo fate inspection and promote/delete/ignore recommendation
    - accepted shallow ABI boundary decision for layer-shell and image buffers
    - accepted sunglasses child startup failure detail preservation
  out:
    - product source or build implementation before accepted implementation slice
    - ABI/C changes during reference-only slices
    - broad Wayland abstraction
    - broad ABI abstraction
    - full upstream repo copying
    - reference_repo as authority

progress:
  completed:
    - 00_plan_review
    - 01_live_memory_activation
    - 02a_zig_std_build_reference_promotion
    - 02b_abi_surface_reference_download
    - 02c_reference_repo_fate
    - 03_zig_016_build_ingestion_lock
    - 03a_picker_text_c_ingestion_cleanup
    - 04_layer_shell_C_fate_decision
    - 05_typed_C_error_boundary
    - 06_move_product_image_policy_to_Zig
    - 07_sunglasses_startup_error_visibility
    - 08_surface_lifecycle_happy_unhappy_paths
    - 09_reference_maturity_scans
    - 02_dev_reference_bias_index
    - 10_final_verification
  current: []
  pending: []

verification_floor:
  - "python -c 'import yaml; [yaml.safe_load(open(p, encoding=\"utf-8\")) for p in (\".agent/history/abi-reference-maturity.yaml\", \".agent/history/sprint.yaml\", \".agent/history/current.yaml\", \".agent/history/references.yaml\")]'"
  - "git diff --check"

stop_conditions:
  - product source or build implementation starts during reference-only slices
  - C retains product behavior without explicit user approval
  - reference_repo remains ambiguous without promote_delete_or_ignore receipt
  - needed official references cannot be sourced with provenance
  - reviewer rejects the final tree
  - user decision is required
