id: app_icon_resolution_and_row_image
state: completed

goal:
  completion_target: reviewer_approved_then_user_smoke
  design_target:
    - resolve app candidate icon names pragmatically
    - draw a simple image layer in the right side of app result rows
    - keep the picker control spine small and direct
    - avoid a theme engine, asset framework, or broad image cache

personas:
  user:
    role: product_owner
    owns:
      - visual acceptance
      - scope corrections
      - manual smoke feedback
  coordinator:
    role: delegate workflow and maintain accountability
    owns:
      - handoffs
      - artifact hygiene
      - review sequencing
      - memory continuity
      - acceptance or rejection of worker proposals
  worker:
    role: propose and execute bounded slices after approval
    must_do:
      - read Wayspot-local memory first
      - propose exact files, symbols, deletions, tests, and verification
      - wait for coordinator approval before implementation unless explicitly authorized
      - keep qagent as provenance only, never live authority
  reviewer:
    role: strict invariant enforcer
    verdicts:
      - accept
      - reject
      - user_needed

workflow:
  steps:
    - worker proposes exact app-icon implementation index
    - coordinator approves, narrows, or rejects the proposal
    - worker executes approved slices
    - coordinator reviews findings-first and commits healthy checkpoints
  review_bias:
    - comments are production code
    - naming and intentional structure matter as much as hot paths
    - sdl_shell remains the picker control spine
    - retained image resources need owner, key, invalidation, scale behavior, cleanup, and tests
    - prefer a small direct resolver over a theme system

product_scope:
  in_scope:
    - resolve candidate icon names from app cache and desktop scan data
    - support common local icon paths and common icon theme directories if pragmatic
    - render a bounded icon image at the right side of app rows
    - draw no icon for missing or unsupported images
    - keep row hit testing and launch behavior unchanged
  out_of_scope:
    - theme selection UI
    - icon theme inheritance engine unless a tiny direct subset is required
    - network icons
    - SVG rendering
    - SDL_image
    - stb or another image decoder vendor
    - broad image cache
    - notification icon changes
    - Hyprland changes
    - provider registry changes

current_facts:
  candidate_icon_field:
    - src/search/types.zig Candidate.icon already exists.
    - src/providers/apps.zig stores desktop Icon fields in app candidates.
    - src/providers/actions.zig stores symbolic action icon names.
  picker_rendering:
    - src/ui/sdl_shell.zig draws row background, title, subtitle, and scrollbar.
    - row right side is available after status badge removal.
    - picker_viewport owns row geometry but not image loading.
  known_gap:
    - no current app icon path resolver exists.
    - no current image decode/upload owner exists for picker row icons.
  accepted_dependency:
    - build.zig.zon now targets git+https://github.com/LaurenceGuws/howl-sdl#release-3.4.x.
    - The resolved package hash is sdl-0.4.2+3.4.4-SDL--kB3pQHKG_4zWG-pH04ZcZZj_IRF7dwMpxNVGwd6.
    - The vendor source is cloned at /home/home/personal/projects/howl-sdl on release-3.4.x.
    - Vendor commit c5ba24c694b5d520cdc1d029d8def398690d6894 exposes SDL_LoadPNG and SDL_LoadBMP in include/SDL3/SDL_surface.h.
    - zigup run 0.16.0 build test --summary all passed after the SDL bump.

active_slice:
  id: 02_app_icon_resolution_and_row_texture
  mode: completed
  goal: >
    Implement pragmatic app icon resolution and right-side row image drawing
    using the accepted SDL 3.4 PNG/BMP surface loaders.
  likely_files:
    - src/ui/app_icons.zig
    - src/ui/sdl_shell.zig
    - src/ui/picker_viewport.zig
    - src/ui/mod.zig
  worker_output_required:
    - app-only candidate icon resolution
    - SDL_LoadPNG and SDL_LoadBMP only
    - bounded retained texture owner with negative missing entries
    - fallback behavior for missing, symbolic, SVG-only, oversized, and unreadable icons
    - exact files, symbols, comments, tests, and verification commands
  stop_conditions:
    - SDL 3.4 bump regression
    - icon owner needs a broader cache or theme engine
    - no implementation shape earns its place
    - user visual decision required

completion_receipt:
  commits:
    dependency: 89bb07a Bump SDL vendor for app icons
    row_icons: c88278c Render app icons in picker rows
  implemented_files:
    - src/ui/app_icons.zig
    - src/ui/picker_viewport.zig
    - src/ui/sdl_shell.zig
    - src/ui/mod.zig
  behavior:
    - app rows resolve icons through a bounded picker-lifetime AppIconStore.
    - SDL_LoadPNG and SDL_LoadBMP are the only image decoders used.
    - missing and unsupported icons are retained as missing entries and do not retry every frame.
    - SDL_Surface values are destroyed immediately after texture upload.
    - retained SDL_Texture values are destroyed once by AppIconStore.deinit before renderer teardown.
    - non-app rows do not resolve or draw icons.
    - row hit testing and launch behavior remain row-based and unchanged.
  verification:
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build -Doptimize=ReleaseFast
    - zigup run 0.16.0 fmt --check src/ui/app_icons.zig src/ui/picker_viewport.zig src/ui/sdl_shell.zig src/ui/mod.zig
    - git diff --check
    - banned pattern scan over changed active Zig files
    - stale vocabulary scan over changed active Zig files
    - timeout 8s ./zig-out/bin/wayspot --ui
    - pgrep cleanup check for leftover wayspot UI processes

follow_up_receipt:
  id: icon_diag_surface_proof
  state: completed
  command: ./zig-out/bin/wayspot --icon-diag
  receipt_file: .agent/history/icon-diag.receipt.tsv
  behavior:
    - app icon diagnostics collect app candidates only.
    - each app row is written as resolved, iconless, or unsupported.
    - resolved PNG/BMP icons run through the same SDL load-scale-upload path as picker row icons.
    - oversized source icons are scaled to a bounded retained texture dimension before upload.
    - true missing icon names remain explicit iconless rows in the receipt.
  local_counts:
    app_rows: 105
    resolved: 59
    surface_ok: 59
    surface_failed: 0
    iconless: 44
    unsupported: 2
    skipped: 0
  verification:
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build -Doptimize=ReleaseFast
    - zigup run 0.16.0 fmt --check src/main.zig src/root.zig src/ui/app_icons.zig src/ui/app_icon_diag.zig src/ui/mod.zig
    - git diff --check
    - banned pattern scan over changed active Zig files
    - stale vocabulary scan over changed active Zig files
    - ./zig-out/bin/wayspot --icon-diag

verification_floor:
  automated:
    - zigup run 0.16.0 build test --summary all
    - git diff --check
    - rg banned Zig patterns over touched active Zig files
    - rg stale runtime-debt vocabulary over touched runtime files
  manual:
    - ./re-run.sh or RERUN_INSTALL_BIN=/tmp/wayspot-smoke ./re-run.sh when daemon owns installed binary
    - app rows show icons on the right when icon files are available
    - missing icons do not disrupt layout, input, scrolling, hover, click, or launch
    - btop idle and mouse-motion CPU remain acceptable

done_definition:
  - implementation index is exact enough for a worker to execute without chat context
  - accepted implementation draws bounded right-side app icons without broad UI architecture
  - icon resources are cleaned up exactly once by their owner
  - missing or unsupported icons fail closed with no layout or launch regression
