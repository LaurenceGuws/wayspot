id: runtime_modes
state: complete

source:
  detailed_index: .agent/history/runtime-modes-sprint.yaml

purpose: >
  Add the smallest runtime maturity surface to the picker: slash modes that
  switch result lists, with daemon modes exposing one restart command each.

law:
  - modes_are_a_picker_noun_not_a_plugin_registry
  - default_picker_list_is_apps_without_a_slash_mode
  - daemon_commands_are_static_bounded_rows
  - selecting_a_mode_changes_the_query_without_launching_a_process

current_scope:
  in:
    - typing / shows mode rows
    - /notifications opens the notifications daemon list
    - /wallpapers opens the wallpaper daemon list
    - selecting a mode row changes the picker list in place
    - daemon mode first row restarts the daemon process through the existing singleton lock path
  out:
    - /apps row
    - plugin/provider registry
    - resident launcher IPC
    - daemon status dashboards
    - notification history browsing
    - wallpaper library browsing

progress:
  completed:
    - slash_modes_and_daemon_restart_rows:
        facts:
          - ModesProvider owns static slash mode candidates
          - default route excludes mode and daemon rows
          - /notifications filters to notifications daemon restart
          - /wallpapers filters to wallpaper daemon restart
          - mode selection rewrites the picker query instead of launching
          - daemon selection launches a static restart command
  current: []

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - manual picker smoke for slash modes
