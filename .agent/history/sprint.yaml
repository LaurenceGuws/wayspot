id: sunglasses_foundations
state: approved

source:
  detailed_index: .agent/history/sunglasses-foundations-sprint.yaml

purpose: >
  Add the v1 foundations for /sunglasses as a real subsystem: a picker form
  for red/blue and dim controls, persisted bounded state, and a non-interactive
  overlay daemon that applies the state per monitor.

law:
  - sunglasses_is_a_runtime_surface_subsystem_not_a_picker_row
  - form_modes_are_not_result_lists
  - overlay_surfaces_must_be_non_interactive_and_cleaned_up_once
  - no_generic_surface_framework_before_two_real_owners_force_a_deletion

current_scope:
  in:
    - /sunglasses mode row
    - /sunglasses opens a form pane in the picker
    - one red/blue toggle and bounded slider per monitor
    - one dim toggle and bounded slider per monitor
    - persisted sunglasses state
    - one resident sunglasses daemon
    - one pass-through overlay surface per monitor
    - daemon apply wake when form state changes
  out:
    - color science beyond a simple signed blue-to-red tint
    - schedules, sunrise, location, animation, profiles, presets
    - generic UI framework
    - plugin or provider registry
    - scripting VM

progress:
  completed:
    - 01_state_owner
    - 02_form_owner_no_effect
  current:
    - ready_for_03_overlay_surface_proof

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - hyprctl layers receipt for sunglasses overlay surfaces
  - screenshot receipt for visible red/blue and dim effects
