status: accepted_discovery
purpose: >
  Record the live Hyprland proof that ordinary Wayland windows can be used as
  deterministic per-monitor overlay surfaces. This rejects the ordinary-window
  path for wallpaper and names that separate overlay idea as monitor glasses.

proof_date: 2026-07-04

source_docs:
  hyprland_ipc: dev_references/hyprland/pages/ipc.md
  hyprland_dispatchers: dev_references/hyprland/pages/dispatchers.md
  hyprland_window_rules: dev_references/hyprland/pages/window-rules.md

live_probe:
  tool: tools/hypr-wallpaper-window-probe.py
  role: development_receipt_only
  stand_in_process: kitty
  stand_in_invariant: >
    Kitty is acceptable only for proving Hyprland window rules and event flow.
    Wayspot runtime must use Wayspot-owned SDL surfaces, not kitty.
  cleanup_knob:
    - -o confirm_os_window_close=0
  verified_facts:
    - hyprctl_dispatch_lua_expression_can_spawn_with_window_rules
    - hyprctl_clients_reports_probe_class_title_monitor_position_size
    - window_can_be_floating_pinned_non_focused_and_borderless
    - contentType_can_be_photo
    - size_can_track_monitor_w_and_monitor_h
    - move_zero_zero_places_surface_at_monitor_origin
    - alter_zorder_bottom_places_surface_behind_other_floating_windows_only
    - alter_zorder_top_places_surface_above_normal_windows
    - socket2_reports_openwindow_and_title_events_for_probe_windows
    - post_run_clients_check_reported_zero_probe_windows_after_confirm_prompt_was_disabled

wallpaper_v1:
  noun: wallpaper
  approved_direction: >
    Wayspot owns one SDL custom Wayland surface per monitor, binds it to
    wlr-layer-shell background for the matching wl_output, and asks Hyprland
    only for monitor facts. Do not use hyprpaper as the runtime backend.
  rejected_direction: >
    Normal XDG toplevel windows plus Hyprland bottom z-order are not wallpaper:
    the live proof covered tiled clients even when the floating window was
    placed at the bottom.
  initial_scope:
    - still_images_only
    - discover_images_from_configured_path
    - one_mode_random_alternating_timer
    - index_resolution_only
    - ask_hyprland_for_monitor_names_positions_scales_and_resolutions
  invariants:
    - every_monitor_surface_has_one_owner
    - every_surface_is_cleaned_up_once
    - request_socket_connections_open_write_read_close_immediately
    - event_socket_is_used_only_if_resident_daemon_needs_monitor_change_events
    - cpu_sleeps_until_timer_monitor_event_or_shutdown

monitor_glasses:
  noun: monitor_glasses
  definition: >
    Non-interactive per-monitor overlay/filter surfaces, like sunglasses for a
    monitor but not limited to sunset or color temperature use cases.
  relationship_to_wallpaper: >
    Owns the ordinary-window experiment and may use top z-order or another
    explicit overlay placement. It is not part of wallpaper v1.
  possible_uses:
    - redlight_or_tint_filter
    - per_monitor_dim_layer
    - inspection_or_focus_overlay
  non_goals_now:
    - no_color_pipeline
    - no_filter_ui
    - no_daemon_scope_until_wallpaper_lifecycle_is_proven
    - no_shared_surface_framework_before_two_real_owners_need_it

stop_conditions_for_wallpaper_start:
  - sdl_custom_wayland_surface_cannot_map_a_wlr_layer_shell_background_surface
  - image_decode_requires_large_unapproved_vendor_surface
  - monitor_change_lifecycle_cannot_be_bounded
  - cleanup_requires_compositor_or_process_guessing
