read_order:
  agents:
    - /home/home/personal/wayspot/AGENTS.md
    - /home/home/personal/wayspot/.agent/history/README.md
    - /home/home/personal/wayspot/.agent/history/current.yaml
    - /home/home/personal/wayspot/.agent/history/sprint.yaml
    - /home/home/personal/wayspot/.agent/history/references.yaml
    - /home/home/personal/wayspot/README.md
  humans:
    - /home/home/personal/wayspot/README.md
    - /home/home/personal/wayspot/.agent/history/README.md
    - /home/home/personal/wayspot/.agent/history/current.yaml
    - /home/home/personal/wayspot/.agent/history/sprint.yaml

active_files:
  memory_manual: /home/home/personal/wayspot/.agent/history/README.md
  current_worldview: /home/home/personal/wayspot/.agent/history/current.yaml
  sprint_contract: /home/home/personal/wayspot/.agent/history/sprint.yaml
  references: /home/home/personal/wayspot/.agent/history/references.yaml
  scope_map: /home/home/personal/wayspot/.agent/history/wayspot-scope-map.yaml
  surface_scale_index: /home/home/personal/wayspot/.agent/history/wayspot-surface-scale-index.yaml
  picker_viewport_index: /home/home/personal/wayspot/.agent/history/wayspot-picker-viewport-index.yaml
  control_spine_index: /home/home/personal/wayspot/.agent/history/wayspot-control-spine-shrink-index.yaml
  ui_appearance_lua_defaults_index: /home/home/personal/wayspot/.agent/history/ui-appearance-lua-defaults-sprint.yaml
  hyprland_direct_surface_discovery: /home/home/personal/wayspot/.agent/history/hyprland-direct-surface-discovery.yaml
  wallpaper_v1_sprint_contract: /home/home/personal/wayspot/.agent/history/wallpaper-v1-sprint-contract.yaml

source_references:
  provenance:
    qagent_workflow_source: /home/home/personal/projects/qagent
    rule: >
      qagent provided the copied way-of-work framework. It is not live authority
      for Wayspot planning or implementation.
    howl_lua_vendor:
      source_copy: /home/home/personal/wayspot/vendor/howl-lua
      upstream_remote: git@github.com:LaurenceGuws/howl-lua.git
      tag: v0.1.0-beta.2
      commit: 89617b9f30a595b27c2ec1cc6140026e24b25641
      provenance_file: /home/home/personal/wayspot/vendor/howl-lua/WAYSPOT_VENDOR.txt
      rule: >
        Wayspot vendors howl-lua as ordinary source files, not as a Git
        submodule or embedded checkout, so future clones include the local
        source copy directly.
  tigerbeetle:
    root: /home/home/personal/wayspot/dev_references/style/tigerbeetle
    required_for_owner_claims:
      - src/stdx/bounded_array.zig
      - src/queue.zig
  foot:
    root: /home/home/personal/wayspot/dev_references/terminals/foot
    required_for_picker_claims:
      - input.c
      - render.c
      - selection.c
  sdl:
    docs: /home/home/personal/wayspot/dev_references/sdl
    vendor:
      root: /home/home/personal/projects/howl-sdl
      branch: release-3.4.x
      commit: c5ba24c694b5d520cdc1d029d8def398690d6894
      icon_loader_apis:
        - include/SDL3/SDL_surface.h:SDL_LoadPNG
        - include/SDL3/SDL_surface.h:SDL_LoadBMP
  zig:
    release_notes: /home/home/personal/wayspot/dev_references/zig/release-notes.html

repo_entrypoints:
  cli:
    main: /home/home/personal/wayspot/src/main.zig
  picker:
    surface: /home/home/personal/wayspot/src/picker/surface.zig
    viewport: /home/home/personal/wayspot/src/picker/viewport.zig
    text: /home/home/personal/wayspot/src/picker/text.zig
    surface_config: /home/home/personal/wayspot/src/picker/scale.zig
    appearance: /home/home/personal/wayspot/src/picker/appearance.zig
    inert_appearance_values: /home/home/personal/wayspot/src/picker/appearance.zig
    defaults_loader: /home/home/personal/wayspot/src/config/defaults.zig
    embedded_defaults_lua: /home/home/personal/wayspot/assets/lua/defaults.lua
  picker_rows:
    picker: /home/home/personal/wayspot/src/picker/mod.zig
    apps: /home/home/personal/wayspot/src/picker/mode/apps.zig
    rank: /home/home/personal/wayspot/src/picker/rank.zig
  notifications:
    dbus: /home/home/personal/wayspot/src/notification/dbus.zig
    rows: /home/home/personal/wayspot/src/notification/rows.zig
    banner: /home/home/personal/wayspot/src/notification/banner.zig
  wallpaper:
    discovery: /home/home/personal/wayspot/.agent/history/hyprland-direct-surface-discovery.yaml
    contract: /home/home/personal/wayspot/.agent/history/wallpaper-v1-sprint-contract.yaml
    monitor_glasses_probe: /home/home/personal/wayspot/tools/hypr-wallpaper-window-probe.py

verification:
  build:
    - cd /home/home/personal/wayspot && zigup run 0.16.0 build test --summary all
    - cd /home/home/personal/wayspot && zigup run 0.16.0 build
  smoke:
    - cd /home/home/personal/wayspot && ./re-run.sh
    - cd /home/home/personal/wayspot && ./zig-out/bin/wayspot --notifications-daemon

archive_policy:
  retired_memory:
    - .agent/history/artifacts.jsonl
  rule: >
    artifacts.jsonl remains historical Wayspot memory until explicitly
    archived. New active worldview belongs in current.yaml, sprint.yaml, and
    references.yaml.
