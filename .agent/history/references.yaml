source_references:
  provenance:
    qagent_workflow_source: /home/home/personal/projects/qagent
    rule: >
      qagent provided the copied way-of-work rules. It is not live authority
      for Wayspot planning or implementation.
    howl_lua_vendor:
      source_copy: /home/home/personal/wayspot/vendor/howl-lua
      upstream_remote: git@github.com:LaurenceGuws/howl-lua.git
      tag: v0.1.0-beta.2
      commit: 89617b9f30a595b27c2ec1cc6140026e24b25641
      provenance_file: /home/home/personal/wayspot/vendor/howl-lua/WAYSPOT_VENDOR.txt
      rule: >
        Wayspot vendors howl-lua as ordinary source files, not as a Git
        submodule or embedded checkout. Vendors are means to an end, not domain
        models.
  tigerbeetle:
    root: /home/home/personal/wayspot/dev_references/style/tigerbeetle
    required_for_owner_claims:
      - docs/TIGER_STYLE.md
      - src/stdx/bounded_array.zig
      - src/queue.zig
  foot:
    root: /home/home/personal/wayspot/dev_references/terminals/foot
    required_for_picker_claims:
      - input.c
      - render.c
      - fdm.c
  sdl:
    docs: /home/home/personal/wayspot/dev_references/sdl
    required_for_monitor_fact_claims:
      - sdlwiki_md/SDL3/SDL_GetDisplays.md
      - sdlwiki_md/SDL3/SDL_GetDisplayName.md
      - sdlwiki_md/SDL3/SDL_GetDisplayBounds.md
      - sdlwiki_md/SDL3/SDL_GetDisplayProperties.md
      - sdlwiki_md/SDL3/SDL_GetWindowProperties.md
      - sdlwiki_md/SDL3/SDL_CreateWindowWithProperties.md
      - sdlwiki_md/SDL3/README-wayland.md
    rule: >
      SDL display is an implementation-source/API term only. The env/domain noun
      for screen output facts is monitor, and src/env/display.zig must not exist.
  hyprland:
    docs: /home/home/personal/wayspot/dev_references/hyprland/pages
    required_for_env_fact_claims:
      - ipc.md
      - using-hyprctl.md
      - dispatchers.md
      - workspace-rules.md
    rule: >
      Hyprland IPC belongs under env only to fill dumb monitor/workspace/window
      facts that SDL cannot fill. Product domains do not own Hyprland IPC.
  zig:
    release_notes: /home/home/personal/wayspot/dev_references/zig/release-notes.html
    std_build_source:
      - /home/home/personal/wayspot/dev_references/zig_maturity/zig/lib/std/Build.zig
      - /home/home/personal/wayspot/dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
      - /home/home/personal/wayspot/dev_references/zig_maturity/zig/lib/std/Build/Module.zig
      - /home/home/personal/wayspot/dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
  abi_surface:
    sdl_image_docs:
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadPNG.md
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadBMP.md
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_ConvertSurface.md
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_CreateSurfaceFrom.md
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_BlitSurfaceScaled.md
      - /home/home/personal/wayspot/dev_references/sdl/sdlwiki_md/SDL3/SDL_GetError.md
    wayland_layer_shell:
      - /home/home/personal/wayspot/dev_references/wayland/protocols/wlr/wlr-layer-shell-unstable-v1.xml
      - /home/home/personal/wayspot/dev_references/wayland/protocols/core/wayland.xml
      - /home/home/personal/wayspot/dev_references/wayland/client/wayland-client.h
    linux_memory:
      - /home/home/personal/wayspot/dev_references/linux/man-pages/man2/memfd_create.2
      - /home/home/personal/wayspot/dev_references/linux/man-pages/man2/mmap.2
      - /home/home/personal/wayspot/dev_references/linux/man-pages/man2/ftruncate.2
      - /home/home/personal/wayspot/dev_references/linux/man-pages/man2/truncate.2
  reference_repo:
    path: /home/home/personal/wayspot/reference_repo
    rule: >
      Do not use as authority. For abi_reference_maturity, inspection found no
      scoped ABI/surface/image material to promote. Recommended fate is
      safe-to-ignore or delete after reviewer/user acceptance because it holds
      D-Bus and notification spec material outside this sprint scope.

repo_entrypoints:
  cli:
    main: /home/home/personal/wayspot/src/main.zig
    terminal_commands:
      - wayspot commands
      - wayspot query <text>
      - wayspot open <open-payload>
      - wayspot complete nushell ...spans
  env:
    planned_root: /home/home/personal/wayspot/src/env/mod.zig
    monitor: /home/home/personal/wayspot/src/env/monitor.zig
    workspace: /home/home/personal/wayspot/src/env/workspace.zig
    window: /home/home/personal/wayspot/src/env/window.zig
    state: /home/home/personal/wayspot/src/env/state.zig
    hyprland: /home/home/personal/wayspot/src/env/hyprland.zig
    forbidden:
      - /home/home/personal/wayspot/src/env/display.zig
      - /home/home/personal/wayspot/src/env/common.zig
      - /home/home/personal/wayspot/src/env/shared.zig
      - /home/home/personal/wayspot/src/env/types.zig
  picker:
    command: /home/home/personal/wayspot/src/picker/command.zig
    surface: /home/home/personal/wayspot/src/picker/surface.zig
    viewport: /home/home/personal/wayspot/src/picker/viewport.zig
    text: /home/home/personal/wayspot/src/picker/text.zig
    appearance: /home/home/personal/wayspot/src/picker/appearance.zig
  picker_modes:
    apps: /home/home/personal/wayspot/src/picker/mode/apps.zig
    notifications: /home/home/personal/wayspot/src/picker/mode/notifications.zig
    wallpaper: /home/home/personal/wayspot/src/picker/mode/wallpaper.zig
    sunglasses: /home/home/personal/wayspot/src/picker/mode/sunglasses.zig
  notifications:
    dbus: /home/home/personal/wayspot/src/notification/dbus.zig
    rows: /home/home/personal/wayspot/src/notification/rows.zig
    banner: /home/home/personal/wayspot/src/notification/banner.zig
  wallpaper:
    discovery: /home/home/personal/wayspot/.agent/history/hyprland-direct-surface-discovery.yaml
    contract: /home/home/personal/wayspot/.agent/history/wallpaper-v1-sprint-contract.yaml
    rule: >
      Wallpaper consumes env monitor facts. Wallpaper no longer owns Hyprland
      monitor fact discovery in live planning.

verification:
  memory_activation:
    - cd /home/home/personal/wayspot && python -c 'import yaml; [yaml.safe_load(open(p, encoding="utf-8")) for p in (".agent/history/de-entity-model-not-picker-abuse.yaml", ".agent/history/sprint.yaml", ".agent/history/current.yaml", ".agent/history/references.yaml")]'
    - cd /home/home/personal/wayspot && git diff --check
  build:
    - cd /home/home/personal/wayspot && zigup run 0.16.0 build test --summary all
    - cd /home/home/personal/wayspot && zigup run 0.16.0 build
  smoke:
    - cd /home/home/personal/wayspot && ./zig-out/bin/wayspot --help
    - cd /home/home/personal/wayspot && ./zig-out/bin/wayspot commands

archive_policy:
  retired_memory:
    - .agent/history/artifacts.jsonl
    - .agent/history/obvious-shape-command-sprint.yaml
  rule: >
    Retired memory remains historical Wayspot memory until explicitly archived.
    New active worldview belongs in current.yaml, sprint.yaml, references.yaml,
    and the active sprint artifact.
