  control_spine_index: /home/home/personal/wayspot/.agent/history/wayspot-control-spine-shrink-index.yaml
  ui_appearance_lua_defaults_index: /home/home/personal/wayspot/.agent/history/ui-appearance-lua-defaults-sprint.yaml
