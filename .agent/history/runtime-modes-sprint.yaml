id: runtime_modes
state: complete

purpose: >
  Expose runtime maturity through picker modes without reopening the old shell
  platform shape. A mode is just a slash query that swaps the current result
  list.

scope:
  in:
    - / lists mode rows
    - /notifications lists notifications daemon commands
    - /wallpapers lists wallpaper daemon commands
    - selecting a mode row mutates the active query and keeps the picker open
    - selecting a daemon row launches one static restart command and closes the picker
  out:
    - /apps mode row
    - generic mode registry
    - runtime scripting
    - IPC server for launcher modes
    - daemon status polling

owner_map:
  src/search/query.zig:
    - parses slash mode routes
  src/providers/modes.zig:
    - owns static mode and daemon candidates
    - owns daemon restart command strings
  src/search/rank.zig:
    - keeps mode rows out of default app search
    - filters daemon rows by selected slash route
  src/ui/sdl_shell.zig:
    - changes query in place when a mode row is selected
  src/ui/common/dispatch.zig:
    - resolves daemon restart actions to detached shell commands

verification_floor:
  - query parser tests for slash routes
  - ranker tests for mode/default isolation
  - provider tests for static mode and daemon candidates
  - dispatch tests for daemon restart command resolution
  - full Zig test/build/fmt/diff checks
