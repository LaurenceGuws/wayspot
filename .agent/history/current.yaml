workspace:
  name: wayspot
  root: /home/home/personal/wayspot
  version: local-dev

product:
  summary: >
    Wayspot is a pragmatic DE busybox: CLI-summoned picker,
    notification DBus interface, wallpaper loop, and focused surfaces.
  active_focus: obvious_shape_command
  flow:
    launcher: cli -> picker_bundle -> picker -> picker_surface -> detached_command -> cleanup
    notifications: cli -> notification_dbus -> notification_state -> notification_banner_child
    wallpaper: cli_or_loop -> hyprland_monitor_facts -> vendor_wayland_surfaces -> wlr_layer_shell_background
    sunglasses: picker_form -> persisted_filter_state -> overlay -> per_monitor_pass_through_layer_surfaces

ownership:
  main:
    - CLI mode selection
    - entrypoint owner wiring
    - top-level cleanup order
  picker:
    - retained candidate list for one picker lifecycle
    - slash mode candidates and lifecycle command rows
    - history load, snapshot, record, and save
    - query ranking entry point
  app_rows:
    - desktop application discovery
    - app candidate string ownership
    - app cache read, refresh, and invalidation
  picker_surface:
    - one bounded picker lifecycle
    - vendor window, renderer, event loop, dirty redraw, launch queue, and shutdown signal
  picker_viewport:
    - foot-derived base-coordinate row math
    - selected row, scroll offset, visible range, hit testing, and passive scrollbar facts
  picker_text:
    - UTF-8 admission
    - HarfBuzz shaping buffer
    - FreeType face/raster data
    - bounded config-owned font fallback candidates
    - per-draw vendor texture lifetime
  picker_appearance:
    - embedded Lua defaults from assets/lua/defaults.lua
    - optional user overrides from $HOME/.config/wayspot/defaults.lua
    - bounded inert appearance values under src/picker/appearance.zig
    - product picker, banner, and sunglasses form mappings under src/picker/appearance.zig
  app_icon_rendering:
    - app icon name resolution for launcher candidates
    - bounded icon image decode and vendor texture lifetime
    - right-side icon drawing inside visible app rows
  notifications:
    - freedesktop D-Bus notification interface
    - bounded retained notification rows
    - banner child lifecycle
  wallpaper:
    - one Wayspot-owned vendor surface per monitor
    - Hyprland monitor discovery and wlr-layer-shell background output binding
    - still-image random alternating timer from one configured library path
  modes:
    - slash-prefixed picker mode rows
    - /notifications and /wallpapers lifecycle command lists
    - no /apps row because apps remain the default picker list
  sunglasses:
    - /sunglasses opens a form pane, not a result list
    - each monitor has a red/blue toggle and bounded slider
    - each monitor has a dimming toggle and bounded black-overlay slider
    - state applies through a resident non-interactive per-monitor overlay owner

boundaries:
  - notification_dbus_interface_is_long_lived
  - launcher_ipc_is_not_authorized
  - picker_surface_is_the_picker_control_spine
  - picker_viewport_has_no_vendor_dispatch_config_or_allocator_dependency
  - qagent_memory_is_not_a_planning_dependency

design_law:
  summary:
    - shape_first
    - measure_after_shape_is_worth_measuring
  rules:
    - keep direct owners before adding retained resources
    - delete unearned helper shape before adding optimization shape
    - model only the current product domain
    - do not preserve old architecture as inert fallback surface
    - prove behavior through bounded tests and direct behavior checks

constraints:
  bounds:
    - every_loop_queue_buffer_command_result_page_wake_slot_and_notification_has_a_bound
    - every_owner_cleans_up_once
    - cpu_sleeps_unless_input_notification_work_or_deadline_exists
  code:
    - no_gtk_shell_modules_open_registries_web_window_workspace_open inventories_or_scripting_vms
    - no_resident_launcher_ipc_without_fresh_approved_design
    - no_usize_anytype_anyopaque_or_discard_assignment_in_active_zig
    - comments_are_production_assertions
    - lua_defaults_are_bounded_data_only_without_standard_libraries
  review:
    - passing_tests_are_not_acceptance
    - stale_vocabulary_is_a_bug
    - broad_buckets_are_rejected_until_they_have_a_single_real_owner

accepted_discoveries:
  hyprland_direct_surfaces:
    memory: .agent/history/hyprland-direct-surface-discovery.yaml
    wallpaper_path: vendor_wayland_surface_plus_wlr_layer_shell_background
    reserved_overlay_noun: monitor_glasses
    rule: >
      Wallpaper starts from direct Wayspot-owned vendor Wayland surfaces on
      the background layer. Normal toplevel windows are preserved only for
      monitor_glasses overlay work.

memory_policy:
  live_files:
    - .agent/history/README.md
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
  live_rules:
    - live_files_contain_current_wayspot_truth
    - retired_material_stays_in_named_history_artifacts_or_archive
    - external_project_memory_is_provenance_only
  write_policy:
    - user_and_coordinator_may_rewrite_live_memory
    - workers_may_propose_memory_edits_unless_explicitly_authorized_to_write
