workspace:
  name: wayspot
  root: /home/home/personal/wayspot
  version: local-dev

product:
  summary: >
    Wayspot is a pragmatic DE busybox: CLI-summoned picker,
    notification DBus interface, wallpaper loop, sunglasses overlay, and focused
    surfaces.
  active_focus: abi_reference_maturity
  flow:
    launcher: cli -> picker -> picker_surface -> detached_command -> cleanup
    notifications: cli -> notification_dbus -> notification_state -> notification_banner_child
    wallpaper: cli_or_loop -> env_monitor_facts -> vendor_wayland_surfaces -> wlr_layer_shell_background
    sunglasses: picker_mode_sunglasses -> runtime_config -> overlay -> per_monitor_pass_through_layer_surfaces
    env: implementation_sources -> dumb_monitor_workspace_window_facts -> bounded_snapshot
    references: dev_references -> scoped_official_specs_and_local_source_backed_examples -> sprint_receipts

ownership:
  main:
    - CLI mode selection
    - entrypoint owner wiring
    - top-level cleanup order
  env:
    - dumb bounded monitor facts
    - dumb bounded workspace facts
    - dumb bounded window facts
    - internal state snapshots shared by processes commands and candidates as needed
    - Hyprland IPC only as a fact source for values SDL cannot fill
  env_monitor:
    - monitor is the env and product domain noun for screen output facts
    - SDL display is only an implementation-source or API term inside monitor-owned code
    - monitor size and optional scale facts
    - current active workspace refs as source facts only
  env_workspace:
    - workspace id and name facts
    - visible monitor refs as source facts only
    - window refs as source facts only
  env_window:
    - window id address class title and size facts
    - visible and focused facts
    - workspace ref as a source fact only
  picker:
    - one picker lifecycle
    - mode-owned action rows
    - app open rows
    - notification history rows
    - wallpaper lifecycle rows
    - sunglasses runtime config entry point
  notifications:
    - freedesktop D-Bus notification interface
    - bounded retained notification rows
    - banner child lifecycle
  wallpaper:
    - one Wayspot-owned vendor surface per monitor
    - consumes env monitor facts
    - still-image random alternating timer from one configured library path
  sunglasses:
    - /sunglasses opens runtime config, not a generic result list
    - red blue filter runtime config
    - dimm runtime config
    - image runtime config
    - overlay consumes env monitor facts
  references:
    - dev_references is the bias library for source-backed claims
    - reference_repo is not an authority path
    - reference_repo material must be promoted into dev_references with provenance or deleted/explicitly ignored

boundaries:
  - env_owns_monitor_workspace_window_facts
  - monitor_is_the_env_domain_noun
  - display_is_not_an_env_domain_noun
  - SDL_display_is_only_an_implementation_source_term_inside_monitor_owned_code
  - vendors_are_not_domain_models
  - product_domains_do_not_own_hyprland_ipc
  - direct_hyprland_under_env_only_fills_dumb_facts
  - workspace_window_scope_is_not_feature_complete
  - notification_dbus_interface_is_long_lived
  - launcher_ipc_is_not_authorized
  - picker_surface_is_the_picker_control_spine
  - qagent_memory_is_not_a_planning_dependency
  - reference_repo_is_promote_delete_or_explicit_ignore_only

design_law:
  summary:
    - shape_first
    - measure_after_shape_is_worth_measuring
  rules:
    - keep direct owners before adding retained resources
    - delete unearned helper shape before adding optimization shape
    - model only the current product domain
    - do not preserve old architecture as inert fallback surface
    - prove behavior through bounded tests and direct behavior checks

constraints:
  bounds:
    - every_loop_queue_buffer_command_result_page_wake_slot_and_notification_has_a_bound
    - every_monitor_workspace_window_list_has_a_bound
    - every_owner_cleans_up_once
    - cpu_sleeps_unless_input_notification_work_or_deadline_exists
  code:
    - no_gtk_shell_modules_open_registries_web_window_workspace_open_inventories_or_scripting_vms
    - no_resident_launcher_ipc_without_fresh_approved_design
    - no_usize_anytype_anyopaque_or_discard_assignment_in_active_zig
    - comments_are_production_assertions
    - lua_defaults_are_bounded_data_only_without_standard_libraries
    - no_env_display_zig
    - no_vague_cross_product_bucket_shape
  review:
    - passing_tests_are_not_acceptance
    - stale_vocabulary_is_a_bug
    - broad_buckets_are_rejected_until_they_have_a_single_real_owner
    - ambiguous_reference_directories_are_rejected_until_promoted_deleted_or_explicitly_ignored

accepted_discoveries:
  hyprland_direct_surfaces:
    memory: .agent/history/hyprland-direct-surface-discovery.yaml
    wallpaper_path: vendor_wayland_surface_plus_wlr_layer_shell_background
    reserved_overlay_noun: monitor_glasses
    rule: >
      Wallpaper and sunglasses use Wayspot-owned vendor Wayland surfaces. The
      Hyprland-specific IPC needed to fill monitor/workspace/window facts belongs
      under env, not wallpaper or sunglasses product ownership.

memory_policy:
  live_files:
    - .agent/history/README.md
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
  live_rules:
    - live_files_contain_current_wayspot_truth
    - retired_material_stays_in_named_history_artifacts_or_archive
    - external_project_memory_is_provenance_only
  write_policy:
    - user_and_coordinator_may_rewrite_live_memory
    - workers_may_propose_memory_edits_unless_explicitly_authorized_to_write
