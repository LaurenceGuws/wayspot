status: implementation_in_progress_manual_feedback_needed
purpose: >
  Plan the next Wayspot sprint as a control-spine shrink pass. The sprint must
  leave runtime code smaller, more direct, and more intentional, with no
  behavior beyond the accepted picker and notification-daemon scope.

authority:
  user_direction:
    - sdl_shell_zig_is_the_control_spine
    - picker_viewport_zig_is_foot_derived_viewport_math
    - tigerbeetle_style_is_the_pressure_used_to_beat_foot
    - every_surviving_character_must_earn_its_stay
    - manual_btop_feedback_is_the_performance_receipt
  coordinator_role: review_and_iterate_until_explicit
  worker_role: propose_exact_change_index_then_implement_when_references_answer
  implementation_allowed: true
  stop_conditions:
    - user_decision_required
    - sprint_complete

product_scope:
  in_scope:
    - shrink SDL picker control path
    - make foot-derived viewport intent explicit in production comments
    - remove unearned helper shape and redundant constants
    - keep event handling direct and dirty-only
    - audit stack and heap allocation sites for smallest pragmatic owners
    - small agent-driven metrics helper for iterative RSS/CPU receipts
    - preserve current picker behavior unless an accepted shrink slice says otherwise
  out_of_scope:
    - GUI polish
    - measurement architecture
    - profiling code
    - broad UI frameworks
    - drag scrollbar
    - animations
    - notification daemon changes
    - Hyprland changes
    - IPC
    - config schema expansion
    - search policy changes
    - command planning policy changes

style_law:
  control_spine:
    owner: src/ui/sdl_shell.zig
    rule: >
      The SDL shell is the boss. It owns lifecycle, event loop, redraw, launch,
      and shutdown. It calls smaller plain owners directly and does not delegate
      orchestration to invented mini-frameworks.
  plain_owners:
    rule: >
      Smaller owners are simple nouns and only verbs when the verb is the real
      domain operation. They provide direct facts or bounded math for the spine.
  allocation_pressure:
    rule: >
      Every stack and heap allocation site is suspect until the chosen data type
      and size are the smallest pragmatic fit for the current product path.
  comments_and_asserts:
    rule: >
      Comments and assertions are production code. Comments state durable
      ownership, reference pressure, and invariants; they do not carry roadmap,
      fallback, or chat-memory text.
  performance_feedback:
    rule: >
      Manual btop feedback remains authoritative. A tiny bash or Python helper
      may capture RSS/CPU receipts for iteration, but it is a disposable tool,
      not runtime architecture and not a reason to revert every small change
      that does not immediately show a win.

reference_pressure:
  foot:
    required_for_picker_viewport_comments:
      - dev_references/terminals/foot/input.c
      - dev_references/terminals/foot/render.c
      - dev_references/terminals/foot/selection.c
    lessons:
      - viewport and hit-test math stay close to input/render surfaces
      - coordinate spaces are explicit
      - redraw follows real state change
      - selection and visible rows are bounded before use
  tigerbeetle:
    required_for_shape_review:
      - dev_references/style/tigerbeetle/src/stdx/bounded_array.zig
      - dev_references/style/tigerbeetle/src/queue.zig
    lessons:
      - exact owners
      - bounded counters and transitions
      - assert illegal states directly
      - tests prove edge behavior, not decorative implementation details

current_known_surface:
  primary_spine: src/ui/sdl_shell.zig
  helper_math_owner: src/ui/picker_viewport.zig
  existing_dirty_runtime_files:
    - src/ui/picker_viewport.zig
    - src/ui/sdl_shell.zig
    - src/providers/apps.zig
    - src/search/rank.zig
    - src/ui/sdl_text.zig
    - src/app/search_service.zig
    - src/main.zig
    - src/ui/common/kinds.zig
  known_user_feedback:
    - tests 1 through 10 from the live smoke list looked good
    - taller resize exposed concern about shell-level hard caps
    - initialization RSS around 240 MB is concerning
    - mouse movement showed visible CPU according to btop
    - resize showed higher CPU according to btop
  implementation_progress:
    - picker_viewport file comment now states foot-derived row math ownership
    - ResultLayout comment now names foot-style base-coordinate row geometry
    - ResultLayout.visibleRowAtPoint uses direct row math instead of scanning visible rows
    - sdl_shell no longer keeps a shell-level visible row cap
    - sdl_shell computes render range and layout once per frame
    - sdl_shell no longer builds dynamic window titles during render
    - apps provider retains one current app string set instead of current and previous sets
    - search ranking folds ASCII during comparison instead of allocating lowercase query, title, and subtitle copies
    - text engine reuses one scratch pixel buffer instead of allocating a buffer for every text draw
    - text engine owns one HarfBuzz shaping buffer instead of creating one per text draw
    - search service collects candidates once per service lifetime and ranks retained candidates per query
    - query timing field and clock calls were removed from the search path
    - row status badge rendering and layout fields were removed
    - tools/wayspot-sample-process.sh samples a live process RSS and CPU as a receipt helper

indexing_task:
  instruction: >
    A long-lived worker must turn this draft into an exact implementation index
    before any runtime code changes start. The worker must propose file, symbol,
    comment, assertion, test, removal, and verification changes for each slice.
    The coordinator and worker should iterate until the sprint is explicit,
    checked, and scoped to nothing more and nothing less than the goal.
  required_output:
    - exact files allowed per slice
    - exact symbols to add, change, inline, or remove
    - comments to add or rewrite, including foot-derived viewport intent
    - allocation sites to inspect with owner and reason
    - tests to keep, add, shrink, or remove
    - stale-text and banned-pattern searches
    - live manual btop checks requested from the user
    - optional small metrics helper command and output fields
    - stop conditions and non-goals
  forbidden_output:
    - broad refactor plan without file and symbol targets
    - compatibility paths
    - runtime performance instrumentation code
    - new abstraction layers
    - runtime edits in the indexing pass

draft_slices:
  - id: 00_make_reference_intent_runtime_truth
    status: implemented_gates_passed
    goal: >
      Make picker_viewport.zig explicitly state that its viewport, visible row,
      and hit-test math are foot-derived production intent.
    likely_files:
      - src/ui/picker_viewport.zig
    required_index_detail:
      - exact file role comment text
      - exact symbol comments to add or rewrite
      - exact stale comments to remove
      - reference lines or patterns from foot that justify the comment
    acceptance_shape:
      - comment intent is explicit enough that the next contributor does not
        need chat memory
      - comments remain production assertions, not decoration

  - id: 01_control_spine_shrink_review
    status: implemented_first_pass_gates_passed
    goal: >
      Identify what in sdl_shell.zig makes the boss less direct, and propose
      removals or inlines before implementation.
    likely_files:
      - src/ui/sdl_shell.zig
      - src/ui/picker_viewport.zig
    required_index_detail:
      - helper-by-helper keep, inline, rename, or remove verdict
      - direct spine responsibilities that must remain in sdl_shell.zig
      - plain facts/math that belong in picker_viewport.zig
      - no runtime code edits in this slice
    acceptance_shape:
      - review produces exact implementation slices
      - no vague cleanup bucket remains

  - id: 02_picker_viewport_plain_noun_pass
    status: implemented_first_pass_gates_passed
    goal: >
      Keep picker_viewport.zig as a small plain math owner: viewport state,
      visible range, row geometry, hit-test, and passive scrollbar facts.
    likely_files:
      - src/ui/picker_viewport.zig
      - src/ui/sdl_shell.zig
    required_index_detail:
      - exact helpers or fields to remove, inline, or keep
      - exact tests proving the retained invariants
      - line-by-line comment changes for foot intent and bounds
    acceptance_shape:
      - fewer moving parts
      - same approved behavior
      - no SDL/search/dispatch/config dependency in picker_viewport.zig

  - id: 03_allocation_site_audit
    status: implemented_first_pass_gates_pending_manual_feedback_needed
    goal: >
      Account for every stack and heap allocation site on launcher init,
      search, render, input, and launch paths.
    likely_files:
      - src/ui/sdl_shell.zig
      - src/ui/sdl_text.zig
      - src/ui/surface_config.zig
      - src/app/
      - src/search/
    required_index_detail:
      - allocation site
      - owner
      - current data type and size
      - keep, shrink, move, or remove recommendation
      - smallest pragmatic alternative when change is proposed
    acceptance_shape:
      - no implementation in the audit
      - every allocation has a production reason or a proposed removal slice

  - id: 04_low_hanging_cpu_simplification
    status: implemented_first_pass_gates_passed_manual_feedback_needed
    goal: >
      Reduce event-path CPU by deleting avoidable work and making input and
      resize handling more direct.
    likely_files:
      - src/ui/sdl_shell.zig
      - src/ui/picker_viewport.zig
      - src/ui/sdl_text.zig
    required_index_detail:
      - exact event-path work to remove or guard
      - exact dirty-state conditions to preserve
      - exact helper inlines or cached facts, if any
      - manual btop checks for user feedback
    acceptance_shape:
      - SDL_WaitEvent remains blocking
      - redraw happens only after real state or layout change
      - no measurement code is added

  - id: 05_render_text_memory_pressure
    status: implemented_first_pass_gates_pending_manual_feedback_needed
    goal: >
      Inspect the 240 MB initialization footprint and shrink text/render/search
      memory only where the code clearly over-allocates for the current path.
    likely_files:
      - src/ui/sdl_text.zig
      - src/ui/sdl_shell.zig
      - src/search/
      - src/app/
    required_index_detail:
      - likely high-RSS owners
      - allocation sites to inspect first
      - proposed removals or smaller data shapes
      - manual RSS checks requested from the user
    acceptance_shape:
      - no profiling architecture
      - retained large allocations have explicit production reasons

  - id: 06_small_metrics_receipts
    status: implemented_gates_passed
    goal: >
      Add or define a tiny agent-driven helper that captures enough RSS/CPU
      facts to show iterative progress beside user btop feedback.
    likely_files:
      - scripts/
      - tools/
      - .agent/
    required_index_detail:
      - exact helper path or decision to keep it untracked/manual
      - bash or Python only
      - command to run the picker and sample RSS/CPU
      - fields emitted
      - cleanup policy
      - proof it does not alter runtime code or acceptance criteria
    acceptance_shape:
      - helper is small enough to audit in one screen
      - output is a receipt, not a gate
      - no daemon, service, profiler framework, dependency, or config path is added

  - id: 07_live_smoke_and_manual_feedback
    status: user_feedback_needed
    goal: >
      Run the picker after accepted shrink slices and collect user manual btop
      feedback, optional helper receipts, and behavior feedback.
    likely_files: []
    required_index_detail:
      - exact ./re-run.sh receipt expectations
      - numbered manual checks
      - optional metrics helper command and expected output shape
      - how user feedback maps to accept, reject, or next shrink slice
    acceptance_shape:
      - behavior receipts cover idle, mouse movement, resize, wheel, hover,
        click, keyboard, scrollbar, and launch
      - CPU and RSS observations come from user manual checks
      - helper receipts show trends without automatically failing small changes

verification_floor:
  automated:
    - "zigup run 0.16.0 build test --summary all"
    - "zigup run 0.16.0 fmt --check src/ui/sdl_shell.zig src/ui/picker_viewport.zig src/ui/sdl_text.zig src/ui/surface_config.zig"
    - "git diff --check"
    - "rg -n \"selected:|self\\.selected|max_results|TODO|todo|fallback|legacy|compatibility|maybe|for now|future|drag scrollbar|Hyprland|IPC|notification daemon\" src/ui src/app src/search || true"
    - "rg -n \"_ =|\\busize\\b|\\banytype\\b|\\banyopaque\\b\" src/ui src/app src/search || true"
  manual:
    - "./re-run.sh"
    - user_btop_idle_cpu
    - user_btop_mouse_motion_cpu
    - user_btop_resize_cpu
    - user_btop_init_rss
    - user_picker_behavior_receipts
  optional_metrics_helper:
    - small_bash_or_python_only
    - no_runtime_instrumentation
    - no_new_dependencies
    - receipts_not_gates

done_definition:
  - >
    The next implementation index is explicit enough for a worker to execute
    without chat context.
  - >
    Runtime comments carry foot-derived viewport intent and current ownership
    truth.
  - >
    sdl_shell.zig remains the direct control spine and gets smaller or more
    focused.
  - >
    picker_viewport.zig remains a plain math owner with no SDL or policy creep.
  - >
    Allocation-heavy paths are accounted for before memory-shrink changes.
  - >
    CPU and RSS conclusions rely on user manual btop feedback, not new
    runtime measurement code.
  - >
    Optional metrics helper receipts may show iteration progress, but they do
    not become architecture and do not automatically reject changes without a
    product or code-shape reason.
