status: indexing_in_progress
purpose: >
  Define the exact Wayspot picker viewport sprint before implementation.
  This planning artifact is production memory: it must name the files,
  folders, symbols, comments, tests, removals, and reference pressure needed
  to make the SDL picker feel like a graphical picker without adding a UI
  framework or broad surface abstraction.

priority_order:
  - safety
  - pragmatic_small_direct_code
  - tigerbeetle_and_foot_reference_pressure

product_scope:
  in_scope:
    - mouse wheel scrolling
    - pointer hover selection
    - click-to-launch for visible rows
    - explicit viewport state with bounded selected and scroll offset
    - resize-aware visible row calculation
    - passive scrollbar rendering
    - dirty-only redraw policy
    - tests for pure viewport/layout math
  out_of_scope:
    - animations
    - drag scrollbar
    - theme system
    - generic UI framework
    - resident launcher IPC
    - notification daemon changes
    - Hyprland config changes

accepted_constraints:
  bounds:
    - every index is checked before use
    - selected row is valid or absent
    - scroll offset is clamped to total rows and visible rows
    - click and hover cannot address rows outside the visible range
    - resize cannot produce invalid row counts
  runtime:
    - no idle redraw loop
    - SDL event wait remains blocking
    - redraw only when dirty
    - rendering remains bounded by visible rows
  code_shape:
    - keep the owner picker-local
    - prefer one small viewport owner over scattered selected/offset math
    - no broad surface abstraction
    - comments are production assertions only
    - no `_ =`, `usize`, `anytype`, or unapproved `anyopaque`

reference_pressure:
  required_before_execution:
    tigerbeetle:
      paths:
        - dev_references/style/tigerbeetle/src/stdx/bounded_array.zig
        - dev_references/style/tigerbeetle/src/queue.zig
      lessons_to_extract:
        - explicit state owner
        - bounded arithmetic
        - assertion style
        - illegal state tests
    foot:
      paths:
        - dev_references/terminals/foot/input.c
        - dev_references/terminals/foot/render.c
        - dev_references/terminals/foot/selection.c
      lessons_to_extract:
        - direct input-to-state ownership
        - viewport/render math close to the surface
        - pragmatic redraw and selection handling

current_known_surface:
  primary_owner: src/ui/sdl_shell.zig
  current_limitations:
    - selected index is a single u32 field on SdlShell
    - render clamps visible rows to max_results from result index zero
    - viewport is locked to the first result page
    - redraw is triggered by filtering, keyboard movement, zoom, and launch path only
    - no mouse wheel event handling
    - no pointer hover mapping
    - no click-to-launch row mapping
    - no scrollbar

indexing_task:
  required_output:
    files_and_folders:
      add:
        - path: src/ui/picker_viewport.zig
          owner: picker viewport math
          role: >
            Pure picker-local owner for selected row, scroll offset, visible row
            count, row hit testing, row geometry, visible range, and passive
            scrollbar geometry. It must import only std and contain no SDL,
            search, dispatch, allocator, config, daemon, Hyprland, IPC,
            animation, or theme dependencies.
      change:
        - path: src/ui/mod.zig
          action: >
            Export picker_viewport for tests and for the SDL owner. Keep Shell
            as the only runtime UI entry point.
        - path: src/ui/sdl_shell.zig
          action: >
            Replace scattered selected/index/layout math with the picker-local
            viewport owner. Wire SDL resize, wheel, pointer motion, left click,
            keyboard movement, refresh, rendering, and launch through explicit
            viewport methods. Keep SDL lifecycle, search results ownership,
            command planning, launch queue, shutdown signal, and dirty redraw
            ownership in this file.
        - path: build.zig
          action: >
            No structural build change expected if src/root.zig already imports
            src/ui/mod.zig tests. Change only if a new pure module is not pulled
            into the existing test graph.
      remove: []
    symbols:
      add:
        - file: src/ui/picker_viewport.zig
          name: pub const Viewport
          role: >
            Owns total_rows, selected_row, scroll_offset, visible_rows, and the
            invariant that selection is absent when total_rows is zero and
            otherwise selected_row < total_rows.
          required_fields:
            - "total_rows: u32"
            - "selected_row: ?u32"
            - "scroll_offset: u32"
            - "visible_rows: u32"
          required_methods:
            - "pub fn init() Viewport"
            - "pub fn resetResults(self: *Viewport, total_rows: u32) bool"
            - "pub fn resize(self: *Viewport, visible_rows: u32) bool"
            - "pub fn moveSelection(self: *Viewport, delta: i32) bool"
            - "pub fn scrollLines(self: *Viewport, delta: i32) bool"
            - "pub fn selectVisibleRow(self: *Viewport, visible_row: u32) bool"
            - "pub fn resultAtVisibleRow(self: *const Viewport, visible_row: u32) ?u32"
            - "pub fn visibleRange(self: *const Viewport) VisibleRange"
            - "pub fn selected(self: *const Viewport) ?u32"
          invariants:
            - visible_rows is clamped to at least one before any non-empty range is exposed.
            - scroll_offset never exceeds max_scroll_offset(total_rows, visible_rows).
            - selected_row is always visible after keyboard movement, hover, click, resize, and result refresh.
            - empty results force selected_row = null and scroll_offset = 0.
            - visible row hit testing returns null outside the current visible range.
        - file: src/ui/picker_viewport.zig
          name: pub const VisibleRange
          required_fields:
            - "start: u32"
            - "count: u32"
          invariants:
            - start + count never exceeds total_rows.
            - count never exceeds visible_rows.
        - file: src/ui/picker_viewport.zig
          name: pub const Scrollbar
          role: >
            Passive scrollbar geometry result. It contains only whether a bar is
            needed and bounded track/thumb rectangles or ratios; it must not own
            input or dragging.
        - file: src/ui/picker_viewport.zig
          name: pub const ResultLayout
          role: >
            Base-coordinate result row and passive scrollbar geometry:
            result-list top, row x/y/w/h, status x, scrollbar track x/y/w/h,
            visible row count, and pointer-to-visible-row mapping. It does not
            own selection, search results, SDL resources, or rendering.
        - file: src/ui/picker_viewport.zig
          name: "pub fn visibleRowsForHeight"
          role: >
            Convert the available result-list height into a bounded row count
            using row_height and row_gap. It must never return zero to non-empty
            viewport code.
        - file: src/ui/sdl_shell.zig
          name: "viewport: picker_viewport.Viewport"
          role: >
            Replaces selected as the shell's only picker selection/scroll state.
        - file: src/ui/sdl_shell.zig
          name: "fn updateViewportForWindow(self: *SdlShell) !void"
          role: >
            Reads SDL window size, converts to base-coordinate available height
            using current scale, updates visible_rows, clamps viewport, and marks
            dirty only when state or layout changed.
        - file: src/ui/sdl_shell.zig
          name: "fn visibleRowAtPoint(self: *SdlShell, x: f32, y: f32) ?u32"
          role: >
            Maps pointer coordinates to visible row index after checking row
            bounds. It must not inspect results directly.
        - file: src/ui/sdl_shell.zig
          name: "fn queueLaunchAtResult(self: *SdlShell, result_index: u32) !void"
          role: >
            Launches exactly one checked result index. Keyboard return and
            pointer click share this path.
        - file: src/ui/sdl_shell.zig
          name: "fn drawScrollbar(self: *SdlShell) !void"
          role: >
            Renders a passive scrollbar only when total rows exceed visible rows.
      change:
        - file: src/ui/sdl_shell.zig
          from: "const max_results = 8"
          to: >
            Keep only if it becomes an upper safety cap named
            max_visible_result_rows. It must no longer define the viewport as a
            fixed first page.
        - file: src/ui/sdl_shell.zig
          from: "const row_height: f32 = 44"
          to: >
            Move to src/ui/picker_viewport.zig as the single layout owner
            consumed by visibleRowsForHeight, row geometry, hit testing, and
            drawing.
        - file: src/ui/sdl_shell.zig
          from: "const row_gap: f32 = 6"
          to: >
            Move with row_height or keep with it. There must be one owner for
            row gap.
        - file: src/ui/sdl_shell.zig
          from: "fn handleEvent(self: *SdlShell, event: *const c.SDL_Event) !bool"
          to: >
            Add cases for SDL_EVENT_MOUSE_WHEEL, SDL_EVENT_MOUSE_MOTION,
            SDL_EVENT_MOUSE_BUTTON_DOWN, SDL_EVENT_WINDOW_RESIZED, and
            SDL_EVENT_WINDOW_PIXEL_SIZE_CHANGED if SDL3 exposes both. Each case
            must call viewport/layout methods, mark dirty only on change, and
            never launch rows outside the visible range.
        - file: src/ui/sdl_shell.zig
          from: "fn refreshResults(self: *SdlShell) !void"
          to: >
            After searchQuery, call viewport.resetResults(@intCast(results.len))
            instead of manually clamping selected.
        - file: src/ui/sdl_shell.zig
          from: "fn queueSelectedLaunch(self: *SdlShell) !void"
          to: >
            Read viewport.selected(); return when null; pass the checked result
            index to queueLaunchAtResult.
        - file: src/ui/sdl_shell.zig
          from: "fn activeResult(self: *SdlShell) ?ScoredCandidate"
          to: >
            Read viewport.selected() and bounds-check before indexing results.
        - file: src/ui/sdl_shell.zig
          from: "fn drawResults(self: *SdlShell) !void"
          to: >
            Draw only viewport.visibleRange(), indexing results from
            range.start + visible row. Highlight selected_row, not visible row
            zero. Draw no more than visible_rows.
        - file: src/ui/sdl_shell.zig
          from: "fn applySurfaceScale(self: *SdlShell) !void"
          to: >
            After SetWindowSize/SetRenderScale, refresh viewport visible rows
            from actual window size and mark dirty when changed.
      remove:
        - file: src/ui/sdl_shell.zig
          symbol: "selected: u32 = 0"
          reason: >
            This duplicates viewport ownership and cannot represent absent
            selection for empty results.
        - file: src/ui/sdl_shell.zig
          symbol: "self.selected manual clamps in refreshResults"
          reason: Replaced by Viewport.resetResults.
        - file: src/ui/sdl_shell.zig
          symbol: "self.selected +/- keyboard math in handleEvent"
          reason: Replaced by Viewport.moveSelection.
        - file: src/ui/sdl_shell.zig
          symbol: "self.results[@intCast(self.selected)]"
          reason: Replaced by queueLaunchAtResult and activeResult through Viewport.selected.
        - file: src/ui/sdl_shell.zig
          symbol: "const visible = @min(self.results.len, max_results)"
          reason: >
            This is the fixed first-page viewport bug. Rendering must use
            Viewport.visibleRange.
        - file: src/ui/sdl_shell.zig
          symbol: "const selected = i == self.selected"
          reason: >
            This compares visible row to absolute selected index and fails once
            scroll_offset is non-zero.
        - file: src/ui/sdl_shell.zig
          symbol: "var y: f32 = 72 duplicated row positioning"
          reason: >
            Result row y calculation belongs to the single layout owner used by
            drawing and hit testing.
    comments:
      add:
        - file: src/ui/picker_viewport.zig
          text: "//! Picker viewport owns bounded result selection, scroll offset, visible range, and row hit testing."
        - file: src/ui/picker_viewport.zig
          text: "/// Viewport keeps selected_row visible or absent; callers never index results without asking it."
        - file: src/ui/picker_viewport.zig
          text: "/// VisibleRange names the absolute result rows that may be rendered for the current frame."
        - file: src/ui/picker_viewport.zig
          text: "/// Scrollbar is passive render geometry; dragging is outside the picker viewport scope."
        - file: src/ui/sdl_shell.zig
          text: "/// The viewport is the only owner of picker selection and scroll offset."
          location: above the SdlShell viewport field
      change:
        - file: src/ui/sdl_shell.zig
          current: "//! SDL shell owns one bounded picker lifecycle from CLI entry to cleanup."
          required: keep
        - file: src/ui/sdl_shell.zig
          current: "//! Approved happy path: create one SDL window, search app/action candidates,"
          required: keep unless reflowed with the existing file role comment
        - file: src/ui/sdl_shell.zig
          current: "/// LaunchQueue owns one detached command intent between picker activation and controlled drain."
          required: keep
        - file: src/ui/sdl_shell.zig
          current: "/// ShutdownSignal turns SIGINT and SIGTERM into one SDL wake event owned by the shell."
          required: keep
      remove:
        - file: src/ui/picker_viewport.zig
          forbidden_text:
            - TODO
            - FIXME
            - fallback
            - legacy
            - compatibility
            - maybe
            - for now
            - future
            - animation
            - theme
            - drag
          reason: >
            The viewport file is planned production code; comments must assert
            current invariants only.
        - file: src/ui/sdl_shell.zig
          forbidden_text:
            - TODO
            - fallback
            - legacy
            - compatibility
            - old
            - maybe
            - future
            - workaround
            - drag scrollbar
            - IPC
            - Hyprland
            - notification daemon
          reason: >
            Runtime comments must not carry roadmap, deleted scope, or
            compatibility chatter.
    tests:
      add:
        - file: src/ui/picker_viewport.zig
          name: test "empty viewport has no selected row and zero visible range"
          assertions:
            - selected() returns null.
            - visibleRange() returns start 0 count 0.
            - resultAtVisibleRow(0) returns null.
        - file: src/ui/picker_viewport.zig
          name: test "reset results clamps selected and scroll offset"
          assertions:
            - shrinking total rows clamps selected_row to last valid row.
            - empty reset clears selected_row and scroll_offset.
            - growing from empty selects row 0 and leaves scroll_offset 0.
        - file: src/ui/picker_viewport.zig
          name: test "keyboard movement keeps selected row visible"
          assertions:
            - moving down past the bottom advances scroll_offset.
            - moving up past the top decreases scroll_offset.
            - movement clamps at first and last result.
        - file: src/ui/picker_viewport.zig
          name: test "scroll lines clamps offset and preserves valid selection"
          assertions:
            - positive and negative deltas cannot underflow or overflow.
            - selected row remains valid and is adjusted into the visible range.
        - file: src/ui/picker_viewport.zig
          name: test "visible row lookup rejects rows outside rendered range"
          assertions:
            - rows below visible count map to absolute result indexes.
            - row equal to visible count returns null.
            - empty results always return null.
        - file: src/ui/picker_viewport.zig
          name: test "resize recalculates visible range without invalid state"
          assertions:
            - zero or tiny available height clamps to minimum visible row count.
            - growing visible_rows reduces max_scroll_offset when possible.
            - shrinking visible_rows keeps selected_row visible.
        - file: src/ui/picker_viewport.zig
          name: test "passive scrollbar thumb is bounded"
          assertions:
            - scrollbar is absent when total_rows <= visible_rows.
            - thumb start and size stay within the track.
            - last scroll offset places thumb at the track end.
        - file: src/ui/picker_viewport.zig
          name: test "visible row point mapping rejects chrome gaps and scrollbar"
          assertions:
            - points above the first row return null.
            - points in row gaps return null.
            - points outside result x bounds return null.
            - points inside a visible row return that visible row.
      change:
        - file: build.zig
          action: >
            Ensure zigup run 0.16.0 build test --summary all runs
            picker_viewport tests through the existing module test step. Do not
            add a separate harness unless the existing graph cannot see the new
            pure file.
      remove: []
    implementation_slices:
      - id: 01_pure_viewport_owner
        files_allowed:
          - src/ui/picker_viewport.zig
          - src/ui/mod.zig
          - build.zig
        actions:
          - Add Viewport, VisibleRange, Scrollbar, and visibleRowsForHeight.
          - Add all pure viewport tests.
          - Export the module for tests.
        done_criteria:
          - zigup run 0.16.0 build test --summary all passes.
          - No SDL symbols appear in src/ui/picker_viewport.zig.
          - No `_ =`, `usize`, `anytype`, or anyopaque appear in added active Zig code.
          - Every Viewport method preserves the listed invariants under tests.
      - id: 02_layout_single_owner
        files_allowed:
          - src/ui/picker_viewport.zig
          - src/ui/mod.zig
          - src/ui/sdl_shell.zig
        actions:
          - Move result-list row constants and hit-test geometry to one owner.
          - Keep base-coordinate layout compatible with current scaled renderer.
          - Add point mapping tests if the math is not covered in picker_viewport.zig.
        done_criteria:
          - One search hit owns row_height and one search hit owns row_gap outside tests.
          - Drawing and pointer hit testing call the same layout math.
          - No UI framework, theme system, animation, or drag-scrollbar symbols are added.
      - id: 03_shell_viewport_adoption
        files_allowed:
          - src/ui/sdl_shell.zig
        actions:
          - Replace selected with viewport.
          - Convert refreshResults, activeResult, queueSelectedLaunch, and drawResults.
          - Render viewport.visibleRange from scroll_offset instead of first page.
          - Add drawScrollbar as passive render-only code.
        done_criteria:
          - rg finds no selected field or direct selected index math in sdl_shell.zig.
          - queueSelectedLaunch and click launch share queueLaunchAtResult.
          - drawResults indexes only checked absolute result indexes from visibleRange.
          - Empty results still draw exactly the existing no-results state.
      - id: 04_input_and_resize_wiring
        files_allowed:
          - src/ui/sdl_shell.zig
          - src/ui/picker_viewport.zig
        actions:
          - Wire SDL mouse wheel to Viewport.scrollLines.
          - Wire pointer motion to selectVisibleRow through visibleRowAtPoint.
          - Wire left click down on a visible row to queueLaunchAtResult.
          - Wire window resize and surface scale changes to visibleRowsForHeight.
          - Keep SDL_WaitEvent blocking and redraw only when dirty.
        done_criteria:
          - Wheel, hover, click, keyboard, resize, and filtering set dirty only when state changes or results change.
          - Pointer motion outside rows does not clear selection unless explicitly approved later.
          - Clicks on chrome, row gaps, scrollbar, or outside visible rows cannot launch.
          - No idle redraw loop or scheduled animation deadline is introduced.
      - id: 05_live_smoke_and_hygiene
        files_allowed:
          - .agent/history/wayspot-picker-viewport-index.yaml
        actions:
          - Run automated gates.
          - Run one live picker lifecycle with ./re-run.sh.
          - Capture manual smoke receipts in the implementation handoff, not in runtime files.
        done_criteria:
          - zigup run 0.16.0 build test --summary all passes.
          - git diff --check passes.
          - stale/scope search has only expected hits.
          - Live smoke receipts cover resize, wheel, hover, click launch, keyboard movement after scroll, and idle CPU behavior.
    final_done_definition:
      - >
        src/ui/picker_viewport.zig exists and owns all selected-row,
        scroll-offset, visible-range, row-hit, and passive-scrollbar math with
        pure tests for empty, shrink, grow, scroll, keyboard, hit-test, resize,
        and scrollbar bounds.
      - >
        src/ui/sdl_shell.zig has no stale selected/index/layout duplication:
        no selected field, no manual selected clamp, no first-page max_results
        render loop, no visible-row-to-absolute-row comparison bug, and no
        duplicate row y math outside the layout owner.
      - >
        SDL event handling supports mouse wheel scrolling, hover selection,
        click-to-launch for visible rows, and resize-aware visible row
        calculation while keeping SDL_WaitEvent blocking and dirty-only redraw.
      - >
        Rendering remains bounded by visible rows, draws the passive scrollbar
        only when needed, and never indexes results outside Viewport.visibleRange.
      - >
        The scope remains picker-local: no broad UI framework, theme system,
        animations, drag scrollbar, IPC, Hyprland change, or notification daemon
        change is present.
      - >
        Comments are exact production assertions only, with the required file
        role comments retained and no TODO/fallback/legacy/maybe-path chatter.
      - >
        Verification commands pass and live smoke receipts prove the approved
        viewport/pointer behavior in one picker lifecycle.
    verification_commands:
      automated:
        - "zigup run 0.16.0 build test --summary all"
        - "git diff --check"
        - "rg -n \"selected:|self\\.selected|max_results|TODO|todo|fallback|legacy|compatibility|maybe|for now|future|drag scrollbar|Hyprland|IPC|notification daemon\" src/ui/sdl_shell.zig src/ui/picker_viewport.zig 2>/dev/null || true"
        - "rg -n \"_ =|usize|anytype|anyopaque\" src/ui/sdl_shell.zig src/ui/picker_viewport.zig 2>/dev/null || true"
        - "rg -n \"SDL_|sdl_c|SearchService|common_dispatch|allocator\" src/ui/picker_viewport.zig"
        - "git status --short --branch"
      live_smoke:
        command: "./re-run.sh"
        expected_receipts:
          - launcher opens and sleeps until input; no visible idle redraw loop.
          - wheel down scrolls beyond the first visible page when more results exist.
          - wheel up clamps at the first result without underflow.
          - pointer hover selects only rows under the pointer.
          - pointer in chrome, gaps, and scrollbar does not launch.
          - left click on a visible row launches that exact row and exits once.
          - keyboard up/down after scroll keeps the selected row visible.
          - resizing shorter reduces visible rows and clamps offset/selection.
          - resizing taller increases visible rows without invalid blank indexes.
          - passive scrollbar appears only when total rows exceed visible rows.
    reference_lessons:
      tigerbeetle:
        - source: dev_references/style/tigerbeetle/src/stdx/bounded_array.zig
          pattern: >
            BoundedArrayType keeps count_u32 private-ish, exposes count/count_as,
            asserts index bounds in get, checks overflow before from_slice/resize,
            and fuzzes operations against a model.
          wayspot_implication: >
            Viewport must own its u32 row counts directly, expose checked access
            methods instead of raw indexing, clamp before callers index results,
            and test state transitions against illegal empty/shrink/overflow
            edges.
        - source: dev_references/style/tigerbeetle/src/queue.zig
          pattern: >
            QueueType has one small intrusive owner, push/pop/remove reset link
            state, asserts illegal membership/state, and fuzzes behavior against
            a model while checking count/empty after each action.
          wayspot_implication: >
            Picker viewport should be one owner, not selected/offset math spread
            across SDL handlers and rendering. Each input action should be a
            small state transition returning whether anything changed, with
            tests checking invariants after every transition.
      foot:
        - source: dev_references/terminals/foot/input.c
          pattern: >
            wl_pointer_motion updates pointer coordinates, maps pixels to grid
            cells near input handling, asserts row/column bounds, and triggers
            refresh only when the effective cell/button state changes.
          wayspot_implication: >
            Wayspot pointer motion should map SDL coordinates to a bounded
            visible row at the shell surface, update Viewport only on a new row,
            and set dirty only when selection changes.
        - source: dev_references/terminals/foot/input.c
          pattern: >
            mouse_scroll and wl_pointer_axis/axis_discrete aggregate wheel
            movement into bounded line counts before calling the scroll owner.
          wayspot_implication: >
            Wayspot wheel events should translate to signed row deltas and then
            call Viewport.scrollLines; no render code should interpret wheel
            events.
        - source: dev_references/terminals/foot/selection.c
          pattern: >
            selection_get_start/end and selection_on_rows explicitly distinguish
            coordinate spaces, bound rows, and assert before overlap math.
          wayspot_implication: >
            Wayspot must name visible row versus absolute result row and keep
            conversion in resultAtVisibleRow/visibleRange instead of comparing
            visible loop indexes to absolute selected indexes.
        - source: dev_references/terminals/foot/render.c
          pattern: >
            render_sixel_images checks whether an absolute row falls inside the
            visible viewport before rendering, and render_scrollback_position
            derives passive scroll indicator geometry from view/rows/populated
            counts.
          wayspot_implication: >
            drawResults should render only Viewport.visibleRange and draw a
            passive scrollbar from total/visible/offset facts. Rendering should
            not mutate viewport state or own scroll policy.
  worker_instruction: >
    Fill the required_output section with exact names, locations, owners,
    invariants, and verification commands. Do not implement code in this
    indexing task.

approval_gate:
  implementation_allowed: false
  implementation_requires:
    - required_output is filled with exact files, symbols, comments, and tests
    - reference_pressure lessons are cited as local source patterns
    - non-goals remain explicit
    - the user or coordinating agent accepts the completed index
