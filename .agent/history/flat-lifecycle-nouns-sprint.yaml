behavior_contract:
  preserve:
    - existing CLI flags, including daemon-named external flags
    - notification DBus ownership and banner dispatch
    - notification history cache/list behavior
    - wallpaper random loop and rotate-now CLI behavior
    - sunglasses overlay reconciliation and apply behavior
    - picker slash modes and restart rows
    - process visible names, under the new identity owner
  no_behavior_expansion:
    - no new modes
    - no new config schema
    - no new IPC
    - no new caches
    - no compatibility modules for old paths

behavior_receipts_required:
  cli_help:
    command: "./zig-out/bin/wayspot --help"
    proves: external CLI flags remain stable.
  picker_open_smoke:
    command: "bash -lc 'timeout 3 ./zig-out/bin/wayspot --ui; status=$?; test \"$status\" -eq 124'"
    proves: picker starts and remains alive until timeout owns shutdown.
  notification_dbus_smoke:
    command: "bash -lc 'timeout 4 ./zig-out/bin/wayspot --notifications-daemon; status=$?; test \"$status\" -eq 124'"
    proves: notification DBus path starts and remains alive.
  wallpaper_rotate:
    command: "bash -lc './zig-out/bin/wayspot --wallpaper-rotate-now; status=$?; test \"$status\" -eq 0'"
    proves: wallpaper rotate route resolves and exits zero in the current session.
  sunglasses_apply_unhappy:
    command: "bash -lc 'out=$(./zig-out/bin/wayspot --sunglasses-apply 2>&1); status=$?; test \"$status\" -eq 1 && printf \"%s\\n\" \"$out\" | rg -q \"FileNotFound\"'"
    proves: sunglasses apply route still resolves and reports missing overlay wake path.
  rerun_parse:
    command: "bash -n re-run.sh"
    proves: local helper still parses.

slices:
  "00_index_review":
    goal: Strict reviewer accepts or rejects this contract.
  "01_notification_flatten":
    goal: Move notification daemon/runtime owners to dbus/rows.
    receipts:
      - src/notification/daemon.zig deleted
      - src/notification/runtime.zig deleted
      - notification module exports use dbus and rows
  "02_wallpaper_sunglasses_flatten":
    goal: Move wallpaper runtime to loop and sunglasses runtime to overlay.
    receipts:
      - src/wallpaper/runtime.zig deleted
      - src/sunglasses/runtime.zig deleted
      - public exports use Loop and Overlay
  "03_picker_lifecycle_rows":
    goal: Rename daemon row kind/open strings/commands to lifecycle language.
    receipts:
      - Candidate.Kind has no daemon member
      - lifecycle restart row behavior preserved
  "04_identity_and_child_nouns":
    goal: Move process_identity to identity and rename child fork/wait helpers.
    receipts:
      - src/process_identity.zig deleted
      - root/main use identity
  "05_docs_memory_build":
    goal: Update build graph, README, AGENTS, packaging, re-run helper, and live memory to flattened nouns.
  "06_behavior_receipts":
    goal: Run all receipts and record expected statuses.
  "07_final_reviewer_gate":
    goal: Strict reviewer accepts the full migrated tree.

verification_floor:
  - "zigup run 0.16.0 fmt --check build.zig build.zig.zon src"
  - "zigup run 0.16.0 build test --summary all"
  - "zigup run 0.16.0 build -Doptimize=ReleaseFast"
  - "git diff --check"
  - "python -c 'import yaml; [yaml.safe_load(open(p, encoding=\"utf-8\")) for p in (\".agent/history/flat-lifecycle-nouns-sprint.yaml\", \".agent/history/sprint.yaml\", \".agent/history/current.yaml\", \".agent/history/references.yaml\")]'"
  - "test ! -e src/process_identity.zig && test ! -e src/notification/daemon.zig && test ! -e src/notification/runtime.zig && test ! -e src/wallpaper/runtime.zig && test ! -e src/sunglasses/runtime.zig"
  - "bash -lc '! rg -n \"\\b(deamon|Deamon)\\b|process_identity|notification\\.daemon|notification\\.runtime|wallpaper\\.Runtime|sunglasses\\.Runtime|\\bDaemon\\b|\\bRuntime\\b|RuntimeWake|RuntimeSignals|DaemonProcessState|needsDaemon|resolveDaemonCommand|forkProcess|waitProcess|daemonExpireTimeoutMs|\\.daemon\\b|daemon:notifications:restart|daemon:wallpapers:restart|runSunglassesDaemon|setupRuntime|processLooksLike|cmdlineLooksLike|daemonProcessState|startDaemon|stopDaemon|startDaemonAndWait|startDaemonDetached|daemonWrapperChild|execSunglassesDaemon|daemon_stop|daemon_start|max_daemon|daemon_child|daemon_wait|WallpaperDaemon|SunglassesDaemon|daemon_pids|process_has_wayspot_arg|Notification Daemon\" src build.zig README.md AGENTS.md re-run.sh packaging/systemd .agent/history/README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml'"
  - "bash -lc '! rg -n \"\\bdaemon\\b|\\bruntime\\b|\\bprocess\\b\" src README.md AGENTS.md re-run.sh packaging/systemd .agent/history/README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml | rg -v -- \"--notifications-daemon|--sunglasses-daemon|ExecStart=.*--notifications-daemon|std\\.process|std\\.c\\._exit|std\\.os\\.linux\\.pid_t|/proc|XDG_RUNTIME_DIR|runtime_dir|README.md:.*notification daemon|external/user interfaces\"'"
  - "bash -lc '! rg -n \"(^|[^A-Za-z0-9_])_\\\\s*=|\\\\busize\\\\b|\\\\banytype\\\\b|TODO\" src --glob \"*.zig\" && test \"$(rg -n \"\\\\banyopaque\\\\b\" src --glob \"*.zig\" | cut -d: -f1 | sort -u)\" = \"src/notification/dbus.zig\"'"

reviewer_gate:
  index_acceptance_questions:
    - Are daemon/runtime/process flattened to concrete owner names?
    - Are allowed external words narrow enough?
    - Are all current affected files and public symbols mapped exactly?
    - Are behavior receipts concrete?
  final_acceptance_questions:
    - Are rejected paths gone?
    - Are stale symbols/comments/live memory gone?
    - Did tests, scans, and behavior receipts pass?
    - Is there no compatibility wrapper or sideways bucket?
