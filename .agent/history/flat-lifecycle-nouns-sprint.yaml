id: flat_lifecycle_nouns
state: accepted

purpose: >
  Flatten Wayspot's remaining broad lifecycle nouns after the domain footing
  sprint. `daemon`, `runtime`, and `process` must stop being Wayspot domain
  owners. The code should name the concrete thing it owns: DBus notification
  interface, notification rows, wallpaper loop, sunglasses overlay, picker
  rows, PID files, child forks, and visible program identity.

user_goal: >
  Flatten `deamon`, `daemon`, `runtime`, and `process` nouns. This is expected
  to be mostly mechanical, but it must leave the tree with direct owner names
  rather than new sideways buckets.

stop_condition: >
  Stop only when every Wayspot-owned file, folder, symbol, comment, memory
  entry, README phrase, and build module using daemon/runtime/process as a
  domain noun has either moved to an exact concrete owner or been deleted; all
  stale names are absent from source and live memory except explicitly allowed
  external interface strings; behavior receipts pass; and the strict reviewer
  accepts the final tree.

team_protocol:
  coordinator: >
    Owns this index, activates it only after reviewer acceptance, delegates the
    implementation to one worker, and does not implement sprint code.
  planner_coder: >
    One long-lived teammate implements only the accepted index. No new behavior,
    no compatibility wrappers, no broader architecture.
  reviewer: >
    One strict teammate gates the index and final tree. Passing tests are not
    acceptance.
  report_to_user_only_for:
    - user_needed_blocker
    - sprint_complete

accepted_owner_language:
  notification:
    dbus: Freedesktop notification DBus interface and timers.
    rows: bounded in-memory notification rows shown by banners and history.
    banner: copied notification text and child banner surface.
    history_cache: JSON cache file.
    history_list: picker history rows.
  wallpaper:
    loop: monitor surfaces, random timer, rotate wake, shutdown cleanup.
    surface: per-monitor background surface.
    hyprland: monitor facts and Hyprland socket paths.
    library: image discovery.
  sunglasses:
    overlay: monitor overlay loop, apply wake, PID file, shutdown cleanup.
    state: persisted monitor filter config.
    surface: per-monitor overlay surface.
    form: picker form.
  picker:
    mode: slash index rows.
    open: selected row execution.
    candidate_kind: >
      Use concrete row kind names. The restart row kind must not be named
      daemon; prefer `lifecycle`.
  identity:
    role: visible Linux comm names for Wayspot entrypoints.

rejected_language:
  words_must_not_remain_as_wayspot_domain_nouns:
    - daemon
    - Daemon
    - deamon
    - Deamon
    - runtime
    - Runtime
    - process
    - Process
  rejected_paths:
    - src/notification/daemon.zig
    - src/notification/runtime.zig
    - src/wallpaper/runtime.zig
    - src/sunglasses/runtime.zig
    - src/process_identity.zig
  rejected_symbols:
    - Daemon
    - Runtime
    - RuntimeWake
    - RuntimeSignals
    - DaemonProcessState
    - runDaemon
    - runWallpaper
    - process_identity
    - forkProcess
    - waitProcess
    - needsDaemon
    - resolveDaemonCommand
    - daemonExpireTimeoutMs

allowed_external_interface_language:
  rule: >
    Keep these only when they are fixed external/user interfaces or standard
    library/API names. They must not leak into Wayspot owner names, file names,
    comments that describe owners, or picker row kinds.
  allowed_examples:
    - "--notifications-daemon"
    - "--sunglasses-daemon"
    - "wayspot --notifications-daemon"
    - "wayspot --sunglasses-daemon"
    - packaging/systemd ExecStart values that invoke external daemon flags
    - freedesktop phrase "notification daemon" in README only if user-facing
      compatibility wording needs it
    - std.process
    - std.c._exit
    - std.os.linux.pid_t as a literal OS type
    - /proc as a literal Linux filesystem path
    - XDG_RUNTIME_DIR as an external environment variable
    - Hyprland runtime directory field when it mirrors XDG_RUNTIME_DIR

target_tree_shape:
  required_paths:
    - src/identity.zig
    - src/notification/dbus.zig
    - src/notification/rows.zig
    - src/notification/banner.zig
    - src/notification/history_cache.zig
    - src/notification/history_list.zig
    - src/notification/preview.zig
    - src/notification/state.zig
    - src/wallpaper/loop.zig
    - src/wallpaper/surface.zig
    - src/sunglasses/overlay.zig
    - src/sunglasses/state.zig
    - src/sunglasses/surface.zig
    - src/picker/mode/notifications.zig
    - src/picker/mode/wallpaper.zig
    - src/picker/mode/sunglasses.zig
  paths_must_not_exist_after:
    - src/process_identity.zig
    - src/notification/daemon.zig
    - src/notification/runtime.zig
    - src/wallpaper/runtime.zig
    - src/sunglasses/runtime.zig

