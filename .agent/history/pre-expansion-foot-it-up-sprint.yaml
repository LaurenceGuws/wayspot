id: pre_expansion_foot_it_up
state: active

goal:
  summary: >
    Shrink and simplify Wayspot before any Hyprland IPC wallpaper daemon work.
    The sprint prepares the codebase for expansion by making current owners
    smaller, shallower, and better proven.
  expansion_not_started: true

engineering_bias:
  order:
    - safety
    - small_direct_pragmatic_code
    - foot_style_surface_ownership
    - tigerbeetle_style_bounded_state_and_cleanup
    - character_reduction_when_it_preserves_the_above

scope:
  in:
    - delete unreferenced runtime silhouettes
    - reduce src character count without hiding behavior
    - flatten names and owners that no longer earn their abstraction
    - add or sharpen production comments only where ownership would otherwise be ambiguous
    - keep CLI launcher, notification daemon, icon diagnostics, and manual icon refresh working
  out:
    - Hyprland IPC wallpaper daemon
    - new resident launcher IPC
    - broad surface abstraction
    - theme system
    - provider framework expansion
    - cache or performance work without direct shape proof

baseline:
  src_lines: 6742
  src_zig_chars: 250448
  largest_files:
    - src/ui/sdl_shell.zig
    - src/notifications/dbus_daemon.zig
    - src/ui/picker_viewport.zig
    - src/providers/apps.zig
    - src/ui/sdl_text.zig
    - src/ui/app_icons.zig

first_slice:
  id: remove_unreferenced_app_shell_silhouette
  state: completed
  deletes:
    - src/app/state.zig
    - src/app/bootstrap.zig
    - src/ui/common/commands.zig
  changes:
    - src/app/mod.zig
  reason:
    - AppState and bootstrap were not referenced by the CLI, picker, notifications, or diagnostics.
    - ui/common/commands.zig was not wired into any input path.
    - These files preserved framework shape without product behavior.
  receipt:
    src_lines_after: 6690
    src_zig_chars_after: 249079
    removed_lines: 52
    removed_zig_chars: 1369
    verification:
      - zigup run 0.16.0 build test --summary all
      - git diff --check
      - banned active Zig pattern scan, with only existing GLib anyopaque boundary hits

next_candidate_slices:
  - id: provider_registry_flattening_review
    state: completed
    likely_files:
      - src/providers/registry.zig
      - src/providers/mod.zig
      - src/app/search_service.zig
      - src/main.zig
    question: >
      Decide whether the fixed app/action provider registry earns its file and
      union, or whether SearchService should directly own the two providers.
    decision: >
      SearchService directly owns optional actions and apps provider pointers.
      The registry file and provider union did not earn their abstraction for a
      fixed two-provider launcher.
    receipt:
      src_lines_after: 6646
      src_zig_chars_after: 247473
      removed_lines_since_previous_slice: 44
      removed_zig_chars_since_previous_slice: 1606
      verification:
        - zigup run 0.16.0 build test --summary all
  - id: icon_tooling_boundary_review
    likely_files:
      - src/ui/app_icon_diag.zig
      - src/ui/app_icon_cache.zig
      - src/ui/app_icons.zig
      - src/main.zig
    question: >
      Keep diagnostics and manual SVG refresh as approved CLI tools, but remove
      any repeated resolver or receipt scaffolding that can be made smaller.
  - id: notification_daemon_comment_and_boundary_review
    likely_files:
      - src/notifications/dbus_daemon.zig
      - src/notifications/state.zig
      - src/notifications/runtime.zig
    question: >
      Keep the freedesktop surface spec-complete, but make GLib boundary comments
      exact and delete non-boundary commentary.
  - id: picker_surface_owner_review
    likely_files:
      - src/ui/sdl_shell.zig
      - src/ui/picker_viewport.zig
      - src/ui/sdl_text.zig
    question: >
      Preserve foot-style direct surface ownership while removing duplicated draw
      style construction and stale geometry helpers.

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - stale runtime vocabulary scan

checkpoint_receipt:
  id: first_two_shrink_slices
  state: completed
  src_lines_after: 6646
  src_zig_chars_after: 247473
  total_removed_lines: 96
  total_removed_zig_chars: 2975
  committed_scope:
    - removed unused app state and bootstrap files
    - removed unused UI command parser
    - deleted fixed provider registry and provider union
    - SearchService directly owns optional app and action providers
    - live sprint memory now points at this prep sprint
  verification:
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build -Doptimize=ReleaseFast
    - zigup run 0.16.0 fmt --check touched Zig files
    - git diff --check
    - banned active Zig pattern scan, with only existing GLib anyopaque boundary hits
    - RERUN_UI=false ./re-run.sh
    - timeout 4s ./zig-out/bin/wayspot --ui
    - ./zig-out/bin/wayspot --icon-diag
    - notify-send smoke through refreshed daemon

stop_conditions:
  - deletion changes product behavior without an explicit replacement
  - an abstraction seems removable but ownership becomes less obvious
  - a future Hyprland IPC decision is required
  - a slice cannot prove smaller code and equal behavior
