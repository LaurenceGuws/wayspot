handover:
  - Use hyprctl layers, not hyprctl clients, to receipt sunglasses surfaces.
  - Transparent or disabled sunglasses state may produce no visible tint even
    when apply succeeds.
  - Keep form monitor names tied to live Hyprland monitor names before adding
    profiles, presets, schedules, or any richer color model.
