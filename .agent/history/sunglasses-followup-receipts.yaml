cli_receipts:
  - name: missing_daemon
    command: XDG_RUNTIME_DIR=temp ./zig-out/bin/wayspot --sunglasses-apply
    result: exit_1
  - name: stale_pid
    command: pid_file_contains_1 ./zig-out/bin/wayspot --sunglasses-apply
    result: exit_1_and_pid_file_removed
  - name: live_daemon_apply
    command: ./zig-out/bin/wayspot --sunglasses-daemon plus ./zig-out/bin/wayspot --sunglasses-apply
    result: exit_0
  - name: enabled_overlay_layers
    command: hyprctl layers -j
    result: two wayspot-sunglasses layer namespaces while daemon is alive and zero after cleanup
  - name: disabled_missing_daemon_reconcile
    command: ./zig-out/bin/wayspot --sunglasses-reconcile with disabled saved state and no sunglasses.pid
    result: status_0_no_pid_no_layers_no_stderr
  - name: disabled_stale_pid_reconcile
    command: ./zig-out/bin/wayspot --sunglasses-reconcile with disabled saved state and sunglasses.pid containing 1
    result: status_0_pid_file_removed_no_stderr
  - name: enabled_state_reconcile
    command: ./zig-out/bin/wayspot --sunglasses-reconcile with dim enabled on HDMI-A-1 and red_blue enabled on DP-1
    result: status_0_pid_3818738_two_wayspot_sunglasses_layers_no_stderr
  - name: disabled_state_stops_live_daemon
    command: ./zig-out/bin/wayspot --sunglasses-reconcile after writing disabled saved state
    result: status_0_pid_removed_zero_wayspot_sunglasses_layers_no_stderr
  - name: restored_enabled_state_reconciled
    command: ./zig-out/bin/wayspot --sunglasses-reconcile after restoring original saved state
    result: status_0_pid_3818886_two_wayspot_sunglasses_layers_no_stderr
  - name: enabled_live_daemon_reconcile_wakes
    command: ./zig-out/bin/wayspot --sunglasses-reconcile with restored enabled state and live daemon
    result: status_0_pid_before_3818886_pid_after_3818886_two_wayspot_sunglasses_layers_no_stderr
  - name: concurrent_enabled_reconcile_does_not_duplicate_daemon
    command: three concurrent ./zig-out/bin/wayspot --sunglasses-reconcile processes with enabled saved state and no pid file
    result: statuses_0_0_0_daemon_count_1_pid_3820324_two_wayspot_sunglasses_layers_no_stderr
  - name: enabled_start_then_disabled_reconcile_stops_booting_daemon
    command: start enabled ./zig-out/bin/wayspot --sunglasses-reconcile, then 10ms later write disabled state and run a second reconcile
    result: start_status_0_stop_status_0_daemon_count_0_pid_absent_zero_wayspot_sunglasses_layers_no_stderr
  - name: restored_enabled_state_after_review_fix
    command: ./zig-out/bin/wayspot --sunglasses-reconcile after restoring original saved state
    result: status_0_daemon_count_1_pid_3820561_two_wayspot_sunglasses_layers_no_stderr
  - name: stale_enabled_snapshot_cannot_start_after_disabled_save
    command: hold sunglasses.reconcile.lock, write enabled state, launch blocked reconcile, write disabled state, release lock
    result: status_0_daemon_count_0_pid_absent_zero_wayspot_sunglasses_layers_no_stderr
  - name: restored_enabled_state_after_locked_state_read
    command: ./zig-out/bin/wayspot --sunglasses-reconcile after restoring original saved state
    result: status_0_daemon_count_1_pid_3822327_two_wayspot_sunglasses_layers_no_stderr

visual_receipts:
  - /tmp/wayspot-row-alignment-after.png
