id: sunglasses_followup_receipts
date: 2026-07-04
status: completed

purpose: >
  Pin the post-foundation fixes that made /sunglasses feel real instead of
  visually present but operationally inert.

fixed_failures:
  - name: form_state_targeted_default_monitor
    assertion: >
      Picker form state is normalized to current Hyprland monitor names before
      rendering, so saves target daemon-owned monitor slots such as HDMI-A-1
      instead of a legacy default placeholder.
  - name: stale_pid_detection_was_too_loose
    assertion: >
      --sunglasses-apply only treats a PID as live when proc cmdline has a
      wayspot argv basename and a separate --sunglasses-daemon argv.
  - name: row_text_was_bottom_heavy
    assertion: >
      Picker result rows center the title/subtitle block inside row geometry,
      and sunglasses form rows center their single-line labels inside the row.
  - name: runtime_lifecycle_followed_effective_state
    assertion: >
      Sunglasses state owns the pure effective-filter predicate, and runtime
      reconciliation starts or wakes the daemon when any saved filter is
      effective, stops it when none are effective, and removes stale pid files.
  - name: reconcile_start_gap_was_serialized
    assertion: >
      Runtime reconciliation holds one runtime-dir lock while reading process
      state, starting and waiting for pid publication, waking, or stopping, so
      concurrent toggles cannot duplicate a daemon or miss a daemon still
      booting.
  - name: reconcile_state_read_moved_under_lock
    assertion: >
      Runtime reconciliation loads the saved sunglasses state after acquiring
      the same runtime-dir lock that owns PID/process decisions, so a queued
      stale enabled caller cannot restart a daemon after a later disabled save.
  - name: reconcile_cli_kept_out_of_product_help
    assertion: >
      --sunglasses-reconcile remains a hidden repair and receipt hook; the
      public usage line does not advertise it as product surface.

