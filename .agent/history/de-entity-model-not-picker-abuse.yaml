    files:
      create: [src/env/mod.zig, src/env/monitor.zig, src/env/workspace.zig, src/env/window.zig, src/env/state.zig]
      avoid_create: [src/env/session.zig, src/env/display.zig, src/env/common.zig, src/env/types.zig, src/env/shared.zig]
  - id: "05_monitor_fact_boundary"
    state: complete
    goal: Isolate SDL-backed facts behind monitor-owned names.
  - id: "06_hyprland_fact_boundary"
    state: complete
    goal: Move Hyprland IPC/JSON/event ownership into env/hyprland.zig for dumb facts.
  - id: "07_state_snapshot_usage"
    state: complete
    goal: Prove current code uses dumb env facts correctly.
  - id: "08_process_tree_alignment"
    state: complete
    goal: Align ownership vocabulary with process/picker/mode tree.
  - id: "09_product_rewire_to_env_facts"
    state: complete
    goal: Product domains consume env facts without direct Hyprland coupling.
  - id: "10_sunglasses_runtime_config_after_domain"
    state: complete
    goal: Fix image path as concrete sunglasses runtime config after env facts are clean.
  - id: "11_docs_alignment"
    state: complete
    goal: Align README after implementation truths exist.
  - id: "12_verification_and_final_review"
