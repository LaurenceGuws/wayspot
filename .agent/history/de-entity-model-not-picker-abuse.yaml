      create: [.agent/history/de-entity-model-not-picker-abuse.yaml]
      change: [.agent/history/sprint.yaml, .agent/history/current.yaml, .agent/history/references.yaml]
    stop_conditions: [activation_not_done, yaml_validation_fails]
  - id: "03_reference_domain_lock"
    state: complete
    goal: Lock vocabulary and source boundaries.
  - id: "04_env_entity_scaffold"
