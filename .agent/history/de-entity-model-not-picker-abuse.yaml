rg_scans:
  imports:
    - "rg -n '@import\\(\".*hyprland\\.zig\"\\)' src --glob '*.zig'"
    - "rg -n 'wallpaper/hyprland|\\.\\./wallpaper/hyprland|hyprctl|HYPRLAND_INSTANCE_SIGNATURE|socket2|\\.socket\\.sock' src --glob '*.zig'"
    - "rg -n '@import\\(\".*env/hyprland\\.zig\"\\)' src/picker src/wallpaper src/sunglasses src/notification --glob '*.zig'"
  forbidden_shape:
    - "find src -path '*/common*' -o -path '*/shared*' -o -path '*/types*'"
    - "find src/env -maxdepth 1 -type f \\( -iname 'display.zig' -o -iname 'sdl*.zig' -o -iname '*sdl*.zig' \\)"
    - "rg -n '\\bprovider(s)?\\b|\\bProvider(s)?\\b' src README.md build.zig build.zig.zon"
    - "find src -type f \\( -iname '*search*' -o -path '*/search/*' \\)"
    - "rg -n '\\b(Search|Search[A-Z][A-Za-z0-9_]*|[A-Za-z0-9_]*Search)\\b' src --glob '*.zig'"
    - "rg -n '\\bsearch\\b' src README.md build.zig build.zig.zon --glob '*.zig' --glob '*.md' --glob '!src/picker/rank.zig' --glob '!src/picker/query.zig'"
    - "rg -n 'pub (const|fn|var) (sdl_|Sdl[A-Z][A-Za-z0-9_]*|SDL[A-Z][A-Za-z0-9_]*)' src/env src/picker src/wallpaper src/sunglasses src/notification --glob '*.zig'"
    - "rg -n 'pub (const|fn|var) ([A-Za-z0-9_]*Display[A-Za-z0-9_]*|display[A-Za-z0-9_]*)' src/env src/picker src/wallpaper src/sunglasses src/notification --glob '*.zig'"

