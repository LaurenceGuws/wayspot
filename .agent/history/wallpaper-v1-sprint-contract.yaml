status: in_progress
purpose: >
  Define the exact wallpaper v1 execution contract so implementation can start
  from a bounded Wayspot-owned SDL lifecycle proof without restoring broad
  compositor, provider, or wallpaper backend surfaces.

sources_read:
  memory:
    - AGENTS.md
    - .agent/history/README.md
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
    - .agent/history/wayspot-scope-map.yaml
    - .agent/history/wayspot-surface-scale-index.yaml
    - .agent/history/hyprland-direct-surface-discovery.yaml
  local_docs:
    - dev_references/hyprland/pages/ipc.md
    - dev_references/hyprland/pages/dispatchers.md
    - dev_references/hyprland/pages/window-rules.md

decision:
  noun: wallpaper
  backend: SDL_custom_Wayland_surface_with_wlr_layer_shell_background
  summary: >
    Wallpaper v1 owns one SDL custom-role Wayland surface per active Hyprland
    monitor, assigns each surface the wlr-layer-shell background layer before
    the first buffer, renders still images, alternates on one random
    timer, and shuts down by the owner that created the surfaces.
  rejected_probe: .agent/history/hyprland-direct-surface-discovery.yaml

hard_scope:
  in:
    - one Wayspot-owned SDL custom Wayland layer surface per active monitor
    - Hyprland monitor list and resolution query
    - wlr-layer-shell background layer with per-monitor output binding
    - still images only
    - image library discovery from one configured path
    - one mode: random alternating timer
    - initial image index records only path, byte size, mtime, format, width, and height
    - lifecycle and footprint proof before decode or discovery
  out:
    - hyprpaper runtime backend
    - resident launcher IPC
    - broad WM abstraction
    - workspace, window, or web providers
    - shell module surface
    - runtime scripting VM
    - animation, video, transitions, playlists, tags, ratings, and UI controls
    - multi-mode scheduling
    - top z-order overlay behavior
    - monitor_glasses implementation

future_nouns:
  monitor_glasses:
    status: named_future_only
    rule: >
      Monitor glasses may share direct Hyprland window mechanics later, but it
      uses overlay placement such as top z-order and is not part of wallpaper v1.

hyprland_contract:
  monitor_query:
    request: j/monitors
    transport: Hyprland request socket
    required_fields:
      - name
      - x
      - y
      - width
      - height
      - scale
      - focused
    bound: reject monitor JSON responses larger than 1 MiB
    dev_probe_equivalent: hyprctl monitors -j
  request_socket:
    source_doc: dev_references/hyprland/pages/ipc.md
    invariant: >
      Open the request socket immediately before each write/read and close it
      immediately after, because unclosed synchronous connections can freeze
      Hyprland until its timeout.
  event_socket:
    source_doc: dev_references/hyprland/pages/ipc.md
    v1_policy: >
      Hold socket2 open only in wallpaper daemon mode through one
      Runtime-owned monitor watcher after the static lifecycle, image index,
      decode, and cleanup paths are proven.
    accepted_events_when_added:
      - monitoradded
      - monitoraddedv2
      - monitorremoved
      - monitorremovedv2
      - focusedmon
      - focusedmonv2
  corrected_layer_shell_invariant:
    source_docs:
      - dev_references/hyprland/pages/window-rules.md#layer-rules
      - dev_references/sdl/sdlwiki_md/SDL3/README-wayland.md
      - /home/home/personal/projects/howl/utils/dev_references/terminals/kitty/glfw/wlr-layer-shell-unstable-v1.xml
    rule: >
      Wallpaper proof uses SDL_CreateWindowWithProperties with
      SDL_PROP_WINDOW_CREATE_WAYLAND_SURFACE_ROLE_CUSTOM_BOOLEAN, obtains the
      SDL wl_display and wl_surface, creates a zwlr_layer_surface_v1 on the
      background layer for the matching wl_output, performs the required
      no-buffer initial commit/configure/ack sequence, and only then lets SDL
      render. Normal XDG toplevel windows plus Hyprland alter_zorder bottom are
      rejected because the live proof covered tiled windows.
  latest_proof_result:
    date: 2026-07-04
    receipt_dir: /tmp/wayspot-wallpaper-shm-proof-20260704-195903
    result: accepted_lifecycle_proof
    facts:
      - process_exited_0
      - hyprctl_layers_during_showed_two_wayspot_wallpaper_layer_surfaces
      - hyprctl_layers_after_one_second_showed_zero_wayspot_wallpaper_layer_surfaces
      - hyprctl_clients_during_showed_zero_wayspot_wallpaper_xdg_clients
      - stderr_error_scan_showed_no_wayland_protocol_errors
      - screenshot_showed_existing_tiled_clients_above_the_background_surface
    corrected_render_invariant: >
      The lifecycle proof uses one C-owned wl_shm solid-color buffer per
      surface. SDL_Renderer is rejected for the proof because it created a
      replacement XDG toplevel surface after the layer role was configured.

configuration_contract:
  file: ~/.config/wayspot/wallpaper.conf
  max_file_bytes: 4096
  required_keys:
    library_path: absolute directory path
    interval_seconds: integer clamped to 30..86400
  defaults:
    interval_seconds: 900
  invalid_policy: >
    Invalid or missing configuration prevents wallpaper mode from starting and
    exits with a clear error before SDL or Hyprland state is retained.
  no_environment_surface: >
    Do not add runtime flag scattering. Any development override belongs in
    .rerun.env or re-run.sh only if the coordinator approves it.

proposed_runtime_files:
  add:
    src/wallpaper/mod.zig:
      role: module export surface
      symbols:
        - pub const Runtime
        - pub const Config
        - pub const Monitor
      exact_file_comment: "//! Wallpaper owns bounded per-monitor SDL surfaces and Hyprland placement."
    src/wallpaper/config.zig:
      role: read and validate wallpaper.conf
      symbols:
        - pub const Config
        - pub fn load
        - pub fn deinit
      exact_file_comment: "//! Wallpaper configuration admits one image library path and one bounded timer."
    src/wallpaper/hyprland.zig:
      role: monitor facts and short Hyprland request helpers
      symbols:
        - pub const Monitor
        - pub fn queryMonitors
      exact_file_comment: "//! Hyprland access is short-lived request I/O for monitor facts."
      required_boundary_comment: "/// Open, write, read, and close each Hyprland request without retaining the synchronous socket."
    src/wallpaper/runtime.zig:
      role: top-level wallpaper lifecycle owner
      symbols:
        - pub const Runtime
        - pub const SurfaceSlot
        - pub fn run
        - pub fn deinit
      exact_file_comment: "//! Wallpaper runtime owns monitor surface slots, the random timer, and shutdown order."
      required_boundary_comment: "/// Each surface slot is created once for one monitor generation and destroyed by Runtime.deinit."
    src/wallpaper/library.zig:
      role: bounded still-image discovery and random selection
      symbols:
        - pub const ImageRecord
        - pub const Library
        - pub fn scan
        - pub fn chooseRandom
      exact_file_comment: "//! Wallpaper library discovery keeps a bounded still-image index from one configured directory."
    src/wallpaper/image_info.zig:
      role: image header resolution probe without full decode after lifecycle proof
      symbols:
        - pub const Format
        - pub const ImageInfo
        - pub fn readInfo
      exact_file_comment: "//! Image info reads only enough header bytes to index still-image resolution."
    src/ui/sdl_wallpaper_surface.zig:
      role: SDL custom Wayland layer surface and one proof wl_shm buffer for one monitor
      symbols:
        - pub const WallpaperSurface
        - pub fn init
        - pub fn drawSolidProof
        - pub fn drawImage
        - pub fn deinit
      exact_file_comment: "//! SDL wallpaper surface owns one layer-shell surface and one proof shm buffer."
      required_boundary_comment: "/// The surface does not own image discovery, Hyprland IPC, or process lifetime."
  modify:
    src/root.zig:
      - export pub const wallpaper = @import("wallpaper/mod.zig")
    src/main.zig:
      - add dev-only --wallpaper-lifecycle-proof for the first lifecycle slice
      - add --wallpaper only after lifecycle proof, config, and image index are accepted
      - update usage string with wallpaper mode after the runtime slice lands
    src/ui/mod.zig:
      - export pub const sdl_wallpaper_surface = @import("sdl_wallpaper_surface.zig")
    src/c/sdl.h:
      - include only SDL and Wayland APIs needed for owned custom surfaces, proof shm buffers, and later image load
    build.zig:
      - no new dependency for first lifecycle proof
      - add an image decode dependency only after image header/index proof shows SDL built-ins are insufficient
  remove: []

first_implementation_slice:
  id: wallpaper_lifecycle_proof
  objective: >
    Prove one SDL custom Wayland layer-shell wallpaper surface per current
    Hyprland monitor can be created, configured on the background layer, kept
    alive on a sleeping timer, and cleaned up once without decoding images or
    scanning a library.
  allowed_runtime_files:
    - src/main.zig
    - src/root.zig
    - src/ui/mod.zig
    - src/ui/sdl_wallpaper_surface.zig
    - src/wallpaper/mod.zig
    - src/wallpaper/hyprland.zig
    - src/wallpaper/runtime.zig
    - src/c/sdl.h
    - build.zig
  explicit_non_goals:
    - no image decode
    - no library scan
    - no config parser unless needed to select lifecycle duration
    - no socket2 monitor-change loop
    - no timer randomization
  behavior:
    - query monitors once
    - allocate a fixed bounded array of monitor surface slots
    - create one SDL custom-role Wayland surface per monitor with a unique title
    - bind each SDL wl_surface to wlr-layer-shell background layer before rendering
    - draw a deterministic solid color per monitor
    - sleep on SDL wait/event timeout or a bounded deadline
    - close all surfaces through their owner and verify no matching layer remains
  bounds:
    max_monitors: 8
    max_hypr_response_bytes: 1048576
    max_client_match_attempts: 40
    client_match_sleep_ms: 100
    proof_runtime_seconds: 10
  coordinator_approved_choices:
    source_folder: src/wallpaper
    first_cli: --wallpaper-lifecycle-proof
    image_formats: deferred_until_after_lifecycle_proof
  acceptance_receipts:
    - hyprctl monitors -j output captured in a local receipt
    - hyprctl layers -j during proof shows wayspot-wallpaper background layer surfaces if Hyprland reports them
    - hyprctl layers -j after cleanup shows zero retained wayspot-wallpaper layers after shutdown
    - screenshot or compositor visual receipt shows normal windows above the solid proof surface

later_slices:
  - id: wallpaper_config_and_library_index
    status: completed
    result: >
      Read wallpaper.conf, scan one configured directory, and retain a bounded
      index of still image records with resolution only.
    allowed_new_files:
      - src/wallpaper/config.zig
      - src/wallpaper/library.zig
      - src/wallpaper/image_info.zig
    bounds:
      max_images: 4096
      max_path_bytes: 4096
      max_directory_entries: 16384
      max_header_read_bytes: 65536
  - id: wallpaper_decode_and_draw
    status: completed
    result: >
      Decode one chosen still image per monitor, copy cover-cropped pixels into
      the Wayspot-owned shm buffer, and commit the existing layer surface.
    rule: decode only after the lifecycle and index are accepted
    corrected_surface_rule: >
      Do not add SDL_Renderer, SDL_Texture, or a render cache for wallpaper.
      SDL may decode image files, but layer-shell presentation stays owned by
      WallpaperSurface through one shm buffer per monitor surface.
  - id: wallpaper_random_timer
    status: completed
    result: >
      Replace images on one bounded random alternating timer while CPU sleeps
      between timer deadlines, SDL events, and shutdown.
    accepted_runtime:
      cli: --wallpaper
      receipt: /tmp/wayspot-wallpaper-daemon-smoke-20260704-205249
      config_source: ~/.config/wayspot/wallpaper.conf
      mode: one random alternating timer
      startup_order:
        - load wallpaper config
        - scan configured library
        - reject empty library before starting SDL
        - query Hyprland monitors
        - create one background layer surface per monitor
        - draw one random image per surface
        - sleep until SDL event, shutdown, or next interval deadline
        - wake on SIGINT or SIGTERM and clean up through Runtime.deinit
      rejected_runtime_shape:
        - no cache
        - no socket2 monitor-change handling
        - no playlist_or_mode_model
        - no broad_surface_framework
  - id: wallpaper_monitor_change_events
    status: completed
    result: >
      Added one bounded socket2 monitor watcher. Monitor add/remove wakes the
      SDL loop and rebuilds surface slots from a fresh monitor query. Focused
      monitor events wake and drain without rebuilding because wallpaper v1
      already owns one background surface per monitor.
    accepted_runtime:
      receipt: /tmp/wayspot-wallpaper-final-smoke-20260704-205941
      owner: src/wallpaper/runtime.zig:MonitorWatcher
      event_stream: src/wallpaper/hyprland.zig:EventStream
      wake_policy:
        - socket2_monitor_events_push_one_sdl_user_event
        - runtime_sleeps_until_sdl_event_shutdown_timer_deadline_or_monitor_event
        - socket2_unavailable_prevents_wallpaper_daemon_start
      rebuild_policy:
        - monitoradded_monitoraddedv2_monitorremoved_monitorremovedv2_rebuild_surface_slots
        - focusedmon_focusedmonv2_do_not_rebuild_per_monitor_wallpaper_surfaces
      rejected_runtime_shape:
        - no_event_bus
        - no_monitor_glasses
        - no_cache

invariants:
  - every monitor surface has exactly one Runtime-owned SurfaceSlot
  - every SDL window, layer role, shm buffer, decoded surface, and allocated path is cleaned up once
  - every wallpaper proof surface is a Wayland layer-shell background surface, not an XDG toplevel window
  - every loop has a bound or sleeps on an explicit event/deadline
  - Hyprland request sockets are never retained across operations
  - socket2 is owned only by wallpaper daemon monitor-change handling
  - no runtime path invokes hyprpaper
  - no runtime path uses kitty or any stand-in terminal
  - monitor_glasses remains a named future noun only
  - comments in new files are ownership assertions, not roadmap text
  - active Zig code still avoids discard assignment, usize, anytype, and anyopaque

tests_and_smokes:
  yaml_memory:
    - parse .agent/history/wallpaper-v1-sprint-contract.yaml
    - parse .agent/history/sprint.yaml
    - parse .agent/history/references.yaml
  first_slice_unit_tests:
    - hyprland monitor JSON parser accepts required fields
    - hyprland monitor JSON parser rejects oversized and malformed responses
    - SurfaceSlot deinit tolerates partially initialized construction
  later_unit_tests:
    - config parser accepts absolute library_path and bounded interval_seconds
    - config parser rejects relative path, oversized file, missing path, and invalid interval
    - image_info reads PNG and BMP dimensions from bounded headers
    - library scan applies extension allowlist and max_images bound
  build_floor:
    - zigup run 0.16.0 build test --summary all
    - zigup run 0.16.0 build -Doptimize=ReleaseFast
    - zigup run 0.16.0 fmt --check touched Zig files
    - git diff --check
    - banned active Zig pattern scan
  visual_receipts:
    - lifecycle proof screenshot with a regular window above the wallpaper surface
    - hyprctl layers -j receipt for wayspot-wallpaper background layer surfaces
    - post-shutdown layers receipt showing no wayspot-wallpaper layers
  rerun_receipts:
    - command: RERUN_UI=false RERUN_NOTIFICATIONS=false ./re-run.sh
      result: >
        Rebuilt ReleaseFast, synced ~/.local/bin/wayspot, skipped notifications
        and picker, stopped old wallpaper pid 3894662, started
        /home/home/.local/bin/wayspot --wallpaper, and printed wallpaper daemon
        pid 3894823 after bounded PID publication wait.
    - command: 'ps -o pid,comm,args -p "$(cat "$XDG_RUNTIME_DIR/wayspot/wallpaper.pid")"'
      result: pid_3894823_comm_wayspot-wall_args_/home/home/.local/bin/wayspot_--wallpaper

stop_conditions:
  - SDL custom-role window creation cannot expose a roleless wl_surface before rendering
  - wlr-layer-shell is unavailable on the compositor running the proof
  - per-monitor wl_output names cannot be matched to Hyprland monitor names
  - cleanup requires compositor guessing, process killing, or retained orphan cleanup
  - image decode requires a large new vendor surface before lifecycle and index are accepted
  - monitor-change handling cannot be bounded without broad compositor state
  - implementation pressure starts creating a generic surface framework before wallpaper has one real owner
