id: sunglasses_foundations
state: approved

purpose: >
  Build /sunglasses v1 without reviving the old personal shell platform.
  The subsystem earns its shape because it has a form owner, persisted runtime
  state, and a resident per-monitor surface owner.

product_v1:
  mode:
    name: /sunglasses
    behavior: opens_form_pane_not_list
  controls:
    per_monitor:
      red_blue:
        enabled: boolean_toggle
        value: bounded_slider
        direction: negative_blue_zero_none_positive_red
        zero: no_tint
      dim:
        enabled: boolean_toggle
        value: bounded_black_slider
        zero: transparent
        full: black_at_1_0_opacity
  apply:
    - form changes persist bounded state
    - form changes wake sunglasses daemon
    - daemon redraws one overlay buffer per monitor

non_goals:
  - no schedules
  - no sunrise or geolocation
  - no color temperature math beyond v1 tint
  - no animation
  - no saved monitor-specific profiles beyond current per-monitor values
  - no plugin registry
  - no generic compositor abstraction
  - no scripting VM

owner_shape:
  add:
    src/sunglasses/mod.zig:
      owns:
        - public sunglasses subsystem exports
    src/sunglasses/state.zig:
      owns:
        - bounded per-monitor filter state
        - state parse and serialize
        - clamp rules
        - tiny persisted file
    src/sunglasses/runtime.zig:
      owns:
        - daemon lifecycle
        - monitor event wake
        - apply wake
        - one overlay slot per monitor
        - exact cleanup order
    src/ui/sdl_sunglasses_surface.zig:
      owns:
        - one pass-through overlay layer-shell surface
        - one attached tint shm buffer
        - redraw from sunglasses state
    src/ui/sunglasses_form.zig:
      owns:
        - form layout
        - focused control
        - toggle hit testing
        - slider hit testing
        - keyboard adjustments
        - rendering facts for the picker pane
  modify:
    src/providers/modes.zig:
      - add /sunglasses mode row
      - add sunglasses daemon restart row only if a daemon mode is later needed
    src/search/query.zig:
      - parse /sunglasses route
    src/search/rank.zig:
      - keep /sunglasses as a mode row and not a default app result
    src/ui/sdl_shell.zig:
      - detect sunglasses form route
      - route events to sunglasses_form while active
      - render form instead of result rows while active
      - persist and signal state changes
    src/ui/common/kinds.zig:
      - no change unless new candidate kind becomes unavoidable
    src/c/sdl.h:
      - expose pass-through input-region and tint-buffer C helpers only if needed
    src/c/wayspot_layer_shell.c:
      - add wl_compositor ownership if empty input regions require it
      - add ARGB tint shm buffer creation
    src/main.zig:
      - add --sunglasses-daemon
      - add tiny apply signal command if form and daemon cannot share process state
    /home/home/.config/hypr/modules/session.lua:
      - start sunglasses daemon after runtime proof
      - remove hyprsunset only after sunglasses effect is visually proven
    /home/home/personal/bash_engine/dots/hypr/modules/session.lua:
      - mirror the same session startup change after proof

state_contract:
  path: ~/.local/state/wayspot/sunglasses.conf
  max_file_bytes: 2048
  format:
    - monitor=<monitor_name>
    - red_blue_enabled=<0_or_1>
    - red_blue_value=<signed_decimal>
    - dim_enabled=<0_or_1>
    - dim_value=<unsigned_decimal>
    - repeated once per retained monitor
  bounds:
    max_monitors: hyprland.max_monitors
    red_blue_value_min: -100
    red_blue_value_zero: 0
    red_blue_value_max: 100
    dim_value_min: 0
    dim_value_zero_alpha: 0.0
    dim_value_max: 100
    dim_value_max_alpha: 1.0
  invalid_state_policy: use defaults and rewrite only after accepted form input

surface_contract:
  layer: overlay
  namespace: wayspot-sunglasses
  per_monitor_bound: hyprland.max_monitors
  interactivity:
    keyboard: none
    pointer: empty_input_region_required
  buffer:
    format: argb8888
    content: >
      Uniform per-monitor overlay. Red/blue is a signed tint where zero has no
      effect, negative values tint blue, and positive values tint red. Dim is a
      black alpha overlay where zero is transparent and full is 1.0 opacity.
    cleanup: previous buffer destroyed after replacement is committed

form_contract:
  controls:
    - monitor_selector
    - selected_monitor_red_blue_toggle
    - selected_monitor_red_blue_slider
    - selected_monitor_dim_toggle
    - selected_monitor_dim_slider
  keyboard:
    - tab_or_shift_tab_moves_focus
    - space_toggles_boolean_control
    - left_right_adjusts_slider
    - escape_closes_picker
  pointer:
    - clicking_toggle_flips_boolean
    - clicking_or_dragging_slider_sets_bounded_value
  apply_policy:
    - every accepted change persists state
    - every accepted change wakes daemon once
    - form redraw is dirty only after monitor selection, state, or focus changes
    - daemon redraw only changes surfaces for monitors whose state changed

implementation_slices:
  - id: 01_state_owner
    state: completed
    files:
      - src/sunglasses/mod.zig
      - src/sunglasses/state.zig
      - src/root.zig
    proof:
      - unit tests for defaults, clamp, parse, malformed, oversized, serialize
      - bounded ensure-monitor owner API for later form mutation
    receipts:
      - zigup run 0.16.0 fmt --check src/root.zig src/sunglasses/mod.zig src/sunglasses/state.zig
      - zigup run 0.16.0 build test --summary all
      - zigup run 0.16.0 build -Doptimize=ReleaseFast
      - git diff --check
      - banned active Zig pattern scan over touched Zig files
  - id: 02_form_owner_no_effect
    state: completed
    files:
      - src/ui/sunglasses_form.zig
      - src/ui/sdl_shell.zig
      - src/providers/modes.zig
      - src/search/query.zig
      - src/search/rank.zig
    proof:
      - /sunglasses mode opens form
      - form controls mutate bounded state in memory
      - default app search remains app list
    receipts:
      - zigup run 0.16.0 fmt --check src/sunglasses/state.zig src/ui/sunglasses_form.zig src/ui/sdl_shell.zig src/providers/modes.zig src/search/query.zig src/search/rank.zig src/app/search_service.zig
      - zigup run 0.16.0 build test --summary all
      - git diff --check
      - 'rg -n "(_ =|\busize\b|\banytype\b|\banyopaque\b)" src/sunglasses/state.zig src/ui/sunglasses_form.zig src/ui/sdl_shell.zig src/providers/modes.zig src/search/query.zig src/search/rank.zig src/app/search_service.zig'
      - click pointer support included for toggles and slider set
      - active form text input is ignored because this slice has no text field
      - pointer drag capture deferred to avoid broadening the no-effect form slice
    note:
      - src/app/search_service.zig test assertion updated because adding the third slash mode changed the existing service mode-count expectation
      - src/sunglasses/state.zig gained indexed monitor accessors so the form does not own retained array layout
  - id: 03_overlay_surface_proof
    state: completed
    files:
      - src/ui/sdl_sunglasses_surface.zig
      - src/c/sdl.h
      - src/c/wayspot_layer_shell.c
      - src/sunglasses/runtime.zig
    proof:
      - hyprctl layers shows one wayspot-sunglasses overlay per monitor
      - pointer and keyboard remain usable through overlay
      - daemon cleanup removes all overlay layers
    receipts:
      - zigup run 0.16.0 fmt --check src/ui/sdl_sunglasses_surface.zig src/sunglasses/runtime.zig src/sunglasses/mod.zig src/main.zig src/root.zig
      - zigup run 0.16.0 build test --summary all
      - zigup run 0.16.0 build -Doptimize=ReleaseFast
      - git diff --check
      - banned active Zig pattern scan over touched Zig files
      - ./zig-out/bin/wayspot --sunglasses-proof
      - hyprctl layers -j showed wayspot-sunglasses count 0 before, 2 during, 0 after process exit
      - active Hyprland window stayed the same before, during, and after proof overlay
      - /tmp/wayspot-sunglasses-proof.png captured visible overlay proof
    note:
      - src/main.zig and src/root.zig were touched only to expose the bounded CLI proof command
  - id: 04_apply_path
    state: next
    files:
      - src/sunglasses/runtime.zig
      - src/ui/sdl_shell.zig
      - src/main.zig
    proof:
      - form change persists state and wakes daemon
      - daemon redraws without polling
      - timerless daemon sleeps until monitor, apply, or shutdown wake
  - id: 05_session_cutover
    files:
      - /home/home/.config/hypr/modules/session.lua
      - /home/home/personal/bash_engine/dots/hypr/modules/session.lua
    proof:
      - sunglasses daemon starts on Hyprland session init
      - hyprsunset is removed only after visual proof

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - stale runtime vocabulary scan
  - hyprctl layers -j receipt
  - grim screenshot receipt through hyprland-screenshot skill

stop_conditions:
  - pass-through overlay cannot be proven
  - surface owner requires a broad compositor abstraction
  - form event handling starts to become a UI framework
  - daemon cannot sleep until explicit wake events
  - removing hyprsunset would leave no working redlight fallback
