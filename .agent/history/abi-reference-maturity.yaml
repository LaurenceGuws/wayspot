id: abi_reference_maturity
title: Shallow ABI Boundaries and Dev Reference Bias
state: complete
purpose: >
  Mature Wayspot's vendor ABI boundary and team reference practice without
  adding product behavior. Vendored ABI must either be consumed directly as
  the main API through translated headers, or translated to Zig at the
  ingestion site with product ownership and errors remaining in Zig.
source_inputs_inspected:
  live_workflow:
    - AGENTS.md
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
  zig_0_16:
    - dev_references/zig/zig-0.16-release-notes.md
    - required_local_std_build_route:
        target_paths:
          - dev_references/zig_maturity/zig/lib/std/Build.zig
          - dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
          - dev_references/zig_maturity/zig/lib/std/Build/Module.zig
          - dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
        inspected_source_paths:
          - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build.zig
          - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
          - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Module.zig
          - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
        current_status: >
          The Wayspot-local target paths are required for this sprint before
          implementation claims rely on them. They were not present during
          planning repair and must be promoted from the inspected local sibling
          reference shelf by slice 02a with provenance, or the sprint must stop
          USER_NEEDED before implementation.
        finding: >
          Build.zig exposes addTranslateC, Step/TranslateC.zig exposes
          createModule and include-path wiring, Module.zig owns addCSourceFile,
          addIncludePath, and linkSystemLibrary, while Step/Compile.zig marks
          compile-level link/addC helpers as deprecated in favor of root_module.
    - section: "@cImport Moving to Build System"
      finding: >
        Zig 0.16 deprecates @cImport directionally; C translation should move
        to build.zig using b.addTranslateC with a header root and imported
        translated module.
    - section: "Build System"
      finding: >
        Build-system behavior and generated artifacts must follow
        current Zig 0.16 APIs, not older reference_repo assumptions.
  howl_reference:
    - /home/home/personal/projects/howl/howl-linux-host/build.zig
    - /home/home/personal/projects/howl/howl-linux-host/src/window/sdl_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/render/howl_render_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/texture/gl_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/window/stb_image.c
    - finding: >
        Howl translates tiny ABI headers at build ingestion sites and keeps C
        implementation minimal: sdl_c.h has three includes, render/gl headers
        are one include each, and stb_image.c exists only for required C macro
        implementation.
  wayspot_current:
    - build.zig
    - src/c/sdl.h
    - src/c/wayspot_layer_shell.c
    - src/sunglasses/surface.zig
    - src/wallpaper/surface.zig
    - finding: >
        Wayspot already uses addTranslateC for src/c/sdl.h, but
        src/c/wayspot_layer_shell.c owns layer-shell globals, output lookup,
        buffer allocation, image loading, crop math, tint/image composition,
        and collapsed -1 failures.
    - finding: >
        src/sunglasses/surface.zig maps all nonzero
        wayspot_shm_buffer_create_sunglasses_image failures to
        SunglassesImageBufferFailed, while overlay startup can hide that child
        failure behind SunglassesOverlayStartTimedOut.
  dev_reference_index:
    - dev_references/README.md
    - dev_references/manifests/SOURCES.md
    - finding: >
        dev_references already defines read routes and provenance for Zig 0.16,
        SDL, Hyprland, TigerBeetle, and foot, with sibling reference shelves
        available for selective promotion.
  abi_surface_references:
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadPNG.md
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadBMP.md
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_ConvertSurface.md
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_CreateSurfaceFrom.md
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_BlitSurfaceScaled.md
    - dev_references/sdl/sdlwiki_md/SDL3/SDL_GetError.md
    - dev_references/wayland/protocols/wlr/wlr-layer-shell-unstable-v1.xml
    - dev_references/wayland/protocols/core/wayland.xml
    - dev_references/wayland/client/wayland-client.h
    - dev_references/linux/man-pages/man2/memfd_create.2
    - dev_references/linux/man-pages/man2/mmap.2
    - dev_references/linux/man-pages/man2/ftruncate.2
    - dev_references/linux/man-pages/man2/truncate.2
    - finding: >
        The ABI/surface/image boundary requires SDL image/error docs, wlr
        layer-shell protocol XML, core Wayland protocol/API source, and Linux
        memory syscall man-pages if C remains responsible for shm buffers.
  reference_repo_fate:
    - /home/home/personal/wayspot/reference_repo
    - rule: >
        reference_repo must not remain an ambiguous maybe-authority directory.
        Needed scoped ABI/reference material must be promoted into
        dev_references with provenance; if no scoped material is needed, the
        directory must be deleted or left ignored with an explicit recorded
        reason.
hard_invariants:
  - no_product_behavior_in_c_unless_user_accepts_a_specific_C_owner
  - C_may_expose_ABI_or_required_vendor_implementation_only
  - product_decisions_errors_and_lifecycle_live_in_Zig
  - C_failure_results_are_typed_or_immediately_translated_to_typed_Zig_errors
  - addTranslateC_is_the_default_ingestion_path_for_headers
  - dev_references_is_the_first_bias_library_for_Zig_build_SDL_Hyprland_TigerBeetle_foot_claims
  - reference_repo_material_is_promoted_to_dev_references_or_deleted_or_explicitly_ignored
  - no_new_features
  - no_generic_ABI_framework
  - no_broad_WM_or_backend_registry
non_goals:
  - new_UI_behavior
  - new_wallpaper_or_sunglasses_features
  - broad_Wayland_framework
  - replacing_SDL
  - importing_dev_references_into_product_code
  - copying_full_upstream_repos_into_dev_references
  - treating_reference_repo_as_source_truth
files:
  inspect:
    - AGENTS.md
    - README.md
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
    - .agent/history/de-entity-model-not-picker-abuse.yaml
    - reference_repo
    - dev_references/README.md
    - dev_references/manifests/SOURCES.md
    - dev_references/zig/zig-0.16-release-notes.md
    - /home/home/personal/projects/howl/howl-linux-host/build.zig
    - /home/home/personal/projects/howl/howl-linux-host/src/window/sdl_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/render/howl_render_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/texture/gl_c.h
    - /home/home/personal/projects/howl/howl-linux-host/src/window/stb_image.c
    - build.zig
    - src/c/sdl.h
    - src/c/wayspot_layer_shell.c
    - src/sunglasses/surface.zig
    - src/wallpaper/surface.zig
    - src/sunglasses/overlay.zig
  may_change:
    - .agent/history/current.yaml
    - .agent/history/sprint.yaml
    - .agent/history/references.yaml
    - .agent/history/abi-reference-maturity.yaml
    - AGENTS.md
    - dev_references/README.md
    - dev_references/manifests/SOURCES.md
    - dev_references/zig_maturity/zig/lib/std/Build.zig
    - dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
    - dev_references/zig_maturity/zig/lib/std/Build/Module.zig
    - dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
    - dev_references/wayland/protocols/wlr/wlr-layer-shell-unstable-v1.xml
    - dev_references/wayland/protocols/core/wayland.xml
    - dev_references/wayland/client/wayland-client.h
    - dev_references/linux/man-pages/man2/memfd_create.2
    - dev_references/linux/man-pages/man2/mmap.2
    - dev_references/linux/man-pages/man2/ftruncate.2
    - dev_references/linux/man-pages/man2/truncate.2
    - reference_repo
    - build.zig
    - src/c/sdl.h
    - src/c/wayspot_layer_shell.c
    - src/sunglasses/surface.zig
    - src/wallpaper/surface.zig
    - src/sunglasses/overlay.zig
  only_if_earned:
    - src/c/layer_shell.h
    - src/c/layer_shell_abi.h
    - src/c/image_abi.h
    - src/surface/layer_shell.zig
    - src/surface/shm_buffer.zig
  must_not_create:
    - src/abi/common.zig
    - src/abi/shared.zig
    - src/abi/types.zig
    - src/c/framework.c
    - src/wayland/backend.zig
    - src/wayland/provider.zig
    - src/reference_repo_index.zig
symbols:
  inspect:
    - sdl_c
    - layer_shell_mod
    - wayspot_layer_globals
    - wayspot_layer_globals_init
    - wayspot_layer_find_output
    - wayspot_layer_get_surface
    - wayspot_layer_get_surface_on_layer
    - wayspot_shm_buffer_create_image
    - wayspot_shm_buffer_create_sunglasses_image
    - wayspot_shm_buffer_create_tint
    - SunglassesSurface
    - WallpaperSurface
    - LayerShellRole
    - startOverlayAndWait
    - startOverlayDetached
    - SunglassesImageBufferFailed
    - SunglassesOverlayStartTimedOut
  proposed:
    - translateCModule
    - LayerShellAbiResult
    - ShmBufferResult
    - ImageBufferError
    - OverlayChildStartResult
  avoid_generic:
    - AbiProvider
    - BackendRegistry
    - SurfaceFramework
    - CommonTypes
slices:
  - id: "00_plan_review"
    state: complete
    goal: Reviewer validates this sprint shape before implementation.
    owner: reviewer
    stop_conditions:
      - reviewer_rejects_C_fate_scope
      - reviewer_requires_user_decision_before_memory_activation
  - id: "01_live_memory_activation"
    state: complete
    goal: Activate this sprint and make dev_references bias plus reference_repo fate explicit.
    files:
      create:
        - .agent/history/abi-reference-maturity.yaml
      change:
        - .agent/history/sprint.yaml
        - .agent/history/current.yaml
        - .agent/history/references.yaml
    comments:
      - live_memory_must_say_reference_repo_material_is_promoted_deleted_or_explicitly_ignored
      - live_memory_must_say_dev_references_is_required_bias_library
    tests:
      - yaml_safe_load_active_memory
    removals:
      - stale_memory_claims_that_reference_repo_is_authoritative
    scans:
      - "rg -n 'reference_repo' .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml AGENTS.md README.md"
      - "rg -n 'dev_references' .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml AGENTS.md README.md"
    accepted_hits:
      - reference_repo_hits_allowed_only_when_stating_promote_delete_or_explicit_ignore_fate
      - dev_references_hits_required_when_stating_bias_library_or_read_route
  - id: "02a_zig_std_build_reference_promotion"
    state: complete
    goal: Promote the exact Zig std Build files required for local maturity claims into dev_references with provenance.
    files:
      create:
        - dev_references/zig_maturity/zig/lib/std/Build.zig
        - dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
        - dev_references/zig_maturity/zig/lib/std/Build/Module.zig
        - dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
      change:
        - dev_references/manifests/SOURCES.md
        - dev_references/README.md
    source:
      preferred_existing_local_shelf:
        - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build.zig
        - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
        - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Module.zig
        - /home/home/personal/projects/dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
      provenance_required:
        - source_path
        - copy_date
        - reason
        - exact_files_only
    rules:
      - promote_only_the_four_named_std_build_files
      - do_not_copy_the_full_Zig_repo
      - do_not_import_promoted_references_from_product_or_build
      - implementation_slices_must_not_claim_Zig_std_build_maturity_until_this_slice_passes
    tests:
      - "test -f dev_references/zig_maturity/zig/lib/std/Build.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Module.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig"
      - yaml_safe_load_active_memory
      - git_diff_check
    stop_conditions:
      - source_sibling_shelf_files_missing
      - provenance_cannot_be_recorded
      - reviewer_requires_different_Zig_std_source
    user_needed_if:
      - source_sibling_shelf_files_missing
      - reviewer_requires_external_Zig_source_fetch
  - id: "02b_abi_surface_reference_download"
    state: complete
    goal: Add only missing official ABI, surface, image, and memory references needed for this sprint.
    files:
      create:
        - dev_references/wayland/protocols/wlr/wlr-layer-shell-unstable-v1.xml
        - dev_references/wayland/protocols/core/wayland.xml
        - dev_references/wayland/client/wayland-client.h
        - dev_references/linux/man-pages/man2/memfd_create.2
        - dev_references/linux/man-pages/man2/mmap.2
        - dev_references/linux/man-pages/man2/ftruncate.2
        - dev_references/linux/man-pages/man2/truncate.2
      change:
        - dev_references/README.md
        - dev_references/manifests/SOURCES.md
    already_local_required_sdl_docs:
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadPNG.md
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_LoadBMP.md
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_ConvertSurface.md
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_CreateSurfaceFrom.md
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_BlitSurfaceScaled.md
      - dev_references/sdl/sdlwiki_md/SDL3/SDL_GetError.md
    source_urls:
      - https://raw.githubusercontent.com/swaywm/wlr-protocols/master/unstable/wlr-layer-shell-unstable-v1.xml
      - https://gitlab.freedesktop.org/wayland/wayland/-/raw/main/protocol/wayland.xml
      - https://gitlab.freedesktop.org/wayland/wayland/-/raw/main/src/wayland-client.h
      - https://git.kernel.org/pub/scm/docs/man-pages/man-pages.git/plain/man/man2/memfd_create.2
      - https://git.kernel.org/pub/scm/docs/man-pages/man-pages.git/plain/man/man2/mmap.2
      - https://git.kernel.org/pub/scm/docs/man-pages/man-pages.git/plain/man/man2/ftruncate.2
      - https://git.kernel.org/pub/scm/docs/man-pages/man-pages.git/plain/man/man2/truncate.2
    rules:
      - do_not_copy_full_upstream_repos
      - do_not_treat_reference_repo_as_authority
      - record_URL_or_local_source_path_date_reason_exact_files
      - stop_USER_NEEDED_if_official_source_cannot_be_downloaded_or_provenance_is_unclear
    tests:
      - "test -f dev_references/wayland/protocols/wlr/wlr-layer-shell-unstable-v1.xml"
      - "test -f dev_references/wayland/protocols/core/wayland.xml"
      - "test -f dev_references/wayland/client/wayland-client.h"
      - "test -f dev_references/linux/man-pages/man2/memfd_create.2"
      - "test -f dev_references/linux/man-pages/man2/mmap.2"
      - "test -f dev_references/linux/man-pages/man2/ftruncate.2"
      - "test -f dev_references/linux/man-pages/man2/truncate.2"
      - yaml_safe_load_active_memory
      - git_diff_check
    stop_conditions:
      - required_official_source_download_fails
      - provenance_is_unclear
      - requested_reference_requires_copying_full_upstream_repo
  - id: "02c_reference_repo_fate"
    state: complete
    goal: Inspect reference_repo for scoped ABI/reference material, promote anything needed into dev_references, then delete or explicitly ignore the remainder.
    files:
      inspect:
        - reference_repo
      create_if_needed:
        - dev_references/reference_promotions
      change_if_promoted:
        - dev_references/README.md
        - dev_references/manifests/SOURCES.md
      delete_if_not_needed:
        - reference_repo
      change_if_delete_not_safe:
        - .agent/history/abi-reference-maturity.yaml
    scope:
      relevant_only:
        - Zig_0_16_build_system_or_std_material_not_already_promoted
        - SDL_image_or_error_docs_not_already_present
        - Wayland_or_layer_shell_protocol_specs_not_already_present
        - Linux_shm_memfd_mmap_ftruncate_docs_not_already_present
        - Howl_like_ABI_boundary_examples_if_more_specific_than_existing_routes
      irrelevant:
        - broad_repo_samples
        - stale_generated_outputs
        - product_code_not_needed_by_this_sprint
        - archived_or_unproven_material_without_source
    rules:
      - do_not_use_reference_repo_as_authority_in_place
      - promote_needed_scoped_files_to_dev_references_with_source_path_date_reason_exact_files
      - prefer_deleting_reference_repo_when_no_needed_scoped_material_is_found
      - if_reference_repo_cannot_be_deleted_record_explicit_ignore_reason_and_stop_for_review
      - do_not_copy_full_upstream_repos
    tests:
      - "find reference_repo -maxdepth 2 -type f | sed -n '1,120p'"
      - "rg -n 'reference_repo' AGENTS.md README.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml dev_references/README.md dev_references/manifests/SOURCES.md"
      - yaml_safe_load_active_memory
      - git_diff_check
    acceptance:
      - needed_scoped_material_promoted_with_provenance_or_none_found
      - reference_repo_deleted_or_explicit_ignore_reason_recorded
      - no_claims_depend_on_reference_repo_path
    stop_conditions:
      - reference_repo_contains_needed_material_but_source_provenance_is_unclear
      - deleting_reference_repo_would_remove_unreviewed_user_material
      - reviewer_requires_user_decision_on_reference_repo_fate
    inspection_receipt:
      inspected:
        - reference_repo/README.md
        - reference_repo/vendor/README.md
        - reference_repo/vendor/ipc/SOURCES.txt
        - reference_repo/vendor/notifications/SOURCES.txt
        - reference_repo_file_list_depth_3
        - reference_repo_scoped_keyword_scan
      result: >
        reference_repo contains D-Bus and freedesktop notification spec
        material plus workspace policy notes. It does not contain scoped
        ABI/surface/image material for this sprint: no Zig std Build source,
        SDL image/error docs, Wayland or layer-shell protocol source, Linux
        shm/memfd/mmap/ftruncate docs, or Howl ABI boundary examples.
      recommended_fate: >
        Safe-to-ignore or delete candidate for this sprint. Do not promote any
        material from reference_repo for abi_reference_maturity. Because the
        directory contains user-retained spec material outside this sprint's
        scope, do not delete until reviewer/user explicitly accepts deletion.
      authority: reference_repo_not_used_as_authority
  - id: "02_dev_reference_bias_index"
    state: complete
    goal: Make dev_references mandatory and auditable without bloating product code.
    files:
      change:
        - dev_references/README.md
        - dev_references/manifests/SOURCES.md
        - AGENTS.md
        - .agent/history/references.yaml
    required_content:
      - Zig_0_16_release_notes_route
      - Zig_std_build_system_route:
          required_paths:
            - dev_references/zig_maturity/zig/lib/std/Build.zig
            - dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig
            - dev_references/zig_maturity/zig/lib/std/Build/Module.zig
            - dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig
      - SDL_docs_route
      - Hyprland_docs_route
      - TigerBeetle_style_route
      - foot_Wayland_process_route
      - sibling_reference_shelves_route_for_selective_promotion
      - Howl_ABI_pattern_route
    rules:
      - references_are_read_before_design_claims
      - references_are_not_imported_by_build_zig
      - new_reference_copies_need_source_date_reason
      - each_future_sprint_names_relevant_reference_routes
    tests:
      - yaml_safe_load_active_memory
      - markdown_readability_sanity
    removals:
      - any_instruction_to_use_reference_repo_as_default
    scans:
      - "rg -n 'reference_repo.*authority|authority.*reference_repo' AGENTS.md .agent/history/current.yaml .agent/history/sprint.yaml .agent/history/references.yaml dev_references/README.md dev_references/manifests/SOURCES.md"
      - "rg -n 'dev_references' AGENTS.md .agent/history/references.yaml dev_references/README.md dev_references/manifests/SOURCES.md"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Step/TranslateC.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Module.zig"
      - "test -f dev_references/zig_maturity/zig/lib/std/Build/Step/Compile.zig"
    accepted_hits:
      - reference_repo_authority_hits_allowed_only_when_redirecting_to_promote_delete_or_explicit_ignore_fate
    progress_receipt:
      status: satisfied_by_accepted_reference_promotion_download_and_slice_09_scans
      executed_by:
        - 02a_zig_std_build_reference_promotion
        - 02b_abi_surface_reference_download
        - 02c_reference_repo_fate
        - 09_reference_maturity_scans
      routes_present:
        - dev_references_README_lists_Zig_0_16_release_notes_and_std_Build_files
        - dev_references_README_lists_SDL_image_docs
        - dev_references_README_lists_Wayland_layer_shell_and_client_docs
        - dev_references_README_lists_Linux_memory_syscall_docs
        - dev_references_README_lists_Hyprland_TigerBeetle_and_foot_routes
        - dev_references_manifests_SOURCES_records_source_date_reason_and_exact_files_for_promoted_downloaded_scope
        - AGENTS_and_references_memory_name_dev_references_as_local_bias_library
        - reference_repo_fate_recorded_as_non_authority_with_no_scoped_ABI_material_promoted
      review_state: accepted
      reviewer_acceptance: Sagan accepted slice 02_dev_reference_bias_index during final closeout before ACCEPT_SPRINT.
  - id: "03_zig_016_build_ingestion_lock"
    state: complete
    goal: Align Wayspot C ingestion with Zig 0.16 addTranslateC guidance and local Howl pattern.
    files:
      change:
        - build.zig
        - src/c/sdl.h
      inspect:
        - /home/home/personal/projects/howl/howl-linux-host/build.zig
        - /home/home/personal/projects/howl/howl-linux-host/src/window/sdl_c.h
        - dev_references/zig/zig-0.16-release-notes.md
        - dev_references/zig_maturity/zig/lib/std/Build.zig
