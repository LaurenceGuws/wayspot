id: post_wallpaper_footification
state: active

purpose: >
  Run the routine TigerBeetle/foot cleanup after the wallpaper expansion. The
  sprint is successful only if the new wallpaper domain is smaller, more direct,
  and easier to audit without reducing proven behavior.

law:
  - comments_are_production_assertions
  - every_owner_has_a_bound_and_one_cleanup_path
  - no_public_proof_or_probe_modes_after_the_real_daemon_exists
  - delete_before_adding_unless_the_addition_removes_live_complexity

scope:
  in:
    - live memory handoff from completed wallpaper sprint to cleanup sprint
    - remove stale proof vocabulary and public proof CLI
    - inspect wallpaper runtime, Hyprland IPC, and layer-shell surface owners
    - shrink helpers where the call site stays clear
    - add the final wallpaper rotate-now CLI request
    - verify no stale proof, inert-fallback, or old-roadmap text remains in active code
  out:
    - new wallpaper modes
    - monitor_glasses implementation
    - image metadata expansion
    - generic compositor abstraction
    - cache work without owner, key, invalidation, scale, cleanup, and test proof

baseline:
  measured_at: 2026-07-04
  files:
    - src/wallpaper/config.zig
    - src/wallpaper/hyprland.zig
    - src/wallpaper/image_info.zig
    - src/wallpaper/library.zig
    - src/wallpaper/mod.zig
    - src/wallpaper/runtime.zig
    - src/ui/sdl_wallpaper_surface.zig
    - src/c/wayspot_layer_shell.c
    - src/c/sdl.h
    - src/main.zig
    - src/root.zig
  line_count: 2158
  char_count: 73249

slices:
  completed:
    - stale_lifecycle_proof_api_removed:
        files:
          - src/main.zig
          - src/root.zig
          - src/wallpaper/runtime.zig
          - src/ui/sdl_wallpaper_surface.zig
        facts:
          - public wallpaper lifecycle proof command is gone
          - runtime no longer has a proof-only wait loop
          - layer-shell solid buffer is named as initial surface mapping state
    - proof_shm_and_noop_wakes_removed:
        receipt: /tmp/wayspot-post-wallpaper-footification-20260704-212427
        files:
          - src/c/sdl.h
          - src/c/wayspot_layer_shell.c
          - src/ui/sdl_wallpaper_surface.zig
          - src/wallpaper/hyprland.zig
          - src/wallpaper/mod.zig
          - src/wallpaper/runtime.zig
        facts:
          - solid color shm helper is gone from the C shim
          - wallpaper image draw is the first buffer attach
          - focused monitor events are ignored because wallpaper placement is per monitor
          - slot_count alone owns the initialized surface slot range
          - shutdown wake no longer retains unread request state
          - wallpaper public module exports only live call-site nouns
          - refreshed wallpaper daemon retained one background layer per monitor
    - wallpaper_rotate_now_cli:
        receipt: /tmp/wayspot-wallpaper-rotate-single-20260704-213643
        files:
          - src/main.zig
          - src/root.zig
          - src/wallpaper/runtime.zig
        facts:
          - --next-wallpaper stays compatible with the live Hyprland binding
          - --wallpaper-rotate-now is accepted as the explicit CLI spelling
          - daemon writes and removes one bounded pid file in XDG_RUNTIME_DIR
          - CLI checks /proc cmdline before signaling the pid
          - SIGUSR1 is converted into an SDL rotate event
          - rotate redraws every monitor surface and resets the timer deadline
          - one CLI request produced one daemon rotate receipt
  current:
    - final_verification_before_commit

verification_floor:
  - zigup run 0.16.0 build test --summary all
  - zigup run 0.16.0 build -Doptimize=ReleaseFast
  - zigup run 0.16.0 fmt --check touched Zig files
  - git diff --check
  - banned active Zig pattern scan
  - stale vocabulary scan over active runtime files

stop_conditions:
  - proposed deletion would hide ownership or cleanup
  - verification fails for behavior outside the edited slice
  - next deletion requires a product decision
