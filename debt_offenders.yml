    comments:
      file: "//! Candidate owns the bounded reachable-node union, terminal Concrete unions, typed Input values, and borrowed display strings consumed by Cmd, GUI, and CLI."
      symbols:
        - "/// Input is the exact typed value vocabulary carried by Concrete leaves."
        - "/// ScalarInput owns value, min, max, and step within the selected leaf bounds and enforces grid alignment from min by whole step increments."
        - "/// ToggleInput owns one enabled value and PathInput owns one bounded path copy."
        - "/// MonitorName owns one bounded monitor copy; ActionLeaf and MonitorLeaf own terminal Input storage."
        - "/// Concrete is the exact terminal union of app, open, lifecycle, and notification leaves."
        - "/// Lifecycle is the exact nine-arm resident leaf vocabulary, including typed sunglasses inputs."
        - "/// Every typed leaf declares accepted Input arms and copies them at construction."
        - "/// Candidate stores one shared SubCmd union or one Concrete terminal leaf."
        - "/// List publishes one bounded collection without taking producer string ownership."
    tests:
      - candidate union exposes exactly sub_cmd and concrete arms
      - Input exposes exactly none, scalar, toggle, and path arms
      - ScalarInput validates value, min, max, positive step, and grid alignment
      - aligned positive and negative scalar ranges, misaligned positive and negative ranges, and exact endpoints are covered
      - ToggleInput maps on and off without a second input tag
      - PathInput owns a bounded absolute path copy and rejects invalid bytes
      - Concrete exposes exactly app, open, lifecycle, and notification arms
      - Lifecycle exposes exactly the nine declared resident leaf arms
      - typed sunglasses leaves carry bounded monitor and Input values
      - each typed leaf rejects non-applicable Input arms explicitly
      - CLI and GUI construct equal Concrete values for scalar, toggle, and path inputs
      - CLI and GUI reject equal invalid scalar, toggle, path, and monitor values
      - candidate capacity rejects the first record beyond the bound
      - borrowed producer strings remain valid until producer cleanup
      - notification leaves are rendered and reported but rejected explicitly at selection and launch
      - hint and mode are absent from Concrete
      - candidate policy rejects non-applicable leaves explicitly

  - path: src/picker/sub_cmd.zig
    status: new
    owner: picker.sub_cmd
    role: sole declaration owner for one shared closed SubCmd union and all concrete resident child-union types
    symbols:
      public:
