current_failure_behavior:
  - path_symbol: "src/notification/history.zig:History.loadAtPath"
    behavior: "Only error.FileNotFound returns an empty History; permission, directory, allocation, StreamTooLong, invalid JSON, unsupported version, and invalid-row errors propagate, and malformed rows reject the complete load."
  - path_symbol: "src/notification/history.zig:duplicateBounded"
    behavior: "Text beyond a field bound returns error.HistoryFieldTooLong before allocation; no text is truncated and a failed upsert leaves the previous row unchanged."
  - path_symbol: "src/picker/cmd.zig:loadHistorySelections"
    behavior: "FileNotFound returns; other read errors return; blank lines are skipped; line size and candidate reachability are unchecked."
  - path_symbol: "src/picker/scale.zig:SurfaceConfig.loadAtPath"
    behavior: "FileNotFound and StreamTooLong return default state; malformed text returns default state."
  - path_symbol: "src/sunglasses/state.zig:State.loadAtPath"
    behavior: "FileNotFound and StreamTooLong return empty State; malformed text returns empty State; other read errors return."
  - path_symbol: "src/wallpaper/config.zig:Config.parse"
    behavior: "Unknown keys and missing and relative library paths return errors; interval values clamp; duplicate keys use the last value."
  - path_symbol: "src/picker/mode/apps.zig:Apps.collectCandidates"
    behavior: "Missing, NotDir, and AccessDenied trigger desktop scan; malformed cache lines skip; cache rebuild write errors are logged and ignored."
  - path_symbol: "src/picker/icon_cache.zig:refresh"
    behavior: "Missing converter returns an error; converter and wait failures leave direct index and PNG writes in place."
  - path_symbol: "src/picker/icons.zig:AppIconStore.textureForWithRoots"
    behavior: "Missing and failed icons retain a missing entry until AppIconStore.deinit."

duplicate_representations:
  - "src/notification/state.zig:Store and src/notification/rows.zig:row_store retain live notification text; src/notification/history.zig:History retains a durable copy."
  - "src/notification/history.zig:History.rows and src/notification/history_list.zig:NotificationHistoryList.cache retain the same full notification rows before Candidate.notification construction."
  - "src/notification/history_list.zig:appendRow embeds notification rank in selection text; src/notification/history.zig:rowNewer already orders rows by timestamp and identity."
  - "src/picker/cmd.zig:Picker.history retains selection strings in memory and history.log; src/picker/rank.zig:notificationHistoryOrderBoost reads notification order from those strings."
  - "src/picker/mode/apps.zig reads desktop-file values, raw TSV bytes, Candidate fields, and fixed local Spec values."
  - "src/picker/icons.zig:Candidate.iconName and AppIconStore repeat icon identity held by src/picker/icon_cache.zig:index.tsv and icon-CRC32.png."
  - "assets/lua/defaults.lua and src/picker/appearance.zig:currentHardcodedDefaults both hold appearance values."
  - "src/picker/scale.zig:SurfaceConfig is loaded and written by src/gui/surface.zig and src/notification/banner.zig."
  - "src/sunglasses/state.zig:State is loaded into src/sunglasses/overlay.zig:Overlay slots and written again by sunglasses apply."
  - "src/notification/history.zig:max_rows 512 and src/notification/state.zig:max_notifications 256 express different notification counts beside project_version_scope.yml:notification_count 256."

