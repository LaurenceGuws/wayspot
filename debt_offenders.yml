# Wayspot cache, config, history, and state marathon register.
# Current source evidence is recorded separately from target names.

register:
  checkpoint: 6ff94bc
  status: open
  implementation_status: not_started
  review_gate:
    state: operator_review_required
    source_changes: false
    uncommitted_register: true

meanings:
  cache:
    meaning: "A bounded derived value rebuilt from a source; it does not record past product events."
    current_uses:
      - app metadata derived from desktop files
      - converted app icon files and their two-field index
      - decoded app icon textures held until AppIconStore.deinit
  config:
    meaning: "A bounded user-authored file read to select appearance defaults and wallpaper settings."
    paths: defaults.lua and wallpaper.conf
  history:
    meaning: "A bounded record of past product events and past picker selections."
    records:
      notification: History rows with notification identity, text, timestamps, and close fields
      picker: Recent candidate selection strings used by picker ranking
    separation: "Notification history and picker selection history use different files, types, bounds, and tests."
  state:
    meaning: "Current UI and resident values held in memory and persisted for restart."
    records:
      surface: SurfaceState zoom value
      sunglasses: State monitor filter and image values
      environment: EnvState compositor facts held only in memory
    separation: "State does not record past events and is not rebuilt app and icon data."

path_table:
  - surface: appearance_defaults
    current_source: "src/config/defaults.zig:load"
    current_path: "$HOME/.config/wayspot/defaults.lua"
    current_rule: load joins the supplied HOME value with .config/wayspot/defaults.lua
    target_path: "$XDG_CONFIG_HOME/wayspot/defaults.lua"
    target_fallback: "$HOME/.config/wayspot/defaults.lua"
  - surface: wallpaper_config
    current_source: "src/wallpaper/config.zig:Config.defaultPath"
    current_path: "$HOME/.config/wayspot/wallpaper.conf"
    current_rule: defaultPath reads HOME and appends .config/wayspot/wallpaper.conf
    target_path: "$XDG_CONFIG_HOME/wayspot/wallpaper.conf"
    target_fallback: "$HOME/.config/wayspot/wallpaper.conf"
  - surface: app_cache
    current_source: "src/main.zig:setupPickerBundle and src/picker/mode/apps.zig:invalidateDefaultCache"
    current_path: "$HOME/.cache/waybar/wofi-app-launcher.tsv"
    current_rule: setupPickerBundle formats the path from HOME and Apps receives it as cache_path
    target_path: "$XDG_CACHE_HOME/wayspot/apps.tsv"
    target_fallback: "$HOME/.cache/wayspot/apps.tsv"
  - surface: icon_cache
    current_source: "src/picker/icon_cache.zig:refresh and src/picker/icons.zig:findCachedIconPath"
    current_path: "$HOME/.cache/wayspot/icons/index.tsv and $HOME/.cache/wayspot/icons/icon-CRC32.png"
    current_rule: refresh receives HOME from CLI and icons.zig reads HOME directly
    target_path: "$XDG_CACHE_HOME/wayspot/icons/index.tsv and $XDG_CACHE_HOME/wayspot/icons/icon-CRC32.png"
    target_fallback: "$HOME/.cache/wayspot/icons/index.tsv and $HOME/.cache/wayspot/icons/icon-CRC32.png"
  - surface: picker_selection_history
    current_source: "src/main.zig:setupPickerBundle"
    current_path: "$HOME/.local/state/wayspot/history.log"
    current_rule: setupPickerBundle formats the path from HOME
    target_path: "$XDG_STATE_HOME/wayspot/history.log"
    target_fallback: "$HOME/.local/state/wayspot/history.log"
  - surface: notification_history
    current_source: "src/notification/history.zig:path"
    current_path: "$XDG_STATE_HOME/wayspot/notifications-history.json; HOME fallback is $HOME/.local/state/wayspot/notifications-history.json"
    current_rule: path treats XDG_STATE_HOME as the parent state directory and appends wayspot/notifications-history.json; HOME fallback appends .local/state/wayspot/notifications-history.json
    target_path: "$XDG_STATE_HOME/wayspot/notifications-history.json"
    target_fallback: "$HOME/.local/state/wayspot/notifications-history.json"
    target_rule: XDG_STATE_HOME is the parent state directory and never includes the /wayspot suffix
  - surface: sunglasses_state
    current_source: "src/sunglasses/state.zig:statePath"
    current_path: "$HOME/.local/state/wayspot/sunglasses.conf"
    current_rule: statePath reads HOME and appends .local/state/wayspot/sunglasses.conf
    target_path: "$XDG_STATE_HOME/wayspot/sunglasses.conf"
    target_fallback: "$HOME/.local/state/wayspot/sunglasses.conf"
  - surface: surface_state
    current_source: "src/picker/scale.zig:statePath"
    current_path: "$HOME/.local/state/wayspot/surface.conf"
    current_rule: statePath reads HOME and appends .local/state/wayspot/surface.conf
    target_path: "$XDG_STATE_HOME/wayspot/surface.conf"
    target_fallback: "$HOME/.local/state/wayspot/surface.conf"

