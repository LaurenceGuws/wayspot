        - resolveSubCmd
        - resolveConcrete
        - assertModeOrder
    comments:
      file: "//! Cmd owns the bounded command tree and never imports SDL, Bash formatting, or resident runtime code."
      symbols:
        - "/// Cmd is the four-arm tagged union in fixed apps-first order."
        - "/// cmds is the bounded ordered array consumed identically by GUI and CLI."
        - "/// Picker owns history and published candidate lifetime around Cmd values."
        - "/// buildCandidatesTransactional publishes a complete set or leaves published storage empty after rollback."
        - "/// resolveConcrete returns an executable leaf intent or the exact rejection for a display-only Concrete arm."
        - "/// complete returns one bounded next shell argument for an explicit Cmd-tree position."
    tests:
      - Cmd arms are exhaustive and ordered apps, notifications, wallpaper, sunglasses
      - apps is the default mode on picker initialization
      - resident Cmd arms expose their child unions through the shared SubCmd wrapper
      - apps exposes Concrete leaves directly and has no SubCmd
      - GUI and CLI receive identical mode and candidate composition
      - equivalent CLI argv and GUI control commits produce equal Input and Concrete values
      - equivalent invalid GUI and CLI inputs return the same bounded rejection
      - candidate construction overflow rolls back completely
      - failed construction can retry without duplicate or dangling candidates
      - concrete leaves resolve without forking or shell execution
      - notification Concrete leaves reject explicitly without forking or shell execution
      - history remains bounded and cleanup is exact
      - completion semantics return position-aware next arguments and never full command payloads
      - top-level completion includes apps in fixed Cmd order
      - subcommand and operation completion expose only the next route word

