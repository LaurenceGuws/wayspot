status: implementation_in_progress
implementation_status: canonical_mode_entrypoints_uncommitted
review_gate:
  current_slice: canonical_mode_entrypoints
  implementation_authorized: true
  forbidden_before_approval:
    - runtime_entrypoint_separation
    - build_packaging_and_rerun_wiring
    - stale_shape_cleanup

shape_bars:
  required_vocabulary:
    - Cmd
    - SubCmd
    - Candidate
    - Concrete
    - Lifecycle
    - Input
    - ScalarInput
    - ToggleInput
    - PathInput
    - DimSubCmd
    - FilterSubCmd
    - ImageSubCmd
    - mode
    - apps
    - notifications
    - wallpaper
    - sunglasses
  deprecated_implementation_vocabulary:
    - Command
    - commands
    - Mode_struct_as_parallel_collection
    - flat_Candidate_List_as_command_tree
    - UserInput
    - user_input_types
    - CandidateType
    - Candidate.types
  ownership_rules:
    - Cmd is the one top-level tagged union.
    - Cmd arms are concrete and ordered apps, notifications, wallpaper, sunglasses.
    - apps is the first arm and the default picker mode.
    - resident Cmd arms own NotificationsSubCmd, WallpaperSubCmd, or SunglassesSubCmd.
    - SubCmd is one shared closed union with explicit resident child arms.
    - src/picker/sub_cmd.zig is the only declaration owner for SubCmd and every resident child union, including nested input routes; route arms do not embed Input.
    - resident mode files own route behavior, candidate construction, resolution, and lifecycle intent; they do not declare child-union types.
    - Candidate.sub_cmd stores SubCmd; Candidate.concrete stores Concrete.
    - Concrete is exactly app, open, lifecycle, and notification.
    - Lifecycle is exactly the nine declared resident leaf arms.
    - Input is exactly none, scalar, toggle, and path; it is the typed value contract carried by a Concrete leaf.
    - ScalarInput owns value, min, max, and positive step; value is inside its inclusive bounds and aligned to min by whole step increments; ToggleInput owns enabled; PathInput owns one bounded absolute path copy.
    - Every typed Concrete leaf declares its accepted Input arms; no parallel CandidateType or input-kind field exists.
    - GUI controls are reusable presentation drafts and commit the same Input values that CLI argv constructs.
    - notification Concrete leaves are display-only and explicitly rejected at selection and launch boundaries.
    - hint and mode are not Concrete arms.
    - apps has no SubCmd and exposes Concrete application and fixed-local open leaves directly.
    - GUI and CLI consume the same Cmd array, SubCmd unions, and Candidate values.
    - resident runtime code has an explicit entrypoint separate from picker code.
    - process code executes resolved leaf intent; Cmd code never forks or runs a shell.
  comment_rules:
    every_target_zig_file:
      - one current //! file contract naming scope, owner, bounds, cleanup, and failure meaning
      - one current /// comment for every public type, field group, constant, and function
      - local // comments only for non-obvious platform or ownership decisions
    forbidden_comment_shape:
      - stale claims about rows, commands, forms, or GUI-only apps
      - comments that describe a future owner instead of the current owner
      - comments that hide allocation, cleanup, or failure meaning
  test_rules:
    - tests stay beside the owner symbol in the owning .zig file
    - every tagged union has an exhaustive-arm test
    - every bounded array has a boundary test
    - every ownership transfer has success, failure, cleanup, and retry proof
    - every CLI, GUI, and resident entrypoint has a real receipt
  candidate_representation:
    shared_union:
      path: src/picker/sub_cmd.zig
      symbol: SubCmd
      arms:
        - notifications: NotificationsSubCmd
        - wallpaper: WallpaperSubCmd
        - sunglasses: SunglassesSubCmd
    candidate_union:
      path: src/picker/candidate.zig
      symbol: Candidate
      arms:
        - sub_cmd: SubCmd
        - concrete: Concrete
    concrete_union:
      path: src/picker/candidate.zig
      symbol: Concrete
      arms:
        - app
        - open
        - lifecycle: Lifecycle
        - notification
      lifecycle_union:
        symbol: Lifecycle
        arms:
          - notifications_restart
          - wallpaper_restart
          - wallpaper_rotate
          - sunglasses_restart
          - sunglasses_apply
          - sunglasses_reconcile
          - sunglasses_dim
          - sunglasses_filter
          - sunglasses_image
      input_union:
        path: src/picker/candidate.zig
        symbol: Input
        arms:
          - none
          - scalar: ScalarInput
          - toggle: ToggleInput
          - path: PathInput
        scalar_fields:
          - value: i32
          - min: i32
          - max: i32
          - step: i32
        toggle_fields:
          - enabled: bool
        path_fields:
          - bytes: fixed_storage
          - length: usize
        ownership: Input is copied into a Concrete leaf; PathInput owns its bounded path bytes and does not borrow GUI or argv storage.
        bounds:
          arm_count: project_version_scope.yml:max_input_arms
          scalar: project_version_scope.yml:sunglasses_scalar_bounds
          path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
      typed_leaf_policy:
        app: Input.none
        open: Input.none
        lifecycle:
          notifications_restart: Input.none
          wallpaper_restart: Input.none
          wallpaper_rotate: Input.none
          sunglasses_restart: Input.none
          sunglasses_apply: Input.none
          sunglasses_reconcile: Input.none
          sunglasses_dim: scalar_or_toggle
          sunglasses_filter: scalar_or_toggle
          sunglasses_image: none_or_scalar_or_toggle_or_path
        notification: Input.none
      owners:
        declaration: src/picker/candidate.zig
        app: src/picker/mode/apps.zig
        open: src/picker/mode/apps.zig
        lifecycle: selected resident mode route owner
        notification: src/notification/history_list.zig
      resolution:
        app: executable leaf intent
        open: executable leaf intent
        lifecycle: typed resident leaf intent
        notification: explicit display-only rejection at selection and launch
      bounds:
        arm_count: project_version_scope.yml:max_concrete_arms
        lifecycle_arm_count: project_version_scope.yml:max_lifecycle_arms
        monitor_name_bytes: project_version_scope.yml:sunglasses_monitor_name_bytes
        image_path_bytes: project_version_scope.yml:sunglasses_image_path_bytes
        scalar_bounds: project_version_scope.yml:sunglasses_scalar_bounds
    apps_rule: apps has no child union and produces Candidate.concrete application and fixed-local open leaves
    equivalence_rule:
      - GUI slider, toggle, and textbox commits construct equal Input and Concrete values to equivalent CLI argv.
      - GUI and CLI reject the same invalid scalar, toggle, path, and monitor values.

