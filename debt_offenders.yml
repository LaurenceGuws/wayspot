acceptance:
  required_before_any_item_closes:
    - design YAML remains aligned with this index
    - "src/picker/sub_cmd.zig defines exactly SubCmd.notifications: NotificationsSubCmd, SubCmd.wallpaper: WallpaperSubCmd, and SubCmd.sunglasses: SunglassesSubCmd"
    - "src/picker/sub_cmd.zig defines exactly DimSubCmd.set/on/off, FilterSubCmd.set/on/off, and ImageSubCmd.set/opacity/on/off/clear"
    - "src/picker/candidate.zig defines exactly Candidate.sub_cmd: SubCmd and Candidate.concrete: Concrete"
    - "src/picker/candidate.zig defines Input exactly as none, scalar, toggle, and path"
    - "src/picker/candidate.zig defines ScalarInput, ToggleInput, and PathInput with the listed owned fields and bounds"
    - "src/picker/candidate.zig enforces ScalarInput grid alignment with signed-safe (value - min) % step == 0 validation"
    - "src/picker/candidate.zig defines Concrete exactly as app, open, lifecycle, and notification"
    - "src/picker/candidate.zig defines Lifecycle exactly as the nine declared resident leaf arms"
    - every Concrete leaf has explicit Input policy coverage and typed sunglasses leaves own bounded monitor values
    - GUI and CLI construct equal Input and Concrete values for equivalent scalar, toggle, and path input
    - GUI and CLI reject the same invalid scalar, toggle, path, and monitor values
    - src/picker/sub_cmd.zig is the sole declaration owner for all SubCmd types; mode files own behavior only
    - apps has no SubCmd arm and emits Candidate.concrete application and fixed-local open leaves
    - notification Concrete leaves have explicit selection and launch rejection
    - no generic, erased, or mode-kind child storage is introduced
    - no CandidateType, Candidate.types, or parallel input-kind field is introduced
    - every target file exists at the exact listed path
    - every target public symbol exists with its listed owner
    - every target file has its listed //! and /// contract
    - every target test exists beside the owning implementation
    - no removed file, symbol, import, or stale command path remains
    - zig build test --summary all
    - zig build
    - git diff --check
    - real CLI apps and resident mode receipts
    - real GUI /apps receipt
    - real Bash completion receipt
    - packaging/bash/wayspot.bash is syntax-checked, source-isolated, and exercised through Bash completion
    - reviewer approval after each implementation slice
