implementation_order:
  - order: 1
    path_symbol: "src/notification/history.zig:History/loadAtPath/path/serialize"
    callers:
      - "build.zig:history_mod"
      - "src/notification/mod.zig:history"
      - "src/notification/dbus.zig:persistHistory"
      - "src/notification/history_list.zig:collectAtPathAtTime"
      - "src/aggregate_test.zig:notification_history_source/History/path"
    task: >-
      Keep the notification history implementation at src/notification/history.zig. Its record container is History, its path function is path, and its relative path constant is relative_path. RowInput, Row, History.rows, upsert, pruneOld, saveAtPath, load, loadAtPath, serialize, duplicateRow, freeRow, and rowNewer remain notification record operations. The build module, imports, notification module export, aggregate export, and notification history test roots use wayspot_history and History.
    acceptance_proof:
      - Test source rename and exact import graph with rg for history_cache, wayspot_history_cache, cachePath, and Cache under notification paths returning no current match.
      - Test RowInput and Row retain all current record fields and History.rows holds at most 512 rows.
      - Test path returns XDG_STATE_HOME/wayspot/notifications-history.json and HOME/.local/state/wayspot/notifications-history.json with XDG_STATE_HOME treated as a parent directory.
      - Test missing file, permission error, directory, allocation error, StreamTooLong, invalid JSON, unsupported version, invalid row, row overflow, and serialized byte overflow as exact errors.
      - Test serialize only builds bounded bytes; test History.saveAtPath writes those bytes through createFileAtomic replacement, file sync, and parent directory creation.
      - Run zig build test --summary all, zig build, zig fmt --check, source scans, YAML validation, and git diff --check.
    status: closed

  - order: 2
    name: notification_live_change_atomicity
    path_symbol: "src/notification/state.zig:Store"
    target_paths:
      - "src/notification/state.zig"
      - "src/notification/dbus.zig"
      - "src/notification/history.zig"
    target_symbols:
      - "src/notification/state.zig:Store.prepareNotify"
      - "src/notification/state.zig:NotifyChange"
      - "src/notification/dbus.zig:DBus.prepareTimer"
      - "src/notification/dbus.zig:TimerChange"
      - "src/notification/history.zig:ParentSyncError"
      - "src/notification/history.zig:History.saveAtPathResult"
      - "src/notification/history.zig:SaveResult"
    callers:
      - "src/notification/dbus.zig:handleNotify"
    depends_on:
      - 1
    task: >-
      Add a bounded Store change transaction for new and replacement notifications. Store.prepareNotify must perform every fallible notification allocation and capacity check before changing the map, retain the exact previous Notification and next_id, and return NotifyChange. NotifyChange.rollback restores the previous Store fields and next_id or removes the new row; NotifyChange.commit performs only non-fallible ownership swaps and frees. Add DBus.prepareTimer and TimerChange. Timer preparation reserves timer-map capacity and creates the new source while the old timer entry remains installed; rollback removes only the new source and commit performs only the prepared map swap and old-source removal. Use this change in handleNotify before new or replacement History persistence. History.saveAtPathResult must distinguish errors before Atomic.replace from parent-sync failure after replacement. Pre-replace errors roll back Store and timer; post-replace parent-sync failure commits Store and timer, publishes post-commit effects, and reports the committed-unsynced result at DBus. Close and expiry History persistence belong only to order 3. Keep src/notification/rows.zig, notification_rows, and their callers untouched.
    acceptance_proof:
      - Test replacement allocation failure leaves every previous Store field and map identity unchanged.
      - Test new allocation failure and NotifyChange.rollback restore Store length and next_id exactly.
      - Test NotifyChange.commit frees retained replacement fields exactly once.
      - Test timer preparation and rollback preserve the old source and timer entry, and successful commit replaces them without a fallible operation.
      - Test the present pre-replace failures: error.IsDir while loading the history path, HistoryFieldTooLong during upsert, and the /proc destination failure. The existing saved History bytes remain byte-identical, Store and timer roll back, and no hook or legacy-row effect publishes; no injected temporary-write, file-sync, or Atomic.replace failure is claimed.
      - Inject parent-sync failure after replacement and prove new valid History bytes remain at the path, Store and timer commit, hook and legacy-row effects publish after commit, and DBus reports the exact committed-unsynced error.
      - Test no picker import reaches DBus and keep rows.zig untouched in this slice.
    size_observation: "Historical order-2 checkpoint: the 377-test proof measured 754297 current src/*.zig bytes against the 718917-byte 6ff94bc src/*.zig baseline; this was not a passing size condition and is not the current worktree measure."
    status: closed

  - order: 3
    path_symbol: "src/notification/dbus.zig:persistHistory"
    target_symbols:
      - "src/notification/dbus.zig:CloseResult"
      - "src/notification/dbus.zig:closeWithReason"
      - "src/notification/dbus.zig:closeWithReasonAtPathWithPersistence"
      - "src/notification/dbus.zig:expireAtPathWithPersistence"
      - "src/notification/dbus.zig:onNotificationExpired"
      - "src/notification/dbus.zig:persistHistory"
      - "src/notification/dbus.zig:persistCloseHistory"
    callers:
      - "src/notification/dbus.zig:handleNotify"
      - "src/notification/dbus.zig:closeWithReason"
      - "src/notification/dbus.zig:onNotificationExpired"
    depends_on:
      - 1
      - 2
    task: >-
      Make persistHistory write notify and replacement rows through History.saveAtPathResult. A live replacement loads the existing durable row and preserves its created_ns; a new durable row uses the current time. Make closeWithReasonAtPathWithPersistence load the complete History.Row and change only updated_ns, active, and closed_reason, preserving id, created_ns, app_name, app_icon, summary, body, urgency, and transient without reading src/notification/rows.zig. A missing durable row returns error.HistoryRowNotFound. Pre-replace load, upsert, serialize, temporary-write, or file-sync errors leave Store, timer, history bytes, hooks, and legacy rows unchanged. A parent-sync error is post-replace: return DBus.CloseResult.committed_unsynced with the exact History.ParentSyncError, then commit live close, timer removal, NotificationClosed, on_closed, and the legacy row. Expiry keeps the current source and live row and returns a continuing source result after a pre-replace error; it removes and closes only after published or committed-unsynced persistence. Explicit CloseNotification distinguishes an unknown live id, HistoryRowNotFound, and other write errors. DBus deinit creates no row; clean shutdown only proves previously written rows survive reload.
    acceptance_proof:
      - Test "notify history preserves replacement created time and dates new rows" for replacement created_ns preservation and new-row timestamps.
      - Test "close persists every durable field before live removal" for id, created_ns, all text, urgency, transient, active, closed_reason, timer removal, NotificationClosed, on_closed, and the legacy row.
      - Test "close missing durable row leaves live state and timer unchanged" for UnknownNotificationId, HistoryRowNotFound, unchanged Store/timer, and no effects.
      - Test "close pre-replace failure preserves live state timer file and effects" for load/path and injected write failure with unchanged Store, timer, bytes, hooks, and legacy rows.
      - Test "close parent sync failure commits live close and effects" for published bytes, committed Store/timer/effects, and exact error.InputOutput.
      - Test "expiry retries pre-replace failure and closes on success" for a continuing current timer, unchanged live state and bytes, then successful close.
      - Test "DBus deinit creates no durable history row" and reload previously written rows after clean shutdown.
      - Test no picker import reaches DBus and no DBus path writes picker history.log.
      - Run bounded notification start, notify, close, expiry, and clean-shutdown receipts.
    size_observation: "Current order-3 worktree proof measures 777209 src/*.zig bytes excluding line endings against the 718917-byte 6ff94bc src/*.zig baseline; the final size gate remains failing."
    status: closed

  - order: 4
    path_symbol: "src/notification/state.zig:Store"
    depends_on: [3]
    delete_paths:
      - "src/notification/rows.zig"
    delete_symbols:
      - "src/notification/dbus.zig:notification_rows/recordNotify/recordClosed"
      - "src/notification/mod.zig:rows"
      - "src/notification/rows.zig:row_store/Rows/Snapshot/registerCloser/clearCloser/recordNotify/recordClosed/closeById/closeAllActive/snapshot/freeSnapshot"
    task: Keep Store as the only live notification row allocation and mutation site with the 256 notification bound. Delete src/notification/rows.zig, remove notification_rows from dbus.zig, remove recordNotify and recordClosed calls, remove the rows export, and remove rows tests from build and aggregate imports. Extend Store.Notification fields and Store.close to carry the live fields needed by DBus and banners. Free every Store notification exactly once at replace, close, timer failure, DBus deinit, and allocation failure.
    acceptance_proof:
      - Run rg for notification_rows, rows.zig, row_store, recordNotify, and recordClosed and accept only historical register text.
      - Test Store replacement, 256-row capacity, 257th notification failure, close, expiry, timer failure, OOM, and deinit.
      - Test failed text duplication leaves the previous Store notification unchanged.
      - Run notification resident reachability and clean-shutdown receipts with no rows.zig process and no unfreed allocation remaining.
    status: open

  - order: 5
    path_symbol: "src/notification/history_list.zig:NotificationHistoryList.cache/collectAtPathAtTime"
    depends_on: [4]
    target_symbols:
      - "src/notification/history_list.zig:NotificationHistoryList.loaded"
      - "src/notification/history_list.zig:collectAtPathAtTime"
      - "src/notification/history_list.zig:appendRow"
    task: >-
      Delete NotificationHistoryList.cache. Add one loaded bool. Make collectAtPathAtTime load one local History, sort its rows, append bounded Candidate.notification strings, deinit the local History, and set loaded true. Make clearCandidateProduction free owned_strings and set loaded false. Make appendRow write stable selection text notification-history:<id> with no rank and retain max_open_bytes 32.
    acceptance_proof:
      - Test source has no NotificationHistoryList.cache field and no retained History after collectAtPathAtTime returns.
      - Test loaded false, one successful load, repeated collect without a second read, clear reset, and retry after failure.
      - Test newest timestamp order, identity tie order, the largest u32 id selection, the 32-byte bound, and formatter rejection of a constructed overlong selection.
      - Test allocation failure frees title, subtitle, selection, local History rows, and Candidate list state.
      - Run notification picker output and GUI/CLI byte-equivalence receipts.
    status: open

  - order: 6
    path_symbol: "src/picker/cmd.zig:Picker.history/recordHistory/loadHistorySelections/writeHistoryAtomic"
    depends_on: [5]
    delete_symbols:
      - "src/picker/cmd.zig:Picker.max_history"
    task: >-
      Set one picker history bound of 64 entries, 256 bytes per selection, and 16384 serialized bytes. Keep Picker.history in unique oldest-first order. Make recordHistory reject empty, overlong, and unreachable selection text; remove an existing equal selection, free it, then append the new allocator-owned copy at the newest end. Add Picker.history_loaded, make loadHistorySelections return on the second call, set history_loaded after a successful missing-file read, and leave it false after another read error. Keep PickerBundle.wirePicker and delete only its max_history assignment. Make writeHistoryAtomic preserve the old file, remove its temporary file after every failure, and let the last successful rename define the file contents.
    acceptance_proof:
      - Test 64 entries, 65th entry, 256-byte selection, 257-byte selection, 16384-byte file, and one-byte overflow.
      - Test missing file, permission error, directory, malformed line, unreachable selection, duplicate selection replacement and freeing, second load, and failed launch recording.
      - Test the 32-value field and the max_history assignment in src/main.zig:PickerBundle.wirePicker are deleted and no other picker history bound remains.
      - Test writeHistoryAtomic leaves the old file valid and removes the temporary file after write, sync, rename, and parent-sync failure.
      - Test deinit frees every selection copy and every selection is an allocator-owned copy independent of query and Candidate bytes.
      - Run GUI and CLI selection-history receipts.
    status: open

  - order: 7
    path_symbol: "src/picker/rank.zig:rankCandidatesWithHistory/rankCandidatesWithOldestFirstHistory"
    depends_on: [6]
    delete_symbols:
      - "src/picker/rank.zig:rankCandidatesWithHistory"
    task: >-
      Keep rankCandidatesWithOldestFirstHistory as the sole picker history rank function. Delete rankCandidatesWithHistory, its wrapper call, its newest-first tests, and notificationHistoryOrderBoost. Make NotificationHistoryList emit notification candidates newest-first. Store each source index in RankedCandidate. After score, title, subtitle, selection, type, and icon comparisons are equal, sort the lower source index first. Rank only the unique oldest-first Picker.history list and preserve notification row order independently of picker ranking.
    acceptance_proof:
      - Run rg for rankCandidatesWithHistory and notificationHistoryOrderBoost and accept only the deleted-symbol record in this register.
      - Test empty history, one selection, 64 selections, duplicate selection, oldest-first order, and deterministic title, selection, type, and icon tie breaks.
      - Test notification timestamps do not change picker scores and picker history does not change notification row order.
      - Test two equal-score notification rows prove the newest source index remains first after ranking.
      - Run zig build test --summary all and zig build.
    status: open

  - order: 8
    path_symbol: "src/picker/mode/apps.zig:Apps.cache_path/cache_data/owned_strings/collectCandidates/collectFromDesktopFiles"
    depends_on: [7]
    target_symbols:
      - "src/picker/mode/apps.zig:Apps.defaultCachePath"
    callers:
      - "src/picker/cmd.zig:buildCandidatesTransactional"
      - "src/cli/entry.zig:runIconDiag"
      - "src/cli/entry.zig:runIconCacheRefresh"
    delete_symbols:
      - "src/picker/mode/apps.zig:Apps.cache_data"
    task: >-
      Make Apps.cache_path an owned []u8 freed by Apps.deinit. Keep owned_strings only for Candidate fields. Delete Apps.cache_data. Read cache bytes into a local buffer, parse each TSV field into an owned copy, free the raw buffer before Candidate publication, and free every owned string in Apps.deinit and picker rollback. Make Apps.defaultCachePath build XDG_CACHE_HOME/wayspot/apps.tsv with HOME/.cache/wayspot/apps.tsv fallback. Remove app_cache_path from PickerBundle. Bound category, name, executable selection, and icon fields at 256 bytes. When no valid cache record remains, call collectFromDesktopFiles and then write valid records through writeAppCacheFromCandidates. Keep fixed local Spec values separate from desktop records.
    acceptance_proof:
      - Test cache parse, desktop fallback, no-valid-record fallback, fixed-local availability, duplicate executable, malformed field, 256-byte field, 257-byte field, 1024-candidate bound, allocation failure, and retry.
      - Test no Candidate points into the raw cache read buffer after collectCandidates returns.
      - Test failed collection publishes no partial Candidate and frees Apps.owned_strings exactly once.
      - Run wayspot apps and GUI /apps output receipts with byte equality.
    status: open

  - order: 9
    path_symbol: "src/picker/mode/apps.zig:writeAppCacheFromCandidates/invalidateDefaultCache"
    depends_on: [8]
    target_symbols:
      - "src/picker/mode/apps.zig:Apps.defaultCachePath"
    delete_symbols:
      - "src/picker/mode/apps.zig:invalidateDefaultCache"
    callers:
      - "src/main.zig:setupPickerBundle"
      - "src/picker/mode/apps.zig:writeAppCacheFromCandidates"
    task: >-
      Make Apps.defaultCachePath the only path construction function. It returns XDG_CACHE_HOME/wayspot/apps.tsv and HOME/.cache/wayspot/apps.tsv fallback. Make the exact first line # wayspot-apps-v1. Make every following record exactly category<TAB>name<TAB>executable<TAB>icon with no fifth field. Make the parser reject a missing, duplicate, or wrong first version line. Move app path construction out of src/main.zig:setupPickerBundle and call Apps.defaultCachePath from that function. Make writeAppCacheFromCandidates write a bounded TSV through a same-directory temporary file, sync it, rename it, and sync the parent. Keep the previous valid file after write, sync, and rename failure. Delete invalidateDefaultCache, its tests, its docs, and its callers.
    acceptance_proof:
      - Test XDG_CACHE_HOME path, HOME fallback, parent creation, version line, four 256-byte fields, malformed cache, and cache overflow.
      - Inject write, sync, rename, and parent-sync failures and prove the previous file remains valid and the temporary file is removed.
      - Run rg for invalidateDefaultCache and accept only this deletion record.
      - Run CLI app collection, GUI /apps, and isolated cache rebuild receipts.
    status: open

  - order: 10
    path_symbol: "src/picker/icon_cache.zig:refresh"
    depends_on: [9]
    target_path_symbol: "src/picker/icon_cache.zig:refresh"
    callers:
      - "src/cli/entry.zig:runIconCacheRefresh"
      - "src/picker/icons.zig:findCachedIconPath"
    task: >-
