        - NotificationsSubCmd
        - WallpaperSubCmd
        - SunglassesSubCmd
        - DimSubCmd
        - FilterSubCmd
        - ImageSubCmd
        - "SubCmd.notifications: NotificationsSubCmd"
        - "SubCmd.wallpaper: WallpaperSubCmd"
        - "SubCmd.sunglasses: SunglassesSubCmd"
      consumers:
        - src/picker/mode/notifications.zig route behavior only
        - src/picker/mode/wallpaper.zig route behavior only
        - src/picker/mode/sunglasses.zig route behavior only
    comments:
      file: "//! SubCmd is the sole declaration owner for the explicit closed child-union types; mode files consume it and apps has no arm."
      symbols:
        - "/// NotificationsSubCmd is the concrete notification child union consumed by the notifications mode."
        - "/// WallpaperSubCmd is the concrete wallpaper child union consumed by the wallpaper mode."
        - "/// SunglassesSubCmd is the concrete sunglasses child union consumed by the sunglasses mode."
        - "/// DimSubCmd selects set, on, or off; the sunglasses leaf builder enforces scalar or toggle Input."
        - "/// FilterSubCmd selects set, on, or off; the sunglasses leaf builder enforces scalar or toggle Input."
        - "/// ImageSubCmd selects set, opacity, on, off, or clear; the sunglasses leaf builder enforces path, scalar, toggle, or none Input."
        - "/// SubCmd.notifications carries NotificationsSubCmd without erasing its type."
        - "/// SubCmd.wallpaper carries WallpaperSubCmd without erasing its type."
        - "/// SubCmd.sunglasses carries SunglassesSubCmd without erasing its type."
    tests:
      - SubCmd has exactly notifications, wallpaper, and sunglasses arms
      - each arm carries its named concrete child union
      - SunglassesSubCmd exposes exactly restart, apply, reconcile, dim, filter, and image
      - DimSubCmd exposes exactly set, on, and off and constrains Input at leaf construction
      - FilterSubCmd exposes exactly set, on, and off and constrains Input at leaf construction
      - ImageSubCmd exposes exactly set, opacity, on, off, and clear and constrains Input at leaf construction
      - SubCmd has no apps arm
      - mode files do not redeclare NotificationsSubCmd, WallpaperSubCmd, or SunglassesSubCmd
      - no generic, erased, or mode-kind child storage exists

