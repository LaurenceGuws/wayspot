size_rule:
  measure: "Measure source bytes after removing CR and LF bytes; measure source line characters before the line-ending removal."
  columns: "Every final in-scope src line must have at most 120 characters."
  baseline: "The 6ff94bc baseline is the byte total from tracked src/*.zig files at commit 6ff94bc after CR and LF removal."
  requirement: "The final in-scope src byte total must be lower than the 6ff94bc baseline."
  proof_commands:
    - "find src -type f -name '*.zig' -print0 | sort -z | xargs -0 awk 'length($0) > 120 { bad = 1 } END { exit bad }'"
    - "baseline=$(git ls-tree -r --name-only 6ff94bc -- src | awk '/\\.zig$/ { print }' | while IFS= read -r path; do git show \"6ff94bc:$path\"; done | tr -d '\\r\\n' | wc -c); current=$(find src -type f -name '*.zig' -print0 | sort -z | xargs -0 cat | tr -d '\\r\\n' | wc -c); test \"$current\" -lt \"$baseline\""
    - "zig build test --summary all"
    - "zig build"
    - "zig fmt --check"
    - "git diff --check"
    - "ruby -e 'require \"yaml\"; YAML.load_stream(File.read(\"debt_offenders.yml\"))'"
  close_rule: "Close an individual order after its listed source tests, source scans, and path receipt pass. Close the register only after every order is closed and the final source-size proof passes."

source_reference_rule: "Every path_symbol and callers entry names a current file and a current symbol. target_path_symbol and target_symbols name planned post-task symbols and are not current source claims."
